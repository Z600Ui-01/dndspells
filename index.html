uccess, it frees itself.","damage_en":"3d6 Bludgeoning","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 땅의 6m(20ft) 정사각형을 꿈틀거리는 검은 촉수가 채운다. 지속시간 동안 이 촉수는 그 구역의 땅을 어려운 지형으로 만든다.\n\n크리처가 한 턴에 처음으로 영향받는 구역에 들어오거나 그곳에서 턴을 시작하면, 민첩 내성 굴림에 성공하지 못할 경우 3d6 타격 피해를 받고 주문이 끝날 때까지 촉수에 포박된다. 이미 촉수에 포박된 채 그 구역에서 턴을 시작하는 크리처는 3d6 타격 피해를 받는다.\n\n촉수에 포박된 크리처는 행동을 사용해 시전자의 주문 내성 DC에 맞선 근력 또는 민첩 판정(선택)을 굴릴 수 있다. 성공 시 스스로 풀려난다.","higher_level_ko":"","damage_ko":"3d6 타격 피해","material_ko":"거대 문어나 거대 오징어의 촉수 조각."},{"name_ko":"에테르화","name_en":"Etherealness","level":7,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"8 hours","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 8th level or higher, you can target up to three willing creatures (including you) for each slot level above 7th. The creatures must be within 10 feet of you when you cast the spell.","desc_en":"You step into the border regions of the Ethereal Plane, in the area where it overlaps with your current plane. You remain in the Border Ethereal for the duration or until you use your action to dismiss the spell. During this time, you can move in any direction. If you move up or down, every foot of movement costs an extra foot. You can see and hear the plane you originated from, but everything there looks gray, and you can't see anything more than 60 feet away.\n\nWhile on the Ethereal Plane, you can only affect and be affected by other creatures on that plane. Creatures that aren't on the Ethereal Plane can't perceive you and can't interact with you, unless a special ability or magic has given them the ability to do so.\n\nYou ignore all objects and effects that aren't on the Ethereal Plane, allowing you to move through objects you perceive on the plane you originated from.\n\nWhen the spell ends, you immediately return to the plane you originated from in the spot you currently occupy. If you occupy the same spot as a solid object or creature when this happens, you are immediately shunted to the nearest unoccupied space that you can occupy and take force damage equal to twice the number of feet you are moved.\n\nThis spell has no effect if you cast it while you are on the Ethereal Plane or a plane that doesn't border it, such as one of the Outer Planes.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"역장 우리","name_en":"Forcecage","level":7,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"100 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"Ruby dust worth 1,500 gp.","higher_level_en":"","desc_en":"An immobile, invisible, cube-shaped prison composed of magical force springs into existence around an area you choose within range. The prison can be a cage or a solid box, as you choose.\n\nA prison in the shape of a cage can be up to 20 feet on a side and is made from 1/2-inch diameter bars spaced 1/2 inch apart.\n\nA prison in the shape of a box can be up to 10 feet on a side, creating a solid barrier that prevents any matter from passing through it and blocking any spells cast into or out from the area.\n\nWhen you cast the spell, any creature that is completely inside the cage's area is trapped. Creatures only partially within the area, or those too large to fit inside the area, are pushed away from the center of the area until they are completely outside the area.\n\nA creature inside the cage can't leave it by nonmagical means. If the creature tries to use teleportation or interplanar travel to leave the cage, it must first make a charisma saving throw. On a success, the creature can use that magic to exit the cage. On a failure, the creature can't exit the cage and wastes the use of the spell or effect. The cage also extends into the Ethereal Plane, blocking ethereal travel.\n\nThis spell can't be dispelled by dispel magic.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"역장의 벽","name_en":"Wall of Force","level":5,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A pinch of powder made by crushing a clear gemstone.","higher_level_en":"","desc_en":"An invisible wall of force springs into existence at a point you choose within range. The wall appears in any orientation you choose, as a horizontal or vertical barrier or at an angle. It can be free floating or resting on a solid surface. You can form it into a hemispherical dome or a sphere with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-by-10-foot panels. Each panel must be contiguous with another panel. In any form, the wall is 1/4 inch thick. It lasts for the duration. If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (your choice which side).\n\nNothing can physically pass through the wall. It is immune to all damage and can't be dispelled by dispel magic. A disintegrate spell destroys the wall instantly, however. The wall also extends into the Ethereal Plane, blocking ethereal travel through the wall.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에서 선택한 지점에 보이지 않는 역장의 벽이 솟아난다. 벽은 수평 장벽, 수직 장벽, 또는 비스듬히 등 원하는 어떤 방향으로도 나타난다. 자유로이 떠 있거나 단단한 표면에 놓일 수 있다. 반경 최대 3m(10ft)의 반구형 반구나 구체로 만들거나, 각각 10피트×10피트인 판 열 개로 이루어진 평면으로 빚을 수 있다. 각 판은 다른 판과 인접해야 한다. 어떤 형태든 벽의 두께는 1/4인치다. 지속시간 동안 유지된다. 벽이 나타날 때 기존 크리처의 공간을 지나가면, 그 크리처는 벽의 한쪽으로 밀려난다(어느 쪽인지는 시전자 선택).\n\n어떤 것도 물리적으로 벽을 통과할 수 없다. 벽은 모든 피해에 면역이며 마법 무효화로 무효화되지 않는다. 다만 분해 주문은 벽을 즉시 파괴한다. 벽은 영계로도 뻗어, 벽을 통한 영계 이동을 막는다.","higher_level_ko":"","damage_ko":"","material_ko":"투명한 보석을 부수어 만든 가루 한 자밤."},{"name_ko":"연쇄 번개","name_en":"Chain Lightning","level":6,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A bit of fur; a piece of amber, glass, or a crystal rod; and three silver pins.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, one additional bolt leaps from the first target to another target for each slot level above 6th.","desc_en":"You create a bolt of lightning that arcs toward a target of your choice that you can see within range. Three bolts then leap from that target to as many as three other targets, each of which must be within 30 feet of the first target. A target can be a creature or an object and can be targeted by only one of the bolts.\n\nA target must make a dexterity saving throw. The target takes 10d8 lightning damage on a failed save, or half as much damage on a successful one.","damage_en":"10d8 Lightning","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"10d8 번개 피해","material_ko":""},{"name_ko":"염동력","name_en":"Telekinesis","level":5,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"You gain the ability to move or manipulate creatures or objects by thought. When you cast the spell, and as your action each round for the duration, you can exert your will on one creature or object that you can see within range, causing the appropriate effect below. You can affect the same target round after round, or choose a new one at any time. If you switch targets, the prior target is no longer affected by the spell.\n\n***Creature.*** You can try to move a Huge or smaller creature. Make an ability check with your spellcasting ability contested by the creature's Strength check. If you win the contest, you move the creature up to 30 feet in any direction, including upward but not beyond the range of this spell. Until the end of your next turn, the creature is restrained in your telekinetic grip. A creature lifted upward is suspended in mid-air.\n\nOn subsequent rounds, you can use your action to attempt to maintain your telekinetic grip on the creature by repeating the contest.\n\n***Object.*** You can try to move an object that weighs up to 1,000 pounds. If the object isn't being worn or carried, you automatically move it up to 30 feet in any direction, but not beyond the range of this spell.\n\nIf the object is worn or carried by a creature, you must make an ability check with your spellcasting ability contested by that creature's Strength check. If you succeed, you pull the object away from that creature and can move it up to 30 feet in any direction but not beyond the range of this spell.\n\nYou can exert fine control on objects with your telekinetic grip, such as manipulating a simple tool, opening a door or a container, stowing or retrieving an item from an open container, or pouring the contents from a vial.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"생각으로 크리처나 물체를 움직이거나 다루는 능력을 얻는다. 주문을 시전할 때, 그리고 지속시간 동안 매 라운드 행동으로, 사거리 내에서 볼 수 있는 크리처나 물체 하나에 의지를 발휘해 아래의 해당 효과를 일으킬 수 있다. 같은 대상에게 라운드마다 계속 영향을 주거나, 언제든 새 대상을 고를 수 있다. 대상을 바꾸면 이전 대상은 더 이상 주문의 영향을 받지 않는다.\n\n***크리처.*** 초대형 이하의 크리처를 움직이려 시도할 수 있다. 시전자의 주문시전 능력으로 능력 판정을 굴려 크리처의 근력 판정과 겨룬다. 겨룸에서 이기면 크리처를 위쪽을 포함한 어느 방향으로든 최대 9m(30ft) 움직이되, 이 주문의 사거리를 넘지는 못한다. 다음 턴이 끝날 때까지 크리처는 시전자의 염동력 손아귀에 포박된다. 위로 들어올려진 크리처는 공중에 매달린다.\n\n이후 라운드에는 행동을 사용해, 겨룸을 반복하여 크리처에 대한 염동력 손아귀를 유지하려 시도할 수 있다.\n\n***물체.*** 최대 1,000파운드 무게의 물체를 움직이려 시도할 수 있다. 물체가 착용하거나 소지되지 않았으면, 어느 방향으로든 최대 9m(30ft) 자동으로 움직이되 이 주문의 사거리를 넘지는 못한다.\n\n물체가 크리처에게 착용되거나 소지되어 있으면, 시전자의 주문시전 능력으로 능력 판정을 굴려 그 크리처의 근력 판정과 겨뤄야 한다. 성공하면 물체를 그 크리처에게서 떼어내 어느 방향으로든 최대 9m(30ft) 움직일 수 있되 이 주문의 사거리를 넘지는 못한다.\n\n염동력 손아귀로 물체를 정밀하게 조종할 수 있으며, 단순한 도구를 다루거나, 문이나 용기를 열거나, 열린 용기에서 물건을 넣거나 꺼내거나, 병의 내용물을 따를 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"염탐","name_en":"Scrying","level":5,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"10 minutes","duration_en":"Up to 10 minutes","material_en":"A focus worth at least 1,000 gp, such as a crystal ball, a silver mirror, or a font filled with holy water.","higher_level_en":"","desc_en":"You can see and hear a particular creature you choose that is on the same plane of existence as you. The target must make a wisdom saving throw, which is modified by how well you know the target and the sort of physical connection you have to it. If a target knows you're casting this spell, it can fail the saving throw voluntarily if it wants to be observed.\n\n| Knowledge | Save Modifier |\n\n|---|---|\n\n| Secondhand (you have heard of the target) | +5 |\n\n| Firsthand (you have met the target) | +0 |\n\n| Familiar (you know the target well) | -5 |\n\n\n\n| Connection | Save Modifier |\n\n|---|---|\n\n| Likeness or picture | -2 |\n\n| Possession or garment | -4 |\n\n| Body part, lock of hair, bit of nail, or the like | -10 |\n\nOn a successful save, the target isn't affected, and you can't use this spell against it again for 24 hours.\n\nOn a failed save, the spell creates an invisible sensor within 10 feet of the target. You can see and hear through the sensor as if you were there. The sensor moves with the target, remaining within 10 feet of it for the duration. A creature that can see invisible objects sees the sensor as a luminous orb about the size of your fist.\n\nInstead of targeting a creature, you can choose a location you have seen before as the target of this spell. When you do, the sensor appears at that location and doesn't move.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"10 분","duration_ko":"정신집중, 최대 10분","desc_ko":"시전자와 같은 존재계에 있는, 선택한 특정 크리처를 보고 들을 수 있다. 대상은 지혜 내성 굴림을 굴려야 하며, 시전자가 대상을 얼마나 잘 아는지와 대상과의 물리적 연결 종류에 따라 수정된다. 대상이 시전자가 이 주문을 시전 중임을 알면, 관찰당하기를 원할 경우 자발적으로 내성 굴림에 실패할 수 있다.\n\n| 지식 | 내성 수정치 |\n|---|---|\n| 간접적(대상에 대해 들어봄) | +5 |\n| 직접적(대상을 만난 적 있음) | +0 |\n| 친숙함(대상을 잘 앎) | -5 |\n\n| 연결 | 내성 수정치 |\n|---|---|\n| 초상화나 그림 | -2 |\n| 소지품이나 의복 | -4 |\n| 신체 부위, 머리카락 한 줌, 손톱 조각 등 | -10 |\n\n내성 굴림에 성공하면 대상은 영향받지 않으며, 24시간 동안 그 대상에게 이 주문을 다시 쓸 수 없다.\n\n내성 굴림에 실패하면, 주문이 대상의 3m(10ft) 이내에 보이지 않는 감지기를 만든다. 마치 그곳에 있는 것처럼 감지기를 통해 보고 들을 수 있다. 감지기는 대상과 함께 이동하며, 지속시간 동안 대상의 3m(10ft) 이내에 머무른다. 투명한 물체를 볼 수 있는 크리처는 감지기를 주먹만 한 빛나는 구체로 본다.\n\n크리처를 대상으로 하는 대신, 전에 본 적 있는 장소를 이 주문의 대상으로 선택할 수 있다. 그러면 감지기가 그 장소에 나타나 움직이지 않는다.","higher_level_ko":"","damage_ko":"","material_ko":"수정구, 은거울, 성수가 담긴 대야 등 1,000gp 이상 가치의 초점 매개체."},{"name_ko":"영상 투사","name_en":"Project Image","level":7,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"500 miles","casting_time_en":"1 action","duration_en":"Up to 24 hours","material_en":"A small replica of you made from materials worth at least 5 gp.","higher_level_en":"","desc_en":"You create an illusory copy of yourself that lasts for the duration. The copy can appear at any location within range that you have seen before, regardless of intervening obstacles. The illusion looks and sounds like you but is intangible. If the illusion takes any damage, it disappears, and the spell ends.\n\nYou can use your action to move this illusion up to twice your speed, and make it gesture, speak, and behave in whatever way you choose. It mimics your mannerisms perfectly.\n\nYou can see through its eyes and hear through its ears as if you were in its space. On your turn as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings.\n\nPhysical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"영속의 불꽃","name_en":"Continual Flame","level":2,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Until dispelled","material_en":"Ruby dust worth 50 gp, which the spell consumes.","higher_level_en":"","desc_en":"A flame, equivalent in brightness to a torch, springs forth from an object that you touch. The effect looks like a regular flame, but it creates no heat and doesn't use oxygen. A continual flame can be covered or hidden but not smothered or quenched.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"무효화될 때까지","desc_ko":"횃불에 맞먹는 밝기의 불꽃이 접촉한 물체에서 솟아난다. 이 효과는 평범한 불꽃처럼 보이지만 열을 내지 않고 산소를 쓰지 않는다. 영속의 불꽃은 덮거나 숨길 수는 있으나 끄거나 진화할 수는 없다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 50gp 가치의 루비 가루."},{"name_ko":"영웅들의 축연","name_en":"Heroes' Feast","level":6,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"10 minutes","duration_en":"Instantaneous","material_en":"A gem-encrusted bowl worth at least 1,000gp, which the spell consumes.","higher_level_en":"","desc_en":"You bring forth a great feast, including magnificent food and drink. The feast takes 1 hour to consume and disappears at the end of that time, and the beneficial effects don't set in until this hour is over. Up to twelve other creatures can partake of the feast.\n\nA creature that partakes of the feast gains several benefits. The creature is cured of all diseases and poison, becomes immune to poison and being frightened, and makes all wisdom saving throws with advantage. Its hit point maximum also increases by 2d10, and it gains the same number of hit points. These benefits last for 24 hours.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"영웅심","name_en":"Heroism","level":1,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"A willing creature you touch is imbued with bravery. Until the spell ends, the creature is immune to being frightened and gains temporary hit points equal to your spellcasting ability modifier at the start of each of its turns. When the spell ends, the target loses any remaining temporary hit points from this spell.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"접촉한 동의하는 크리처에게 용맹이 깃든다. 주문이 끝날 때까지, 그 크리처는 공포에 면역이 되고 자기 턴이 시작될 때마다 시전자의 주문시전 능력 수정치만큼의 임시 히트 포인트를 얻는다. 주문이 끝나면 대상은 이 주문으로 얻은 남은 임시 히트 포인트를 모두 잃는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"영체 무기","name_en":"Spiritual Weapon","level":2,"school":"방출계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 bonus action","duration_en":"1 minute","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for every two slot levels above the 2nd.","desc_en":"You create a floating, spectral weapon within range that lasts for the duration or until you cast this spell again. When you cast the spell, you can make a melee spell attack against a creature within 5 feet of the weapon. On a hit, the target takes force damage equal to 1d8 + your spellcasting ability modifier.\n\nAs a bonus action on your turn, you can move the weapon up to 20 feet and repeat the attack against a creature within 5 feet of it.\n\nThe weapon can take whatever form you choose. Clerics of deities who are associated with a particular weapon (as St. Cuthbert is known for his mace and Thor for his hammer) make this spell's effect resemble that weapon.","damage_en":"1d8 + MOD Force","attack_type":"melee","range_ko":"18m(60ft)","casting_time_ko":"1 추가 행동","duration_ko":"1 분","desc_ko":"사거리 내에 떠다니는 유령 같은 무기를 만들며, 지속시간 동안 또는 이 주문을 다시 시전할 때까지 유지된다. 주문을 시전할 때, 무기의 1.5m(5ft) 이내에 있는 크리처에게 근접 주문 공격을 할 수 있다. 명중 시 대상은 1d8 + 시전자의 주문시전 능력 수정치만큼의 역장 피해를 받는다.\n\n자기 턴에 추가 행동으로, 무기를 최대 6m(20ft) 이동시켜 그 1.5m(5ft) 이내의 크리처에게 공격을 반복할 수 있다.\n\n무기는 원하는 형태를 취할 수 있다. 특정 무기와 연관된 신을 섬기는 성직자는 이 주문의 효과를 그 무기 모양으로 만든다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨 두 단계마다 피해가 1d8씩 증가한다.","damage_ko":"1d8 + 능력 수정치 역장 피해","material_ko":""},{"name_ko":"영혼 수호자","name_en":"Spirit Guardians","level":3,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A holy symbol.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd.","desc_en":"You call forth spirits to protect you. They flit around you to a distance of 15 feet for the duration. If you are good or neutral, their spectral form appears angelic or fey (your choice). If you are evil, they appear fiendish.\n\nWhen you cast this spell, you can designate any number of creatures you can see to be unaffected by it. An affected creature's speed is halved in the area, and when the creature enters the area for the first time on a turn or starts its turn there, it must make a wisdom saving throw. On a failed save, the creature takes 3d8 radiant damage (if you are good or neutral) or 3d8 necrotic damage (if you are evil). On a successful save, the creature takes half as much damage.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"영혼들을 불러내 시전자를 보호한다. 지속시간 동안 영혼들이 시전자 주위 4.5m(15ft) 거리까지 맴돈다. 시전자가 선이나 중립이면 그 영체 형태는 천사나 요정처럼 보이고(시전자 선택), 악이면 악마처럼 보인다.\n\n주문을 시전할 때, 볼 수 있는 크리처를 원하는 만큼 지정해 영향받지 않게 할 수 있다. 영향받는 크리처는 그 구역에서 이동속도가 절반이 되고, 한 턴에 처음으로 그 구역에 들어오거나 그곳에서 턴을 시작하면 지혜 내성 굴림을 굴려야 한다. 실패 시 3d8 광휘 피해(시전자가 선이나 중립일 때)나 3d8 사령 피해(시전자가 악일 때)를, 성공 시 절반의 피해를 받는다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"","material_ko":"성표."},{"name_ko":"예견안","name_en":"Foresight","level":9,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"8 hours","material_en":"A hummingbird feather.","higher_level_en":"","desc_en":"You touch a willing creature and bestow a limited ability to see into the immediate future. For the duration, the target can't be surprised and has advantage on attack rolls, ability checks, and saving throws. Additionally, other creatures have disadvantage on attack rolls against the target for the duration.\n\nThis spell immediately ends if you cast it again before its duration ends.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"예지","name_en":"Divination","level":4,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Incense and a sacrificial offering appropriate to your religion, together worth at least 25gp, which the spell consumes.","higher_level_en":"","desc_en":"Your magic and an offering put you in contact with a god or a god's servants. You ask a single question concerning a specific goal, event, or activity to occur within 7 days. The GM offers a truthful reply. The reply might be a short phrase, a cryptic rhyme, or an omen.\n\nThe spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion.\n\nIf you cast the spell two or more times before finishing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The GM makes this roll in secret.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"시전자의 마법과 제물이 신이나 신의 종복과 접촉하게 한다. 앞으로 7일 이내에 일어날 특정 목표, 사건, 활동에 관한 질문 하나를 한다. DM이 진실한 답을 준다. 답은 짧은 문구, 모호한 시구, 또는 조짐일 수 있다.\n\n이 주문은 추가 주문 시전이나 동료의 상실·합류처럼 결과를 바꿀 수 있는 어떤 상황도 고려하지 않는다.\n\n다음 긴 휴식을 마치기 전에 이 주문을 두 번 이상 시전하면, 첫 번째 이후 시전마다 무작위 결과가 나올 확률이 25퍼센트씩 누적된다. DM은 이 굴림을 비밀리에 한다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는, 시전자의 종교에 어울리는 향과 제물로, 합쳐서 25gp 이상 가치."},{"name_ko":"오도","name_en":"Seeming","level":5,"school":"환영계","components":["S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"8 hours","material_en":"","higher_level_en":"","desc_en":"This spell allows you to change the appearance of any number of creatures that you can see within range. You give each target you choose a new, illusory appearance. An unwilling target can make a charisma saving throw, and if it succeeds, it is unaffected by this spell.\n\nThe spell disguises physical appearance as well as clothing, armor, weapons, and equipment. You can make each creature seem 1 foot shorter or taller and appear thin, fat, or in between. You can't change a target's body type, so you must choose a form that has the same basic arrangement of limbs. Otherwise, the extent of the illusion is up to you. The spell lasts for the duration, unless you use your action to dismiss it sooner.\n\nThe changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to a creature's outfit, objects pass through the hat, and anyone who touches it would feel nothing or would feel the creature's head and hair. If you use this spell to appear thinner than you are, the hand of someone who reaches out to touch you would bump into you while it was seemingly still in midair.\n\nA creature can use its action to inspect a target and make an Intelligence (Investigation) check against your spell save DC. If it succeeds, it becomes aware that the target is disguised.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"이 주문은 사거리 내에서 볼 수 있는 크리처를 원하는 만큼 그 외모를 바꿀 수 있게 한다. 선택한 각 대상에게 새로운 환영 외모를 부여한다. 원치 않는 대상은 매력 내성 굴림을 굴릴 수 있으며, 성공하면 이 주문에 영향받지 않는다.\n\n이 주문은 신체 외모뿐 아니라 옷, 갑옷, 무기, 장비도 변장시킨다. 각 크리처를 1피트 더 작거나 크게 보이게 하고, 마르거나 뚱뚱하거나 그 중간으로 보이게 할 수 있다. 대상의 체형은 바꿀 수 없으므로, 사지 배치가 기본적으로 같은 형태를 골라야 한다. 그 외에 환영의 범위는 시전자에게 달려 있다. 주문은 지속시간 동안, 시전자가 행동을 사용해 일찍 해제하지 않는 한 지속된다.\n\n이 주문으로 만든 변화는 물리적 검사를 견디지 못한다. 예를 들어 이 주문으로 크리처의 복장에 모자를 더하면, 물체가 모자를 통과하며, 그것을 만지는 이는 아무것도 느끼지 못하거나 크리처의 머리와 머리카락을 느낀다. 이 주문으로 실제보다 말라 보이게 하면, 손을 뻗어 만지려는 이의 손은 허공에 있는 듯 보이는 지점에서 시전자와 부딪친다.\n\n크리처는 행동을 사용해 대상을 살피고 시전자의 주문 내성 DC에 맞선 지능(수사) 판정을 할 수 있다. 성공하면 대상이 변장했음을 알아챈다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"오색의 보주","name_en":"Chromatic Orb","level":1,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"오토의 참을 수 없는 춤","name_en":"Otto's Irresistible Dance","level":6,"school":"환혹계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"Choose one creature that you can see within range. The target begins a comic dance in place: shuffling, tapping its feet, and capering for the duration. Creatures that can't be charmed are immune to this spell.\n\nA dancing creature must use all its movement to dance without leaving its space and has disadvantage on dexterity saving throws and attack rolls. While the target is affected by this spell, other creatures have advantage on attack rolls against it. As an action, a dancing creature makes a wisdom saving throw to regain control of itself. On a successful save, the spell ends.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"오틸루크의 빙결 구체","name_en":"Otiluke's Freezing Sphere","level":6,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"300 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A small crystal sphere.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the damage increases by 1d6 for each slot level above 6th.","desc_en":"A frigid globe of cold energy streaks from your fingertips to a point of your choice within range, where it explodes in a 60-foot-radius sphere. Each creature within the area must make a constitution saving throw. On a failed save, a creature takes 10d6 cold damage. On a successful save, it takes half as much damage.\n\nIf the globe strikes a body of water or a liquid that is principally water (not including water-based creatures), it freezes the liquid to a depth of 6 inches over an area 30 feet square. This ice lasts for 1 minute. Creatures that were swimming on the surface of frozen water are trapped in the ice. A trapped creature can use an action to make a Strength check against your spell save DC to break free.\n\nYou can refrain from firing the globe after completing the spell, if you wish. A small globe about the size of a sling stone, cool to the touch, appears in your hand. At any time, you or a creature you give the globe to can throw the globe (to a range of 40 feet) or hurl it with a sling (to the sling's normal range). It shatters on impact, with the same effect as the normal casting of the spell. You can also set the globe down without shattering it. After 1 minute, if the globe hasn't already shattered, it explodes.","damage_en":"10d6 Cold","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"10d6 냉기 피해","material_ko":""},{"name_ko":"오틸루크의 탄성 구체","name_en":"Otiluke's Resilient Sphere","level":4,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A hemispherical piece of clear crystal and a matching hemispherical piece of gum arabic.","higher_level_en":"","desc_en":"A sphere of shimmering force encloses a creature or object of Large size or smaller within range. An unwilling creature must make a dexterity saving throw. On a failed save, the creature is enclosed for the duration.\n\nNothing--not physical objects, energy, or other spell effects--can pass through the barrier, in or out, though a creature in the sphere can breathe there. The sphere is immune to all damage, and a creature or object inside can't be damaged by attacks or effects originating from outside, nor can a creature inside the sphere damage anything outside it.\n\nThe sphere is weightless and just large enough to contain the creature or object inside. An enclosed creature can use its action to push against the sphere's walls and thus roll the sphere at up to half the creature's speed. Similarly, the globe can be picked up and moved by other creatures.\n\nA disintegrate spell targeting the globe destroys it without harming anything inside it.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"어른거리는 역장 구체가 사거리 내 대형 이하의 크리처나 물체를 감싼다. 원치 않는 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 그 크리처는 지속시간 동안 갇힌다.\n\n물리적 물체, 에너지, 그 밖의 주문 효과 등 어떤 것도 장벽을 안팎으로 통과할 수 없으나, 구체 안의 크리처는 그 안에서 숨쉴 수 있다. 구체는 모든 피해에 면역이며, 안의 크리처나 물체는 바깥에서 비롯된 공격이나 효과로 피해를 받을 수 없고, 구체 안의 크리처도 바깥의 어떤 것에도 피해를 줄 수 없다.\n\n구체는 무게가 없고 안의 크리처나 물체를 담을 만큼만 크다. 갇힌 크리처는 행동을 사용해 구체의 벽을 밀어, 크리처 이동속도의 최대 절반으로 구체를 굴릴 수 있다. 마찬가지로 다른 크리처가 구체를 집어들어 옮길 수 있다.\n\n구체를 대상으로 한 분해 주문은 안의 어떤 것도 해치지 않고 구체를 파괴한다.","higher_level_ko":"","damage_ko":"","material_ko":"반구형의 투명한 수정 조각과 그에 맞는 반구형의 아라비아고무 조각."},{"name_ko":"요술","name_en":"Thaumaturgy","level":0,"school":"변환계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"","higher_level_en":"","desc_en":"You manifest a minor wonder, a sign of supernatural power, within range. You create one of the following magical effects within range.\n\n- Your voice booms up to three times as loud as normal for 1 minute.\n\n- You cause flames to flicker, brighten, dim, or change color for 1 minute.\n\n- You cause harmless tremors in the ground for 1 minute.\n\n- You create an instantaneous sound that originates from a point of your choice within range, such as a rumble of thunder, the cry of a raven, or ominous whispers.\n\n- You instantaneously cause an unlocked door or window to fly open or slam shut.\n\n- You alter the appearance of your eyes for 1 minute.\n\nIf you cast this spell multiple times, you can have up to three of its 1-minute effects active at a time, and you can dismiss such an effect as an action.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"사거리 내에서 초자연적 힘의 징표인 사소한 경이를 드러낸다. 사거리 내에서 다음 마법 효과 중 하나를 만든다.\n\n- 목소리가 1분 동안 평소보다 최대 세 배 크게 울린다.\n\n- 불꽃이 1분 동안 깜빡이거나, 밝아지거나, 어두워지거나, 색이 변하게 한다.\n\n- 1분 동안 땅에 무해한 진동을 일으킨다.\n\n- 천둥의 울림, 까마귀의 울음, 불길한 속삭임처럼 사거리 내에서 선택한 지점에서 나는 순간적인 소리를 만든다.\n\n- 잠기지 않은 문이나 창문을 순간적으로 확 열거나 쾅 닫는다.\n\n- 1분 동안 눈의 모습을 바꾼다.\n\n이 주문을 여러 번 시전하면, 1분짜리 효과를 한 번에 최대 세 개까지 유지할 수 있으며, 행동을 사용해 그런 효과를 해제할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"요정 불꽃","name_en":"Faerie Fire","level":1,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"Each object in a 20-foot cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the spell is cast is also outlined in light if it fails a dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-foot radius.\n\nAny attack roll against an affected creature or object has advantage if the attacker can see it, and the affected creature or object can't benefit from being invisible.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내 6m(20ft) 정육면체 안의 각 물체가 파란색, 초록색, 또는 보라색 빛(시전자 선택)으로 윤곽이 드러난다. 주문을 시전할 때 그 구역에 있는 크리처도 민첩 내성 굴림에 실패하면 빛으로 윤곽이 드러난다. 지속시간 동안, 물체와 영향받은 크리처는 3m(10ft) 반경에 흐릿한 빛을 발한다.\n\n영향받은 크리처나 물체를 상대로 한 명중 굴림은 공격자가 그것을 볼 수 있다면 유리 보정을 받으며, 영향받은 크리처나 물체는 투명 상태의 이득을 받을 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"요정 소환","name_en":"Conjure Fey","level":6,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 minute","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the challenge rating increases by 1 for each slot level above 6th.","desc_en":"You summon a fey creature of challenge rating 6 or lower, or a fey spirit that takes the form of a beast of challenge rating 6 or lower. It appears in an unoccupied space that you can see within range. The fey creature disappears when it drops to 0 hit points or when the spell ends.\n\nThe fey creature is friendly to you and your companions for the duration. Roll initiative for the creature, which has its own turns. It obeys any verbal commands that you issue to it (no action required by you), as long as they don't violate its alignment. If you don't issue any commands to the fey creature, it defends itself from hostile creatures but otherwise takes no actions.\n\nIf your concentration is broken, the fey creature doesn't disappear. Instead, you lose control of the fey creature, it becomes hostile toward you and your companions, and it might attack. An uncontrolled fey creature can't be dismissed by you, and it disappears 1 hour after you summoned it.\n\nThe GM has the fey creature's statistics.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"운석 소환","name_en":"Meteor Swarm","level":9,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"1 mile","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Blazing orbs of fire plummet to the ground at four different points you can see within range. Each creature in a 40-foot-radius sphere centered on each point you choose must make a dexterity saving throw. The sphere spreads around corners. A creature takes 20d6 fire damage and 20d6 bludgeoning damage on a failed save, or half as much damage on a successful one. A creature in the area of more than one fiery burst is affected only once.\n\nThe spell damages objects in the area and ignites flammable objects that aren't being worn or carried.","damage_en":"20d6 + 20d6 Fire","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"20d6 + 20d6 화염 피해","material_ko":""},{"name_ko":"원소 소환","name_en":"Conjure Elemental","level":5,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 minute","duration_en":"Up to 1 hour","material_en":"Burning incense for air, soft clay for earth, sulfur and phosphorus for fire, or water and sand for water.","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the challenge rating increases by 1 for each slot level above 5th.","desc_en":"You call forth an elemental servant. Choose an area of air, earth, fire, or water that fills a 10-foot cube within range. An elemental of challenge rating 5 or lower appropriate to the area you chose appears in an unoccupied space within 10 feet of it. For example, a fire elemental emerges from a bonfire, and an earth elemental rises up from the ground. The elemental disappears when it drops to 0 hit points or when the spell ends.\n\nThe elemental is friendly to you and your companions for the duration. Roll initiative for the elemental, which has its own turns. It obeys any verbal commands that you issue to it (no action required by you). If you don't issue any commands to the elemental, it defends itself from hostile creatures but otherwise takes no actions.\n\nIf your concentration is broken, the elemental doesn't disappear. Instead, you lose control of the elemental, it becomes hostile toward you and your companions, and it might attack. An uncontrolled elemental can't be dismissed by you, and it disappears 1 hour after you summoned it.\n\nThe GM has the elemental's statistics.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 분","duration_ko":"정신집중, 최대 1시간","desc_ko":"정령 종복을 불러낸다. 사거리 내에서 3m(10ft) 정육면체를 채우는 공기, 흙, 불, 또는 물의 구역을 선택한다. 선택한 구역에 어울리는 도전 지수 5 이하의 정령이 그 3m(10ft) 이내의 빈 공간에 나타난다. 예를 들어 불의 정령은 모닥불에서 나오고, 흙의 정령은 땅에서 솟아오른다. 정령은 히트 포인트가 0이 되거나 주문이 끝나면 사라진다.\n\n정령은 지속시간 동안 시전자와 동료에게 우호적이다. 정령의 우선권을 굴리며, 정령은 자기 턴을 갖는다. 시전자가 내리는 음성 명령을 따른다(시전자의 행동은 필요 없다). 명령을 내리지 않으면, 적대적인 크리처로부터 스스로를 방어할 뿐 그 외의 행동은 하지 않는다.\n\n정신집중이 끊겨도 정령은 사라지지 않는다. 대신 정령에 대한 통제를 잃고, 정령이 시전자와 동료에게 적대적이 되어 공격할 수 있다. 통제되지 않는 정령은 시전자가 해제할 수 없으며, 소환한 지 1시간 뒤에 사라진다.\n\n정령의 능력치는 DM이 갖는다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 도전 지수가 1씩 증가한다.","damage_ko":"","material_ko":"공기는 불타는 향, 흙은 부드러운 점토, 불은 유황과 인, 물은 물과 모래."},{"name_ko":"원호","name_en":"Aid","level":2,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"8 hours","material_en":"A tiny strip of white cloth.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, a target's hit points increase by an additional 5 for each slot level above 2nd.","desc_en":"Your spell bolsters your allies with toughness and resolve. Choose up to three creatures within range. Each target's hit point maximum and current hit points increase by 5 for the duration.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"이 주문은 아군을 강인함과 결의로 북돋운다. 사거리 내 크리처 최대 셋을 선택한다. 지속시간 동안 각 대상의 최대 히트 포인트와 현재 히트 포인트가 5씩 증가한다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 대상의 히트 포인트가 추가로 5씩 증가한다.","damage_ko":"","material_ko":"작은 흰 천 조각."},{"name_ko":"위장된 죽음","name_en":"Feign Death","level":3,"school":"사령계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"유도 화살","name_en":"Guiding Bolt","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"1 round","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.","desc_en":"A flash of light streaks toward a creature of your choice within range. Make a ranged spell attack against the target. On a hit, the target takes 4d6 radiant damage, and the next attack roll made against this target before the end of your next turn has advantage, thanks to the mystical dim light glittering on the target until then.","damage_en":"4d6 Radiant","attack_type":"ranged","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"1 라운드","desc_ko":"한 줄기 빛이 사거리 내에서 선택한 크리처를 향해 뻗어나간다. 대상에게 원거리 주문 공격을 굴린다. 명중 시 대상은 4d6 광휘 피해를 받으며, 다음 턴이 끝나기 전까지 대상에게 반짝이는 신비한 흐릿한 빛 덕분에 그 대상을 상대로 한 다음 명중 굴림이 유리 보정을 받는다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 피해가 1d6씩 증가한다.","damage_ko":"4d6 광휘 피해","material_ko":""},{"name_ko":"유사화","name_en":"Mislead","level":5,"school":"환영계","components":["S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"","desc_en":"You become invisible at the same time that an illusory double of you appears where you are standing. The double lasts for the duration, but the invisibility ends if you attack or cast a spell.\n\nYou can use your action to move your illusory double up to twice your speed and make it gesture, speak, and behave in whatever way you choose.\n\nYou can see through its eyes and hear through its ears as if you were located where it is. On each of your turns as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"서 있던 자리에 자신의 환영 분신이 나타남과 동시에 투명해진다. 분신은 지속시간 동안 유지되지만, 시전자가 공격하거나 주문을 시전하면 투명화가 끝난다.\n\n행동을 사용해 환영 분신을 시전자 이동속도의 두 배까지 이동시키고, 원하는 대로 몸짓하고, 말하고, 행동하게 할 수 있다.\n\n마치 분신이 있는 곳에 있는 것처럼 그 눈으로 보고 귀로 들을 수 있다. 자기 턴마다 추가 행동으로, 분신의 감각을 쓰는 것과 자신의 감각을 쓰는 것 사이를 전환할 수 있다. 분신의 감각을 쓰는 동안, 시전자는 자신의 주변에 관해서는 실명이자 귀머거리가 된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"육신 석화","name_en":"Flesh to Stone","level":6,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A pinch of lime, water, and earth.","higher_level_en":"","desc_en":"You attempt to turn one creature that you can see within range into stone. If the target's body is made of flesh, the creature must make a constitution saving throw. On a failed save, it is restrained as its flesh begins to harden. On a successful save, the creature isn't affected.\n\nA creature restrained by this spell must make another constitution saving throw at the end of each of its turns. If it successfully saves against this spell three times, the spell ends. If it fails its saves three times, it is turned to stone and subjected to the petrified condition for the duration. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind.\n\nIf the creature is physically broken while petrified, it suffers from similar deformities if it reverts to its original state.\n\nIf you maintain your concentration on this spell for the entire possible duration, the creature is turned to stone until the effect is removed.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"음식과 물 정화","name_en":"Purify Food and Drink","level":1,"school":"변환계","components":["V","S"],"ritual":true,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"All nonmagical food and drink within a 5-foot radius sphere centered on a point of your choice within range is purified and rendered free of poison and disease.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 선택한 지점을 중심으로 한 1.5m(5ft) 반경 구체 내의 모든 비마법적 음식과 음료가 정화되어 독과 질병이 제거된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"음식과 물 창조","name_en":"Create Food and Water","level":3,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You create 45 pounds of food and 30 gallons of water on the ground or in containers within range, enough to sustain up to fifteen humanoids or five steeds for 24 hours. The food is bland but nourishing, and spoils if uneaten after 24 hours. The water is clean and doesn't go bad.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내 지면이나 용기에 45파운드의 음식과 30갤런의 물을 창조하며, 인간형 열다섯이나 탈것 다섯을 24시간 동안 먹이기에 충분하다. 음식은 밋밋하지만 영양이 있으며, 24시간 안에 먹지 않으면 상한다. 물은 깨끗하며 상하지 않는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"이계 전송","name_en":"Plane Shift","level":7,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A forked, metal rod worth at least 250 gp, attuned to a particular plane of existence.","higher_level_en":"","desc_en":"You and up to eight willing creatures who link hands in a circle are transported to a different plane of existence. You can specify a target destination in general terms, such as the City of Brass on the Elemental Plane of Fire or the palace of Dispater on the second level of the Nine Hells, and you appear in or near that destination. If you are trying to reach the City of Brass, for example, you might arrive in its Street of Steel, before its Gate of Ashes, or looking at the city from across the Sea of Fire, at the GM's discretion.\n\nAlternatively, if you know the sigil sequence of a teleportation circle on another plane of existence, this spell can take you to that circle. If the teleportation circle is too small to hold all the creatures you transported, they appear in the closest unoccupied spaces next to the circle.\n\nYou can use this spell to banish an unwilling creature to another plane. Choose a creature within your reach and make a melee spell attack against it. On a hit, the creature must make a charisma saving throw. If the creature fails this save, it is transported to a random location on the plane of existence you specify. A creature so transported must find its own way back to your current plane of existence.","damage_en":"","attack_type":"melee","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"이계 접촉","name_en":"Contact Other Plane","level":5,"school":"예지계","components":["V"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"1 minute","material_en":"","higher_level_en":"","desc_en":"You mentally contact a demigod, the spirit of a long-dead sage, or some other mysterious entity from another plane. Contacting this extraplanar intelligence can strain or even break your mind. When you cast this spell, make a DC 15 intelligence saving throw. On a failure, you take 6d6 psychic damage and are insane until you finish a long rest. While insane, you can't take actions, can't understand what other creatures say, can't read, and speak only in gibberish. A greater restoration spell cast on you ends this effect.\n\nOn a successful save, you can ask the entity up to five questions. You must ask your questions before the spell ends. The GM answers each question with one word, such as \"yes,\" \"no,\" \"maybe,\" \"never,\" \"irrelevant,\" or \"unclear\" (if the entity doesn't know the answer to the question). If a one-word answer would be misleading, the GM might instead offer a short phrase as an answer.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 분","duration_ko":"1 분","desc_ko":"반신, 오래전 죽은 현자의 영혼, 또는 다른 존재계의 신비한 존재와 정신적으로 접촉한다. 이 이계 지성과의 접촉은 정신에 무리를 주거나 심지어 정신을 무너뜨릴 수 있다. 이 주문을 시전할 때 DC 15의 지능 내성 굴림을 굴린다. 실패 시 6d6 정신 피해를 받고 긴 휴식을 마칠 때까지 미친 상태가 된다. 미친 동안 행동할 수 없고, 다른 크리처가 하는 말을 이해할 수 없으며, 읽을 수 없고, 횡설수설만 한다. 시전자에게 시전한 상급 회복 주문이 이 효과를 끝낸다.\n\n내성 굴림에 성공하면, 그 존재에게 최대 다섯 개의 질문을 할 수 있다. 주문이 끝나기 전에 질문해야 한다. DM은 각 질문에 \"예\", \"아니오\", \"아마도\", \"결코\", \"무관\", 또는 \"불명\"(존재가 답을 모를 때) 같은 한 단어로 답한다. 한 단어 답이 오해를 부를 수 있으면, DM은 대신 짧은 문구를 답으로 줄 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"이계체 동맹","name_en":"Planar Ally","level":6,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"10 minutes","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You beseech an otherworldly entity for aid. The being must be known to you: a god, a primordial, a demon prince, or some other being of cosmic power. That entity sends a celestial, an elemental, or a fiend loyal to it to aid you, making the creature appear in an unoccupied space within range. If you know a specific creature's name, you can speak that name when you cast this spell to request that creature, though you might get a different creature anyway (GM's choice).\n\nWhen the creature appears, it is under no compulsion to behave in any particular way. You can ask the creature to perform a service in exchange for payment, but it isn't obliged to do so. The requested task could range from simple (fly us across the chasm, or help us fight a battle) to complex (spy on our enemies, or protect us during our foray into the dungeon). You must be able to communicate with the creature to bargain for its services.\n\nPayment can take a variety of forms. A celestial might require a sizable donation of gold or magic items to an allied temple, while a fiend might demand a living sacrifice or a gift of treasure. Some creatures might exchange their service for a quest undertaken by you.\n\nAs a rule of thumb, a task that can be measured in minutes requires a payment worth 100 gp per minute. A task measured in hours requires 1,000 gp per hour. And a task measured in days (up to 10 days) requires 10,000 gp per day. The GM can adjust these payments based on the circumstances under which you cast the spell. If the task is aligned with the creature's ethos, the payment might be halved or even waived. Nonhazardous tasks typically require only half the suggested payment, while especially dangerous tasks might require a greater gift. Creatures rarely accept tasks that seem suicidal.\n\nAfter the creature completes the task, or when the agreed-upon duration of service expires, the creature returns to its home plane after reporting back to you, if appropriate to the task and if possible. If you are unable to agree on a price for the creature's service, the creature immediately returns to its home plane.\n\nA creature enlisted to join your group counts as a member of it, receiving a full share of experience points awarded.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"이계체 속박","name_en":"Planar Binding","level":5,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 hour","duration_en":"24 hours","material_en":"A jewel worth at least 1,000 gp, which the spell consumes.","higher_level_en":"When you cast this spell using a spell slot of a higher level, the duration increases to 10 days with a 6th-level slot, to 30 days with a 7th-level slot, to 180 days with an 8th-level slot, and to a year and a day with a 9th-level spell slot.","desc_en":"With this spell, you attempt to bind a celestial, an elemental, a fey, or a fiend to your service. The creature must be within range for the entire casting of the spell. (Typically, the creature is first summoned into the center of an inverted magic circle in order to keep it trapped while this spell is cast.) At the completion of the casting, the target must make a charisma saving throw. On a failed save, it is bound to serve you for the duration. If the creature was summoned or created by another spell, that spell's duration is extended to match the duration of this spell.\n\nA bound creature must follow your instructions to the best of its ability. You might command the creature to accompany you on an adventure, to guard a location, or to deliver a message. The creature obeys the letter of your instructions, but if the creature is hostile to you, it strives to twist your words to achieve its own objectives. If the creature carries out your instructions completely before the spell ends, it travels to you to report this fact if you are on the same plane of existence. If you are on a different plane of existence, it returns to the place where you bound it and remains there until the spell ends.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 시간","duration_ko":"24 시간","desc_ko":"이 주문으로 천상체, 정령, 요정, 또는 악마를 시전자의 봉사에 속박하려 시도한다. 크리처는 주문 시전 내내 사거리 내에 있어야 한다(대개 이 주문을 시전하는 동안 가둬두기 위해, 크리처를 먼저 뒤집힌 마법의 원 중앙으로 소환한다). 시전이 완료되면 대상은 매력 내성 굴림을 굴려야 한다. 실패 시 지속시간 동안 시전자를 섬기도록 속박된다. 크리처가 다른 주문으로 소환되거나 만들어졌으면, 그 주문의 지속시간이 이 주문의 지속시간에 맞춰 연장된다.\n\n속박된 크리처는 최선을 다해 시전자의 지시를 따라야 한다. 모험에 동행하거나, 장소를 지키거나, 전언을 전하도록 명령할 수 있다. 크리처는 지시의 문구를 따르지만, 시전자에게 적대적이면 자신의 목적을 이루기 위해 말을 비틀려 애쓴다. 주문이 끝나기 전에 지시를 완전히 완수하면, 시전자와 같은 존재계에 있을 경우 시전자에게 와서 이를 보고한다. 다른 존재계에 있으면, 속박된 장소로 돌아가 주문이 끝날 때까지 그곳에 머무른다.","higher_level_ko":"고레벨 주문 슬롯으로 시전하면, 지속시간이 6레벨 슬롯은 10일, 7레벨 슬롯은 30일, 8레벨 슬롯은 180일, 9레벨 주문 슬롯은 1년 하고도 하루로 늘어난다.","damage_ko":"","material_ko":"이 주문이 소모하는 1,000gp 이상 가치의 보석."},{"name_ko":"이동의 자유","name_en":"Freedom of Movement","level":4,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A leather strap, bound around the arm or a similar appendage.","higher_level_en":"","desc_en":"You touch a willing creature. For the duration, the target's movement is unaffected by difficult terrain, and spells and other magical effects can neither reduce the target's speed nor cause the target to be paralyzed or restrained.\n\nThe target can also spend 5 feet of movement to automatically escape from nonmagical restraints, such as manacles or a creature that has it grappled. Finally, being underwater imposes no penalties on the target's movement or attacks.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"동의하는 크리처 하나를 접촉한다. 지속시간 동안 대상의 이동은 어려운 지형에 영향받지 않으며, 주문과 그 밖의 마법 효과가 대상의 이동속도를 줄이거나 대상을 마비 또는 포박 상태로 만들 수 없다.\n\n대상은 또한 5피트의 이동력을 써서 수갑이나 붙잡은 크리처 같은 비마법적 구속에서 자동으로 벗어날 수 있다. 끝으로, 물속에 있어도 대상의 이동이나 공격에 페널티가 없다.","higher_level_ko":"","damage_ko":"","material_ko":"팔이나 비슷한 부위에 두르는 가죽끈."},{"name_ko":"인간형 매혹","name_en":"Charm Person","level":1,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them.","desc_en":"You attempt to charm a humanoid you can see within range. It must make a wisdom saving throw, and does so with advantage if you or your companions are fighting it. If it fails the saving throw, it is charmed by you until the spell ends or until you or your companions do anything harmful to it. The charmed creature regards you as a friendly acquaintance. When the spell ends, the creature knows it was charmed by you.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"사거리 내에서 볼 수 있는 인간형 하나를 매혹하려 시도한다. 대상은 지혜 내성 굴림을 굴려야 하며, 시전자나 동료가 그와 싸우는 중이면 유리 보정을 받아 굴린다. 내성 굴림에 실패하면, 주문이 끝나거나 시전자나 동료가 그에게 해로운 짓을 할 때까지 시전자에게 매혹된다. 매혹된 크리처는 시전자를 우호적인 지인으로 여긴다. 주문이 끝나면 그 크리처는 자신이 매혹당했음을 안다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다. 대상으로 삼을 때 크리처들은 서로 9m(30ft) 이내에 있어야 한다.","damage_ko":"","material_ko":""},{"name_ko":"인간형 지배","name_en":"Dominate Person","level":5,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"When you cast this spell using a 6th-level spell slot, the duration is concentration, up to 10 minutes. When you use a 7th-level spell slot, the duration is concentration, up to 1 hour. When you use a spell slot of 8th level or higher, the duration is concentration, up to 8 hours.","desc_en":"You attempt to beguile a humanoid that you can see within range. It must succeed on a wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw.\n\nWhile the target is charmed, you have a telepathic link with it as long as the two of you are on the same plane of existence. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability.\n\nYou can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time you can also cause the creature to use a reaction, but this requires you to use your own reaction as well.\n\nEach time the target takes damage, it makes a new wisdom saving throw against the spell. If the saving throw succeeds, the spell ends.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 인간형을 홀리려 시도한다. 그 인간형은 지혜 내성 굴림에 성공하지 못하면 지속시간 동안 시전자에게 매혹된다. 시전자나 시전자에게 우호적인 크리처가 그와 싸우는 중이면 내성 굴림에 유리 보정을 받는다.\n\n대상이 매혹된 동안, 둘이 같은 존재계에 있는 한 시전자는 그와 텔레파시 연결을 갖는다. 의식이 있는 동안 이 텔레파시 연결로 크리처에게 명령을 내릴 수 있으며(행동 필요 없음), 크리처는 최선을 다해 따른다. \"저 크리처를 공격해라\", \"저기로 달려가라\", \"저 물체를 가져와라\"처럼 단순하고 대략적인 행동 방침을 지정할 수 있다. 크리처가 명령을 완수하고 추가 지시를 받지 못하면, 최선을 다해 스스로를 방어하고 보전한다.\n\n행동을 사용해 대상을 완전하고 정밀하게 통제할 수 있다. 다음 턴이 끝날 때까지 크리처는 시전자가 선택한 행동만 하고, 시전자가 허락하지 않는 것은 하지 않는다. 이 동안 크리처가 반응행동을 쓰게 할 수도 있으나, 이는 시전자 자신의 반응행동도 써야 한다.\n\n대상이 피해를 받을 때마다 이 주문에 맞선 새 지혜 내성 굴림을 굴린다. 성공하면 주문이 끝난다.","higher_level_ko":"6레벨 주문 슬롯으로 시전하면 지속시간이 정신집중, 최대 10분이 된다. 7레벨 주문 슬롯을 쓰면 정신집중, 최대 1시간이 된다. 8레벨 이상의 주문 슬롯을 쓰면 정신집중, 최대 8시간이 된다.","damage_ko":"","material_ko":""},{"name_ko":"인간형 포박","name_en":"Hold Person","level":2,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A small, straight piece of iron.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional humanoid for each slot level above 2nd. The humanoids must be within 30 feet of each other when you target them.","desc_en":"Choose a humanoid that you can see within range. The target must succeed on a wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another wisdom saving throw. On a success, the spell ends on the target.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 인간형 하나를 선택한다. 대상은 지혜 내성 굴림에 성공하지 못하면 지속시간 동안 마비된다. 자기 턴이 끝날 때마다 대상은 다시 지혜 내성 굴림을 굴릴 수 있다. 성공 시 그 대상에 대한 주문이 끝난다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 인간형을 하나씩 추가로 대상으로 삼을 수 있다. 대상으로 삼을 때 인간형들은 서로 9m(30ft) 이내에 있어야 한다.","damage_ko":"","material_ko":"작고 곧은 철 조각."},{"name_ko":"자기 변형","name_en":"Alter Self","level":2,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"","desc_en":"You assume a different form. When you cast the spell, choose one of the following options, the effects of which last for the duration of the spell. While the spell lasts, you can end one option as an action to gain the benefits of a different one.\n\n***Aquatic Adaptation.*** You adapt your body to an aquatic environment, sprouting gills and growing webbing between your fingers. You can breathe underwater and gain a swimming speed equal to your walking speed.\n\n***Change Appearance.*** You transform your appearance. You decide what you look like, including your height, weight, facial features, sound of your voice, hair length, coloration, and distinguishing characteristics, if any. You can make yourself appear as a member of another race, though none of your statistics change. You also can't appear as a creature of a different size than you, and your basic shape stays the same; if you're bipedal, you can't use this spell to become quadrupedal, for instance. At any time for the duration of the spell, you can use your action to change your appearance in this way again.\n\n***Natural Weapons.*** You grow claws, fangs, spines, horns, or a different natural weapon of your choice. Your unarmed strikes deal 1d6 bludgeoning, piercing, or slashing damage, as appropriate to the natural weapon you chose, and you are proficient with your unarmed strikes. Finally, the natural weapon is magic and you have a +1 bonus to the attack and damage rolls you make using it.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"다른 모습을 취한다. 주문을 시전할 때 다음 선택지 중 하나를 고르며, 그 효과는 주문의 지속시간 동안 지속된다. 주문이 지속되는 동안, 행동으로 한 선택지를 끝내고 다른 선택지의 이점을 얻을 수 있다.\n\n***수중 적응.*** 몸을 수중 환경에 적응시켜 아가미가 돋고 손가락 사이에 물갈퀴가 자란다. 물속에서 숨쉴 수 있고 걷기 속도와 같은 수영 속도를 얻는다.\n\n***외모 변화.*** 외모를 변형한다. 키, 몸무게, 얼굴 생김새, 목소리, 머리 길이, 색깔, 그리고 특징이 있다면 그것까지 원하는 대로 정한다. 다른 종족의 일원으로 보이게 할 수 있으나 능력치는 전혀 변하지 않는다. 또한 자신과 다른 크기의 크리처로는 보일 수 없으며, 기본 형태는 유지된다. 예를 들어 이족보행이라면 이 주문으로 사족보행이 될 수 없다. 지속시간 동안 언제든 행동으로 이런 식으로 외모를 다시 바꿀 수 있다.\n\n***자연 무기.*** 발톱, 송곳니, 가시, 뿔, 또는 선택한 다른 자연 무기가 자란다. 비무장 공격이 선택한 자연 무기에 맞게 1d6 타격, 관통, 또는 참격 피해를 주며, 비무장 공격에 숙련된다. 끝으로, 그 자연 무기는 마법적이며 그것으로 하는 명중 굴림과 피해 굴림에 +1 보너스를 받는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"자기 위장","name_en":"Disguise Self","level":1,"school":"환영계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"You make yourself--including your clothing, armor, weapons, and other belongings on your person--look different until the spell ends or until you use your action to dismiss it. You can seem 1 foot shorter or taller and can appear thin, fat, or in between. You can't change your body type, so you must adopt a form that has the same basic arrangement of limbs. Otherwise, the extent of the illusion is up to you.\n\nThe changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to your outfit, objects pass through the hat, and anyone who touches it would feel nothing or would feel your head and hair. If you use this spell to appear thinner than you are, the hand of someone who reaches out to touch you would bump into you while it was seemingly still in midair.\n\nTo discern that you are disguised, a creature can use its action to inspect your appearance and must succeed on an Intelligence (Investigation) check against your spell save DC.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"주문이 끝나거나 행동을 사용해 해제할 때까지, 옷, 갑옷, 무기, 몸에 지닌 다른 소지품을 포함한 자신의 모습을 다르게 보이게 한다. 1피트 정도 더 작거나 크게 보일 수 있고, 마르거나 뚱뚱하거나 그 중간으로 보일 수 있다. 체형을 바꿀 수는 없으므로, 사지 배치가 기본적으로 같은 형태를 취해야 한다. 그 외에 환영의 범위는 시전자에게 달려 있다.\n\n이 주문으로 만든 변화는 물리적 검사를 견디지 못한다. 예를 들어 이 주문으로 모자를 씌우면 물체가 모자를 통과하며, 그것을 만지는 이는 아무것도 느끼지 못하거나 시전자의 머리와 머리카락을 느낀다. 이 주문으로 실제보다 말라 보이게 하면, 손을 뻗어 만지려는 이의 손은 허공에 있는 듯 보이는 지점에서 시전자와 부딪친다.\n\n시전자가 변장했음을 알아차리려면, 크리처는 행동을 사용해 외모를 살피고 시전자의 주문 내성 DC에 맞서는 지능(수사) 판정에 성공해야 한다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"자연과의 회화","name_en":"Commune with Nature","level":5,"school":"예지계","components":["V","S"],"ritual":true,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You briefly become one with nature and gain knowledge of the surrounding territory. In the outdoors, the spell gives you knowledge of the land within 3 miles of you. In caves and other natural underground settings, the radius is limited to 300 feet. The spell doesn't function where nature has been replaced by construction, such as in dungeons and towns.\n\nYou instantly gain knowledge of up to three facts of your choice about any of the following subjects as they relate to the area:\n\n- terrain and bodies of water\n\n- prevalent plants, minerals, animals, or peoples\n\n- powerful celestials, fey, fiends, elementals, or undead\n\n- influence from other planes of existence\n\n- buildings\n\nFor example, you could determine the location of powerful undead in the area, the location of major sources of safe drinking water, and the location of any nearby towns.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 분","duration_ko":"즉시","desc_ko":"잠시 자연과 하나가 되어 주변 지역의 지식을 얻는다. 야외에서는 시전자로부터 3마일 이내의 땅에 대한 지식을 준다. 동굴이나 그 밖의 자연적인 지하 환경에서는 반경이 90m(300ft)로 제한된다. 던전이나 마을처럼 자연이 인공물로 대체된 곳에서는 작동하지 않는다.\n\n다음 주제 중 어느 것에 대해서든, 그 구역과 관련된 사실을 최대 세 개까지 즉시 알게 된다.\n\n- 지형과 수역\n\n- 흔한 식물, 광물, 동물, 또는 종족\n\n- 강력한 천상체, 요정, 악마, 정령, 또는 언데드\n\n- 다른 존재계로부터의 영향\n\n- 건물\n\n예를 들어 구역 내 강력한 언데드의 위치, 안전한 식수의 주요 원천 위치, 근처 마을의 위치를 알아낼 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"잔혹한 모욕","name_en":"Vicious Mockery","level":0,"school":"환혹계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You unleash a string of insults laced with subtle enchantments at a creature you can see within range. If the target can hear you (though it need not understand you), it must succeed on a wisdom saving throw or take 1d4 psychic damage and have disadvantage on the next attack roll it makes before the end of its next turn.\n\nThis spell's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).","damage_en":"1d4 Psychic","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는 크리처에게 미묘한 마법이 깃든 모욕을 쏟아붓는다. 대상이 시전자의 말을 들을 수 있다면(이해할 필요는 없다), 지혜 내성 굴림에 성공하지 못할 경우 1d4 정신 피해를 받고, 다음 턴이 끝나기 전에 굴리는 첫 명중 굴림에 불리 보정을 받는다.\n\n이 주문의 피해는 5레벨(2d4), 11레벨(3d4), 17레벨(4d4)에 도달할 때 1d4씩 증가한다.","higher_level_ko":"","damage_ko":"1d4 정신 피해","material_ko":""},{"name_ko":"장님화/귀머거리화","name_en":"Blindness/Deafness","level":2,"school":"사령계","components":["V"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.","desc_en":"You can blind or deafen a foe. Choose one creature that you can see within range to make a constitution saving throw. If it fails, the target is either blinded or deafened (your choice) for the duration. At the end of each of its turns, the target can make a constitution saving throw. On a success, the spell ends.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"적을 실명시키거나 귀머거리로 만들 수 있다. 사거리 내에서 볼 수 있는 크리처 하나를 선택해 건강 내성 굴림을 굴리게 한다. 실패 시 대상은 지속시간 동안 실명하거나 귀머거리가 된다(시전자 선택). 자기 턴이 끝날 때마다 대상은 건강 내성 굴림을 굴릴 수 있다. 성공 시 주문이 끝난다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":""},{"name_ko":"재생","name_en":"Regenerate","level":7,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"1 hour","material_en":"A prayer wheel and holy water.","higher_level_en":"","desc_en":"You touch a creature and stimulate its natural healing ability. The target regains 4d8 + 15 hit points. For the duration of the spell, the target regains 1 hit point at the start of each of its turns (10 hit points each minute).\n\nThe target's severed body members (fingers, legs, tails, and so on), if any, are restored after 2 minutes. If you have the severed part and hold it to the stump, the spell instantaneously causes the limb to knit to the stump.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"재활성화","name_en":"Revivify","level":3,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Diamonds worth 300gp, which the spell consumes.","higher_level_en":"","desc_en":"You touch a creature that has died within the last minute. That creature returns to life with 1 hit point. This spell can't return to life a creature that has died of old age, nor can it restore any missing body parts.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"지난 1분 이내에 죽은 크리처를 접촉한다. 그 크리처는 히트 포인트 1점으로 되살아난다. 이 주문은 노화로 죽은 크리처를 되살릴 수 없으며, 잃어버린 신체 부위를 복원하지도 못한다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 300gp 가치의 다이아몬드."},{"name_ko":"저능화","name_en":"Feeblemind","level":8,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A handful of clay, crystal, glass, or mineral spheres.","higher_level_en":"","desc_en":"You blast the mind of a creature that you can see within range, attempting to shatter its intellect and personality. The target takes 4d6 psychic damage and must make an intelligence saving throw.\n\nOn a failed save, the creature's Intelligence and Charisma scores become 1. The creature can't cast spells, activate magic items, understand language, or communicate in any intelligible way. The creature can, however, identify its friends, follow them, and even protect them.\n\nAt the end of every 30 days, the creature can repeat its saving throw against this spell. If it succeeds on its saving throw, the spell ends.\n\nThe spell can also be ended by greater restoration, heal, or wish.","damage_en":"4d6 Psychic","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"4d6 정신 피해","material_ko":""},{"name_ko":"저속화","name_en":"Slow","level":3,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A drop of molasses.","higher_level_en":"","desc_en":"You alter time around up to six creatures of your choice in a 40-foot cube within range. Each target must succeed on a wisdom saving throw or be affected by this spell for the duration.\n\nAn affected target's speed is halved, it takes a -2 penalty to AC and dexterity saving throws, and it can't use reactions. On its turn, it can use either an action or a bonus action, not both. Regardless of the creature's abilities or magic items, it can't make more than one melee or ranged attack during its turn.\n\nIf the creature attempts to cast a spell with a casting time of 1 action, roll a d20. On an 11 or higher, the spell doesn't take effect until the creature's next turn, and the creature must use its action on that turn to complete the spell. If it can't, the spell is wasted.\n\nA creature affected by this spell makes another wisdom saving throw at the end of its turn. On a successful save, the effect ends for it.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내 12m(40ft) 정육면체 안에서 선택한 크리처 최대 여섯의 주위 시간을 조작한다. 각 대상은 지혜 내성 굴림에 성공하지 못하면 지속시간 동안 이 주문의 영향을 받는다.\n\n영향받는 대상은 이동속도가 절반이 되고, 방어도(AC)와 민첩 내성 굴림에 -2 페널티를 받으며, 반응행동을 쓸 수 없다. 자기 턴에는 행동이나 추가 행동 중 하나만 쓸 수 있고, 둘 다는 쓸 수 없다. 크리처의 능력이나 마법 물품과 무관하게, 자기 턴에 근접 또는 원거리 공격을 한 번을 초과해 할 수 없다.\n\n크리처가 시전 시간이 1 행동인 주문을 시전하려 하면 d20을 굴린다. 11 이상이 나오면 그 주문은 크리처의 다음 턴까지 효력이 발생하지 않으며, 크리처는 그 턴에 행동을 사용해 주문을 완성해야 한다. 그러지 못하면 주문은 낭비된다.\n\n이 주문에 영향받는 크리처는 자기 턴이 끝날 때 다시 지혜 내성 굴림을 굴린다. 성공 시 그 크리처에 대한 효과가 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"당밀 한 방울."},{"name_ko":"저주 부여","name_en":"Bestow Curse","level":3,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"If you cast this spell using a spell slot of 4th level or higher, the duration is concentration, up to 10 minutes. If you use a spell slot of 5th level or higher, the duration is 8 hours. If you use a spell slot of 7th level or higher, the duration is 24 hours. If you use a 9th level spell slot, the spell lasts until it is dispelled. Using a spell slot of 5th level or higher grants a duration that doesn't require concentration.","desc_en":"You touch a creature, and that creature must succeed on a wisdom saving throw or become cursed for the duration of the spell. When you cast this spell, choose the nature of the curse from the following options:\n\n- Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score.\n\n- While cursed, the target has disadvantage on attack rolls against you.\n\n- While cursed, the target must make a wisdom saving throw at the start of each of its turns. If it fails, it wastes its action that turn doing nothing.\n\n- While the target is cursed, your attacks and spells deal an extra 1d8 necrotic damage to the target.\n\nA remove curse spell ends this effect. At the GM's option, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse's effect.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"크리처 하나를 접촉하면, 그 크리처는 지혜 내성 굴림에 성공하지 못할 경우 주문의 지속시간 동안 저주에 걸린다. 주문을 시전할 때 다음 선택지 중에서 저주의 성질을 고른다.\n\n- 능력치 하나를 선택한다. 저주에 걸린 동안 대상은 그 능력치로 하는 능력 판정과 내성 굴림에 불리 보정을 받는다.\n\n- 저주에 걸린 동안 대상은 시전자를 상대로 한 명중 굴림에 불리 보정을 받는다.\n\n- 저주에 걸린 동안 대상은 매 턴이 시작될 때 지혜 내성 굴림을 굴려야 한다. 실패하면 그 턴의 행동을 아무것도 하지 않고 낭비한다.\n\n- 대상이 저주에 걸린 동안, 시전자의 공격과 주문은 대상에게 추가로 1d8 사령 피해를 준다.\n\n저주 해제 주문은 이 효과를 끝낸다. DM의 선택에 따라 다른 저주 효과를 고를 수도 있으나, 위에 설명된 것보다 강력해서는 안 된다. 그러한 저주의 효과는 DM이 최종 결정한다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면 지속시간이 정신집중, 최대 10분이 된다. 5레벨 이상의 주문 슬롯을 쓰면 지속시간이 8시간이 된다. 7레벨 이상이면 24시간, 9레벨 슬롯이면 무효화될 때까지 지속된다. 5레벨 이상의 주문 슬롯을 쓰면 정신집중이 필요 없는 지속시간이 된다.","damage_ko":"","material_ko":""},{"name_ko":"저주 해제","name_en":"Remove Curse","level":3,"school":"방호계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"At your touch, all curses affecting one creature or object end. If the object is a cursed magic item, its curse remains, but the spell breaks its owner's attunement to the object so it can be removed or discarded.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"시전자의 접촉으로, 크리처 하나나 물체 하나에 걸린 모든 저주가 끝난다. 물체가 저주받은 마법 물품이라면 그 저주는 남지만, 주문이 소유자의 물품 조율을 끊어 물품을 제거하거나 버릴 수 있게 한다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"저항","name_en":"Resistance","level":0,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A miniature cloak.","higher_level_en":"","desc_en":"You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one saving throw of its choice. It can roll the die before or after making the saving throw. The spell then ends.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"동의하는 크리처 하나를 접촉한다. 주문이 끝나기 전 한 번, 대상은 d4를 굴려 그 결과를 자신이 선택한 내성 굴림 하나에 더할 수 있다. 주사위는 내성 굴림 전후 어느 때나 굴릴 수 있다. 그 후 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"소형 망토."},{"name_ko":"전격의 손아귀","name_en":"Shocking Grasp","level":0,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Lightning springs from your hand to deliver a shock to a creature you try to touch. Make a melee spell attack against the target. You have advantage on the attack roll if the target is wearing armor made of metal. On a hit, the target takes 1d8 lightning damage, and it can't take reactions until the start of its next turn.\n\nThe spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","damage_en":"1d8 Lightning","attack_type":"melee","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"손에서 번개가 튀어나와 접촉하려는 크리처에게 충격을 준다. 대상에게 근접 주문 공격을 굴린다. 대상이 금속 갑옷을 착용하고 있다면 명중 굴림에 유리 보정을 받는다. 명중 시 대상은 1d8 번개 피해를 받고, 다음 턴이 시작될 때까지 반응행동을 할 수 없다.\n\n이 주문의 피해는 5레벨(2d8), 11레벨(3d8), 17레벨(4d8)에 도달할 때 1d8씩 증가한다.","higher_level_ko":"","damage_ko":"1d8 번개 피해","material_ko":""},{"name_ko":"전달","name_en":"Message","level":0,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"1 round","material_en":"A short piece of copper wire.","higher_level_en":"","desc_en":"You point your finger toward a creature within range and whisper a message. The target (and only the target) hears the message and can reply in a whisper that only you can hear.\n\nYou can cast this spell through solid objects if you are familiar with the target and know it is beyond the barrier. Magical silence, 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood blocks the spell. The spell doesn't have to follow a straight line and can travel freely around corners or through openings.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"1 라운드","desc_ko":"사거리 내 크리처를 손가락으로 가리키며 전언을 속삭인다. 대상은(오직 대상만) 그 전언을 들으며, 시전자만 들을 수 있는 속삭임으로 답할 수 있다.\n\n대상을 잘 알고 있고 그가 장벽 너머에 있음을 안다면, 고체 물체를 통해서도 이 주문을 시전할 수 있다. 마법적 침묵, 1피트의 돌, 1인치의 일반 금속, 얇은 납판, 3피트의 나무는 주문을 차단한다. 주문은 직선을 따를 필요가 없으며 모퉁이를 돌거나 틈새를 통해 자유로이 이동
