<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D 5e 주문 목록</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap">
<style>
:root{
  --bg:#1a1a1d;
  --text:#ffffff;
  --text-72:rgba(255,255,255,0.72);
  --text-65:rgba(255,255,255,0.65);
  --text-50:rgba(255,255,255,0.5);
  --text-40:rgba(255,255,255,0.4);
  --glass:rgba(255,255,255,0.07);
  --glass-strong:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.14);
  --glass-line:rgba(255,255,255,0.12);
  --chip-bg:rgba(255,255,255,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);overflow-x:hidden;}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  color:var(--text);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding:0;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
  background:#1a1a1d;
}
.wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px;}

header{border-bottom:1px solid var(--glass-line);padding-bottom:20px;margin-bottom:0;}
h1{font-size:26px;font-weight:500;letter-spacing:-0.02em;color:var(--text);}
.subtitle{font-size:13px;color:var(--text-50);margin-top:6px;}

.controls{padding:16px 0 16px;border-bottom:1px solid var(--glass-line);margin-bottom:8px;}
.searchbar{
  position:relative;margin-bottom:14px;border-radius:14px;
  box-shadow:0 12px 30px -8px rgba(0,0,0,0.75), 0 6px 16px -6px rgba(0,0,0,0.6);
}
.searchbar input{
  width:100%;height:46px;border:none;border-radius:14px;
  padding:0 44px 0 42px;font-size:15px;font-family:inherit;color:var(--text);
  background:#161619;box-shadow:inset 0 0 26px rgba(120,180,230,0.22);
  transition:box-shadow .15s;position:relative;z-index:1;display:block;
}
.searchbar input:focus{outline:none;box-shadow:inset 0 0 30px rgba(120,180,230,0.34);}
.searchbar input::placeholder{color:var(--text-40);}
.searchbar .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none;z-index:2;}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:2;
  width:26px;height:26px;border:none;border-radius:7px;cursor:pointer;
  background:transparent;color:var(--text-40);
  display:none;align-items:center;justify-content:center;transition:color .12s, background .12s;
}
.search-clear i{font-size:16px;line-height:1;}
.search-clear:hover{color:var(--text);background:rgba(255,255,255,0.08);}
.searchbar.has-text .search-clear{display:flex;}

.filter-row{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:0;}
.filter-group{display:flex;flex-direction:column;gap:7px;}
.filter-label{font-size:11px;font-weight:600;color:var(--text-50);letter-spacing:0.04em;text-transform:uppercase;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  border:1px solid var(--glass-border);background:var(--glass);color:var(--text-72);
  font-family:inherit;font-size:13px;font-weight:500;
  padding:5px 11px;border-radius:8px;cursor:pointer;user-select:none;
  transition:all .12s;white-space:nowrap;
}
.chip:hover{border-color:rgba(255,255,255,0.45);color:var(--text);}
.chip.active{background:rgba(255,255,255,0.92);color:#14162a;border-color:rgba(255,255,255,0.92);}
.chip-attr{display:inline-flex;align-items:center;gap:5px;}
.chip-attr i{font-size:14px;line-height:1;}

.meta-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 2px 12px;font-size:13px;color:var(--text-50);flex-wrap:wrap;gap:8px;}
.reset{font-family:inherit;font-size:12px;color:var(--text-65);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:2px 0;}
.reset:hover{color:var(--text);}
.sort-select{font-family:inherit;font-size:12px;border:1px solid var(--glass-border);border-radius:6px;padding:4px 8px;color:var(--text-72);background:rgba(26,26,29,0.95);cursor:pointer;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}

.card{
  position:relative;border-radius:14px;padding:1px;border:none;
  background:linear-gradient(90deg,#3dd6d0 0%,#5a8cf0 50%,#a86cf0 100%);
  box-shadow:0 24px 48px -8px rgba(0,0,0,0.9), 0 12px 28px -6px rgba(0,0,0,0.8);
  transition:box-shadow .15s, transform .1s;
}
.card:hover{box-shadow:0 30px 60px -8px rgba(0,0,0,0.95), 0 14px 34px -6px rgba(0,0,0,0.85);transform:translateY(-2px);}
.card-inner{
  border-radius:13px;padding:15px 15px;background:#161619;
  box-shadow:inset 0 0 26px rgba(120,180,230,0.22);
  display:flex;flex-direction:column;gap:0;height:100%;
}
.card-top{display:flex;align-items:center;gap:7px;margin-bottom:11px;}
.school-icon{font-size:17px;line-height:1;color:rgba(255,255,255,0.92);flex:none;}
.school-tag{font-size:11px;font-weight:500;color:var(--text-72);letter-spacing:0.02em;}
.card-name{font-size:16px;font-weight:500;letter-spacing:-0.01em;line-height:1.25;color:var(--text);}
.card-en{font-family:'Uncial Antiqua',serif;font-size:12px;color:var(--text-50);margin-top:4px;line-height:1.35;}
.card-body{margin-bottom:20px;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:20px;border-top:1px solid var(--glass-line);gap:8px;}
.level-badge{font-size:12px;font-weight:500;color:var(--text-65);}
.bottom-right{display:flex;align-items:center;gap:8px;}
.comps{display:flex;gap:4px;}
.comp{
  font-size:11px;font-weight:500;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  border-radius:5px;background:var(--chip-bg);color:var(--text-72);
}
.attr-ic{display:inline-flex;align-items:center;justify-content:center;}
.attr-ic i{font-size:15px;line-height:1;}
.attr-ic.ritual{color:#a86cf0;}
.attr-ic.concentration{color:#3dd6d0;}

.empty{text-align:center;padding:60px 20px;color:var(--text-50);font-size:15px;}

/* ===== 상세 다이얼로그 ===== */
.card{cursor:pointer;}
.dialog-overlay{
  position:fixed;inset:0;z-index:100;overscroll-behavior:contain;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(5,5,10,0.6);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.dialog-overlay.open{opacity:1;pointer-events:auto;}
.dialog{
  width:100%;max-width:440px;max-height:82vh;
  display:flex;flex-direction:column;position:relative;
  border-radius:18px;border:1px solid transparent;
  background:
    radial-gradient(130% 80% at 100% 0%, rgba(90,150,255,0.3), rgba(150,110,240,0.2) 35%, transparent 60%) padding-box,
    linear-gradient(rgba(22,22,25,0.94), rgba(22,22,25,0.94)) padding-box,
    linear-gradient(90deg,#3dd6d0 0%,#5a8cf0 50%,#a86cf0 100%) border-box;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 26px 60px -10px rgba(0,0,0,0.7), 0 10px 30px -8px rgba(0,0,0,0.6);
  transform:translateY(8px) scale(0.99);transition:transform .18s;
}
.dialog .dlg-higher-label, .dialog .dlg-subhead{--dlg-head:#c9a8ff;}
.dialog-overlay.open .dialog{transform:translateY(0) scale(1);}
.dlg-close{
  position:absolute;top:14px;right:14px;z-index:2;
  width:30px;height:30px;border:none;border-radius:8px;cursor:pointer;
  background:transparent;color:var(--text-40);
  display:flex;align-items:center;justify-content:center;transition:color .12s, background .12s;
}
.dlg-close i{font-size:18px;line-height:1;}
.dlg-close:hover{color:var(--text);background:rgba(255,255,255,0.08);}
.dlg-head{padding:22px 22px 16px;border-bottom:1px solid var(--glass-line);}
.dlg-card-top{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.dlg-title{margin-bottom:14px;}
.dlg-name{font-size:22px;font-weight:500;}
.dlg-en{font-size:14px;margin-top:3px;}
.dlg-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.dlg-scroll{overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:18px 22px 24px;}
.dlg-toggle-row{display:flex;justify-content:flex-start;margin-bottom:14px;}
.dlg-toggle{
  font-family:inherit;font-size:11px;font-weight:500;color:var(--text-50);
  background:transparent;border:1px solid var(--glass-border);border-radius:6px;
  padding:3px 9px;cursor:pointer;transition:color .12s,border-color .12s;
}
.dlg-toggle:hover{color:var(--text);border-color:rgba(255,255,255,0.4);}
.dlg-stats{display:flex;flex-direction:column;gap:0;margin-bottom:18px;
  border:1px solid var(--glass-line);border-radius:10px;overflow:hidden;}
.dlg-field{display:flex;gap:12px;padding:9px 13px;font-size:13px;}
.dlg-field:not(:last-child){border-bottom:1px solid var(--glass-line);}
.dlg-flabel{flex:none;width:88px;color:var(--text-50);}
.dlg-fval{color:rgba(255,255,255,0.82);flex:1;}
.dlg-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.92);}
.dlg-desc p{margin-bottom:12px;}
.dlg-desc p:last-child{margin-bottom:0;}
.dlg-empty{color:var(--text-40);font-style:normal;}
.dlg-higher{margin-top:18px;padding-top:16px;border-top:1px solid var(--glass-line);
  font-size:14px;line-height:1.7;color:rgba(255,255,255,0.92);}
.dlg-higher-label{font-size:12px;font-weight:500;color:var(--dlg-head,#9db8ff);margin-bottom:6px;}
.dlg-desc strong, .dlg-higher strong{font-weight:600;color:#fff;}
.dlg-subhead{display:inline-block;font-weight:600;color:var(--dlg-head,#9db8ff);margin:0 0 4px;}
.dlg-desc p + .dlg-subhead, .dlg-higher p + .dlg-subhead{margin-top:22px;}
.dlg-desc table + .dlg-subhead, .dlg-higher table + .dlg-subhead{margin-top:22px;}
.dlg-table{width:100%;border-collapse:collapse;margin:0 0 4px;font-size:13px;}
.dlg-subhead + .dlg-table{margin-top:0;}
.dlg-table th,.dlg-table td{border:1px solid var(--glass-line);padding:5px 9px;text-align:left;}
.dlg-table th{color:var(--text);font-weight:500;background:rgba(255,255,255,0.04);}
.dlg-table td{color:rgba(255,255,255,0.82);}
.dlg-scroll::-webkit-scrollbar{width:8px;}
.dlg-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:4px;}

@media (max-width:520px){
  .wrap{padding:20px 14px 60px;}
  h1{font-size:22px;}
  .grid{grid-template-columns:1fr 1fr;gap:12px;}
  .card-name{font-size:15px;}
  .filter-row{gap:14px;}
  /* 모바일: 다이얼로그를 하단 시트로 */
  .dialog-overlay{padding:0;align-items:flex-end;overflow-x:hidden;}
  .dialog{
    width:100%;max-width:100%;box-sizing:border-box;
    max-height:92vh;max-height:92dvh;
    border-radius:18px 18px 0 0;
    border-left:none;border-right:none;border-bottom:none;
    transform:translateY(100%);overflow-x:hidden;
  }
  .dialog-overlay.open .dialog{transform:translateY(0);}
  .dlg-head{padding:20px 18px 14px;}
  .dlg-scroll{padding:16px 18px calc(24px + env(safe-area-inset-bottom));overflow-x:hidden;}
  .dlg-name{font-size:20px;}
  .dlg-desc, .dlg-higher, .dlg-field, .dlg-fval, .dlg-en{overflow-wrap:break-word;word-break:break-word;}
  .dlg-table{table-layout:fixed;width:100%;}
  .dlg-table th, .dlg-table td{overflow-wrap:break-word;word-break:break-word;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>D&amp;D 5e 주문 목록</h1>
    <p class="subtitle">총 <span id="total">0</span>개</p>
  </header>

  <div class="controls">
    <div class="searchbar">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="주문 이름 검색 (한글 또는 영어)" autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="검색어 지우기" type="button"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">레벨</span>
        <div class="chips" id="level-chips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">계열</span>
        <div class="chips" id="school-chips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">구성요소</span>
        <div class="chips" id="comp-chips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">속성</span>
        <div class="chips" id="attr-chips"></div>
      </div>
    </div>
  </div>

  <div class="meta-bar">
    <span id="count">0개 표시 중</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <select class="sort-select" id="sort">
        <option value="ko">가나다순</option>
        <option value="level-asc">레벨 낮은순</option>
        <option value="level-desc">레벨 높은순</option>
        <option value="en">영어명순</option>
      </select>
      <button class="reset" id="reset">필터 초기화</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">조건에 맞는 주문이 없어요.</div>
</div>

<div class="dialog-overlay" id="dialog-overlay">
  <div class="dialog" id="dialog" role="dialog" aria-modal="true"></div>
</div>

<script>
const SPELLS = [{"name_ko":"가속","name_en":"Haste","level":3,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A shaving of licorice root.","higher_level_en":"","desc_en":"Choose a willing creature that you can see within range. Until the spell ends, the target's speed is doubled, it gains a +2 bonus to AC, it has advantage on dexterity saving throws, and it gains an additional action on each of its turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action.\n\nWhen the spell ends, the target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는, 동의하는 크리처 하나를 선택한다. 주문이 끝날 때까지 대상의 이동속도는 두 배가 되고, 방어도(AC)에 +2 보너스를 받으며, 민첩 내성 굴림에 유리 보정을 받고, 매 턴 추가 행동 하나를 얻는다. 그 행동은 공격(무기 공격 1회만), 달리기, 철수, 은신, 물체 사용 행동에만 쓸 수 있다.\n\n주문이 끝나면 대상은 무기력의 파도에 휩싸여, 다음 턴이 끝날 때까지 이동하거나 행동할 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"감초 뿌리 조각."},{"name_ko":"가스 형상","name_en":"Gaseous Form","level":3,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A bit of gauze and a wisp of smoke.","higher_level_en":"","desc_en":"You transform a willing creature you touch, along with everything it's wearing and carrying, into a misty cloud for the duration. The spell ends if the creature drops to 0 hit points. An incorporeal creature isn't affected.\n\nWhile in this form, the target's only method of movement is a flying speed of 10 feet. The target can enter and occupy the space of another creature. The target has resistance to nonmagical damage, and it has advantage on Strength, Dexterity, and constitution saving throws. The target can pass through small holes, narrow openings, and even mere cracks, though it treats liquids as though they were solid surfaces. The target can't fall and remains hovering in the air even when stunned or otherwise incapacitated.\n\nWhile in the form of a misty cloud, the target can't talk or manipulate objects, and any objects it was carrying or holding can't be dropped, used, or otherwise interacted with. The target can't attack or cast spells.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"접촉한 동의하는 크리처 하나를, 착용하고 소지한 모든 것과 함께 지속시간 동안 안개 구름으로 변형시킨다. 그 크리처의 히트 포인트가 0이 되면 주문이 끝난다. 영체 크리처는 영향받지 않는다.\n\n이 형태인 동안, 대상의 유일한 이동 수단은 3m(10ft)의 비행 속도다. 대상은 다른 크리처의 공간에 들어가 점유할 수 있다. 대상은 비마법 피해에 저항을 얻고, 근력·민첩·건강 내성 굴림에 유리 보정을 받는다. 작은 구멍, 좁은 틈, 심지어 단순한 균열까지 통과할 수 있으나, 액체는 단단한 표면처럼 취급한다. 대상은 떨어지지 않으며, 충격을 받거나 무력화되어도 공중에 계속 떠 있는다.\n\n안개 구름 형태인 동안, 대상은 말하거나 물체를 다룰 수 없고, 소지하거나 들고 있던 물체는 떨어뜨리거나 사용하거나 달리 상호작용할 수 없다. 대상은 공격하거나 주문을 시전할 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"거즈 조각과 한 줄기 연기."},{"name_ko":"가시 무리","name_en":"Hail of Thorns","level":1,"school":"조형계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"가시 성장","name_en":"Spike Growth","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"Seven sharp thorns or seven small twigs, each sharpened to a point.","higher_level_en":"","desc_en":"The ground in a 20-foot radius centered on a point within range twists and sprouts hard spikes and thorns. The area becomes difficult terrain for the duration. When a creature moves into or within the area, it takes 2d4 piercing damage for every 5 feet it travels.\n\nThe transformation of the ground is camouflaged to look natural. Any creature that can't see the area at the time the spell is cast can make a Wisdom (Perception) check against your spell save DC to recognize the terrain as hazardous before entering it.","damage_en":"","attack_type":"","range_ko":"45m(150ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내 한 지점을 중심으로 한 6m(20ft) 반경의 땅이 뒤틀리며 단단한 가시와 돌기가 솟아난다. 그 구역은 지속시간 동안 어려운 지형이 된다. 크리처가 그 구역으로 들어오거나 그 안에서 이동하면, 1.5m(5ft) 이동할 때마다 2d4 관통 피해를 받는다.\n\n땅의 변형은 자연스러워 보이도록 위장된다. 주문을 시전할 때 그 구역을 볼 수 없는 크리처는, 들어가기 전에 시전자의 주문 내성 DC에 맞서는 지혜(감지) 판정에 성공하여 그 지형이 위험함을 알아챌 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"날카로운 가시 일곱 개, 또는 끝을 뾰족하게 깎은 작은 나뭇가지 일곱 개."},{"name_ko":"가시 채찍","name_en":"Thorn Whip","level":0,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"가시의 벽","name_en":"Wall of Thorns","level":6,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A handful of thorns.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, both types of damage increase by 1d8 for each slot level above 6th.","desc_en":"You create a wall of tough, pliable, tangled brush bristling with needle-sharp thorns. The wall appears within range on a solid surface and lasts for the duration. You choose to make the wall up to 60 feet long, 10 feet high, and 5 feet thick or a circle that has a 20-foot diameter and is up to 20 feet high and 5 feet thick. The wall blocks line of sight.\n\nWhen the wall appears, each creature within its area must make a dexterity saving throw. On a failed save, a creature takes 7d8 piercing damage, or half as much damage on a successful save.\n\nA creature can move through the wall, albeit slowly and painfully. For every 1 foot a creature moves through the wall, it must spend 4 feet of movement. Furthermore, the first time a creature enters the wall on a turn or ends its turn there, the creature must make a dexterity saving throw. It takes 7d8 slashing damage on a failed save, or half as much damage on a successful one.","damage_en":"7d8 Piercing","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"7d8 관통 피해","material_ko":""},{"name_ko":"가해","name_en":"Harm","level":6,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You unleash a virulent disease on a creature that you can see within range. The target must make a constitution saving throw. On a failed save, it takes 14d6 necrotic damage, or half as much damage on a successful save. The damage can't reduce the target's hit points below 1. If the target fails the saving throw, its hit point maximum is reduced for 1 hour by an amount equal to the necrotic damage it took. Any effect that removes a disease allows a creature's hit point maximum to return to normal before that time passes.","damage_en":"14d6 Necrotic","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"14d6 사령 피해","material_ko":""},{"name_ko":"감금","name_en":"Imprisonment","level":9,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 minute","duration_en":"Until dispelled","material_en":"A vellum depiction or a carved statuette in the likeness of the target, and a special component that varies according to the version of the spell you choose, worth at least 500gp per Hit Die of the target.","higher_level_en":"","desc_en":"You create a magical restraint to hold a creature that you can see within range. The target must succeed on a wisdom saving throw or be bound by the spell; if it succeeds, it is immune to this spell if you cast it again. While affected by this spell, the creature doesn't need to breathe, eat, or drink, and it doesn't age. Divination spells can't locate or perceive the target.\n\nWhen you cast the spell, you choose one of the following forms of imprisonment.\n\n***Burial.*** The target is entombed far beneath the earth in a sphere of magical force that is just large enough to contain the target. Nothing can pass through the sphere, nor can any creature teleport or use planar travel to get into or out of it.\n\nThe special component for this version of the spell is a small mithral orb.\n\n***Chaining.*** Heavy chains, firmly rooted in the ground, hold the target in place. The target is restrained until the spell ends, and it can't move or be moved by any means until then.\n\nThe special component for this version of the spell is a fine chain of precious metal.\n\n***Hedged Prison.*** The spell transports the target into a tiny demiplane that is warded against teleportation and planar travel. The demiplane can be a labyrinth, a cage, a tower, or any similar confined structure or area of your choice.\n\nThe special component for this version of the spell is a miniature representation of the prison made from jade.\n\n***Minimus Containment.*** The target shrinks to a height of 1 inch and is imprisoned inside a gemstone or similar object. Light can pass through the gemstone normally (allowing the target to see out and other creatures to see in), but nothing else can pass through, even by means of teleportation or planar travel. The gemstone can't be cut or broken while the spell remains in effect.\n\nThe special component for this version of the spell is a large, transparent gemstone, such as a corundum, diamond, or ruby.\n\n***Slumber.*** The target falls asleep and can't be awoken.\n\nThe special component for this version of the spell consists of rare soporific herbs.\n\n***Ending the Spell.*** During the casting of the spell, in any of its versions, you can specify a condition that will cause the spell to end and release the target. The condition can be as specific or as elaborate as you choose, but the GM must agree that the condition is reasonable and has a likelihood of coming to pass. The conditions can be based on a creature's name, identity, or deity but otherwise must be based on observable actions or qualities and not based on intangibles such as level, class, or hit points.\n\nA dispel magic spell can end the spell only if it is cast as a 9th-level spell, targeting either the prison or the special component used to create it.\n\nYou can use a particular special component to create only one prison at a time. If you cast the spell again using the same component, the target of the first casting is immediately freed from its binding.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"감정 진정화","name_en":"Calm Emotions","level":2,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"You attempt to suppress strong emotions in a group of people. Each humanoid in a 20-foot-radius sphere centered on a point you choose within range must make a charisma saving throw; a creature can choose to fail this saving throw if it wishes. If a creature fails its saving throw, choose one of the following two effects. You can suppress any effect causing a target to be charmed or frightened. When this spell ends, any suppressed effect resumes, provided that its duration has not expired in the meantime.\n\nAlternatively, you can make a target indifferent about creatures of your choice that it is hostile toward. This indifference ends if the target is attacked or harmed by a spell or if it witnesses any of its friends being harmed. When the spell ends, the creature becomes hostile again, unless the GM rules otherwise.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"한 무리의 사람들에게서 강한 감정을 억누르려 시도한다. 사거리 내에서 선택한 지점을 중심으로 한 6m(20ft) 반경 구체 내의 각 인간형은 매력 내성 굴림을 굴려야 한다. 크리처는 원한다면 이 내성 굴림에 일부러 실패할 수 있다. 크리처가 내성 굴림에 실패하면, 다음 두 효과 중 하나를 선택한다. 대상을 매혹하거나 공포에 빠뜨리는 효과를 억누를 수 있다. 이 주문이 끝나면, 지속시간이 그동안 만료되지 않은 한 억눌린 효과가 다시 이어진다.\n\n또는 대상이 적대하는, 시전자가 선택한 크리처들에 대해 무관심하게 만들 수 있다. 이 무관심은 대상이 공격받거나 주문으로 해를 입거나, 자기 편이 해를 입는 것을 목격하면 끝난다. 주문이 끝나면, DM이 달리 판정하지 않는 한 그 크리처는 다시 적대적이 된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"거대화/축소화","name_en":"Enlarge/Reduce","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A pinch iron powder.","higher_level_en":"","desc_en":"You cause a creature or an object you can see within range to grow larger or smaller for the duration. Choose either a creature or an object that is neither worn nor carried. If the target is unwilling, it can make a Constitution saving throw. On a success, the spell has no effect.\n\nIf the target is a creature, everything it is wearing and carrying changes size with it. Any item dropped by an affected creature returns to normal size at once.\n\n***Enlarge.*** The target's size doubles in all dimensions, and its weight is multiplied by eight. This growth increases its size by one category-from Medium to Large, for example. If there isn't enough room for the target to double its size, the creature or object attains the maximum possible size in the space available. Until the spell ends, the target also has advantage on Strength checks and Strength saving throws. The target's weapons also grow to match its new size. While these weapons are enlarged, the target's attacks with them deal 1d4 extra damage.\n\n***Reduce.*** The target's size is halved in all dimensions, and its weight is reduced to one-eighth of normal. This reduction decreases its size by one category-from Medium to Small, for example. Until the spell ends, the target also has disadvantage on Strength checks and Strength saving throws. The target's weapons also shrink to match its new size. While these weapons are reduced, the target's attacks with them deal 1d4 less damage (this can't reduce the damage below 1).","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 크리처나 물체 하나를 지속시간 동안 더 크거나 작게 만든다. 크리처 하나, 또는 착용하거나 소지되지 않은 물체 하나를 선택한다. 대상이 원치 않으면 건강 내성 굴림을 굴릴 수 있다. 성공 시 주문은 효과가 없다.\n\n대상이 크리처라면, 그가 착용하고 소지한 모든 것이 함께 크기가 변한다. 영향받은 크리처가 떨어뜨린 물건은 즉시 원래 크기로 돌아온다.\n\n***거대화.*** 대상의 크기가 모든 차원에서 두 배가 되고, 무게는 여덟 배가 된다. 이 성장으로 크기 범주가 한 단계 커진다. 예를 들어 중형에서 대형이 된다. 대상이 두 배로 커질 공간이 부족하면, 크리처나 물체는 가능한 공간 안에서 최대 크기가 된다. 주문이 끝날 때까지 대상은 근력 판정과 근력 내성 굴림에 유리 보정을 받는다. 대상의 무기도 새 크기에 맞춰 커진다. 이 무기가 거대해진 동안, 대상의 그 무기 공격은 1d4 추가 피해를 준다.\n\n***축소화.*** 대상의 크기가 모든 차원에서 절반이 되고, 무게는 8분의 1로 줄어든다. 이 축소로 크기 범주가 한 단계 작아진다. 예를 들어 중형에서 소형이 된다. 주문이 끝날 때까지 대상은 근력 판정과 근력 내성 굴림에 불리 보정을 받는다. 대상의 무기도 새 크기에 맞춰 줄어든다. 이 무기가 작아진 동안, 대상의 그 무기 공격은 1d4 적은 피해를 준다(피해가 1 미만으로 줄지는 않는다).","higher_level_ko":"","damage_ko":"","material_ko":"철가루 한 자밤."},{"name_ko":"거미 등반","name_en":"Spider Climb","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A drop of bitumen and a spider.","higher_level_en":"","desc_en":"Until the spell ends, one willing creature you touch gains the ability to move up, down, and across vertical surfaces and upside down along ceilings, while leaving its hands free. The target also gains a climbing speed equal to its walking speed.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"주문이 끝날 때까지, 접촉한 동의하는 크리처 하나가 수직면을 오르내리고 가로지르며 천장에 거꾸로 매달려 이동하는 능력을 얻으며, 두 손은 자유롭게 쓸 수 있다. 대상은 또한 걷기 속도와 같은 등반 속도를 얻는다.","higher_level_ko":"","damage_ko":"","material_ko":"역청 한 방울과 거미 한 마리."},{"name_ko":"거미줄","name_en":"Web","level":2,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A bit of spiderweb.","higher_level_en":"","desc_en":"You conjure a mass of thick, sticky webbing at a point of your choice within range. The webs fill a 20-foot cube from that point for the duration. The webs are difficult terrain and lightly obscure their area.\n\nIf the webs aren't anchored between two solid masses (such as walls or trees) or layered across a floor, wall, or ceiling, the conjured web collapses on itself, and the spell ends at the start of your next turn. Webs layered over a flat surface have a depth of 5 feet.\n\nEach creature that starts its turn in the webs or that enters them during its turn must make a dexterity saving throw. On a failed save, the creature is restrained as long as it remains in the webs or until it breaks free.\n\nA creature restrained by the webs can use its action to make a Strength check against your spell save DC. If it succeeds, it is no longer restrained.\n\nThe webs are flammable. Any 5-foot cube of webs exposed to fire burns away in 1 round, dealing 2d4 fire damage to any creature that starts its turn in the fire.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"사거리 내에서 선택한 지점에 두껍고 끈적한 거미줄 덩어리를 소환한다. 거미줄은 그 지점에서 6m(20ft) 정육면체를 지속시간 동안 채운다. 거미줄은 어려운 지형이며 그 구역을 약하게 가린다.\n\n거미줄이 벽이나 나무 같은 두 단단한 덩어리 사이에 고정되거나 바닥, 벽, 천장에 덮여 있지 않으면, 소환된 거미줄은 스스로 무너지고 다음 턴이 시작될 때 주문이 끝난다. 평평한 표면에 덮인 거미줄은 1.5m(5ft) 깊이를 갖는다.\n\n거미줄 안에서 턴을 시작하거나 턴 중에 들어오는 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 그 크리처는 거미줄 안에 있는 동안, 또는 벗어날 때까지 포박된다.\n\n거미줄에 포박된 크리처는 행동을 사용해 시전자의 주문 내성 DC에 맞서는 근력 판정을 굴릴 수 있다. 성공 시 더 이상 포박되지 않는다.\n\n거미줄은 인화성이다. 불에 노출된 1.5m(5ft) 정육면체의 거미줄은 1라운드 만에 타 없어지며, 그 불 속에서 턴을 시작하는 크리처에게 2d4 화염 피해를 준다.","higher_level_ko":"","damage_ko":"","material_ko":"거미줄 조각."},{"name_ko":"거울 분신","name_en":"Mirror Image","level":2,"school":"환영계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 minute","material_en":"","higher_level_en":"","desc_en":"Three illusory duplicates of yourself appear in your space. Until the spell ends, the duplicates move with you and mimic your actions, shifting position so it's impossible to track which image is real. You can use your action to dismiss the illusory duplicates.\n\nEach time a creature targets you with an attack during the spell's duration, roll a d20 to determine whether the attack instead targets one of your duplicates.\n\nIf you have three duplicates, you must roll a 6 or higher to change the attack's target to a duplicate. With two duplicates, you must roll an 8 or higher. With one duplicate, you must roll an 11 or higher.\n\nA duplicate's AC equals 10 + your Dexterity modifier. If an attack hits a duplicate, the duplicate is destroyed. A duplicate can be destroyed only by an attack that hits it. It ignores all other damage and effects. The spell ends when all three duplicates are destroyed.\n\nA creature is unaffected by this spell if it can't see, if it relies on senses other than sight, such as blindsight, or if it can perceive illusions as false, as with truesight.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"시전자의 공간에 자신의 환영 분신 셋이 나타난다. 주문이 끝날 때까지, 분신들은 시전자와 함께 움직이며 행동을 흉내내고, 위치를 바꿔가며 어느 것이 진짜인지 추적할 수 없게 만든다. 행동을 사용해 환영 분신을 해제할 수 있다.\n\n주문의 지속시간 동안 크리처가 시전자를 공격 대상으로 삼을 때마다, d20을 굴려 공격이 대신 분신 하나를 향하는지 결정한다.\n\n분신이 셋이면 6 이상을 굴려야 공격 대상을 분신으로 바꾼다. 둘이면 8 이상, 하나면 11 이상이어야 한다.\n\n분신의 방어도(AC)는 10 + 시전자의 민첩 수정치다. 공격이 분신을 명중시키면 그 분신은 파괴된다. 분신은 명중하는 공격으로만 파괴할 수 있으며, 그 외의 모든 피해와 효과는 무시한다. 분신 셋이 모두 파괴되면 주문이 끝난다.\n\n크리처가 볼 수 없거나, 맹안시야처럼 시각 외의 감각에 의존하거나, 진시야처럼 환영을 거짓으로 인지할 수 있으면 이 주문의 영향을 받지 않는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"거짓 삶","name_en":"False Life","level":1,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A small amount of alcohol or distilled spirits.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you gain 5 additional temporary hit points for each slot level above 1st.","desc_en":"Bolstering yourself with a necromantic facsimile of life, you gain 1d4 + 4 temporary hit points for the duration.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"사령술로 만든 생명의 모조품으로 자신을 강화하여, 지속시간 동안 1d4+4 임시 히트 포인트를 얻는다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 임시 히트 포인트를 5씩 추가로 얻는다.","damage_ko":"","material_ko":"소량의 술 또는 증류주."},{"name_ko":"격리","name_en":"Sequester","level":7,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Until dispelled","material_en":"A powder composed of diamond, emerald, ruby, and sapphire dust worth at least 5,000 gp, which the spell consumes.","higher_level_en":"","desc_en":"By means of this spell, a willing creature or an object can be hidden away, safe from detection for the duration. When you cast the spell and touch the target, it becomes invisible and can't be targeted by divination spells or perceived through scrying sensors created by divination spells.\n\nIf the target is a creature, it falls into a state of suspended animation. Time ceases to flow for it, and it doesn't grow older.\n\nYou can set a condition for the spell to end early. The condition can be anything you choose, but it must occur or be visible within 1 mile of the target. Examples include \"after 1,000 years\" or \"when the tarrasque awakens.\" This spell also ends if the target takes any damage.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"결투 강제","name_en":"Compelled Duel","level":1,"school":"환혹계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"경로 파악","name_en":"Find the Path","level":6,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"Up to 24 hours","material_en":"A set of divinatory tools--such as bones, ivory sticks, cards, teeth, or carved runes--worth 100gp and an object from the location you wish to find.","higher_level_en":"","desc_en":"This spell allows you to find the shortest, most direct physical route to a specific fixed location that you are familiar with on the same plane of existence. If you name a destination on another plane of existence, a destination that moves (such as a mobile fortress), or a destination that isn't specific (such as \"a green dragon's lair\"), the spell fails.\n\nFor the duration, as long as you are on the same plane of existence as the destination, you know how far it is and in what direction it lies. While you are traveling there, whenever you are presented with a choice of paths along the way, you automatically determine which path is the shortest and most direct route (but not necessarily the safest route) to the destination.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"경보","name_en":"Alarm","level":1,"school":"방호계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 minute","duration_en":"8 hours","material_en":"A tiny bell and a piece of fine silver wire.","higher_level_en":"","desc_en":"You set an alarm against unwanted intrusion. Choose a door, a window, or an area within range that is no larger than a 20-foot cube. Until the spell ends, an alarm alerts you whenever a Tiny or larger creature touches or enters the warded area. When you cast the spell, you can designate creatures that won't set off the alarm. You also choose whether the alarm is mental or audible.\n\nA mental alarm alerts you with a ping in your mind if you are within 1 mile of the warded area. This ping awakens you if you are sleeping.\n\nAn audible alarm produces the sound of a hand bell for 10 seconds within 60 feet.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 분","duration_ko":"8 시간","desc_ko":"원치 않는 침입에 대비해 경보를 설정한다. 사거리 내에서 6m(20ft) 정육면체를 넘지 않는 문, 창문, 또는 구역 하나를 선택한다. 주문이 끝날 때까지, 초소형 이상의 크리처가 결계 구역을 건드리거나 들어올 때마다 경보가 시전자에게 알린다. 주문을 시전할 때 경보를 울리지 않을 크리처를 지정할 수 있다. 경보를 정신적 방식으로 할지 소리 방식으로 할지도 선택한다.\n\n정신적 경보는 시전자가 결계 구역으로부터 1마일 이내에 있을 때 머릿속 울림으로 알린다. 이 울림은 잠들어 있을 때 깨운다.\n\n소리 경보는 18m(60ft) 이내에서 10초 동안 손종 소리를 낸다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 종과 고운 은철사 한 조각."},{"name_ko":"계획된 환영","name_en":"Programmed Illusion","level":6,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Until dispelled","material_en":"A bit of fleece and jade dust worth at least 25 gp.","higher_level_en":"","desc_en":"You create an illusion of an object, a creature, or some other visible phenomenon within range that activates when a specific condition occurs. The illusion is imperceptible until then. It must be no larger than a 30-foot cube, and you decide when you cast the spell how the illusion behaves and what sounds it makes. This scripted performance can last up to 5 minutes.\n\nWhen the condition you specify occurs, the illusion springs into existence and performs in the manner you described. Once the illusion finishes performing, it disappears and remains dormant for 10 minutes. After this time, the illusion can be activated again.\n\nThe triggering condition can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the area. For example, you could create an illusion of yourself to appear and warn off others who attempt to open a trapped door, or you could set the illusion to trigger only when a creature says the correct word or phrase.\n\nPhysical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"곤충 거대화","name_en":"Giant Insect","level":4,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"You transform up to ten centipedes, three spiders, five wasps, or one scorpion within range into giant versions of their natural forms for the duration. A centipede becomes a giant centipede, a spider becomes a giant spider, a wasp becomes a giant wasp, and a scorpion becomes a giant scorpion.\n\nEach creature obeys your verbal commands, and in combat, they act on your turn each round. The GM has the statistics for these creatures and resolves their actions and movement.\n\nA creature remains in its giant size for the duration, until it drops to 0 hit points, or until you use an action to dismiss the effect on it.\n\nThe GM might allow you to choose different targets. For example, if you transform a bee, its giant version might have the same statistics as a giant wasp.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내의 지네 최대 열, 거미 셋, 말벌 다섯, 또는 전갈 하나를 지속시간 동안 그 자연 형태의 거대판으로 변형시킨다. 지네는 거대 지네로, 거미는 거대 거미로, 말벌은 거대 말벌로, 전갈은 거대 전갈로 바뀐다.\n\n각 크리처는 시전자의 음성 명령을 따르며, 전투에서는 매 라운드 시전자의 턴에 행동한다. 이 크리처들의 능력치는 DM이 가지며 그 행동과 이동을 처리한다.\n\n크리처는 지속시간 동안, 히트 포인트가 0이 되거나 시전자가 행동을 사용해 그 크리처에 대한 효과를 해제할 때까지 거대한 크기를 유지한다.\n\nDM이 다른 대상을 고르도록 허용할 수도 있다. 예를 들어 벌을 변형시키면 그 거대판이 거대 말벌과 같은 능력치를 가질 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"곤충 무리","name_en":"Insect Plague","level":5,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"300 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A few grains of sugar, some kernels of grain, and a smear of fat.","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d10 for each slot level above 5th.","desc_en":"Swarming, biting locusts fill a 20-foot-radius sphere centered on a point you choose within range. The sphere spreads around corners. The sphere remains for the duration, and its area is lightly obscured. The sphere's area is difficult terrain.\n\nWhen the area appears, each creature in it must make a constitution saving throw. A creature takes 4d10 piercing damage on a failed save, or half as much damage on a successful one. A creature must also make this saving throw when it enters the spell's area for the first time on a turn or ends its turn there.","damage_en":"4d10 Piercing","attack_type":"","range_ko":"90m(300ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에서 선택한 지점을 중심으로, 물어뜯는 메뚜기 떼가 6m(20ft) 반경 구체를 채운다. 구체는 모퉁이를 돌아 퍼질 수 있다. 구체는 지속시간 동안 유지되며, 그 구역은 약하게 가려진다. 구체 구역은 어려운 지형이다.\n\n구역이 나타날 때, 그 안의 각 크리처는 건강 내성 굴림을 굴려야 한다. 실패 시 4d10 관통 피해를, 성공 시 절반의 피해를 받는다. 크리처는 한 턴에 처음으로 주문 구역에 들어오거나 그곳에서 턴을 마칠 때도 이 내성 굴림을 굴려야 한다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 피해가 1d10씩 증가한다.","damage_ko":"4d10 관통 피해","material_ko":"설탕 몇 알, 곡물 낟알 약간, 기름 한 줌."},{"name_ko":"공포","name_en":"Fear","level":3,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A white feather or the heart of a hen.","higher_level_en":"","desc_en":"You project a phantasmal image of a creature's worst fears. Each creature in a 30-foot cone must succeed on a wisdom saving throw or drop whatever it is holding and become frightened for the duration.\n\nWhile frightened by this spell, a creature must take the Dash action and move away from you by the safest available route on each of its turns, unless there is nowhere to move. If the creature ends its turn in a location where it doesn't have line of sight to you, the creature can make a wisdom saving throw. On a successful save, the spell ends for that creature.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"크리처의 가장 큰 공포를 담은 환영 이미지를 투사한다. 9m(30ft) 원뿔 내의 각 크리처는 지혜 내성 굴림에 성공하지 못하면 들고 있던 것을 떨어뜨리고 지속시간 동안 공포에 빠진다.\n\n이 주문으로 공포에 빠진 크리처는, 이동할 곳이 없지 않은 한, 매 턴 달리기 행동을 취해 가장 안전한 경로로 시전자에게서 멀어져야 한다. 크리처가 시전자를 볼 수 없는 위치에서 턴을 마치면, 지혜 내성 굴림을 굴릴 수 있다. 성공 시 그 크리처에 대한 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"흰 깃털 또는 암탉의 심장."},{"name_ko":"관문","name_en":"Gate","level":9,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A diamond worth at least 5,000gp.","higher_level_en":"","desc_en":"You conjure a portal linking an unoccupied space you can see within range to a precise location on a different plane of existence. The portal is a circular opening, which you can make 5 to 20 feet in diameter. You can orient the portal in any direction you choose. The portal lasts for the duration.\n\nThe portal has a front and a back on each plane where it appears. Travel through the portal is possible only by moving through its front. Anything that does so is instantly transported to the other plane, appearing in the unoccupied space nearest to the portal.\n\nDeities and other planar rulers can prevent portals created by this spell from opening in their presence or anywhere within their domains.\n\nWhen you cast this spell, you can speak the name of a specific creature (a pseudonym, title, or nickname doesn't work). If that creature is on a plane other than the one you are on, the portal opens in the named creature's immediate vicinity and draws the creature through it to the nearest unoccupied space on your side of the portal. You gain no special power over the creature, and it is free to act as the GM deems appropriate. It might leave, attack you, or help you.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"광기의 왕관","name_en":"Crown of Madness","level":2,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"괴물 지배","name_en":"Dominate Monster","level":8,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell with a 9th-level spell slot, the duration is concentration, up to 8 hours.","desc_en":"You attempt to beguile a creature that you can see within range. It must succeed on a wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw.\n\nWhile the creature is charmed, you have a telepathic link with it as long as the two of you are on the same plane of existence. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability.\n\nYou can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time, you can also cause the creature to use a reaction, but this requires you to use your own reaction as well.\n\nEach time the target takes damage, it makes a new wisdom saving throw against the spell. If the saving throw succeeds, the spell ends.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"괴물 포박","name_en":"Hold Monster","level":5,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A small piece of iron.","higher_level_en":"When you cast this spell using a level 6 or higher location, you can target an additional creature for each level of location beyond the fifth. The creatures must be within 30 feet o f each other when you target them.","desc_en":"Choose a creature you can see and reach. The target must make a saving throw of Wisdom or be paralyzed for the duration of the spell. This spell has no effect against the undead. At the end of each round, the target can make a new saving throw of Wisdom. If successful, the spell ends for the creature.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"볼 수 있고 닿을 수 있는 크리처 하나를 선택한다. 대상은 지혜 내성 굴림에 성공하지 못하면 주문의 지속시간 동안 마비된다. 이 주문은 언데드에는 효과가 없다. 매 라운드가 끝날 때 대상은 다시 지혜 내성 굴림을 굴릴 수 있다. 성공하면 그 크리처에 대한 주문이 끝난다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다. 대상으로 삼을 때 크리처들은 서로 9m(30ft) 이내에 있어야 한다.","damage_ko":"","material_ko":"작은 철 조각."},{"name_ko":"구조화","name_en":"Fabricate","level":4,"school":"변환계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"10 minutes","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You convert raw materials into products of the same material. For example, you can fabricate a wooden bridge from a clump of trees, a rope from a patch of hemp, and clothes from flax or wool.\n\nChoose raw materials that you can see within range. You can fabricate a Large or smaller object (contained within a 10-foot cube, or eight connected 5-foot cubes), given a sufficient quantity of raw material. If you are working with metal, stone, or another mineral substance, however, the fabricated object can be no larger than Medium (contained within a single 5-foot cube). The quality of objects made by the spell is commensurate with the quality of the raw materials.\n\nCreatures or magic items can't be created or transmuted by this spell. You also can't use it to create items that ordinarily require a high degree of craftsmanship, such as jewelry, weapons, glass, or armor, unless you have proficiency with the type of artisan's tools used to craft such objects.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"10 분","duration_ko":"즉시","desc_ko":"원자재를 같은 재료의 제품으로 변환한다. 예를 들어 나무 무더기로 나무다리를, 삼 한 뭉치로 밧줄을, 아마나 양모로 옷을 만들 수 있다.\n\n사거리 내에서 볼 수 있는 원자재를 선택한다. 충분한 양의 원자재가 있으면 대형 이하의 물체(3m(10ft) 정육면체, 또는 이어진 1.5m(5ft) 정육면체 여덟 개 안에 들어가는)를 만들 수 있다. 다만 금속, 돌, 또는 다른 광물성 물질을 다룰 경우, 만드는 물체는 중형 이하(단일 1.5m(5ft) 정육면체 안에 들어가는)여야 한다. 주문으로 만든 물체의 품질은 원자재의 품질에 상응한다.\n\n이 주문으로 크리처나 마법 물품을 창조하거나 변환할 수는 없다. 또한 보석, 무기, 유리, 갑옷처럼 높은 수준의 장인 기술을 요하는 물품은, 그런 물체를 만드는 데 쓰는 장인 도구 종류에 숙련되지 않은 한 이 주문으로 만들 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"굿베리","name_en":"Goodberry","level":1,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A sprig of mistletoe.","higher_level_en":"","desc_en":"Up to ten berries appear in your hand and are infused with magic for the duration. A creature can use its action to eat one berry. Eating a berry restores 1 hit point, and the berry provides enough nourishment to sustain a creature for a day.\n\nThe berries lose their potency if they have not been consumed within 24 hours of the casting of this spell.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"손에 열매 최대 열 개가 나타나 지속시간 동안 마법이 깃든다. 크리처는 행동을 사용해 열매 하나를 먹을 수 있다. 열매 하나를 먹으면 히트 포인트 1점을 회복하며, 열매는 크리처가 하루를 버틸 만큼의 영양을 준다.\n\n열매는 이 주문을 시전한 뒤 24시간 이내에 먹지 않으면 효력을 잃는다.","higher_level_ko":"","damage_ko":"","material_ko":"겨우살이 잔가지."},{"name_ko":"권능어: 죽음","name_en":"Power Word Kill","level":9,"school":"환혹계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You utter a word of power that can compel one creature you can see within range to die instantly. If the creature you choose has 100 hit points or fewer, it dies. Otherwise, the spell has no effect.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"권능어: 충격","name_en":"Power Word Stun","level":8,"school":"환혹계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You speak a word of power that can overwhelm the mind of one creature you can see within range, leaving it dumbfounded. If the target has 150 hit points or fewer, it is stunned. Otherwise, the spell has no effect.\n\nThe stunned target must make a constitution saving throw at the end of each of its turns. On a successful save, this stunning effect ends.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"권능어: 치유","name_en":"Power Word Heal","level":9,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"귀환의 단어","name_en":"Word of Recall","level":6,"school":"조형계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"5 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You and up to five willing creatures within 5 feet of you instantly teleport to a previously designated sanctuary. You and any creatures that teleport with you appear in the nearest unoccupied space to the spot you designated when you prepared your sanctuary (see below). If you cast this spell without first preparing a sanctuary, the spell has no effect.\n\nYou must designate a sanctuary by casting this spell within a location, such as a temple, dedicated to or strongly linked to your deity. If you attempt to cast the spell in this manner in an area that isn't dedicated to your deity, the spell has no effect.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"금속 가열","name_en":"Heat Metal","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A piece of iron and a flame.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd.","desc_en":"Choose a manufactured metal object, such as a metal weapon or a suit of heavy or medium metal armor, that you can see within range. You cause the object to glow red-hot. Any creature in physical contact with the object takes 2d8 fire damage when you cast the spell. Until the spell ends, you can use a bonus action on each of your subsequent turns to cause this damage again.\n\nIf a creature is holding or wearing the object and takes the damage from it, the creature must succeed on a constitution saving throw or drop the object if it can. If it doesn't drop the object, it has disadvantage on attack rolls and ability checks until the start of your next turn.","damage_en":"2d8 Fire","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는, 금속 무기나 중장/평장 금속 갑옷 같은 가공된 금속 물체 하나를 선택한다. 그 물체를 시뻘겋게 달군다. 주문을 시전할 때 그 물체에 물리적으로 닿아 있는 크리처는 2d8 화염 피해를 받는다. 주문이 끝날 때까지, 이후 자기 턴마다 추가 행동으로 이 피해를 다시 입힐 수 있다.\n\n크리처가 그 물체를 들거나 착용한 채 피해를 받으면, 건강 내성 굴림에 성공하지 못할 경우 가능하다면 물체를 떨어뜨려야 한다. 물체를 떨어뜨리지 않으면, 다음 턴이 시작될 때까지 명중 굴림과 능력 판정에 불리 보정을 받는다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"2d8 화염 피해","material_ko":"철 조각과 불꽃."},{"name_ko":"금제","name_en":"Forbiddance","level":6,"school":"방호계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"10 minutes","duration_en":"24 hours","material_en":"A sprinkling of holy water, rare incense, and powdered ruby worth at least 1,000 gp.","higher_level_en":"","desc_en":"You create a ward against magical travel that protects up to 40,000 square feet of floor space to a height of 30 feet above the floor. For the duration, creatures can't teleport into the area or use portals, such as those created by the gate spell, to enter the area. The spell proofs the area against planar travel, and therefore prevents creatures from accessing the area by way of the Astral Plane, Ethereal Plane, Feywild, Shadowfell, or the plane shift spell.\n\nIn addition, the spell damages types of creatures that you choose when you cast it. Choose one or more of the following: celestials, elementals, fey, fiends, and undead. When a chosen creature enters the spell's area for the first time on a turn or starts its turn there, the creature takes 5d10 radiant or necrotic damage (your choice when you cast this spell).\n\nWhen you cast this spell, you can designate a password. A creature that speaks the password as it enters the area takes no damage from the spell.\n\nThe spell's area can't overlap with the area of another forbiddance spell. If you cast forbiddance every day for 30 days in the same location, the spell lasts until it is dispelled, and the material components are consumed on the last casting.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"기괴","name_en":"Weird","level":9,"school":"환영계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"Drawing on the deepest fears of a group of creatures, you create illusory creatures in their minds, visible only to them. Each creature in a 30-foot-radius sphere centered on a point of your choice within range must make a wisdom saving throw. On a failed save, a creature becomes frightened for the duration. The illusion calls on the creature's deepest fears, manifesting its worst nightmares as an implacable threat. At the start of each of the frightened creature's turns, it must succeed on a wisdom saving throw or take 4d10 psychic damage. On a successful save, the spell ends for that creature.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"기름칠","name_en":"Grease","level":1,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"A bit of pork rind or butter.","higher_level_en":"","desc_en":"Slick grease covers the ground in a 10-foot square centered on a point within range and turns it into difficult terrain for the duration.\n\nWhen the grease appears, each creature standing in its area must succeed on a dexterity saving throw or fall prone. A creature that enters the area or ends its turn there must also succeed on a dexterity saving throw or fall prone.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"사거리 내 한 지점을 중심으로 한 3m(10ft) 정사각형 바닥이 미끄러운 기름으로 덮여, 지속시간 동안 어려운 지형이 된다.\n\n기름이 나타날 때, 그 구역에 서 있는 각 크리처는 민첩 내성 굴림에 성공하지 못하면 넘어진다. 그 구역에 들어오거나 그곳에서 턴을 마치는 크리처도 민첩 내성 굴림에 성공하지 못하면 넘어진다.","higher_level_ko":"","damage_ko":"","material_ko":"돼지 껍질 조각이나 버터."},{"name_ko":"기억 조작","name_en":"Modify Memory","level":5,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"If you cast this spell using a spell slot of 6th level or higher, you can alter the target's memories of an event that took place up to 7 days ago (6th level), 30 days ago (7th level), 1 year ago (8th level), or any time in the creature's past (9th level).","desc_en":"You attempt to reshape another creature's memories. One creature that you can see must make a wisdom saving throw. If you are fighting the creature, it has advantage on the saving throw. On a failed save, the target becomes charmed by you for the duration. The charmed target is incapacitated and unaware of its surroundings, though it can still hear you. If it takes any damage or is targeted by another spell, this spell ends, and none of the target's memories are modified.\n\nWhile this charm lasts, you can affect the target's memory of an event that it experienced within the last 24 hours and that lasted no more than 10 minutes. You can permanently eliminate all memory of the event, allow the target to recall the event with perfect clarity and exacting detail, change its memory of the details of the event, or create a memory of some other event.\n\nYou must speak to the target to describe how its memories are affected, and it must be able to understand your language for the modified memories to take root. Its mind fills in any gaps in the details of your description. If the spell ends before you have finished describing the modified memories, the creature's memory isn't altered. Otherwise, the modified memories take hold when the spell ends.\n\nA modified memory doesn't necessarily affect how a creature behaves, particularly if the memory contradicts the creature's natural inclinations, alignment, or beliefs. An illogical modified memory, such as implanting a memory of how much the creature enjoyed dousing itself in acid, is dismissed, perhaps as a bad dream. The GM might deem a modified memory too nonsensical to affect a creature in a significant manner.\n\nA remove curse or greater restoration spell cast on the target restores the creature's true memory.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"다른 크리처의 기억을 다시 빚으려 시도한다. 볼 수 있는 크리처 하나가 지혜 내성 굴림을 굴려야 한다. 시전자가 그 크리처와 싸우는 중이면 내성 굴림에 유리 보정을 받는다. 실패 시 대상은 지속시간 동안 시전자에게 매혹된다. 매혹된 대상은 무력화되고 주변을 인지하지 못하지만, 시전자의 말은 들을 수 있다. 대상이 피해를 받거나 다른 주문의 대상이 되면 이 주문이 끝나고, 대상의 기억은 전혀 바뀌지 않는다.\n\n이 매혹이 지속되는 동안, 대상이 지난 24시간 이내에 겪은, 10분을 넘지 않는 사건에 대한 기억에 영향을 줄 수 있다. 그 사건의 모든 기억을 영구히 지우거나, 대상이 그 사건을 완벽하고 세세하게 떠올리게 하거나, 사건의 세부에 대한 기억을 바꾸거나, 다른 사건의 기억을 만들 수 있다.\n\n기억이 어떻게 영향받는지 대상에게 말로 묘사해야 하며, 바뀐 기억이 자리잡으려면 대상이 시전자의 언어를 이해할 수 있어야 한다. 대상의 정신이 묘사의 빈틈을 채운다. 바뀐 기억을 다 묘사하기 전에 주문이 끝나면 크리처의 기억은 바뀌지 않는다. 그렇지 않으면 주문이 끝날 때 바뀐 기억이 자리잡는다.\n\n바뀐 기억이 반드시 크리처의 행동에 영향을 주는 것은 아니며, 특히 그 기억이 크리처의 타고난 성향, 성향, 신념과 모순되면 그렇다. 크리처가 산성 물질을 뒤집어쓰는 것을 얼마나 즐겼는지 심는 것처럼 비논리적인 바뀐 기억은, 아마도 나쁜 꿈으로 치부되어 무시된다. DM은 바뀐 기억이 너무 터무니없어서 크리처에게 유의미한 영향을 주지 못한다고 판정할 수 있다.\n\n대상에게 시전한 저주 해제나 상급 회복 주문은 크리처의 진짜 기억을 되돌린다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 최대 7일 전(6레벨), 30일 전(7레벨), 1년 전(8레벨), 또는 크리처의 과거 어느 때(9레벨)에 일어난 사건의 기억을 바꿀 수 있다.","damage_ko":"","material_ko":""},{"name_ko":"기후 조종","name_en":"Control Weather","level":8,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"10 minutes","duration_en":"Up to 8 hours","material_en":"Burning incense and bits of earth and wood mixed in water.","higher_level_en":"","desc_en":"You take control of the weather within 5 miles of you for the duration. You must be outdoors to cast this spell. Moving to a place where you don't have a clear path to the sky ends the spell early.\n\nWhen you cast the spell, you change the current weather conditions, which are determined by the GM based on the climate and season. You can change precipitation, temperature, and wind. It takes 1d4 x 10 minutes for the new conditions to take effect. Once they do so, you can change the conditions again. When the spell ends, the weather gradually returns to normal.\n\nWhen you change the weather conditions, find a current condition on the following tables and change its stage by one, up or down. When changing the wind, you can change its direction.\n\n##### Precipitation\n\n| Stage | Condition |\n\n|---|---|\n\n| 1 | Clear |\n\n| 2 | Light clouds |\n\n| 3 | Overcast or ground fog |\n\n| 4 | Rain, hail, or snow |\n\n| 5 | Torrential rain, driving hail, or blizzard |\n\n##### Temperature\n\n| Stage | Condition |\n\n|---|---|\n\n| 1 | Unbearable heat |\n\n| 2 | Hot |\n\n| 3 | Warm |\n\n| 4 | Cool |\n\n| 5 | Cold |\n\n| 6 | Arctic cold |\n\n##### Wind\n\n| Stage | Condition |\n\n|---|---|\n\n| 1 | Calm |\n\n| 2 | Moderate wind |\n\n| 3 | Strong wind |\n\n| 4 | Gale |\n\n| 5 | Storm |","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"깃털 낙하","name_en":"Feather Fall","level":1,"school":"변환계","components":["V","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 reaction","duration_en":"1 minute","material_en":"A small feather or a piece of down.","higher_level_en":"","desc_en":"Choose up to five falling creatures within range. A falling creature's rate of descent slows to 60 feet per round until the spell ends. If the creature lands before the spell ends, it takes no falling damage and can land on its feet, and the spell ends for that creature.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 반응행동","duration_ko":"1 분","desc_ko":"사거리 내에서 떨어지는 크리처 최대 다섯을 선택한다. 주문이 끝날 때까지 떨어지는 크리처의 낙하 속도가 라운드당 18m(60ft)로 느려진다. 주문이 끝나기 전에 착지하면, 낙하 피해를 받지 않고 두 발로 착지할 수 있으며, 그 크리처에 대한 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 깃털이나 솜털 조각."},{"name_ko":"깨무는 눈길","name_en":"Eyebite","level":6,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"For the spell's duration, your eyes become an inky void imbued with dread power. One creature of your choice within 60 feet of you that you can see must succeed on a wisdom saving throw or be affected by one of the following effects of your choice for the duration. On each of your turns until the spell ends, you can use your action to target another creature but can't target a creature again if it has succeeded on a saving throw against this casting of eyebite.\n\n***Asleep.*** The target falls unconscious. It wakes up if it takes any damage or if another creature uses its action to shake the sleeper awake.\n\n***Panicked.*** The target is frightened of you. On each of its turns, the frightened creature must take the Dash action and move away from you by the safest and shortest available route, unless there is nowhere to move. If the target moves to a place at least 60 feet away from you where it can no longer see you, this effect ends.\n\n***Sickened.*** The target has disadvantage on attack rolls and ability checks. At the end of each of its turns, it can make another wisdom saving throw. If it succeeds, the effect ends.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"깨어남","name_en":"Awaken","level":5,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"8 hours","duration_en":"Instantaneous","material_en":"An agate worth at least 1,000 gp, which the spell consumes.","higher_level_en":"","desc_en":"After spending the casting time tracing magical pathways within a precious gemstone, you touch a Huge or smaller beast or plant. The target must have either no Intelligence score or an Intelligence of 3 or less. The target gains an Intelligence of 10. The target also gains the ability to speak one language you know. If the target is a plant, it gains the ability to move its limbs, roots, vines, creepers, and so forth, and it gains senses similar to a human's. Your GM chooses statistics appropriate for the awakened plant, such as the statistics for the awakened shrub or the awakened tree.\n\nThe awakened beast or plant is charmed by you for 30 days or until you or your companions do anything harmful to it. When the charmed condition ends, the awakened creature chooses whether to remain friendly to you, based on how you treated it while it was charmed.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"8 시간","duration_ko":"즉시","desc_ko":"시전 시간 동안 귀한 보석 안에 마법의 경로를 그린 뒤, 초대형 이하의 야수나 식물을 접촉한다. 대상은 지능 점수가 없거나 지능이 3 이하여야 한다. 대상은 지능 10을 얻는다. 또한 시전자가 아는 언어 하나를 말하는 능력을 얻는다. 대상이 식물이면 사지, 뿌리, 덩굴, 넝쿨 등을 움직이는 능력을 얻고, 인간과 비슷한 감각을 얻는다. 각성한 관목이나 각성한 나무의 능력치처럼, 각성한 식물에 어울리는 능력치는 DM이 선택한다.\n\n각성한 야수나 식물은 30일 동안, 또는 시전자나 동료가 그에게 해로운 짓을 할 때까지 시전자에게 매혹된다. 매혹 상태가 끝나면, 각성한 크리처는 매혹된 동안 대우받은 방식에 따라 시전자에게 계속 우호적일지 스스로 정한다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 1,000gp 이상 가치의 마노."},{"name_ko":"나무 질주","name_en":"Tree Stride","level":5,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"You gain the ability to enter a tree and move from inside it to inside another tree of the same kind within 500 feet. Both trees must be living and at least the same size as you. You must use 5 feet of movement to enter a tree. You instantly know the location of all other trees of the same kind within 500 feet and, as part of the move used to enter the tree, can either pass into one of those trees or step out of the tree you're in. You appear in a spot of your choice within 5 feet of the destination tree, using another 5 feet of movement. If you have no movement left, you appear within 5 feet of the tree you entered.\n\nYou can use this transportation ability once per round for the duration. You must end each turn outside a tree.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"나무 안으로 들어가, 그 안에서 45m(150ft) 이내의 같은 종류의 다른 나무 안으로 이동하는 능력을 얻는다. 두 나무 모두 살아 있어야 하며 적어도 시전자와 같은 크기여야 한다. 나무에 들어가려면 5피트의 이동력을 써야 한다. 45m(150ft) 이내의 같은 종류의 다른 모든 나무 위치를 즉시 알며, 나무에 들어가는 데 쓴 이동의 일부로 그 나무들 중 하나로 넘어가거나 있던 나무에서 나올 수 있다. 목적지 나무의 1.5m(5ft) 이내에서 선택한 지점에, 5피트의 이동력을 추가로 써서 나타난다. 남은 이동력이 없으면 들어간 나무의 1.5m(5ft) 이내에 나타난다.\n\n지속시간 동안 라운드당 한 번 이 이동 능력을 쓸 수 있다. 매 턴을 나무 밖에서 마쳐야 한다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"나무껍질 피부","name_en":"Barkskin","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A handful of oak bark.","higher_level_en":"","desc_en":"You touch a willing creature. Until the spell ends, the target's skin has a rough, bark-like appearance, and the target's AC can't be less than 16, regardless of what kind of armor it is wearing.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"동의하는 크리처 하나를 접촉한다. 주문이 끝날 때까지 대상의 피부가 거친 나무껍질 같은 모습이 되며, 어떤 갑옷을 착용하든 대상의 방어도(AC)는 16 미만이 될 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"떡갈나무 껍질 한 줌."},{"name_ko":"낙뢰 소환","name_en":"Call Lightning","level":3,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 4th or higher level, the damage increases by 1d10 for each slot level above 3rd.","desc_en":"A storm cloud appears in the shape of a cylinder that is 10 feet tall with a 60-foot radius, centered on a point you can see 100 feet directly above you. The spell fails if you can't see a point in the air where the storm cloud could appear (for example, if you are in a room that can't accommodate the cloud).\n\nWhen you cast the spell, choose a point you can see within range. A bolt of lightning flashes down from the cloud to that point. Each creature within 5 feet of that point must make a dexterity saving throw. A creature takes 3d10 lightning damage on a failed save, or half as much damage on a successful one. On each of your turns until the spell ends, you can use your action to call down lightning in this way again, targeting the same point or a different one.\n\nIf you are outdoors in stormy conditions when you cast this spell, the spell gives you control over the existing storm instead of creating a new one. Under such conditions, the spell's damage increases by 1d10.","damage_en":"3d10 Lightning","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"시전자로부터 똑바로 위 30m(100ft) 지점에, 높이 3m(10ft), 반경 18m(60ft)의 원기둥 모양 폭풍 구름이 나타난다. 폭풍 구름이 나타날 공중의 지점을 볼 수 없으면(예를 들어 구름을 수용할 수 없는 방 안에 있으면) 주문은 실패한다.\n\n주문을 시전할 때, 사거리 내에서 볼 수 있는 지점 하나를 선택한다. 구름에서 그 지점으로 번개가 내리친다. 그 지점의 1.5m(5ft) 이내에 있는 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 3d10 번개 피해를, 성공 시 절반의 피해를 받는다. 주문이 끝날 때까지 매 턴 행동을 사용해, 같은 지점이나 다른 지점을 겨눠 이 번개를 다시 내리칠 수 있다.\n\n이 주문을 시전할 때 폭풍우가 치는 야외에 있다면, 새 구름을 만드는 대신 기존 폭풍을 조종하게 된다. 그런 조건에서는 주문의 피해가 1d10 증가한다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 피해가 1d10씩 증가한다.","damage_ko":"3d10 번개 피해","material_ko":""},{"name_ko":"낙인의 강타","name_en":"Branding Smite","level":2,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 bonus action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the extra damage increases by 1d6 for each slot level above 2nd.","desc_en":"The next time you hit a creature with a weapon attack before this spell ends, the weapon gleams with astral radiance as you strike. The attack deals an extra 2d6 radiant damage to the target, which becomes visible if it's invisible, and the target sheds dim light in a 5-foot radius and can't become invisible until the spell ends.","damage_en":"2d6 Radiant","attack_type":"","range_ko":"자신","casting_time_ko":"1 추가 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"이 주문이 끝나기 전 다음번 무기 공격으로 크리처를 명중시킬 때, 내려치는 순간 무기가 천계의 광휘로 빛난다. 그 공격은 대상에게 추가로 2d6 광휘 피해를 주며, 대상이 투명 상태였다면 보이게 되고, 주문이 끝날 때까지 대상은 1.5m(5ft) 반경에 흐릿한 빛을 발하며 투명해질 수 없다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 추가 피해가 1d6씩 증가한다.","damage_ko":"2d6 광휘 피해","material_ko":""},{"name_ko":"냉기 분사","name_en":"Cone of Cold","level":5,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A small crystal or glass cone.","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.","desc_en":"A blast of cold air erupts from your hands. Each creature in a 60-foot cone must make a constitution saving throw. A creature takes 8d8 cold damage on a failed save, or half as much damage on a successful one.\n\nA creature killed by this spell becomes a frozen statue until it thaws.","damage_en":"8d8 Cold","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"손에서 찬 공기의 폭발이 뿜어져 나온다. 18m(60ft) 원뿔 내의 각 크리처는 건강 내성 굴림을 굴려야 한다. 실패 시 8d8 냉기 피해를, 성공 시 절반의 피해를 받는다.\n\n이 주문으로 죽은 크리처는 녹을 때까지 얼어붙은 조각상이 된다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"8d8 냉기 피해","material_ko":"작은 수정이나 유리 원뿔."},{"name_ko":"냉랭한 접촉","name_en":"Chill Touch","level":0,"school":"사령계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"1 round","material_en":"","higher_level_en":"","desc_en":"You create a ghostly, skeletal hand in the space of a creature within range. Make a ranged spell attack against the creature to assail it with the chill of the grave. On a hit, the target takes 1d8 necrotic damage, and it can't regain hit points until the start of your next turn. Until then, the hand clings to the target.\n\nIf you hit an undead target, it also has disadvantage on attack rolls against you until the end of your next turn.\n\nThis spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","damage_en":"1d8 Necrotic","attack_type":"ranged","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"1 라운드","desc_ko":"사거리 내 크리처의 공간에 유령 같은 해골 손을 만들어낸다. 그 크리처에게 원거리 주문 공격을 굴려 무덤의 냉기로 공격한다. 명중 시 대상은 1d8 사령 피해를 받고, 다음 턴이 시작될 때까지 히트 포인트를 회복할 수 없다. 그때까지 손은 대상에게 달라붙어 있다.\n\n언데드 대상을 명중시키면, 그 대상은 다음 턴이 끝날 때까지 시전자를 상대로 한 명중 굴림에 불리 보정을 받는다.\n\n이 주문의 피해는 5레벨(2d8), 11레벨(3d8), 17레벨(4d8)에 도달할 때 1d8씩 증가한다.","higher_level_ko":"","damage_ko":"1d8 사령 피해","material_ko":""},{"name_ko":"능력 강화","name_en":"Enhance Ability","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"Fur or a feather from a beast.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, you can target one ad
