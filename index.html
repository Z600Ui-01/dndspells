e the image of an object, a creature, or some other visible phenomenon that is no larger than a 20-foot cube. The image appears at a spot that you can see within range and lasts for the duration. It seems completely real, including sounds, smells, and temperature appropriate to the thing depicted. You can't create sufficient heat or cold to cause damage, a sound loud enough to deal thunder damage or deafen a creature, or a smell that might sicken a creature (like a troglodyte's stench).\n\nAs long as you are within range of the illusion, you can use your action to cause the image to move to any other spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking. Similarly, you can cause the illusion to make different sounds at different times, even making it carry on a conversation, for example.\n\nPhysical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and its other sensory qualities become faint to the creature.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"6m(20ft) 정육면체를 넘지 않는 물체, 크리처, 또는 그 밖에 눈에 보이는 현상의 이미지를 만든다. 이미지는 사거리 내에서 볼 수 있는 지점에 나타나 지속시간 동안 유지된다. 묘사한 대상에 어울리는 소리, 냄새, 온도까지 포함하여 완전히 진짜처럼 보인다. 다만 피해를 줄 만한 열이나 냉기, 천둥 피해를 주거나 귀머거리로 만들 만큼 큰 소리, 크리처를 메스껍게 할 냄새(트로글로다이트의 악취 등)는 만들 수 없다.\n\n이 환영의 사거리 내에 있는 한, 행동을 사용해 이미지를 사거리 내 다른 지점으로 이동시킬 수 있다. 이미지가 위치를 옮길 때, 움직임이 자연스러워 보이도록 외형을 바꿀 수 있다. 예를 들어 크리처의 이미지를 만들어 이동시키면 걷는 것처럼 보이게 할 수 있다. 마찬가지로, 환영이 서로 다른 시점에 다른 소리를 내게 하거나, 심지어 대화를 이어가게 할 수도 있다.\n\n이미지와 물리적으로 접촉하면 물체가 통과하므로 환영임이 드러난다. 행동을 사용해 이미지를 살피는 크리처는 시전자의 주문 내성 DC에 맞서는 지능(수사) 판정에 성공하여 그것이 환영임을 알아낼 수 있다. 크리처가 환영의 정체를 간파하면 이미지를 꿰뚫어 볼 수 있고, 다른 감각적 특성도 그 크리처에게 희미해진다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 정신집중 없이 무효화될 때까지 주문이 지속된다.","damage_ko":"","material_ko":"양털 조각."},{"name_ko":"상급 투명화","name_en":"Greater Invisibility","level":4,"school":"환영계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"You or a creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"시전자나 접촉한 크리처가 주문이 끝날 때까지 투명해진다. 대상이 착용하거나 소지한 것은 대상의 몸에 있는 한 함께 투명해진다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"상급 회복","name_en":"Greater Restoration","level":5,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Diamond dust worth at least 100gp, which the spell consumes.","higher_level_en":"","desc_en":"You imbue a creature you touch with positive energy to undo a debilitating effect. You can reduce the target's exhaustion level by one, or end one of the following effects on the target:\n\n- One effect that charmed or petrified the target\n\n- One curse, including the target's attunement to a cursed magic item\n\n- Any reduction to one of the target's ability scores\n\n- One effect reducing the target's hit point maximum","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"접촉한 크리처에게 긍정 에너지를 불어넣어 쇠약 효과를 되돌린다. 대상의 탈진 수치를 하나 줄이거나, 대상에게 걸린 다음 효과 중 하나를 끝낼 수 있다.\n\n- 대상을 매혹하거나 석화시킨 효과 하나\n\n- 저주 하나(저주받은 마법 물품에 대한 대상의 조율 포함)\n\n- 대상의 능력치 하나에 대한 모든 감소\n\n- 대상의 최대 히트 포인트를 줄이는 효과 하나","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 100gp 이상 가치의 다이아몬드 가루."},{"name_ko":"상처 가해","name_en":"Inflict Wounds","level":1,"school":"사령계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st.","desc_en":"Make a melee spell attack against a creature you can reach. On a hit, the target takes 3d10 necrotic damage.","damage_en":"3d10 Necrotic","attack_type":"melee","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"닿을 수 있는 크리처에게 근접 주문 공격을 굴린다. 명중 시 대상은 3d10 사령 피해를 받는다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 피해가 1d10씩 증가한다.","damage_ko":"3d10 사령 피해","material_ko":""},{"name_ko":"상처 치료","name_en":"Cure Wounds","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d8 for each slot level above 1st.","desc_en":"A creature you touch regains a number of hit points equal to 1d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"접촉한 크리처가 1d8 + 주문시전 능력 수정치만큼의 히트 포인트를 회복한다. 이 주문은 언데드나 구조물에는 효과가 없다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 회복량이 1d8씩 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"색 분사","name_en":"Color Spray","level":1,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 round","material_en":"A pinch of powder or sand that is colored red, yellow, and blue.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d10 for each slot level above 1st.","desc_en":"A dazzling array of flashing, colored light springs from your hand. Roll 6d10; the total is how many hit points of creatures this spell can effect. Creatures in a 15-foot cone originating from you are affected in ascending order of their current hit points (ignoring unconscious creatures and creatures that can't see).\n\nStarting with the creature that has the lowest current hit points, each creature affected by this spell is blinded until the spell ends. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 라운드","desc_ko":"현란하게 번쩍이는 색색의 빛이 손에서 뿜어져 나온다. 6d10을 굴린다. 그 합계가 이 주문이 영향을 줄 수 있는 크리처들의 히트 포인트 총량이다. 시전자로부터 뻗어나가는 4.5m(15ft) 원뿔 내의 크리처들이 현재 히트 포인트가 낮은 순서대로 영향을 받는다(무의식 상태이거나 볼 수 없는 크리처는 무시한다).\n\n현재 히트 포인트가 가장 낮은 크리처부터 시작해, 이 주문에 영향을 받은 각 크리처는 주문이 끝날 때까지 실명한다. 다음으로 낮은 히트 포인트의 크리처로 넘어가기 전에, 각 크리처의 히트 포인트를 총량에서 뺀다. 크리처가 영향을 받으려면 그 크리처의 히트 포인트가 남은 총량 이하여야 한다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 2d10을 추가로 굴린다.","damage_ko":"","material_ko":"빨강, 노랑, 파랑으로 물들인 가루나 모래 한 자밤."},{"name_ko":"생각 탐지","name_en":"Detect Thoughts","level":2,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A copper coin.","higher_level_en":"","desc_en":"For the duration, you can read the thoughts of certain creatures. When you cast the spell and as your action on each turn until the spell ends, you can focus your mind on any one creature that you can see within 30 feet of you. If the creature you choose has an Intelligence of 3 or lower or doesn't speak any language, the creature is unaffected.\n\nYou initially learn the surface thoughts of the creature - what is most on its mind in that moment. As an action, you can either shift your attention to another creature's thoughts or attempt to probe deeper into the same creature's mind. If you probe deeper, the target must make a Wisdom saving throw. If it fails, you gain insight into its reasoning (if any), its emotional state, and something that looms large in its mind (such as something it worries over, loves, or hates). If it succeeds, the spell ends. Either way, the target knows that you are probing into its mind, and unless you shift your attention to another creature's thoughts, the creature can use its action on its turn to make an Intelligence check contested by your Intelligence check; if it succeeds, the spell ends.\n\nQuestions verbally directed at the target creature naturally shape the course of its thoughts, so this spell is particularly effective as part of an interrogation.\n\nYou can also use this spell to detect the presence of thinking creatures you can't see. When you cast the spell or as your action during the duration, you can search for thoughts within 30 feet of you. The spell can penetrate barriers, but 2 feet of rock, 2 inches of any metal other than lead, or a thin sheet of lead blocks you. You can't detect a creature with an Intelligence of 3 or lower or one that doesn't speak any language.\n\nOnce you detect the presence of a creature in this way, you can read its thoughts for the rest of the duration as described above, even if you can't see it, but it must still be within range.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"지속시간 동안, 특정 크리처의 생각을 읽을 수 있다. 주문을 시전할 때, 그리고 주문이 끝날 때까지 매 턴 행동으로, 시전자로부터 9m(30ft) 이내에서 볼 수 있는 크리처 하나에 정신을 집중할 수 있다. 선택한 크리처의 지능이 3 이하이거나 어떤 언어도 말하지 못하면 영향받지 않는다.\n\n처음에는 크리처의 표면 생각, 즉 그 순간 마음속에 가장 큰 것을 알게 된다. 행동을 사용해 다른 크리처의 생각으로 주의를 옮기거나, 같은 크리처의 마음을 더 깊이 탐색하려 시도할 수 있다. 더 깊이 탐색하면 대상은 지혜 내성 굴림을 굴려야 한다. 실패하면 그 크리처의 (있다면) 사고방식, 감정 상태, 그리고 마음속에 크게 자리한 것(걱정하거나 사랑하거나 미워하는 것 등)에 대한 통찰을 얻는다. 성공하면 주문이 끝난다. 어느 쪽이든 대상은 시전자가 자기 마음을 탐색하고 있음을 알며, 시전자가 다른 크리처의 생각으로 주의를 옮기지 않는 한, 그 크리처는 자기 턴에 행동을 사용해 시전자의 지능 판정과 겨루는 지능 판정을 할 수 있다. 성공하면 주문이 끝난다.\n\n대상 크리처에게 말로 던지는 질문은 자연히 그 생각의 흐름을 형성하므로, 이 주문은 심문의 일부로 특히 효과적이다.\n\n이 주문으로 볼 수 없는, 생각하는 크리처의 존재를 감지할 수도 있다. 주문을 시전할 때, 또는 지속시간 동안 행동으로, 시전자로부터 9m(30ft) 이내의 생각을 탐색할 수 있다. 이 주문은 장벽을 통과할 수 있지만, 2피트의 바위, 납을 제외한 2인치의 금속, 얇은 납판은 막는다. 지능이 3 이하이거나 어떤 언어도 말하지 못하는 크리처는 감지할 수 없다.\n\n이렇게 크리처의 존재를 감지하면, 볼 수 없더라도 위에 설명한 대로 남은 지속시간 동안 그 생각을 읽을 수 있으나, 여전히 사거리 내에 있어야 한다.","higher_level_ko":"","damage_ko":"","material_ko":"구리 동전."},{"name_ko":"생명의 오오라","name_en":"Aura of Life","level":4,"school":"방호계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"서리 광선","name_en":"Ray of Frost","level":0,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"A frigid beam of blue-white light streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, it takes 1d8 cold damage, and its speed is reduced by 10 feet until the start of your next turn.\n\nThe spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","damage_en":"1d8 Cold","attack_type":"ranged","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"청백색의 차가운 빛줄기가 사거리 내 크리처를 향해 뻗어나간다. 대상에게 원거리 주문 공격을 굴린다. 명중 시 대상은 1d8 냉기 피해를 받고, 다음 턴이 시작될 때까지 이동속도가 10피트 감소한다.\n\n이 주문의 피해는 5레벨(2d8), 11레벨(3d8), 17레벨(4d8)에 도달할 때 1d8씩 증가한다.","higher_level_ko":"","damage_ko":"1d8 냉기 피해","material_ko":""},{"name_ko":"섬뜩한 방출","name_en":"Eldritch Blast","level":0,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"A beam of crackling energy streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 force damage. The spell creates more than one beam when you reach higher levels: two beams at 5th level, three beams at 11th level, and four beams at 17th level. You can direct the beams at the same target or at different ones. Make a separate attack roll for each beam.","damage_en":"1d10 Force","attack_type":"ranged","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"탁탁 튀는 에너지 광선이 사거리 내 크리처를 향해 뻗어나간다. 대상에게 원거리 주문 공격을 굴린다. 명중 시 대상은 1d10 역장 피해를 받는다. 이 주문은 고레벨에 도달하면 광선이 여러 개로 늘어난다. 5레벨에 둘, 11레벨에 셋, 17레벨에 넷이다. 광선을 같은 대상에게 몰거나 서로 다른 대상에게 겨눌 수 있다. 각 광선마다 별도로 명중 굴림을 굴린다.","higher_level_ko":"","damage_ko":"1d10 역장 피해","material_ko":""},{"name_ko":"성스러운 오오라","name_en":"Holy Aura","level":8,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A tiny reliquary worth at least 1,000gp containing a sacred relic, such as a scrap of cloth from a saint's robe or a piece of parchment from a religious text.","higher_level_en":"","desc_en":"Divine light washes out from you and coalesces in a soft radiance in a 30-foot radius around you. Creatures of your choice in that radius when you cast this spell shed dim light in a 5-foot radius and have advantage on all saving throws, and other creatures have disadvantage on attack rolls against them until the spell ends. In addition, when a fiend or an undead hits an affected creature with a melee attack, the aura flashes with brilliant light. The attacker must succeed on a constitution saving throw or be blinded until the spell ends.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"성역화","name_en":"Sanctuary","level":1,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 bonus action","duration_en":"1 minute","material_en":"A small silver mirror.","higher_level_en":"","desc_en":"You ward a creature within range against attack. Until the spell ends, any creature who targets the warded creature with an attack or a harmful spell must first make a wisdom saving throw. On a failed save, the creature must choose a new target or lose the attack or spell. This spell doesn't protect the warded creature from area effects, such as the explosion of a fireball.\n\nIf the warded creature makes an attack or casts a spell that affects an enemy creature, this spell ends.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 추가 행동","duration_ko":"1 분","desc_ko":"사거리 내 크리처 하나를 공격으로부터 보호한다. 주문이 끝날 때까지, 보호받는 크리처를 공격이나 해로운 주문의 대상으로 삼으려는 크리처는 먼저 지혜 내성 굴림을 굴려야 한다. 실패 시 그 크리처는 새 대상을 선택하거나 공격 또는 주문을 잃어야 한다. 이 주문은 화염구의 폭발 같은 범위 효과로부터는 보호받는 크리처를 지켜주지 않는다.\n\n보호받는 크리처가 적 크리처에게 영향을 주는 공격이나 주문을 시전하면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 은거울."},{"name_ko":"성전사의 망토","name_en":"Crusader's Mantle","level":3,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"소원","name_en":"Wish","level":9,"school":"조형계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Wish is the mightiest spell a mortal creature can cast. By simply speaking aloud, you can alter the very foundations of reality in accord with your desires.\n\nThe basic use of this spell is to duplicate any other spell of 8th level or lower. You don't need to meet any requirements in that spell, including costly components. The spell simply takes effect.\n\nAlternatively, you can create one of the following effects of your choice:\n\n- You create one object of up to 25,000 gp in value that isn't a magic item. The object can be no more than 300 feet in any dimension, and it appears in an unoccupied space you can see on the ground.\n\n- You allow up to twenty creatures that you can see to regain all hit points, and you end all effects on them described in the greater restoration spell.\n\n- You grant up to ten creatures that you can see resistance to a damage type you choose.\n\n- You grant up to ten creatures you can see immunity to a single spell or other magical effect for 8 hours. For instance, you could make yourself and all your companions immune to a lich's life drain attack.\n\n- You undo a single recent event by forcing a reroll of any roll made within the last round (including your last turn). Reality reshapes itself to accommodate the new result. For example, a wish spell could undo an opponent's successful save, a foe's critical hit, or a friend's failed save. You can force the reroll to be made with advantage or disadvantage, and you can choose whether to use the reroll or the original roll.\n\nYou might be able to achieve something beyond the scope of the above examples. State your wish to the GM as precisely as possible. The GM has great latitude in ruling what occurs in such an instance; the greater the wish, the greater the likelihood that something goes wrong. This spell might simply fail, the effect you desire might only be partly achieved, or you might suffer some unforeseen consequence as a result of how you worded the wish. For example, wishing that a villain were dead might propel you forward in time to a period when that villain is no longer alive, effectively removing you from the game. Similarly, wishing for a legendary magic item or artifact might instantly transport you to the presence of the item's current owner.\n\nThe stress of casting this spell to produce any effect other than duplicating another spell weakens you. After enduring that stress, each time you cast a spell until you finish a long rest, you take 1d10 necrotic damage per level of that spell. This damage can't be reduced or prevented in any way. In addition, your Strength drops to 3, if it isn't 3 or lower already, for 2d4 days. For each of those days that you spend resting and doing nothing more than light activity, your remaining recovery time decreases by 2 days. Finally, there is a 33 percent chance that you are unable to cast wish ever again if you suffer this stress.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"수리","name_en":"Mending","level":0,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"Instantaneous","material_en":"Two lodestones.","higher_level_en":"","desc_en":"This spell repairs a single break or tear in an object you touch, such as a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no longer than 1 foot in any dimension, you mend it, leaving no trace of the former damage.\n\nThis spell can physically repair a magic item or construct, but the spell can't restore magic to such an object.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 분","duration_ko":"즉시","desc_ko":"부러진 열쇠, 찢어진 망토, 새는 술부대처럼 접촉한 물체의 부러짐이나 찢어짐 하나를 수리한다. 부러지거나 찢어진 부위가 어느 방향으로도 1피트를 넘지 않는 한, 흔적 없이 고쳐낸다.\n\n이 주문은 마법 물품이나 구조물을 물리적으로 수리할 수 있지만, 그런 물체에 마법을 되돌려주지는 못한다.","higher_level_ko":"","damage_ko":"","material_ko":"자철석 두 개."},{"name_ko":"수면","name_en":"Sleep","level":1,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"A pinch of fine sand, rose petals, or a cricket.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d8 for each slot level above 1st.","desc_en":"This spell sends creatures into a magical slumber. Roll 5d8; the total is how many hit points of creatures this spell can affect. Creatures within 20 feet of a point you choose within range are affected in ascending order of their current hit points (ignoring unconscious creatures).\n\nStarting with the creature that has the lowest current hit points, each creature affected by this spell falls unconscious until the spell ends, the sleeper takes damage, or someone uses an action to shake or slap the sleeper awake. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected.\n\nUndead and creatures immune to being charmed aren't affected by this spell.","damage_en":"5d8","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"이 주문은 크리처들을 마법의 잠에 빠뜨린다. 5d8을 굴린다. 그 합계가 이 주문이 영향을 줄 수 있는 크리처들의 히트 포인트 총량이다. 사거리 내에서 선택한 지점의 6m(20ft) 이내에 있는 크리처들이 현재 히트 포인트가 낮은 순서대로 영향을 받는다(무의식 상태인 크리처는 무시한다).\n\n현재 히트 포인트가 가장 낮은 크리처부터 시작해, 이 주문에 영향을 받은 각 크리처는 주문이 끝나거나, 잠든 크리처가 피해를 받거나, 누군가 행동을 사용해 흔들거나 때려 깨울 때까지 무의식 상태가 된다. 다음으로 낮은 히트 포인트의 크리처로 넘어가기 전에, 각 크리처의 히트 포인트를 총량에서 뺀다. 크리처가 영향을 받으려면 그 크리처의 히트 포인트가 남은 총량 이하여야 한다.\n\n언데드와 매혹에 면역인 크리처는 이 주문에 영향받지 않는다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 2d8을 추가로 굴린다.","damage_ko":"5d8","material_ko":"고운 모래 한 자밤, 장미 꽃잎, 또는 귀뚜라미."},{"name_ko":"수면 보행","name_en":"Water Walk","level":3,"school":"변환계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A piece of cork.","higher_level_en":"","desc_en":"This spell grants the ability to move across any liquid surface--such as water, acid, mud, snow, quicksand, or lava--as if it were harmless solid ground (creatures crossing molten lava can still take damage from the heat). Up to ten willing creatures you can see within range gain this ability for the duration.\n\nIf you target a creature submerged in a liquid, the spell carries the target to the surface of the liquid at a rate of 60 feet per round.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"이 주문은 물, 산, 진흙, 눈, 유사, 용암 같은 어떤 액체 표면이든 해롭지 않은 단단한 땅처럼 가로질러 이동하는 능력을 부여한다(녹은 용암을 건너는 크리처는 여전히 열로 인한 피해를 받을 수 있다). 사거리 내에서 볼 수 있는, 동의하는 크리처 최대 열이 지속시간 동안 이 능력을 얻는다.\n\n액체에 잠긴 크리처를 대상으로 하면, 주문이 대상을 라운드당 18m(60ft) 속도로 액체 표면까지 올려보낸다.","higher_level_ko":"","damage_ko":"","material_ko":"코르크 조각."},{"name_ko":"수중 호흡","name_en":"Water Breathing","level":3,"school":"변환계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"24 hours","material_en":"A short piece of reed or straw.","higher_level_en":"","desc_en":"This spell gives a maximum of ten willing creatures within range and you can see, the ability to breathe underwater until the end of its term. Affected creatures also retain their normal breathing pattern.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"24 시간","desc_ko":"이 주문은 사거리 내에서 볼 수 있는, 동의하는 크리처 최대 열에게 지속시간이 끝날 때까지 물속에서 숨쉬는 능력을 준다. 영향받은 크리처는 평소의 호흡 방식도 유지한다.","higher_level_ko":"","damage_ko":"","material_ko":"짧은 갈대나 지푸라기 조각."},{"name_ko":"순간이동","name_en":"Teleport","level":7,"school":"조형계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"This spell instantly transports you and up to eight willing creatures of your choice that you can see within range, or a single object that you can see within range, to a destination you select. If you target an object, it must be able to fit entirely inside a 10-foot cube, and it can't be held or carried by an unwilling creature.\n\nThe destination you choose must be known to you, and it must be on the same plane of existence as you. Your familiarity with the destination determines whether you arrive there successfully. The GM rolls d100 and consults the table.\n\n| Familiarity | Mishap | Similar Area | Off Target | On Target |\n\n|---|---|---|---|---|\n\n| Permanent circle | -- | -- | -- | 01-100 |\n\n| Associated object | -- | -- | -- | 01-100 |\n\n| Very familiar | 01-05 | 06-13 | 14-24 | 25-100 |\n\n| Seen casually | 01-33 | 34-43 | 44-53 | 54-100 |\n\n| Viewed once | 01-43 | 44-53 | 54-73 | 74-100 |\n\n| Description | 01-43 | 44-53 | 54-73 | 74-100 |\n\n| False destination | 01-50 | 51-100 | -- | -- |\n\n***Familiarity.*** \"Permanent circle\" means a permanent teleportation circle whose sigil sequence you know.\n\n\"Associated object\" means that you possess an object taken from the desired destination within the last six months, such as a book from a wizard's library, bed linen from a royal suite, or a chunk of marble from a lich's secret tomb.\n\n\"Very familiar\" is a place you have been very often, a place you have carefully studied, or a place you can see when you cast the spell.\n\n\"Seen casually\" is someplace you have seen more than once but with which you aren't very familiar.\n\n\"Viewed once\" is a place you have seen once, possibly using magic.\n\n\"Description\" is a place whose location and appearance you know through someone else's description, perhaps from a map.\n\n\"False destination\" is a place that doesn't exist. Perhaps you tried to scry an enemy's sanctum but instead viewed an illusion, or you are attempting to teleport to a familiar location that no longer exists.\n\n***On Target.*** You and your group (or the target object) appear where you want to.\n\n***Off Target.*** You and your group (or the target object) appear a random distance away from the destination in a random direction. Distance off target is 1d10 x 1d10 percent of the distance that was to be traveled. For example, if you tried to travel 120 miles, landed off target, and rolled a 5 and 3 on the two d10s, then you would be off target by 15 percent, or 18 miles. The GM determines the direction off target randomly by rolling a d8 and designating 1 as north, 2 as northeast, 3 as east, and so on around the points of the compass.  If you were teleporting to a coastal city and wound up 18 miles out at sea, you could be in trouble.\n\n***Similar Area.*** You and your group (or the target object) wind up in a different area that's visually or thematically similar to the target area. If you are heading for your home laboratory, for example, you might wind up in another wizard's laboratory or in an alchemical supply shop that has many of the same tools and implements as your laboratory. Generally, you appear in the closest similar place, but since the spell has no range limit, you could conceivably wind up anywhere on the plane.\n\n***Mishap.*** The spell's unpredictable magic results in a difficult journey. Each teleporting creature (or the target object) takes 3d10 force damage, and the GM rerolls on the table to see where you wind up (multiple mishaps can occur, dealing damage each time).","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"순간이동의 원","name_en":"Teleportation Circle","level":5,"school":"조형계","components":["V","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 minute","duration_en":"1 round","material_en":"Rare chalks and inks infused with precious gems with 50 gp, which the spell consumes.","higher_level_en":"","desc_en":"As you cast the spell, you draw a 10-foot-diameter circle on the ground inscribed with sigils that link your location to a permanent teleportation circle of your choice whose sigil sequence you know and that is on the same plane of existence as you. A shimmering portal opens within the circle you drew and remains open until the end of your next turn. Any creature that enters the portal instantly appears within 5 feet of the destination circle or in the nearest unoccupied space if that space is occupied.\n\nMany major temples, guilds, and other important places have permanent teleportation circles inscribed somewhere within their confines. Each such circle includes a unique sigil sequence--a string of magical runes arranged in a particular pattern. When you first gain the ability to cast this spell, you learn the sigil sequences for two destinations on the Material Plane, determined by the GM. You can learn additional sigil sequences during your adventures. You can commit a new sigil sequence to memory after studying it for 1 minute.\n\nYou can create a permanent teleportation circle by casting this spell in the same location every day for one year. You need not use the circle to teleport when you cast the spell in this way.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 분","duration_ko":"1 라운드","desc_ko":"주문을 시전하면서, 시전자의 위치를, 시전자가 인장 배열을 알고 시전자와 같은 존재계에 있는 영구적 순간이동의 원에 연결하는 인장이 새겨진 지름 3m(10ft)의 원을 지면에 그린다. 그린 원 안에 어른거리는 관문이 열려 다음 턴이 끝날 때까지 유지된다. 관문에 들어가는 크리처는 즉시 목적지 원의 1.5m(5ft) 이내에, 또는 그 공간이 점유되어 있으면 가장 가까운 빈 공간에 나타난다.\n\n많은 주요 신전, 조합, 그 밖의 중요한 장소는 그 경내 어딘가에 영구적 순간이동의 원이 새겨져 있다. 그런 원마다 고유한 인장 배열, 즉 특정 패턴으로 배열된 마법 룬의 열이 있다. 이 주문을 시전하는 능력을 처음 얻을 때, DM이 정한 물질계의 목적지 두 곳에 대한 인장 배열을 배운다. 모험 중에 추가 인장 배열을 배울 수 있다. 새 인장 배열을 1분 동안 연구한 뒤 기억할 수 있다.\n\n1년 동안 매일 같은 장소에 이 주문을 시전하면 영구적 순간이동의 원을 만들 수 있다. 이렇게 시전할 때는 원을 순간이동에 쓸 필요가 없다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는, 귀한 보석이 스며든 50gp 가치의 희귀 분필과 잉크."},{"name_ko":"숲의 존재 소환","name_en":"Conjure Woodland Beings","level":4,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"One holly berry per creature summoned.","higher_level_en":"When you cast this spell using certain higher-level spell slots, you choose one of the summoning options above, and more creatures appear: twice as many with a 6th-level slot and three times as many with an 8th-level slot.","desc_en":"You summon fey creatures that appear in unoccupied spaces that you can see within range. Choose one of the following options for what appears:\n\n- One fey creature of challenge rating 2 or lower\n\n- Two fey creatures of challenge rating 1 or lower\n\n- Four fey creatures of challenge rating 1/2 or lower\n\n- Eight fey creatures of challenge rating 1/4 or lower\n\nA summoned creature disappears when it drops to 0 hit points or when the spell ends.\n\nThe summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which have their own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions.\n\nThe GM has the creatures' statistics.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"사거리 내에서 볼 수 있는 빈 공간에 나타나는 요정 크리처를 소환한다. 나타날 것으로 다음 선택지 중 하나를 고른다.\n\n- 도전 지수 2 이하의 요정 크리처 하나\n\n- 도전 지수 1 이하의 요정 크리처 둘\n\n- 도전 지수 1/2 이하의 요정 크리처 넷\n\n- 도전 지수 1/4 이하의 요정 크리처 여덟\n\n소환된 크리처는 히트 포인트가 0이 되거나 주문이 끝나면 사라진다.\n\n소환된 크리처는 시전자와 동료에게 우호적이다. 소환된 크리처들의 우선권은 한 무리로 굴리며, 자기들만의 턴을 갖는다. 시전자가 내리는 음성 명령을 따른다(시전자의 행동은 필요 없다). 명령을 내리지 않으면, 적대적인 크리처로부터 스스로를 방어할 뿐 그 외의 행동은 하지 않는다.\n\n크리처들의 능력치는 DM이 갖는다.","higher_level_ko":"특정 고레벨 주문 슬롯으로 시전하면, 위 소환 선택지 중 하나를 고르고 더 많은 크리처가 나타난다. 6레벨 슬롯은 두 배, 8레벨 슬롯은 세 배다.","damage_ko":"","material_ko":"소환하는 크리처당 호랑가시나무 열매 하나."},{"name_ko":"시간 정지","name_en":"Time Stop","level":9,"school":"변환계","components":["V"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You briefly stop the flow of time for everyone but yourself. No time passes for other creatures, while you take 1d4 + 1 turns in a row, during which you can use actions and move as normal.\n\nThis spell ends if one of the actions you use during this period, or any effects that you create during this period, affects a creature other than you or an object being worn or carried by someone other than you. In addition, the spell ends if you move to a place more than 1,000 feet from the location where you cast it.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"시뮬라크럼","name_en":"Simulacrum","level":7,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"12 hours","duration_en":"Until dispelled","material_en":"Snow or ice in quantities sufficient to made a life-size copy of the duplicated creature; some hair, fingernail clippings, or other piece of that creature's body placed inside the snow or ice; and powdered ruby worth 1,500 gp, sprinkled over the duplicate and consumed by the spell.","higher_level_en":"","desc_en":"You shape an illusory duplicate of one beast or humanoid that is within range for the entire casting time of the spell. The duplicate is a creature, partially real and formed from ice or snow, and it can take actions and otherwise be affected as a normal creature. It appears to be the same as the original, but it has half the creature's hit point maximum and is formed without any equipment. Otherwise, the illusion uses all the statistics of the creature it duplicates.\n\nThe simulacrum is friendly to you and creatures you designate. It obeys your spoken commands, moving and acting in accordance with your wishes and acting on your turn in combat. The simulacrum lacks the ability to learn or become more powerful, so it never increases its level or other abilities, nor can it regain expended spell slots.\n\nIf the simulacrum is damaged, you can repair it in an alchemical laboratory, using rare herbs and minerals worth 100 gp per hit point it regains. The simulacrum lasts until it drops to 0 hit points, at which point it reverts to snow and melts instantly.\n\nIf you cast this spell again, any currently active duplicates you created with this spell are instantly destroyed.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"식물 성장","name_en":"Plant Growth","level":3,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"This spell channels vitality into plants within a specific area. There are two possible uses for the spell, granting either immediate or long-term benefits.\n\nIf you cast this spell using 1 action, choose a point within range. All normal plants in a 100-foot radius centered on that point become thick and overgrown. A creature moving through the area must spend 4 feet of movement for every 1 foot it moves.\n\nYou can exclude one or more areas of any size within the spell's area from being affected.\n\nIf you cast this spell over 8 hours, you enrich the land. All plants in a half-mile radius centered on a point within range become enriched for 1 year. The plants yield twice the normal amount of food when harvested.","damage_en":"","attack_type":"","range_ko":"45m(150ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"이 주문은 특정 구역 내의 식물에 생명력을 불어넣는다. 즉각적인 이점과 장기적인 이점 중 하나를 주는 두 가지 용도가 있다.\n\n1 행동으로 이 주문을 시전하면, 사거리 내 한 지점을 선택한다. 그 지점을 중심으로 한 30m(100ft) 반경의 모든 평범한 식물이 무성하게 우거진다. 그 구역을 지나는 크리처는 1피트 이동할 때마다 4피트의 이동력을 써야 한다.\n\n주문 구역 내에서 임의 크기의 구역 하나 이상을 영향에서 제외할 수 있다.\n\n8시간에 걸쳐 이 주문을 시전하면 땅을 비옥하게 한다. 사거리 내 한 지점을 중심으로 한 0.5마일 반경의 모든 식물이 1년 동안 비옥해진다. 수확 시 평소의 두 배에 달하는 식량을 낸다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"식물과의 대화","name_en":"Speak with Plants","level":3,"school":"변환계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"","higher_level_en":"","desc_en":"You imbue plants within 30 feet of you with limited sentience and animation, giving them the ability to communicate with you and follow your simple commands. You can question plants about events in the spell's area within the past day, gaining information about creatures that have passed, weather, and other circumstances.\n\nYou can also turn difficult terrain caused by plant growth (such as thickets and undergrowth) into ordinary terrain that lasts for the duration. Or you can turn ordinary terrain where plants are present into difficult terrain that lasts for the duration, causing vines and branches to hinder pursuers, for example.\n\nPlants might be able to perform other tasks on your behalf, at the GM's discretion. The spell doesn't enable plants to uproot themselves and move about, but they can freely move branches, tendrils, and stalks.\n\nIf a plant creature is in the area, you can communicate with it as if you shared a common language, but you gain no magical ability to influence it.\n\nThis spell can cause the plants created by the entangle spell to release a restrained creature.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"10 분","desc_ko":"시전자로부터 9m(30ft) 이내의 식물에 제한적인 지각과 생동을 불어넣어, 시전자와 소통하고 간단한 명령을 따르는 능력을 준다. 주문 구역 내에서 지난 하루 동안 일어난 일에 관해 식물에게 물을 수 있으며, 지나간 크리처, 날씨, 그 밖의 상황에 관한 정보를 얻는다.\n\n또한 식물의 성장으로 생긴 어려운 지형(덤불이나 관목 등)을 지속시간 동안 지속되는 평범한 지형으로 바꿀 수 있다. 또는 식물이 있는 평범한 지형을 지속시간 동안 지속되는 어려운 지형으로 바꿔, 예를 들어 덩굴과 가지가 추격자를 방해하게 할 수 있다.\n\nDM의 재량에 따라 식물이 시전자를 위해 다른 작업을 수행할 수도 있다. 이 주문은 식물이 스스로 뿌리를 뽑아 돌아다니게 하지는 못하지만, 가지, 덩굴손, 줄기는 자유로이 움직일 수 있다.\n\n식물 크리처가 그 구역에 있으면, 공용 언어를 공유하는 것처럼 소통할 수 있으나, 그것에 영향을 줄 마법적 능력은 얻지 못한다.\n\n이 주문은 얽혣매기 주문으로 만든 식물이 포박된 크리처를 놓아주게 할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"식물의 통한 이동","name_en":"Transport via Plants","level":6,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 action","duration_en":"1 round","material_en":"","higher_level_en":"","desc_en":"This spell creates a magical link between a Large or larger inanimate plant within range and another plant, at any distance, on the same plane of existence. You must have seen or touched the destination plant at least once before. For the duration, any creature can step into the target plant and exit from the destination plant by using 5 feet of movement.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"식별","name_en":"Identify","level":1,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"Instantaneous","material_en":"A pearl worth at least 100gp and an owl feather.","higher_level_en":"","desc_en":"You choose one object that you must touch throughout the casting of the spell. If it is a magic item or some other magic-imbued object, you learn its properties and how to use them, whether it requires attunement to use, and how many charges it has, if any. You learn whether any spells are affecting the item and what they are. If the item was created by a spell, you learn which spell created it.\n\nIf you instead touch a creature throughout the casting, you learn what spells, if any, are currently affecting it.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 분","duration_ko":"즉시","desc_ko":"주문을 시전하는 내내 접촉하고 있어야 하는 물체 하나를 선택한다. 그것이 마법 물품이거나 마법이 깃든 물체라면, 그 속성과 사용법, 사용에 조율이 필요한지, 충전량이 얼마나 있는지를 알아낸다. 물품에 영향을 주는 주문이 있는지, 있다면 무엇인지 알아낸다. 물품이 주문으로 만들어졌다면 어떤 주문으로 만들어졌는지 알아낸다.\n\n대신 시전 내내 크리처를 접촉하면, 현재 그 크리처에게 영향을 주는 주문이 있다면 무엇인지 알아낸다.","higher_level_ko":"","damage_ko":"","material_ko":"100gp 이상 가치의 진주와 올빼미 깃털."},{"name_ko":"신성 단어","name_en":"Divine Word","level":7,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 bonus action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You utter a divine word, imbued with the power that shaped the world at the dawn of creation. Choose any number of creatures you can see within range. Each creature that can hear you must make a Charisma saving throw. On a failed save, a creature suffers an effect based on its current hit points:\n\n- 50 hit points or fewer: deafened for 1 minute\n\n- 40 hit points or fewer: deafened and blinded for 10 minutes\n\n- 30 hit points or fewer: blinded, deafened, and stunned for 1 hour\n\n- 20 hit points or fewer: killed instantly\n\nRegardless of its current hit points, a celestial, an elemental, a fey, or a fiend that fails its save is forced back to its plane of origin (if it isn't there already) and can't return to your current plane for 24 hours by any means short of a wish spell.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"신성한 불길","name_en":"Sacred Flame","level":0,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Flame-like radiance descends on a creature that you can see within range. The target must succeed on a dexterity saving throw or take 1d8 radiant damage. The target gains no benefit from cover for this saving throw.\n\nThe spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","damage_en":"1d8 Radiant","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는 크리처에게 화염 같은 광휘가 내려온다. 대상은 민첩 내성 굴림에 성공하지 못하면 1d8 광휘 피해를 받는다. 이 내성 굴림에는 엄폐로 인한 이득을 받지 못한다.\n\n이 주문의 피해는 5레벨(2d8), 11레벨(3d8), 17레벨(4d8)에 도달할 때 1d8씩 증가한다.","higher_level_ko":"","damage_ko":"1d8 광휘 피해","material_ko":""},{"name_ko":"신성한 청원","name_en":"Divine Favor","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 bonus action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"Your prayer empowers you with divine radiance. Until the spell ends, your weapon attacks deal an extra 1d4 radiant damage on a hit.","damage_en":"1d4 Radiant","attack_type":"","range_ko":"자신","casting_time_ko":"1 추가 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"기도가 시전자에게 신성한 광휘를 채운다. 주문이 끝날 때까지, 무기 공격이 명중할 때마다 추가로 1d4 광휘 피해를 준다.","higher_level_ko":"","damage_ko":"1d4 광휘 피해","material_ko":""},{"name_ko":"신성화","name_en":"Hallow","level":5,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"24 hours","duration_en":"Until dispelled","material_en":"Herbs, oils, and incense worth at least 1,000 gp, which the spell consumes.","higher_level_en":"","desc_en":"You touch a point and infuse an area around it with holy (or unholy) power. The area can have a radius up to 60 feet, and the spell fails if the radius includes an area already under the effect a hallow spell. The affected area is subject to the following effects.\n\nFirst, celestials, elementals, fey, fiends, and undead can't enter the area, nor can such creatures charm, frighten, or possess creatures within it. Any creature charmed, frightened, or possessed by such a creature is no longer charmed, frightened, or possessed upon entering the area. You can exclude one or more of those types of creatures from this effect.\n\nSecond, you can bind an extra effect to the area. Choose the effect from the following list, or choose an effect offered by the GM. Some of these effects apply to creatures in the area; you can designate whether the effect applies to all creatures, creatures that follow a specific deity or leader, or creatures of a specific sort, such as ores or trolls. When a creature that would be affected enters the spell's area for the first time on a turn or starts its turn there, it can make a charisma saving throw. On a success, the creature ignores the extra effect until it leaves the area.\n\n***Courage.*** Affected creatures can't be frightened while in the area.\n\n***Darkness.*** Darkness fills the area. Normal light, as well as magical light created by spells of a lower level than the slot you used to cast this spell, can't illuminate the area.\n\n***Daylight.*** Bright light fills the area. Magical darkness created by spells of a lower level than the slot you used to cast this spell can't extinguish the light.\n\n***Energy Protection.*** Affected creatures in the area have resistance to one damage type of your choice, except for bludgeoning, piercing, or slashing.\n\n***Energy Vulnerability.*** Affected creatures in the area have vulnerability to one damage type of your choice, except for bludgeoning, piercing, or slashing.\n\n***Everlasting Rest.*** Dead bodies interred in the area can't be turned into undead.\n\n***Extradimensional Interference.*** Affected creatures can't move or travel using teleportation or by extradimensional or interplanar means.\n\n***Fear.*** Affected creatures are frightened while in the area.\n\n***Silence.*** No sound can emanate from within the area, and no sound can reach into it.\n\n***Tongues.*** Affected creatures can communicate with any other creature in the area, even if they don't share a common language.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"24 시간","duration_ko":"무효화될 때까지","desc_ko":"한 지점을 접촉해 그 주위 구역에 신성한(또는 불경한) 힘을 불어넣는다. 구역은 반경 최대 18m(60ft)까지 가능하며, 반경이 이미 신성화 주문의 효과 아래 있는 구역을 포함하면 주문은 실패한다. 영향받는 구역은 다음 효과를 받는다.\n\n첫째, 천상체, 정령, 요정, 악마, 언데드는 그 구역에 들어올 수 없으며, 그런 크리처가 구역 안의 크리처를 매혹, 공포, 빙의시킬 수 없다. 그런 크리처에게 매혹, 공포, 빙의된 크리처는 구역에 들어오면 더 이상 매혹, 공포, 빙의되지 않는다. 이 효과에서 그런 유형의 크리처를 하나 이상 제외할 수 있다.\n\n둘째, 구역에 추가 효과 하나를 결부할 수 있다. 다음 목록에서 효과를 고르거나, DM이 제시하는 효과를 고른다. 이 효과 중 일부는 구역 내 크리처에게 적용되며, 모든 크리처에게 적용할지, 특정 신이나 지도자를 따르는 크리처에게 적용할지, 오크나 트롤 같은 특정 종류의 크리처에게 적용할지 지정할 수 있다. 영향받을 크리처가 한 턴에 처음으로 주문 구역에 들어오거나 그곳에서 턴을 시작하면, 매력 내성 굴림을 굴릴 수 있다. 성공 시 그 크리처는 구역을 떠날 때까지 추가 효과를 무시한다.\n\n***용기.*** 영향받는 크리처는 구역에 있는 동안 공포에 빠지지 않는다.\n\n***어둠.*** 어둠이 구역을 채운다. 일반적인 빛과, 이 주문을 시전한 슬롯보다 낮은 레벨의 주문으로 만든 마법의 빛은 구역을 밝힐 수 없다.\n\n***태양광.*** 밝은 빛이 구역을 채운다. 이 주문을 시전한 슬롯보다 낮은 레벨의 주문으로 만든 마법의 어둠은 그 빛을 끌 수 없다.\n\n***에너지 보호.*** 구역 내 영향받는 크리처는 타격, 관통, 참격을 제외한, 시전자가 선택한 피해 유형 하나에 저항을 얻는다.\n\n***에너지 취약.*** 구역 내 영향받는 크리처는 타격, 관통, 참격을 제외한, 시전자가 선택한 피해 유형 하나에 취약해진다.\n\n***영원한 안식.*** 구역에 묻힌 시신은 언데드로 바뀔 수 없다.\n\n***차원간 간섭.*** 영향받는 크리처는 순간이동이나 차원간·이계간 수단으로 이동하거나 여행할 수 없다.\n\n***공포.*** 영향받는 크리처는 구역에 있는 동안 공포에 빠진다.\n\n***침묵.*** 구역 안에서는 어떤 소리도 나올 수 없고, 어떤 소리도 그 안으로 닿을 수 없다.\n\n***언어구사.*** 영향받는 크리처는 공용 언어를 공유하지 않아도 구역 내 다른 어떤 크리처와도 소통할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 1,000gp 이상 가치의 약초, 기름, 향."},{"name_ko":"신속한 후퇴","name_en":"Expeditious Retreat","level":1,"school":"변환계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 bonus action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"This spell allows you to move at an incredible pace. When you cast this spell, and then as a bonus action on each of your turns until the spell ends, you can take the Dash action.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 추가 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"이 주문은 놀라운 속도로 이동하게 해준다. 이 주문을 시전할 때, 그리고 주문이 끝날 때까지 자기 턴마다 추가 행동으로 달리기 행동을 취할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"신앙의 수호자","name_en":"Spiritual Guardians","level":3,"school":"조형계","components":["V"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"아가티스의 갑주","name_en":"Armor of Agathys","level":1,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"아스트랄체 투영","name_en":"Astral Projection","level":9,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"10 feet","casting_time_en":"1 hour","duration_en":"Special","material_en":"For each creature you affect with this spell, you must provide one jacinth worth at least 1,000gp and one ornately carved bar of silver worth at least 100gp, all of which the spell consumes.","higher_level_en":"","desc_en":"You and up to eight willing creatures within range project your astral bodies into the Astral Plane (the spell fails and the casting is wasted if you are already on that plane). The material body you leave behind is unconscious and in a state of suspended animation; it doesn't need food or air and doesn't age.\n\nYour astral body resembles your mortal form in almost every way, replicating your game statistics and possessions. The principal difference is the addition of a silvery cord that extends from between your shoulder blades and trails behind you, fading to invisibility after 1 foot. This cord is your tether to your material body. As long as the tether remains intact, you can find your way home. If the cord is cut--something that can happen only when an effect specifically states that it does--your soul and body are separated, killing you instantly.\n\nYour astral form can freely travel through the Astral Plane and can pass through portals there leading to any other plane. If you enter a new plane or return to the plane you were on when casting this spell, your body and possessions are transported along the silver cord, allowing you to re-enter your body as you enter the new plane. Your astral form is a separate incarnation. Any damage or other effects that apply to it have no effect on your physical body, nor do they persist when you return to it.\n\nThe spell ends for you and your companions when you use your action to dismiss it. When the spell ends, the affected creature returns to its physical body, and it awakens.\n\nThe spell might also end early for you or one of your companions. A successful dispel magic spell used against an astral or physical body ends the spell for that creature. If a creature's original body or its astral form drops to 0 hit points, the spell ends for that creature. If the spell ends and the silver cord is intact, the cord pulls the creature's astral form back to its body, ending its state of suspended animation.\n\nIf you are returned to your body prematurely, your companions remain in their astral forms and must find their own way back to their bodies, usually by dropping to 0 hit points.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"악과 선 탐지","name_en":"Detect Evil and Good","level":1,"school":"예지계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"For the duration, you know if there is an aberration, celestial, elemental, fey, fiend, or undead within 30 feet of you, as well as where the creature is located. Similarly, you know if there is a place or object within 30 feet of you that has been magically consecrated or desecrated.\n\nThe spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"지속시간 동안, 시전자로부터 9m(30ft) 이내에 이형체, 천상체, 정령, 요정, 악마, 언데드가 있는지, 그리고 그 크리처가 어디 있는지 안다. 마찬가지로, 9m(30ft) 이내에 마법적으로 신성화되거나 모독된 장소나 물체가 있는지도 안다.\n\n이 주문은 대부분의 장벽을 통과하지만, 1피트의 돌, 1인치의 일반 금속, 얇은 납판, 3피트의 나무나 흙에는 차단된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"악과 선 퇴치","name_en":"Dispel Evil and Good","level":5,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"Holy water or powdered silver and iron.","higher_level_en":"","desc_en":"Shimmering energy surrounds and protects you from fey, undead, and creatures originating from beyond the Material Plane. For the duration, celestials, elementals, fey, fiends, and undead have disadvantage on attack rolls against you.\n\nYou can end the spell early by using either of the following special functions.\n\n***Break Enchantment.*** As your action, you touch a creature you can reach that is charmed, frightened, or possessed by a celestial, an elemental, a fey, a fiend, or an undead. The creature you touch is no longer charmed, frightened, or possessed by such creatures.\n\n***Dismissal.*** As your action, make a melee spell attack against a celestial, an elemental, a fey, a fiend, or an undead you can reach. On a hit, you attempt to drive the creature back to its home plane. The creature must succeed on a charisma saving throw or be sent back to its home plane (if it isn't there already). If they aren't on their home plane, undead are sent to the Shadowfell, and fey are sent to the Feywild.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"어른거리는 에너지가 시전자를 감싸 요정, 언데드, 물질계 너머에서 온 크리처로부터 보호한다. 지속시간 동안, 천상체, 정령, 요정, 악마, 언데드는 시전자를 상대로 한 명중 굴림에 불리 보정을 받는다.\n\n다음 특수 기능 중 하나를 써서 주문을 일찍 끝낼 수 있다.\n\n***마법 파괴.*** 행동을 사용해, 천상체, 정령, 요정, 악마, 또는 언데드에게 매혹, 공포, 빙의된, 닿을 수 있는 크리처를 접촉한다. 접촉한 크리처는 더 이상 그런 크리처에게 매혹, 공포, 빙의되지 않는다.\n\n***추방.*** 행동을 사용해, 닿을 수 있는 천상체, 정령, 요정, 악마, 또는 언데드에게 근접 주문 공격을 한다. 명중 시 그 크리처를 고향 존재계로 돌려보내려 시도한다. 크리처는 매력 내성 굴림에 성공하지 못하면 고향 존재계로 보내진다(이미 그곳에 있지 않다면). 고향 존재계에 있지 않은 경우, 언데드는 섀도펠로, 요정은 페이와일드로 보내진다.","higher_level_ko":"","damage_ko":"","material_ko":"성수 또는 은과 철 가루."},{"name_ko":"악과 선으로부터의 보호","name_en":"Protection from Evil and Good","level":1,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"Holy water or powdered silver and iron, which the spell consumes.","higher_level_en":"","desc_en":"Until the spell ends, one willing creature you touch is protected against certain types of creatures: aberrations, celestials, elementals, fey, fiends, and undead.\n\nThe protection grants several benefits. Creatures of those types have disadvantage on attack rolls against the target. The target also can't be charmed, frightened, or possessed by them. If the target is already charmed, frightened, or possessed by such a creature, the target has advantage on any new saving throw against the relevant effect.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"주문이 끝날 때까지, 접촉한 동의하는 크리처 하나가 특정 유형의 크리처, 즉 이형체, 천상체, 정령, 요정, 악마, 언데드로부터 보호받는다.\n\n이 보호는 여러 이점을 준다. 그 유형의 크리처는 대상을 상대로 한 명중 굴림에 불리 보정을 받는다. 또한 대상은 그들에게 매혹, 공포, 빙의당하지 않는다. 대상이 이미 그런 크리처에게 매혹, 공포, 빙의된 상태라면, 해당 효과에 대한 새 내성 굴림에 유리 보정을 받는다.","higher_level_ko":"","damage_ko":"","material_ko":"성수 또는 은과 철 가루. 주문이 이를 소모한다."},{"name_ko":"악취 구름","name_en":"Stinking Cloud","level":3,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A rotten egg or several skunk cabbage leaves.","higher_level_en":"","desc_en":"You create a 20-foot-radius sphere of yellow, nauseating gas centered on a point within range. The cloud spreads around corners, and its area is heavily obscured. The cloud lingers in the air for the duration.\n\nEach creature that is completely within the cloud at the start of its turn must make a constitution saving throw against poison. On a failed save, the creature spends its action that turn retching and reeling. Creatures that don't need to breathe or are immune to poison automatically succeed on this saving throw.\n\nA moderate wind (at least 10 miles per hour) disperses the cloud after 4 rounds. A strong wind (at least 20 miles per hour) disperses it after 1 round.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내 한 지점을 중심으로, 노랗고 메스꺼운 기체의 6m(20ft) 반경 구체를 만든다. 구름은 모퉁이를 돌아 퍼질 수 있으며, 그 구역은 심하게 가려진다. 구름은 지속시간 동안 공중에 머무른다.\n\n턴 시작 시 구름 안에 완전히 들어가 있는 각 크리처는 독에 맞선 건강 내성 굴림을 굴려야 한다. 실패 시 그 크리처는 그 턴의 행동을 구역질하고 비틀거리는 데 쓴다. 숨쉴 필요가 없거나 독에 면역인 크리처는 이 내성 굴림에 자동으로 성공한다.\n\n중간 이상 속도의 바람(시속 10마일 이상)은 4라운드 뒤 구름을 흩어버린다. 강한 바람(시속 20마일 이상)은 1라운드 뒤 흩어버린다.","higher_level_ko":"","damage_ko":"","material_ko":"썩은 달걀 또는 스컹크 양배추 잎 여러 장."},{"name_ko":"안개 걸음","name_en":"Misty Step","level":2,"school":"조형계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 bonus action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Briefly surrounded by silvery mist, you teleport up to 30 feet to an unoccupied space that you can see.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 추가 행동","duration_ko":"즉시","desc_ko":"잠시 은빛 안개에 휩싸이며, 볼 수 있는 빈 공간으로 최대 9m(30ft) 순간이동한다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"안개 구름","name_en":"Fog Cloud","level":1,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the radius of the fog increases by 20 feet for each slot level above 1st.","desc_en":"You create a 20-foot-radius sphere of fog centered on a point within range. The sphere spreads around corners, and its area is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"사거리 내 한 지점을 중심으로 6m(20ft) 반경의 안개 구체를 만든다. 이 구체는 모퉁이를 돌아 퍼질 수 있으며, 그 구역은 심하게 가려진다. 지속시간 동안, 또는 중간 이상 속도의 바람(시속 10마일 이상)이 흩어버릴 때까지 지속된다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 안개의 반경이 6m(20ft)씩 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"안내","name_en":"Guidance","level":0,"school":"예지계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the ability check. The spell then ends.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"동의하는 크리처 하나를 접촉한다. 주문이 끝나기 전 한 번, 대상은 d4를 굴려 그 결과를 자신이 선택한 능력 판정 하나에 더할 수 있다. 주사위는 능력 판정 전후 어느 때나 굴릴 수 있다. 그 후 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"안온한 처리","name_en":"Gentle Repose","level":2,"school":"사령계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"10 days","material_en":"A pinch of salt and one copper piece placed on each of the corpse's eyes, which must remain there for the duration.","higher_level_en":"","desc_en":"You touch a corpse or other remains. For the duration, the target is protected from decay and can't become undead.\n\nThe spell also effectively extends the time limit on raising the target from the dead, since days spent under the influence of this spell don't count against the time limit of spells such as raise dead.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"10 일","desc_ko":"시체나 다른 유해를 접촉한다. 지속시간 동안 대상은 부패로부터 보호되며 언데드가 될 수 없다.\n\n이 주문은 또한 대상을 죽음에서 되살리는 시간 제한을 사실상 연장한다. 이 주문의 영향을 받은 날들은 죽은 자 되살리기 같은 주문의 시간 제한에 포함되지 않기 때문이다.","higher_level_ko":"","damage_ko":"","material_ko":"소금 한 자밤과 시체의 두 눈 위에 각각 올려놓는 구리 동전. 지속시간 동안 그곳에 있어야 한다."},{"name_ko":"암시","name_en":"Suggestion","level":2,"school":"환혹계","components":["V","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 8 hours","material_en":"A snake's tongue and either a bit of honeycomb or a drop of sweet oil.","higher_level_en":"","desc_en":"You suggest a course of activity (limited to a sentence or two) and magically influence a creature you can see within range that can hear and understand you. Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to stab itself, throw itself onto a spear, immolate itself, or do some other obviously harmful act ends the spell.\n\nThe target must make a wisdom saving throw. On a failed save, it pursues the course of action you described to the best of its ability. The suggested course of action can continue for the entire duration. If the suggested activity can be completed in a shorter time, the spell ends when the subject finishes what it was asked to do.\n\nYou can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that a knight give her warhorse to the first beggar she meets. If the condition isn't met before the spell expires, the activity isn't performed.\n\nIf you or any of your companions damage the target, the spell ends.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 8시간","desc_ko":"활동의 방향(한두 문장으로 제한)을 제안하여, 사거리 내에서 볼 수 있고 시전자의 말을 듣고 이해할 수 있는 크리처에게 마법적으로 영향을 준다. 매혹될 수 없는 크리처는 이 효과에 면역이다. 제안은 그 행동이 합리적으로 들리도록 표현되어야 한다. 크리처에게 자신을 찌르거나, 창에 몸을 던지거나, 스스로를 불태우거나, 그 밖에 명백히 해로운 행위를 요구하면 주문이 끝난다.\n\n대상은 지혜 내성 굴림을 굴려야 한다. 실패 시 시전자가 묘사한 행동을 최선을 다해 따른다. 제안된 행동은 지속시간 내내 이어질 수 있다. 제안된 활동이 더 짧은 시간에 완료될 수 있다면, 대상이 요구받은 것을 마칠 때 주문이 끝난다.\n\n지속시간 동안 특별한 활동을 유발할 조건을 지정할 수도 있다. 예를 들어 기사에게 처음 만나는 거지에게 군마를 주라고 제안할 수 있다. 주문이 만료되기 전에 조건이 충족되지 않으면 그 활동은 수행되지 않는다.\n\n시전자나 동료가 대상에게 피해를 주면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"뱀의 혀와 벌집 조각 또는 달콤한 기름 한 방울."},{"name_ko":"암시야","name_en":"Darkvision","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"8 hours","material_en":"Either a pinch of dried carrot or an agate.","higher_level_en":"","desc_en":"You touch a willing creature to grant it the ability to see in the dark. For the duration, that creature has darkvision out to a range of 60 feet.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"동의하는 크리처 하나를 접촉해 어둠 속에서 보는 능력을 부여한다. 지속시간 동안 그 크리처는 18m(60ft) 범위의 암시야를 갖는다.","higher_level_ko":"","damage_ko":"","material_ko":"말린 당근 한 자밤 또는 마노."},{"name_ko":"암흑","name_en":"Darkness","level":2,"school":"방출계","components":["V","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"Bat fur and a drop of pitch or piece of coal.","higher_level_en":"","desc_en":"Magical darkness spreads from a point you choose within range to fill a 15-foot-radius sphere for the duration. The darkness spreads around corners. A creature with darkvision can't see through this darkness, and nonmagical light can't illuminate it.\n\nIf the point you choose is on an object you are holding or one that isn't being worn or carried, the darkness emanates from the object and moves with it. Completely covering the source of the darkness with an opaque object, such as a bowl or a helm, blocks the darkness.\n\nIf any of this spell's area overlaps with an area of light created by a spell of 2nd level or lower, the spell that created the light is dispelled.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에서 선택한 지점에서 마법의 어둠이 퍼져 지속시간 동안 4.5m(15ft) 반경 구체를 채운다. 어둠은 모퉁이를 돌아 퍼질 수 있다. 암시야를 지닌 크리처도 이 어둠 속을 볼 수 없으며, 비마법 광원으로는 밝힐 수 없다.\n\n선택한 지점이 시전자가 든 물체나 착용·소지되지 않은 물체 위라면, 어둠은 그 물체에서 뿜어져 나오며 물체와 함께 이동한다. 사발이나 투구처럼 불투명한 물체로 어둠의 근원을 완전히 덮으면 어둠이 차단된다.\n\n이 주문의 구역 일부가 2레벨 이하의 주문으로 만든 빛의 구역과 겹치면, 그 빛을 만든 주문이 무효화된다.","higher_level_ko":"","damage_ko":"","material_ko":"박쥐 털과 역청 한 방울 또는 석탄 조각."},{"name_ko":"야수 감각","name_en":"Beast Sense","level":2,"school":"예지계","components":["S"],"ritual":true,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"야수 지배","name_en":"Dominate Beast","level":4,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"When you cast this spell with a 9th level spell slot, the duration is concentration, up to 8 hours.","desc_en":"You attempt to beguile a creature that you can see within range. It must succeed on a wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw.\n\nWhile the creature is charmed, you have a telepathic link with it as long as the two of you are on the same plane of existence. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability.\n\nYou can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time, you can also cause the creature to use a reaction, but this requires you to use your own reaction as well. Each time the target takes damage, it makes a new wisdom saving throw against the spell. If the saving throw succeeds, the spell ends.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 크리처를 홀리려 시도한다. 그 크리처는 지혜 내성 굴림에 성공하지 못하면 지속시간 동안 시전자에게 매혹된다. 시전자나 시전자에게 우호적인 크리처가 그와 싸우는 중이면 그 크리처는 내성 굴림에 유리 보정을 받는다.\n\n크리처가 매혹된 동안, 둘이 같은 존재계에 있는 한 시전자는 그 크리처와 텔레파시 연결을 갖는다. 의식이 있는 동안 이 텔레파시 연결로 크리처에게 명령을 내릴 수 있으며(행동 필요 없음), 크리처는 최선을 다해 따른다. \"저 크리처를 공격해라\", \"저기로 달려가라\", \"저 물체를 가져와라\"처럼 단순하고 대략적인 행동 방침을 지정할 수 있다. 크리처가 명령을 완수하고 추가 지시를 받지 못하면, 최선을 다해 스스로를 방어하고 보전한다.\n\n행동을 사용해 대상을 완전하고 정밀하게 통제할 수 있다. 다음 턴이 끝날 때까지 크리처는 시전자가 선택한 행동만 하고, 시전자가 허락하지 않는 것은 하지 않는다. 이 동안 크리처가 반응행동을 쓰게 할 수도 있으나, 이는 시전자 자신의 반응행동도 써야 한다. 대상이 피해를 받을 때마다 이 주문에 맞선 새 지혜 내성 굴림을 굴린다. 성공하면 주문이 끝난다.","higher_level_ko":"9레벨 주문 슬롯으로 시전하면 지속시간이 정신집중, 최대 8시간이 된다.","damage_ko":"","material_ko":""},{"name_ko":"억압","name_en":"Bane","level":1,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A drop of blood.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st.","desc_en":"Up to three creatures of your choice that you can see within range must make charisma saving throws. Whenever a target that fails this saving throw makes an attack roll or a saving throw before the spell ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는, 선택한 크리처 최대 셋이 매력 내성 굴림을 굴려야 한다. 이 내성 굴림에 실패한 대상이 주문이 끝나기 전에 명중 굴림이나 내성 굴림을 굴릴 때마다, d4를 굴려 그 결과를 명중 굴림이나 내성 굴림에서 빼야 한다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"피 한 방울."},{"name_ko":"언데드 창조","name_en":"Create Undead","level":6,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 minute","duration_en":"Instantaneous","material_en":"One clay pot filled with grave dirt, one clay pot filled with brackish water, and one 150 gp black onyx stone for each corpse.","higher_level_en":"When you cast this spell using a 7th-level spell slot, you can animate or reassert control over four ghouls. When you cast this spell using an 8th-level spell slot, you can animate or reassert control over five ghouls or two ghasts or wights. When you cast this spell using a 9th-level spell slot, you can animate or reassert control over six ghouls, three ghasts or wights, or two mummies.","desc_en":"You can cast this spell only at night. Choose up to three corpses of Medium or Small humanoids within range. Each corpse becomes a ghoul under your control. (The GM has game statistics for these creatures.)\n\nAs a bonus action on each of your turns, you can mentally command any creature you animated with this spell if the creature is within 120 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete.\n\nThe creature is under your control for 24 hours, after which it stops obeying any command you have given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature before the current 24-hour period ends. This use of the spell reasserts your control over up to three creatures you have animated with this spell, rather than animating new ones.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"언어 변환","name_en":"Comprehend Languages","level":1,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A pinch of soot and salt.","higher_level_en":"","desc_en":"For the duration, you understand the literal meaning of any spoken language that you hear. You also understand any written language that you see, but you must be touching the surface on which the words are written. It takes about 1 minute to read one page of text.\n\nThis spell doesn't decode secret messages in a text or a glyph, such as an arcane sigil, that isn't part of a written language.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"지속시간 동안, 시전자가 듣는 모든 구어의 문자 그대로의 의미를 이해한다. 또한 보이는 모든 문자 언어를 이해하지만, 글자가 쓰인 표면을 접촉하고 있어야 한다. 글 한 페이지를 읽는 데 약 1분이 걸린다.\n\n이 주문은 비전 인장 같은, 문자 언어의 일부가 아닌 글이나 문양 속에 숨겨진 비밀 메시지를 해독하지는 못한다.","higher_level_ko":"","damage_ko":"","material_ko":"그을음과 소금 한 자밤."},{"name_ko":"언어구사","name_en":"Tongues","level":3,"school":"예지계","components":["V","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A small clay model of a ziggurat.","higher_level_en":"","desc_en":"This spell grants the creature you touch the ability to understand any spoken language it hears. Moreover, when the target speaks, any creature that knows at least one language and can hear the target understands what it says.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"이 주문은 접촉한 크리처에게 듣는 모든 구어를 이해하는 능력을 준다. 나아가 대상이 말할 때, 언어를 하나 이상 아는, 대상의 말을 들을 수 있는 모든 크리처가 그 말을 이해한다.","higher_level_ko":"","damage_ko":"","material_ko":"지구라트의 작은 점토 모형."},{"name_ko":"얼음 폭풍","name_en":"Ice Storm","level":4,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"300 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A pinch of dust and a few drops of water.","higher_level_en":"When you cast this spell using a spell slot of 5th level or higher, the bludgeoning damage increases by 1d8 for each slot level above 4th.","desc_en":"A hail of rock-hard ice pounds to the ground in a 20-foot-radius, 40-foot-high cylinder centered on a point within range. Each creature in the cylinder must make a dexterity saving throw. A creature takes 2d8 bludgeoning damage and 4d6 cold damage on a failed save, or half as much damage on a successful one.\n\nHailstones turn the storm's area of effect into difficult terrain until the end of your next turn.","damage_en":"2d8 + 4d6 Bludgeoning","attack_type":"","range_ko":"90m(300ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내 한 지점을 중심으로 한 반경 6m(20ft), 높이 12m(40ft)의 원기둥에 바위처럼 단단한 얼음 우박이 땅으로 쏟아진다. 원기둥 안의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 2d8 타격 피해와 4d6 냉기 피해를, 성공 시 절반의 피해를 받는다.\n\n우박은 다음 턴이 끝날 때까지 주문의 효과 범위를 어려운 지형으로 만든다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 타격 피해가 1d8씩 증가한다.","damage_ko":"2d8 + 4d6 타격 피해","material_ko":"먼지 한 자밤과 물 몇 방울."},{"name_ko":"얼음의 벽","name_en":"Wall of Ice","level":6,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A small piece of quartz.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the damage the wall deals when it appears increases by 2d6, and the damage from passing through the sheet of frigid air increases by 1d6, for each slot level above 6th.","desc_en":"You create a wall of ice on a solid surface within range. You can form it into a hemispherical dome or a sphere with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-square panels. Each panel must be contiguous with another panel. In any form, the wall is 1 foot thick and lasts for the duration.\n\nIf the wall cuts through a creature's space when it appears, the creature within its area is pushed to one side of the wall and must make a dexterity saving throw. On a failed save, the creature takes 10d6 cold damage, or half as much damage on a successful save.\n\nThe wall is an object that can be damaged and thus breached. It has AC 12 and 30 hit points per 10-foot section, and it is vulnerable to fire damage. Reducing a 10-foot section of wall to 0 hit points destroys it and leaves behind a sheet of frigid air in the space the wall occupied. A creature moving through the sheet of frigid air for the first time on a turn must make a constitution saving throw. That creature takes 5d6 cold damage on a failed save, or half as much damage on a successful one.","damage_en":"10d6 Cold","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"10d6 냉기 피해","material_ko":""},{"name_ko":"얽혀듬","name_en":"Entangle","level":1,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"Grasping weeds and vines sprout from the ground in a 20-foot square starting form a point within range. For the duration, these plants turn the ground in the area into difficult terrain.\n\nA creature in the area when you cast the spell must succeed on a strength saving throw or be restrained by the entangling plants until the spell ends. A creature restrained by the plants can use its action to make a Strength check against your spell save DC. On a success, it frees itself.\n\nWhen the spell ends, the conjured plants wilt away.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내 한 지점에서 시작하는 6m(20ft) 정사각형 구역에 붙잡는 잡초와 덩굴이 땅에서 솟아난다. 지속시간 동안 이 식물들은 그 구역의 땅을 어려운 지형으로 만든다.\n\n주문을 시전할 때 그 구역에 있는 크리처는 근력 내성 굴림에 성공하지 못하면 주문이 끝날 때까지 얽어매는 식물에 포박된다. 식물에 포박된 크리처는 행동을 사용해 시전자의 주문 내성 DC에 맞서는 근력 판정을 굴릴 수 있다. 성공 시 스스로 풀려난다.\n\n주문이 끝나면 소환된 식물은 시들어 사라진다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"에너지로부터의 보호","name_en":"Protection from Energy","level":3,"school":"방호계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"","desc_en":"For the duration, the willing creature you touch has resistance to one damage type of your choice: acid, cold, fire, lightning, or thunder.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"지속시간 동안, 접촉한 동의하는 크리처가 시전자가 선택한 피해 유형 하나(산성, 냉기, 화염, 번개, 또는 천둥)에 저항을 얻는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"에바드의 검은 촉수","name_en":"Evard's Black Tentacles","level":4,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A piece of tentacle from a giant octopus or a giant squid","higher_level_en":"","desc_en":"Squirming, ebony tentacles fill a 20-foot square on ground that you can see within range. For the duration, these tentacles turn the ground in the area into difficult terrain.\n\nWhen a creature enters the affected area for the first time on a turn or starts its turn there, the creature must succeed on a Dexterity saving throw or take 3d6 bludgeoning damage and be restrained by the tentacles until the spell ends. A creature that starts its turn in the area and is already restrained by the tentacles takes 3d6 bludgeoning damage.\n\nA creature restrained by the tentacles can use its action to make a Strength or Dexterity check (its choice) against your spell save DC. On a s
