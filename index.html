ditional creature for each slot level above 2nd.","desc_en":"You touch a creature and bestow upon it a magical enhancement. Choose one of the following effects; the target gains that effect until the spell ends.\n\n***Bear's Endurance.*** The target has advantage on constitution checks. It also gains 2d6 temporary hit points, which are lost when the spell ends.\n\n***Bull's Strength.*** The target has advantage on strength checks, and his or her carrying capacity doubles.\n\n***Cat's Grace.*** The target has advantage on dexterity checks. It also doesn't take damage from falling 20 feet or less if it isn't incapacitated.\n\n***Eagle's Splendor.*** The target has advantage on Charisma checks.\n\n***Fox's Cunning.*** The target has advantage on intelligence checks.\n\n***Owl's Wisdom.*** The target has advantage on wisdom checks.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"크리처 하나를 접촉해 마법적 강화를 부여한다. 다음 효과 중 하나를 선택하며, 대상은 주문이 끝날 때까지 그 효과를 얻는다.\n\n***곰의 인내.*** 대상은 건강 판정에 유리 보정을 받는다. 또한 2d6 임시 히트 포인트를 얻으며, 주문이 끝나면 사라진다.\n\n***황소의 힘.*** 대상은 근력 판정에 유리 보정을 받고, 운반 능력이 두 배가 된다.\n\n***고양이의 우아함.*** 대상은 민첩 판정에 유리 보정을 받는다. 또한 무력화 상태가 아니라면 6m(20ft) 이하의 낙하로는 피해를 받지 않는다.\n\n***독수리의 위엄.*** 대상은 매력 판정에 유리 보정을 받는다.\n\n***여우의 교활함.*** 대상은 지능 판정에 유리 보정을 받는다.\n\n***올빼미의 지혜.*** 대상은 지혜 판정에 유리 보정을 받는다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"야수의 털이나 깃털."},{"name_ko":"니스툴의 마법 오오라","name_en":"Nystul's Magic Aura","level":2,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"다중 상처 치료","name_en":"Mass Cure Wounds","level":5,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the healing increases by 1d8 for each slot level above 5th.","desc_en":"A wave of healing energy washes out from a point of your choice within range. Choose up to six creatures in a 30-foot-radius sphere centered on that point. Each target regains hit points equal to 3d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 선택한 지점에서 치유 에너지의 파도가 퍼진다. 그 지점을 중심으로 한 9m(30ft) 반경 구체 내에서 크리처 최대 여섯을 선택한다. 각 대상은 3d8 + 시전자의 주문시전 능력 수정치만큼의 히트 포인트를 회복한다. 이 주문은 언데드나 구조물에는 효과가 없다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 회복량이 1d8씩 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"다중 암시","name_en":"Mass Suggestion","level":6,"school":"환혹계","components":["V","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"24 hours","material_en":"A snake's tongue and either a bit of honeycomb or a drop of sweet oil.","higher_level_en":"When you cast this spell using a 7th-level spell slot, the duration is 10 days. When you use an 8th-level spell slot, the duration is 30 days. When you use a 9th-level spell slot, the duration is a year and a day.","desc_en":"You suggest a course of activity (limited to a sentence or two) and magically influence up to twelve creatures of your choice that you can see within range and that can hear and understand you. Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to stab itself, throw itself onto a spear, immolate itself, or do some other obviously harmful act automatically negates the effect of the spell.\n\nEach target must make a wisdom saving throw. On a failed save, it pursues the course of action you described to the best of its ability. The suggested course of action can continue for the entire duration. If the suggested activity can be completed in a shorter time, the spell ends when the subject finishes what it was asked to do.\n\nYou can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that a group of soldiers give all their money to the first beggar they meet. If the condition isn't met before the spell ends, the activity isn't performed.\n\nIf you or any of your companions damage a creature affected by this spell, the spell ends for that creature.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"다중 치료의 단어","name_en":"Mass Healing Word","level":3,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 bonus action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the healing increases by 1d4 for each slot level above 3rd.","desc_en":"As you call out words of restoration, up to six creatures of your choice that you can see within range regain hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 추가 행동","duration_ko":"즉시","desc_ko":"회복의 말을 외치면, 사거리 내에서 볼 수 있는, 선택한 크리처 최대 여섯이 각각 1d4 + 주문시전 능력 수정치만큼의 히트 포인트를 회복한다. 이 주문은 언데드나 구조물에는 효과가 없다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 회복량이 1d4씩 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"다중 치유","name_en":"Mass Heal","level":9,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"A flood of healing energy flows from you into injured creatures around you. You restore up to 700 hit points, divided as you choose among any number of creatures that you can see within range. Creatures healed by this spell are also cured of all diseases and any effect making them blinded or deafened. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"단검의 구름","name_en":"Cloud of Daggers","level":2,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"단순마술","name_en":"Prestidigitation","level":0,"school":"변환계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"This spell is a minor magical trick that novice spellcasters use for practice. You create one of the following magical effects within 'range':\n\nYou create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor.\n\nYou instantaneously light or snuff out a candle, a torch, or a small campfire.\n\nYou instantaneously clean or soil an object no larger than 1 cubic foot.\n\nYou chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour.\n\nYou make a color, a small mark, or a symbol appear on an object or a surface for 1 hour.\n\nYou create a nonmagical trinket or an illusory image that can fit in your hand and that lasts until the end of your next turn.\n\nIf you cast this spell multiple times, you can have up to three of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"이 주문은 초보 시전자가 연습용으로 쓰는 사소한 마법 재주다. 사거리 내에서 다음 효과 중 하나를 만들어낸다.\n\n불꽃놀이, 한 줄기 바람, 희미한 음악 소리, 이상한 냄새 같은 순간적이고 무해한 감각 효과를 만든다.\n\n촛불, 횃불, 작은 모닥불을 순간적으로 켜거나 끈다.\n\n1세제곱피트 이하의 물체를 순간적으로 깨끗이 하거나 더럽힌다.\n\n1세제곱피트 이하의 무생물을 1시간 동안 차갑게, 따뜻하게, 또는 맛이 나게 한다.\n\n물체나 표면에 색깔, 작은 표식, 기호를 1시간 동안 나타나게 한다.\n\n손에 들어갈 만한 비마법적 장신구나 환영 이미지를 만들며, 다음 턴이 끝날 때까지 지속된다.\n\n이 주문을 여러 번 시전하면, 순간적이지 않은 효과를 한 번에 최대 세 개까지 유지할 수 있으며, 행동을 사용해 그런 효과를 해제할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"달빛 광선","name_en":"Moonbeam","level":2,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"Several seeds of any moonseed plant and a piece of opalescent feldspar.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1dl0 for each slot level above 2nd.","desc_en":"A silvery beam of pale light shines down in a 5-foot radius, 40-foot-high cylinder centered on a point within range. Until the spell ends, dim light fills the cylinder.\n\nWhen a creature enters the spell's area for the first time on a turn or starts its turn there, it is engulfed in ghostly flames that cause searing pain, and it must make a constitution saving throw. It takes 2d10 radiant damage on a failed save, or half as much damage on a successful one.\n\nA shapechanger makes its saving throw with disadvantage. If it fails, it also instantly reverts to its original form and can't assume a different form until it leaves the spell's light.\n\nOn each of your turns after you cast this spell, you can use an action to move the beam 60 feet in any direction.","damage_en":"2d10 Radiant","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"창백한 은빛 광선이 사거리 내 한 지점을 중심으로 한 1.5m(5ft) 반경, 12m(40ft) 높이의 원기둥에 내리쬔다. 주문이 끝날 때까지 흐릿한 빛이 원기둥을 채운다.\n\n크리처가 한 턴에 처음으로 주문 구역에 들어오거나 그곳에서 턴을 시작하면, 타는 듯한 고통을 주는 유령 같은 불길에 휩싸이며 건강 내성 굴림을 굴려야 한다. 실패 시 2d10 광휘 피해를, 성공 시 절반의 피해를 받는다.\n\n변신자는 이 내성 굴림에 불리 보정을 받아 굴린다. 실패하면 즉시 본래 모습으로 돌아가며, 주문의 빛을 벗어날 때까지 다른 모습을 취할 수 없다.\n\n이 주문을 시전한 뒤 자기 턴마다, 행동을 사용해 광선을 아무 방향으로 18m(60ft) 이동시킬 수 있다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 피해가 1d10씩 증가한다.","damage_ko":"2d10 광휘 피해","material_ko":"문시드 계열 식물의 씨앗 몇 개와 유백색 장석 조각."},{"name_ko":"대지 이동","name_en":"Move Earth","level":6,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 2 hours","material_en":"An iron blade and a small bag containing a mixture of soils--clay, loam, and sand.","higher_level_en":"","desc_en":"Choose an area of terrain no larger than 40 feet on a side within range. You can reshape dirt, sand, or clay in the area in any manner you choose for the duration. You can raise or lower the area's elevation, create or fill in a trench, erect or flatten a wall, or form a pillar. The extent of any such changes can't exceed half the area's largest dimension. So, if you affect a 40-foot square, you can create a pillar up to 20 feet high, raise or lower the square's elevation by up to 20 feet, dig a trench up to 20 feet deep, and so on. It takes 10 minutes for these changes to complete.\n\nAt the end of every 10 minutes you spend concentrating on the spell, you can choose a new area of terrain to affect.\n\nBecause the terrain's transformation occurs slowly, creatures in the area can't usually be trapped or injured by the ground's movement.\n\nThis spell can't manipulate natural stone or stone construction. Rocks and structures shift to accommodate the new terrain. If the way you shape the terrain would make a structure unstable, it might collapse.\n\nSimilarly, this spell doesn't directly affect plant growth. The moved earth carries any plants along with it.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"대해일","name_en":"Tsunami","level":8,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"데미플레인","name_en":"Demiplane","level":8,"school":"조형계","components":["S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"You create a shadowy door on a flat solid surface that you can see within range. The door is large enough to allow Medium creatures to pass through unhindered. When opened, the door leads to a demiplane that appears to be an empty room 30 feet in each dimension, made of wood or stone. When the spell ends, the door disappears, and any creatures or objects inside the demiplane remain trapped there, as the door also disappears from the other side.\n\nEach time you cast this spell, you can create a new demiplane, or have the shadowy door connect to a demiplane you created with a previous casting of this spell. Additionally, if you know the nature and contents of a demiplane created by a casting of this spell by another creature, you can have the shadowy door connect to its demiplane instead.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"도검 방비","name_en":"Blade Ward","level":0,"school":"방호계","components":["V","S"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"도약","name_en":"Jump","level":1,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 minute","material_en":"A grasshopper's hind leg.","higher_level_en":"","desc_en":"You touch a creature. The creature's jump distance is tripled until the spell ends.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"크리처 하나를 접촉한다. 주문이 끝날 때까지 그 크리처의 도약 거리가 세 배가 된다.","higher_level_ko":"","damage_ko":"","material_ko":"메뚜기 뒷다리."},{"name_ko":"독 분사","name_en":"Poison Spray","level":0,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You extend your hand toward a creature you can see within range and project a puff of noxious gas from your palm. The creature must succeed on a constitution saving throw or take 1d12 poison damage.\n\nThis spell's damage increases by 1d12 when you reach 5th level (2d12), 11th level (3d12), and 17th level (4d12).","damage_en":"1d12 Poison","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는 크리처를 향해 손을 뻗어 손바닥에서 유독 가스를 내뿜는다. 그 크리처는 건강 내성 굴림에 성공하지 못하면 1d12 독성 피해를 받는다.\n\n이 주문의 피해는 5레벨(2d12), 11레벨(3d12), 17레벨(4d12)에 도달할 때 1d12씩 증가한다.","higher_level_ko":"","damage_ko":"1d12 독성 피해","material_ko":""},{"name_ko":"독과 질병 탐지","name_en":"Detect Poison and Disease","level":1,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A yew leaf.","higher_level_en":"","desc_en":"For the duration, you can sense the presence and location of poisons, poisonous creatures, and diseases within 30 feet of you. You also identify the kind of poison, poisonous creature, or disease in each case.\n\nThe spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"지속시간 동안, 시전자로부터 9m(30ft) 이내에 있는 독, 독성 크리처, 질병의 존재와 위치를 감지할 수 있다. 각 경우에 독, 독성 크리처, 질병의 종류도 알아낸다.\n\n이 주문은 대부분의 장벽을 통과하지만, 1피트의 돌, 1인치의 일반 금속, 얇은 납판, 3피트의 나무나 흙에는 차단된다.","higher_level_ko":"","damage_ko":"","material_ko":"주목나무 잎."},{"name_ko":"독으로부터의 보호","name_en":"Protection from Poison","level":2,"school":"방호계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"You touch a creature. If it is poisoned, you neutralize the poison. If more than one poison afflicts the target, you neutralize one poison that you know is present, or you neutralize one at random.\n\nFor the duration, the target has advantage on saving throws against being poisoned, and it has resistance to poison damage.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"크리처 하나를 접촉한다. 그 크리처가 중독 상태라면 독을 중화한다. 대상이 여러 독에 걸려 있으면, 존재를 아는 독 하나를 중화하거나 무작위로 하나를 중화한다.\n\n지속시간 동안, 대상은 중독에 대한 내성 굴림에 유리 보정을 받고, 독성 피해에 저항을 얻는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"돌에 녹아들기","name_en":"Meld into Stone","level":3,"school":"변환계","components":["V","S"],"ritual":true,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"8 hours","material_en":"","higher_level_en":"","desc_en":"You step into a stone object or surface large enough to fully contain your body, melding yourself and all the equipment you carry with the stone for the duration. Using your movement, you step into the stone at a point you can touch. Nothing of your presence remains visible or otherwise detectable by nonmagical senses.\n\nWhile merged with the stone, you can't see what occurs outside it, and any Wisdom (Perception) checks you make to hear sounds outside it are made with disadvantage. You remain aware of the passage of time and can cast spells on yourself while merged in the stone. You can use your movement to leave the stone where you entered it, which ends the spell. You otherwise can't move.\n\nMinor physical damage to the stone doesn't harm you, but its partial destruction or a change in its shape (to the extent that you no longer fit within it) expels you and deals 6d6 bludgeoning damage to you. The stone's complete destruction (or transmutation into a different substance) expels you and deals 50 bludgeoning damage to you. If expelled, you fall prone in an unoccupied space closest to where you first entered.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"몸을 완전히 감쌀 만큼 큰 돌 물체나 표면 안으로 들어가, 지속시간 동안 자신과 소지한 모든 장비를 돌과 하나로 융합시킨다. 이동을 사용해, 접촉할 수 있는 지점에서 돌 안으로 들어간다. 시전자의 존재는 비마법적 감각으로는 전혀 보이거나 감지되지 않는다.\n\n돌과 융합된 동안, 바깥에서 일어나는 일을 볼 수 없으며, 바깥의 소리를 듣기 위한 지혜(감지) 판정은 불리 보정을 받는다. 시간의 흐름은 계속 인지하며, 돌 안에 융합된 채 자신에게 주문을 시전할 수 있다. 이동을 사용해 들어간 곳으로 돌에서 나올 수 있으며, 그러면 주문이 끝난다. 그 외에는 이동할 수 없다.\n\n돌에 가해지는 경미한 물리적 피해는 시전자를 해치지 않지만, 돌이 부분적으로 파괴되거나 형태가 변해(더 이상 그 안에 들어맞지 않을 정도로) 밀려나면 6d6 타격 피해를 받는다. 돌이 완전히 파괴되거나(다른 물질로 변환되면) 밀려나며 50 타격 피해를 받는다. 밀려나면, 처음 들어간 곳과 가장 가까운 빈 공간에 넘어진 채 떨어진다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"돌풍","name_en":"Gust of Wind","level":2,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A legume seed.","higher_level_en":"","desc_en":"A line of strong wind 60 feet long and 10 feet wide blasts from you in a direction you choose for the spell's duration. Each creature that starts its turn in the line must succeed on a strength saving throw or be pushed 15 feet away from you in a direction following the line.\n\nAny creature in the line must spend 2 feet of movement for every 1 foot it moves when moving closer to you.\n\nThe gust disperses gas or vapor, and it extinguishes candles, torches, and similar unprotected flames in the area. It causes protected flames, such as those of lanterns, to dance wildly and has a 50 percent chance to extinguish them.\n\nAs a bonus action on each of your turns before the spell ends, you can change the direction in which the line blasts from you.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"길이 18m(60ft), 폭 3m(10ft)의 강풍 직선이 주문의 지속시간 동안 시전자가 선택한 방향으로 몰아친다. 그 직선에서 턴을 시작하는 각 크리처는 근력 내성 굴림에 성공하지 못하면 직선을 따라 시전자로부터 4.5m(15ft) 밀려난다.\n\n그 직선 안의 크리처는 시전자에게 가까워지는 방향으로 이동할 때, 1피트 이동마다 2피트의 이동력을 써야 한다.\n\n돌풍은 기체나 증기를 흩어버리고, 그 구역의 촛불, 횃불 등 보호되지 않은 불꽃을 끈다. 등불처럼 보호된 불꽃은 격렬하게 일렁이게 하며, 50% 확률로 끈다.\n\n주문이 끝나기 전 자기 턴마다 추가 행동으로, 직선이 몰아치는 방향을 바꿀 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"콩과 식물의 씨앗."},{"name_ko":"동물 또는 식물 위치파악","name_en":"Locate Animals or Plants","level":2,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A bit of fur from a bloodhound.","higher_level_en":"","desc_en":"Describe or name a specific kind of beast or plant. Concentrating on the voice of nature in your surroundings, you learn the direction and distance to the closest creature or plant of that kind within 5 miles, if any are present.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"특정 종류의 야수나 식물을 묘사하거나 이름을 댄다. 주변 자연의 목소리에 집중하면, 5마일 이내에 그 종류의 가장 가까운 크리처나 식물이 있다면 그 방향과 거리를 알아낸다.","higher_level_ko":"","damage_ko":"","material_ko":"블러드하운드의 털 조각."},{"name_ko":"동물 소환","name_en":"Conjure Animals","level":3,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using certain higher-level spell slots, you choose one of the summoning options above, and more creatures appear: twice as many with a 5th-level slot, three times as many with a 7th-level.","desc_en":"You summon fey spirits that take the form of beasts and appear in unoccupied spaces that you can see within range. Choose one of the following options for what appears:\n\n- One beast of challenge rating 2 or lower\n\n- Two beasts of challenge rating 1 or lower\n\n- Four beasts of challenge rating 1/2 or lower\n\n- Eight beasts of challenge rating 1/4 or lower\n\n- Each beast is also considered fey, and it disappears when it drops to 0 hit points or when the spell ends.\n\nThe summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which has its own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions.\n\nThe GM has the creatures' statistics.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"야수 형태를 취하는 요정 정령을 소환하며, 사거리 내에서 볼 수 있는 빈 공간에 나타난다. 나타날 것으로 다음 선택지 중 하나를 고른다.\n\n- 도전 지수 2 이하의 야수 하나\n\n- 도전 지수 1 이하의 야수 둘\n\n- 도전 지수 1/2 이하의 야수 넷\n\n- 도전 지수 1/4 이하의 야수 여덟\n\n각 야수는 요정으로도 간주되며, 히트 포인트가 0이 되거나 주문이 끝나면 사라진다.\n\n소환된 크리처는 시전자와 동료에게 우호적이다. 소환된 크리처들의 우선권은 한 무리로 굴리며, 자기들만의 턴을 갖는다. 시전자가 내리는 음성 명령을 따른다(시전자의 행동은 필요 없다). 명령을 내리지 않으면, 적대적인 크리처로부터 스스로를 방어할 뿐 그 외의 행동은 하지 않는다.\n\n크리처들의 능력치는 DM이 갖는다.","higher_level_ko":"특정 고레벨 주문 슬롯으로 시전하면, 위 소환 선택지 중 하나를 고르고 더 많은 크리처가 나타난다. 5레벨 슬롯은 두 배, 7레벨 슬롯은 세 배, 9레벨 슬롯은 네 배다.","damage_ko":"","material_ko":""},{"name_ko":"동물 전달자","name_en":"Animal Messenger","level":2,"school":"환혹계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"24 hours","material_en":"A morsel of food.","higher_level_en":"If you cast this spell using a spell slot of 3nd level or higher, the duration of the spell increases by 48 hours for each slot level above 2nd.","desc_en":"By means of this spell, you use an animal to deliver a message. Choose a Tiny beast you can see within range, such as a squirrel, a blue jay, or a bat. You specify a location, which you must have visited, and a recipient who matches a general description, such as \"a man or woman dressed in the uniform of the town guard\" or \"a red-haired dwarf wearing a pointed hat.\" You also speak a message of up to twenty-five words. The target beast travels for the duration of the spell toward the specified location, covering about 50 miles per 24 hours for a flying messenger, or 25 miles for other animals.\n\nWhen the messenger arrives, it delivers your message to the creature that you described, replicating the sound of your voice. The messenger speaks only to a creature matching the description you gave. If the messenger doesn't reach its destination before the spell ends, the message is lost, and the beast makes its way back to where you cast this spell.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"24 시간","desc_ko":"이 주문으로 동물을 이용해 전언을 전달한다. 다람쥐, 어치, 박쥐처럼 사거리 내에서 볼 수 있는 초소형 야수 하나를 선택한다. 시전자가 방문한 적 있는 장소와, '읍 경비대 제복을 입은 남녀'나 '뾰족한 모자를 쓴 붉은 머리 드워프'처럼 대략적인 묘사에 맞는 수신인을 지정한다. 또한 최대 스물다섯 단어의 전언을 말한다. 대상 야수는 주문의 지속시간 동안 지정한 장소를 향해 이동하며, 비행 전달자는 24시간당 약 50마일을, 그 외 동물은 25마일을 간다.\n\n전달자가 도착하면, 시전자의 목소리를 재현하여 묘사한 크리처에게 전언을 전한다. 전달자는 시전자가 준 묘사에 맞는 크리처에게만 말한다. 주문이 끝나기 전에 목적지에 도달하지 못하면 전언은 사라지고, 야수는 시전자가 이 주문을 시전한 곳으로 돌아간다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 주문의 지속시간이 48시간씩 늘어난다.","damage_ko":"","material_ko":"음식 한 조각."},{"name_ko":"동물 친밀화","name_en":"Animal Friendship","level":1,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"24 hours","material_en":"A morsel of food.","higher_level_en":"","desc_en":"This spell lets you convince a beast that you mean it no harm. Choose a beast that you can see within range. It must see and hear you. If the beast's Intelligence is 4 or higher, the spell fails. Otherwise, the beast must succeed on a wisdom saving throw or be charmed by you for the spell's duration. If you or one of your companions harms the target, the spells ends.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"24 시간","desc_ko":"야수에게 해칠 뜻이 없음을 납득시키는 주문이다. 사거리 내에서 볼 수 있는 야수 하나를 선택한다. 그 야수는 시전자를 보고 들을 수 있어야 한다. 야수의 지능이 4 이상이면 주문은 실패한다. 그렇지 않으면 야수는 지혜 내성 굴림에 성공하지 못할 경우 주문의 지속시간 동안 시전자에게 매혹된다. 시전자나 동료가 대상을 해치면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"음식 한 조각."},{"name_ko":"동물 형상","name_en":"Animal Shapes","level":8,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 24 hours","material_en":"","higher_level_en":"","desc_en":"Your magic turns others into beasts. Choose any number of willing creatures that you can see within range. You transform each target into the form of a Large or smaller beast with a challenge rating of 4 or lower. On subsequent turns, you can use your action to transform affected creatures into new forms.\n\nThe transformation lasts for the duration for each target, or until the target drops to 0 hit points or dies. You can choose a different form for each target. A target's game statistics are replaced by the statistics of the chosen beast, though the target retains its alignment and Intelligence, Wisdom, and Charisma scores. The target assumes the hit points of its new form, and when it reverts to its normal form, it returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can't speak or cast spells.\n\nThe target's gear melds into the new form. The target can't activate, wield, or otherwise benefit from any of its equipment.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"동물과의 대화","name_en":"Speak with Animals","level":1,"school":"예지계","components":["V","S"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"","higher_level_en":"","desc_en":"You gain the ability to comprehend and verbally communicate with beasts for the duration. The knowledge and awareness of many beasts is limited by their intelligence, but at a minimum, beasts can give you information about nearby locations and monsters, including whatever they can perceive or have perceived within the past day. You might be able to persuade a beast to perform a small favor for you, at the GM's discretion.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"10 분","desc_ko":"지속시간 동안 야수를 이해하고 말로 소통하는 능력을 얻는다. 많은 야수의 지식과 인지는 지능에 의해 제한되지만, 최소한 야수는 근처 장소와 괴물에 관한 정보를 줄 수 있으며, 여기에는 지난 하루 동안 인지했거나 인지할 수 있는 것이 포함된다. DM의 재량에 따라 야수를 설득해 작은 부탁을 들어주게 할 수도 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"드로미즈의 즉석 소환","name_en":"Drawmij's Instant Summons","level":6,"school":"조형계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"Until dispelled","material_en":"A sapphire worth 1,000 gp.","higher_level_en":"","desc_en":"You touch an object weighing 10 pounds or less whose longest dimension is 6 feet or less. The spell leaves an invisible mark on its surface and invisibly inscribes the name of the item on the sapphire you use as the material component. Each time you cast this spell, you must use a different sapphire.\n\nAt any time thereafter, you can use your action to speak the item's name and crush the sapphire. The item instantly appears in your hand regardless of physical or planar distances, and the spell ends.\n\nIf another creature is holding or carrying the item, crushing the sapphire doesn't transport the item to you, but instead you learn who the creature possessing the object is and roughly where that creature is located at that moment.\n\nDispel magic or a similar effect successfully applied to the sapphire ends this spell's effect.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"드루이드술","name_en":"Druidcraft","level":0,"school":"변환계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Whispering to the spirits of nature, you create one of the following effects within 'range':\n\n- You create a tiny, harmless sensory effect that predicts what the weather will be at your location for the next 24 hours. The effect might manifest as a golden orb for clear skies, a cloud for rain, falling snowflakes for snow, and so on. This effect persists for 1 round.\n\n- You instantly make a flower bloom, a seed pod open, or a leaf bud bloom.\n\n- You create an instantaneous, harmless sensory effect, such as falling leaves, a puff of wind, the sound of a small animal, or the faint order of skunk. The effect must fit in a 5-foot cube.\n\n- You instantly light or snuff out a candle, a torch, or a small campfire.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"자연의 정령에게 속삭이며 사거리 내에서 다음 효과 중 하나를 만들어낸다.\n\n- 앞으로 24시간 동안 현재 위치의 날씨를 예측하는, 작고 무해한 감각 효과를 만든다. 맑음은 황금빛 구체, 비는 구름, 눈은 떨어지는 눈송이 등으로 나타날 수 있다. 이 효과는 1라운드 동안 지속된다.\n\n- 꽃을 피우거나, 씨앗 꼬투리를 열거나, 잎눈을 틔운다.\n\n- 떨어지는 나뭇잎, 한 줄기 바람, 작은 동물 소리, 희미한 스컹크 냄새 같은 순간적이고 무해한 감각 효과를 만든다. 이 효과는 1.5m(5ft) 정육면체 안에 들어가야 한다.\n\n- 촛불, 횃불, 작은 모닥불을 켜거나 끈다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"래리의 정신 유대","name_en":"Rary's Telepathic Bond","level":5,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"Pieces of eggshell from two different kinds of creatures","higher_level_en":"","desc_en":"You forge a telepathic link among up to eight willing creatures of your choice within range, psychically linking each creature to all the others for the duration. Creatures with Intelligence scores of 2 or less aren't affected by this spell.\n\nUntil the spell ends, the targets can communicate telepathically through the bond whether or not they have a common language. The communication is possible over any distance, though it can't extend to other planes of existence.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"사거리 내에서 선택한, 동의하는 크리처 최대 여덟 사이에 텔레파시 연결을 만들어, 지속시간 동안 각 크리처를 다른 모두와 정신적으로 잇는다. 지능 점수가 2 이하인 크리처는 이 주문의 영향을 받지 않는다.\n\n주문이 끝날 때까지, 대상들은 공용 언어의 유무와 관계없이 연결을 통해 텔레파시로 소통할 수 있다. 소통은 어떤 거리에서도 가능하나, 다른 존재계로는 뻗지 못한다.","higher_level_ko":"","damage_ko":"","material_ko":"서로 다른 두 종류의 크리처에게서 나온 알껍데기 조각."},{"name_ko":"레오문드의 비밀 상자","name_en":"Leomund's Secret Chest","level":4,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"An exquisite chest, 3 feet by 2 feet by 2 feet, constructed from rare materials worth at least 5,000 gp, and a Tiny replica made from the same materials worth at least 50 gp.","higher_level_en":"","desc_en":"You hide a chest, and all its contents, on the Ethereal Plane. You must touch the chest and the miniature replica that serves as a material component for the spell. The chest can contain up to 12 cubic feet of nonliving material (3 feet by 2 feet by 2 feet).\n\nWhile the chest remains on the Ethereal Plane, you can use an action and touch the replica to recall the chest. It appears in an unoccupied space on the ground within 5 feet of you. You can send the chest back to the Ethereal Plane by using an action and touching both the chest and the replica.\n\nAfter 60 days, there is a cumulative 5 percent chance per day that the spell's effect ends. This effect ends if you cast this spell again, if the smaller replica chest is destroyed, or if you choose to end the spell as an action. If the spell ends and the larger chest is on the Ethereal Plane, it is irretrievably lost.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"상자와 그 내용물 전부를 영계에 숨긴다. 상자와, 주문의 물질 구성요소 역할을 하는 축소 모형을 접촉해야 한다. 상자는 12세제곱피트(3피트×2피트×2피트)의 무생물을 담을 수 있다.\n\n상자가 영계에 있는 동안, 행동을 사용하고 모형을 접촉해 상자를 다시 불러올 수 있다. 상자는 시전자로부터 1.5m(5ft) 이내 지면의 빈 공간에 나타난다. 행동을 사용하고 상자와 모형을 둘 다 접촉하면 상자를 영계로 돌려보낼 수 있다.\n\n60일이 지나면, 하루에 5퍼센트씩 누적되는 확률로 주문 효과가 끝난다. 이 주문을 다시 시전하거나, 작은 모형 상자가 파괴되거나, 행동을 사용해 주문을 끝내기로 하면 효과가 끝난다. 주문이 끝났을 때 큰 상자가 영계에 있으면, 되찾을 수 없이 영영 잃는다.","higher_level_ko":"","damage_ko":"","material_ko":"5,000gp 이상 가치의 희귀 재료로 만든, 3피트×2피트×2피트의 정교한 상자와, 같은 재료로 만든 50gp 이상 가치의 초소형 모형."},{"name_ko":"레오문드의 작은 오두막","name_en":"Leomund's Tiny Hut","level":3,"school":"방출계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"8 hours","material_en":"A small crystal bead.","higher_level_en":"","desc_en":"A 10-foot-radius immobile dome of force springs into existence around and above you and remains stationary for the duration. The spell ends if you leave its area.\n\nNine creatures of Medium size or smaller can fit inside the dome with you. The spell fails if its area includes a larger creature or more than nine creatures. Creatures and objects within the dome when you cast this spell can move through it freely. All other creatures and objects are barred from passing through it. Spells and other magical effects can't extend through the dome or be cast through it. The atmosphere inside the space is comfortable and dry, regardless of the weather outside.\n\nUntil the spell ends, you can command the interior to become dimly lit or dark. The dome is opaque from the outside, of any color you choose, but it is transparent from the inside.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 분","duration_ko":"8 시간","desc_ko":"시전자를 둘러싸고 그 위로 반경 3m(10ft)의 고정된 역장 반구가 생겨나, 지속시간 동안 그 자리에 머무른다. 시전자가 그 구역을 벗어나면 주문이 끝난다.\n\n중형 이하의 크리처 아홉이 시전자와 함께 반구 안에 들어갈 수 있다. 그 구역에 더 큰 크리처나 아홉을 넘는 크리처가 포함되면 주문은 실패한다. 주문을 시전할 때 반구 안에 있던 크리처와 물체는 자유로이 통과할 수 있다. 그 외의 모든 크리처와 물체는 통과가 차단된다. 주문과 그 밖의 마법 효과는 반구를 통과해 뻗거나 반구를 통해 시전될 수 없다. 바깥 날씨와 무관하게 내부 공기는 쾌적하고 건조하다.\n\n주문이 끝날 때까지, 내부를 흐릿하게 밝히거나 어둡게 하도록 명령할 수 있다. 반구는 바깥에서는 원하는 색의 불투명한 모습이지만, 안에서는 투명하다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 수정 구슬."},{"name_ko":"로프 속임수","name_en":"Rope Trick","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"Powdered corn extract and a twisted loop of parchment.","higher_level_en":"","desc_en":"You touch a length of rope that is up to 60 feet long. One end of the rope then rises into the air until the whole rope hangs perpendicular to the ground. At the upper end of the rope, an invisible entrance opens to an extradimensional space that lasts until the spell ends.\n\nThe extradimensional space can be reached by climbing to the top of the rope. The space can hold as many as eight Medium or smaller creatures. The rope can be pulled into the space, making the rope disappear from view outside the space.\n\nAttacks and spells can't cross through the entrance into or out of the extradimensional space, but those inside can see out of it as if through a 3-foot-by-5-foot window centered on the rope.\n\nAnything inside the extradimensional space drops out when the spell ends.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"길이 18m(60ft) 이하의 밧줄 하나를 접촉한다. 밧줄의 한쪽 끝이 공중으로 솟아올라 밧줄 전체가 지면과 수직으로 매달린다. 밧줄 위쪽 끝에는 주문이 끝날 때까지 지속되는, 차원 밖 공간으로 통하는 보이지 않는 입구가 열린다.\n\n차원 밖 공간은 밧줄 꼭대기로 올라가 도달할 수 있다. 그 공간은 중형 이하의 크리처를 최대 여덟까지 수용한다. 밧줄을 공간 안으로 끌어당길 수 있으며, 그러면 밧줄이 공간 밖에서 보이지 않게 된다.\n\n공격과 주문은 입구를 통해 차원 밖 공간을 드나들 수 없지만, 안에 있는 이들은 밧줄을 중심으로 한 3피트×5피트 창을 통하는 것처럼 밖을 볼 수 있다.\n\n주문이 끝나면 차원 밖 공간 안의 모든 것이 떨어진다.","higher_level_ko":"","damage_ko":"","material_ko":"옥수수 가루 추출물과 비틀어 고리로 만든 양피지."},{"name_ko":"마력 곤봉","name_en":"Shillelagh","level":0,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 bonus action","duration_en":"1 minute","material_en":"Mistletoe, a shamrock leaf, and a club or quarterstaff.","higher_level_en":"","desc_en":"The wood of a club or a quarterstaff you are holding is imbued with nature's power. For the duration, you can use your spellcasting ability instead of Strength for the attack and damage rolls of melee attacks using that weapon, and the weapon's damage die becomes a d8. The weapon also becomes magical, if it isn't already. The spell ends if you cast it again or if you let go of the weapon.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 추가 행동","duration_ko":"1 분","desc_ko":"들고 있는 곤봉이나 육척봉의 나무에 자연의 힘이 깃든다. 지속시간 동안, 그 무기를 사용한 근접 공격의 명중 굴림과 피해 굴림에 근력 대신 주문시전 능력치를 사용할 수 있으며, 무기의 피해 주사위가 d8이 된다. 무기는 아직 마법적이지 않다면 마법 무기가 된다. 이 주문을 다시 시전하거나 무기를 놓으면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"겨우살이, 클로버 잎, 그리고 곤봉이나 육척봉."},{"name_ko":"마법 갑주","name_en":"Mage Armor","level":1,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"8 hours","material_en":"A piece of cured leather.","higher_level_en":"","desc_en":"You touch a willing creature who isn't wearing armor, and a protective magical force surrounds it until the spell ends. The target's base AC becomes 13 + its Dexterity modifier. The spell ends if the target dons armor or if you dismiss the spell as an action.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"갑옷을 입지 않은 동의하는 크리처를 접촉하면, 주문이 끝날 때까지 보호의 마법 기운이 그를 감싼다. 대상의 기본 방어도(AC)가 13 + 민첩 수정치가 된다. 대상이 갑옷을 입거나 시전자가 행동을 사용해 주문을 해제하면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"무두질한 가죽 조각."},{"name_ko":"마법 무효화","name_en":"Dispel Magic","level":3,"school":"방호계","components":["S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, you automatically end the effects of a spell on the target if the spell's level is equal to or less than the level of the spell slot you used.","desc_en":"Choose one creature, object, or magical effect within range. Any spell of 3rd level or lower on the target ends. For each spell of 4th level or higher on the target, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a successful check, the spell ends.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 크리처, 물체, 또는 마법 효과 하나를 선택한다. 대상에 걸린 3레벨 이하의 주문은 모두 끝난다. 대상에 걸린 4레벨 이상의 각 주문에 대해, 주문시전 능력으로 능력 판정을 굴린다. DC는 10 + 그 주문의 레벨이다. 판정에 성공하면 그 주문이 끝난다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 사용한 주문 슬롯 레벨 이하인 주문의 효과를 대상에게서 자동으로 끝낸다.","damage_ko":"","material_ko":""},{"name_ko":"마법 탐지","name_en":"Detect Magic","level":1,"school":"예지계","components":["V","S"],"ritual":true,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"For the duration, you sense the presence of magic within 30 feet of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any.\n\nThe spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"지속시간 동안, 시전자로부터 9m(30ft) 이내에 있는 마법의 존재를 감지한다. 이렇게 마법을 감지하면, 행동을 사용해 그 구역에서 마법을 지닌 눈에 보이는 크리처나 물체 주위의 희미한 오오라를 볼 수 있으며, 있다면 그 마법 계열도 알아낸다.\n\n이 주문은 대부분의 장벽을 통과하지만, 1피트의 돌, 1인치의 일반 금속, 얇은 납판, 3피트의 나무나 흙에는 차단된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"마법 항아리","name_en":"Magic Jar","level":6,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"Until dispelled","material_en":"A gem, crystal, reliquary, or some other ornamental container worth at least 500 gp.","higher_level_en":"","desc_en":"Your body falls into a catatonic state as your soul leaves it and enters the container you used for the spell's material component. While your soul inhabits the container, you are aware of your surroundings as if you were in the container's space. You can't move or use reactions. The only action you can take is to project your soul up to 100 feet out of the container, either returning to your living body (and ending the spell) or attempting to possess a humanoids body.\n\nYou can attempt to possess any humanoid within 100 feet of you that you can see (creatures warded by a protection from evil and good or magic circle spell can't be possessed). The target must make a charisma saving throw. On a failure, your soul moves into the target's body, and the target's soul becomes trapped in the container. On a success, the target resists your efforts to possess it, and you can't attempt to possess it again for 24 hours.\n\nOnce you possess a creature's body, you control it. Your game statistics are replaced by the statistics of the creature, though you retain your alignment and your Intelligence, Wisdom, and Charisma scores. You retain the benefit of your own class features. If the target has any class levels, you can't use any of its class features.\n\nMeanwhile, the possessed creature's soul can perceive from the container using its own senses, but it can't move or take actions at all.\n\nWhile possessing a body, you can use your action to return from the host body to the container if it is within 100 feet of you, returning the host creature's soul to its body. If the host body dies while you're in it, the creature dies, and you must make a charisma saving throw against your own spellcasting DC. On a success, you return to the container if it is within 100 feet of you. Otherwise, you die.\n\nIf the container is destroyed or the spell ends, your soul immediately returns to your body. If your body is more than 100 feet away from you or if your body is dead when you attempt to return to it, you die. If another creature's soul is in the container when it is destroyed, the creature's soul returns to its body if the body is alive and within 100 feet. Otherwise, that creature dies.\n\nWhen the spell ends, the container is destroyed.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"마법 화살","name_en":"Magic Missile","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the spell creates one more dart for each slot level above 1st.","desc_en":"You create three glowing darts of magical force. Each dart hits a creature of your choice that you can see within range. A dart deals 1d4 + 1 force damage to its target. The darts all strike simultaneously, and you can direct them to hit one creature or several.","damage_en":"3d4 + 3 Force","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"빛나는 마법 역장의 화살 세 발을 만든다. 각 화살은 사거리 내에서 볼 수 있는, 선택한 크리처를 명중시킨다. 한 발당 1d4+1 역장 피해를 준다. 화살은 모두 동시에 명중하며, 한 크리처에게 몰거나 여러 대상에게 나눠 쏠 수 있다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 화살이 하나씩 늘어난다.","damage_ko":"3d4 + 3 역장 피해","material_ko":""},{"name_ko":"마법사의 손","name_en":"Mage Hand","level":0,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"","higher_level_en":"","desc_en":"A spectral, floating hand appears at a point you choose within range. The hand lasts for the duration or until you dismiss it as an action. The hand vanishes if it is ever more than 30 feet away from you or if you cast this spell again.\n\nYou can use your action to control the hand. You can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a vial. You can move the hand up to 30 feet each time you use it.\n\nThe hand can't attack, activate magic items, or carry more than 10 pounds.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"사거리 내에서 선택한 지점에 유령 같은 떠다니는 손이 나타난다. 이 손은 지속시간 동안, 또는 행동을 사용해 해제할 때까지 유지된다. 손이 시전자로부터 9m(30ft)보다 멀어지거나 이 주문을 다시 시전하면 사라진다.\n\n행동을 사용해 손을 조종할 수 있다. 손으로 물체를 다루거나, 잠기지 않은 문이나 용기를 열거나, 열린 용기에서 물건을 넣거나 꺼내거나, 병의 내용물을 따를 수 있다. 손은 사용할 때마다 최대 9m(30ft) 이동할 수 있다.\n\n손은 공격하거나, 마법 물품을 작동시키거나, 10파운드 넘게 들 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"마법의 원","name_en":"Magic Circle","level":3,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 minute","duration_en":"1 hour","material_en":"Holy water or powdered silver and iron worth at least 100 gp, which the spell consumes.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the duration increases by 1 hour for each slot level above 3rd.","desc_en":"You create a 10-foot radius, 20-foot-tall cylinder of magical energy centered on a point on the ground that you can see within range. Glowing runes appear whenever the cylinder intersects with the floor or other surface.\n\nChoose one or more of the following types of creatures: celestials, elementals, fey, fiends, or undead. The circle affects a creature of the chosen type in the following ways:\n\n- The creature can't willingly enter the cylinder by nonmagical means. If the creature tries to use teleportation or interplanar travel to do so, it must first succeed on a charisma saving throw.\n\n- The creature has disadvantage on attack rolls against targets within the cylinder.\n\n- Targets within the cylinder can't be charmed, frightened, or possessed by the creature.\n\nWhen you cast this spell, you can elect to cause its magic to operate in the reverse direction, preventing a creature of the specified type from leaving the cylinder and protecting targets outside it.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 분","duration_ko":"1 시간","desc_ko":"사거리 내에서 볼 수 있는 지면의 한 지점을 중심으로, 반경 3m(10ft), 높이 6m(20ft)의 마법 에너지 원기둥을 만든다. 원기둥이 바닥이나 다른 표면과 만나는 곳마다 빛나는 룬이 나타난다.\n\n다음 크리처 유형 중 하나 이상을 선택한다. 천상체, 정령, 요정, 악마, 언데드. 원은 선택한 유형의 크리처에게 다음과 같이 작용한다.\n\n- 그 크리처는 비마법적 수단으로 원기둥에 자발적으로 들어올 수 없다. 순간이동이나 이계 이동을 써서 들어오려면, 먼저 매력 내성 굴림에 성공해야 한다.\n\n- 그 크리처는 원기둥 안의 대상을 상대로 한 명중 굴림에 불리 보정을 받는다.\n\n- 원기둥 안의 대상은 그 크리처에게 매혹, 공포, 빙의당하지 않는다.\n\n주문을 시전할 때, 마법이 반대 방향으로 작동하게 하여, 지정한 유형의 크리처가 원기둥을 떠나지 못하게 막고 바깥의 대상을 보호할 수도 있다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 지속시간이 1시간씩 증가한다.","damage_ko":"","material_ko":"이 주문이 소모하는 100gp 이상 가치의 성수 또는 은과 철 가루."},{"name_ko":"마법의 입","name_en":"Magic Mouth","level":2,"school":"환영계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 minute","duration_en":"Until dispelled","material_en":"A honeycomb and jade dust of at least 10 inches, the spell consumes.","higher_level_en":"","desc_en":"You plant a message to an object in the range of the spell. The message is verbalized when the trigger conditions are met. Choose an object that you see, and that is not worn or carried by another creature. Then say the message, which should not exceed 25 words but listening can take up to 10 minutes. Finally, establish the circumstances that trigger the spell to deliver your message.\n\nWhen these conditions are satisfied, a magical mouth appears on the object and it articulates the message imitating your voice, the same tone used during implantation of the message. If the selected object has a mouth or something that approaches such as the mouth of a statue, the magic mouth come alive at this point, giving the illusion that the words come from the mouth of the object.\n\nWhen you cast this spell, you may decide that the spell ends when the message is delivered or it can persist and repeat the message whenever circumstances occur.\n\nThe triggering circumstance can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the object. For example, you could instruct the mouth to speak when any creature moves within 30 feet of the object or when a silver bell rings within 30 feet of it.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 분","duration_ko":"무효화될 때까지","desc_ko":"주문 사거리 내의 물체에 전언을 심는다. 이 전언은 유발 조건이 충족되면 소리 내어 말해진다. 시전자가 볼 수 있고, 다른 크리처가 착용하거나 소지하지 않은 물체 하나를 선택한다. 그런 다음 전언을 말하는데, 스물다섯 단어를 넘지 않아야 하나 듣는 데는 최대 10분까지 걸릴 수 있다. 끝으로, 주문이 전언을 전하도록 유발하는 상황을 정한다.\n\n이 조건이 충족되면, 물체에 마법의 입이 나타나 심을 때 사용한 것과 같은 어조로 시전자의 목소리를 흉내내 전언을 말한다. 선택한 물체에 입이 있거나 조각상의 입처럼 입에 가까운 것이 있으면, 그 지점에서 마법의 입이 살아나 물체의 입에서 말이 나오는 듯한 착각을 준다.\n\n이 주문을 시전할 때, 전언이 전달되면 주문이 끝나도록 정하거나, 지속되며 상황이 발생할 때마다 전언을 반복하게 할 수 있다.\n\n유발 상황은 원하는 만큼 일반적이거나 상세할 수 있으나, 물체로부터 9m(30ft) 이내에서 일어나는 시각적 또는 청각적 조건에 근거해야 한다. 예를 들어 어떤 크리처든 물체의 9m(30ft) 이내로 이동할 때, 또는 물체의 9m(30ft) 이내에서 은종이 울릴 때 입이 말하도록 지시할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 벌집과 10인치 이상의 옥 가루."},{"name_ko":"맹목의 강타","name_en":"Blinding Smite","level":3,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"멜프의 산성 화살","name_en":"Melf's Acid Arrow","level":2,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Powdered rhubarb leaf and an adder's stomach.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the damage (both initial and later) increases by 1d4 for each slot level above 2nd.","desc_en":"A shimmering green arrow streaks toward a target within range and bursts in a spray of acid. Make a ranged spell attack against the target. On a hit, the target takes 4d4 acid damage immediately and 2d4 acid damage at the end of its next turn. On a miss, the arrow splashes the target with acid for half as much of the initial damage and no damage at the end of its next turn.","damage_en":"4d4 Acid","attack_type":"ranged","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"반짝이는 초록 화살이 사거리 내 대상을 향해 뻗어나가 산성 물보라로 터진다. 대상에게 원거리 주문 공격을 굴린다. 명중 시 대상은 즉시 4d4 산성 피해를 받고, 다음 턴이 끝날 때 2d4 산성 피해를 받는다. 빗나가면 화살이 대상에게 초기 피해의 절반을 튀기고, 다음 턴 끝의 피해는 없다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 피해(초기와 이후 모두)가 1d4씩 증가한다.","damage_ko":"4d4 산성 피해","material_ko":"대황 잎 가루와 살무사의 위장."},{"name_ko":"명령","name_en":"Command","level":1,"school":"환혹계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"1 round","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you can affect one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them.","desc_en":"You speak a one-word command to a creature you can see within range. The target must succeed on a wisdom saving throw or follow the command on its next turn. The spell has no effect if the target is undead, if it doesn't understand your language, or if your command is directly harmful to it.\n\nSome typical commands and their effects follow. You might issue a command other than one described here. If you do so, the GM determines how the target behaves. If the target can't follow your command, the spell ends.\n\n***Approach.*** The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you.\n\n***Drop.*** The target drops whatever it is holding and then ends its turn.\n\n***Flee.*** The target spends its turn moving away from you by the fastest available means.\n\n***Grovel.*** The target falls prone and then ends its turn.\n\n***Halt.*** The target doesn't move and takes no actions. A flying creature stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"1 라운드","desc_ko":"사거리 내에서 볼 수 있는 크리처에게 한 단어의 명령을 내린다. 대상은 지혜 내성 굴림에 성공하지 못하면 다음 턴에 그 명령을 따라야 한다. 대상이 언데드이거나, 시전자의 언어를 이해하지 못하거나, 명령이 대상에게 직접적으로 해로운 경우에는 효과가 없다.\n\n대표적인 명령과 그 효과는 다음과 같다. 여기 설명된 것 외의 명령을 내릴 수도 있으며, 그럴 경우 대상이 어떻게 행동할지는 DM이 결정한다. 대상이 명령을 따를 수 없으면 주문이 끝난다.\n\n***접근.*** 대상은 가장 짧고 직접적인 경로로 시전자에게 다가오며, 시전자의 1.5m(5ft) 이내로 들어오면 턴을 마친다.\n\n***내려놓기.*** 대상은 들고 있던 것을 내려놓고 턴을 마친다.\n\n***도주.*** 대상은 가능한 가장 빠른 수단으로 시전자에게서 멀어지며 턴을 보낸다.\n\n***굴복.*** 대상은 넘어진 뒤 턴을 마친다.\n\n***정지.*** 대상은 이동하지 않고 어떤 행동도 하지 않는다. 비행 중인 크리처는 가능하다면 공중에 머무른다. 공중에 머물기 위해 이동해야 한다면, 공중에 남기 위한 최소 거리만 비행한다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다. 대상으로 삼을 때 크리처들은 서로 9m(30ft) 이내에 있어야 한다.","damage_ko":"","material_ko":""},{"name_ko":"모덴카이넨의 개인 성소","name_en":"Mordenkainen's Private Sanctum","level":4,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"10 minutes","duration_en":"24 hours","material_en":"A thin sheet of lead, a piece of opaque glass, a wad of cotton or cloth, and powdered chrysolite.","higher_level_en":"When you cast this spell using a spell slot of 5th level or higher, you can increase the size of the cube by 100 feet for each slot level beyond 4th. Thus you could protect a cube that can be up to 200 feet on one side by using a spell slot of 5th level.","desc_en":"You make an area within range magically secure. The area is a cube that can be as small as 5 feet to as large as 100 feet on each side. The spell lasts for the duration or until you use an action to dismiss it.\n\nWhen you cast the spell, you decide what sort of security the spell provides, choosing any or all of the following properties:\n\n- Sound can't pass through the barrier at the edge of the warded area.\n\n- The barrier of the warded area appears dark and foggy, preventing vision (including darkvision) through it.\n\n- Sensors created by divination spells can't appear inside the protected area or pass through the barrier at its perimeter.\n\n- Creatures in the area can't be targeted by divination spells.\n\n- Nothing can teleport into or out of the warded area.\n\n- Planar travel is blocked within the warded area.\n\nCasting this spell on the same spot every day for a year makes this effect permanent.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"10 분","duration_ko":"24 시간","desc_ko":"사거리 내의 한 구역을 마법으로 안전하게 만든다. 그 구역은 각 변이 최소 1.5m(5ft)에서 최대 30m(100ft)에 이르는 정육면체다. 주문은 지속시간 동안, 또는 행동을 사용해 해제할 때까지 지속된다.\n\n주문을 시전할 때, 주문이 제공할 보안의 종류를 정하며, 다음 속성 중 하나 이상을 선택한다.\n\n- 결계 구역 가장자리의 장벽을 소리가 통과할 수 없다.\n\n- 결계 구역의 장벽이 어둡고 안개 낀 것처럼 보여, 그것을 통한 시야(암시야 포함)를 막는다.\n\n- 예지 주문으로 만든 감지기가 보호 구역 안에 나타나거나 그 경계의 장벽을 통과할 수 없다.\n\n- 구역 안의 크리처는 예지 주문의 대상이 될 수 없다.\n\n- 어떤 것도 결계 구역 안팎으로 순간이동할 수 없다.\n\n- 결계 구역 안에서는 존재계 이동이 차단된다.\n\n1년 동안 매일 같은 자리에 이 주문을 시전하면 이 효과가 영구적이 된다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 정육면체의 크기를 30m(100ft)씩 키울 수 있다. 따라서 5레벨 주문 슬롯을 쓰면 한 변이 최대 60m(200ft)인 정육면체를 보호할 수 있다.","damage_ko":"","material_ko":"얇은 납판, 불투명한 유리 조각, 솜이나 천 뭉치, 감람석 가루."},{"name_ko":"모덴카이넨의 검","name_en":"Mordenkainen's Sword","level":7,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"모덴카이넨의 장엄한 저택","name_en":"Mordenkainen's Magnificent Mansion","level":7,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"300 feet","casting_time_en":"1 minute","duration_en":"24 hours","material_en":"A miniature portal carved from ivory, a small piece of polished marble, and a tiny silver spoon, each item worth at least 5 gp.","higher_level_en":"","desc_en":"You conjure an extradimensional dwelling in range that lasts for the duration. You choose where its one entrance is located. The entrance shimmers faintly and is 5 feet wide and 10 feet tall. You and any creature you designate when you cast the spell can enter the extradimensional dwelling as long as the portal remains open. You can open or close the portal if you are within 30 feet of it. While closed, the portal is invisible.\n\nBeyond the portal is a magnificent foyer with numerous chambers beyond. The atmosphere is clean, fresh, and warm.\n\nYou can create any floor plan you like, but the space can't exceed 50 cubes, each cube being 10 feet on each side. The place is furnished and decorated as you choose. It contains sufficient food to serve a nine course banquet for up to 100 people. A staff of 100 near-transparent servants attends all who enter. You decide the visual appearance of these servants and their attire. They are completely obedient to your orders. Each servant can perform any task a normal human servant could perform, but they can't attack or take any action that would directly harm another creature. Thus the servants can fetch things, clean, mend, fold clothes, light fires, serve food, pour wine, and so on. The servants can go anywhere in the mansion but can't leave it. Furnishings and other objects created by this spell dissipate into smoke if removed from the mansion. When the spell ends, any creatures inside the extradimensional space are expelled into the open spaces nearest to the entrance.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"모덴카이넨의 충실한 사냥개","name_en":"Mordenkainen's Faithful Hound","level":4,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"8 hours","material_en":"A tiny silver whistle, a piece of bone, and a thread","higher_level_en":"","desc_en":"You conjure a phantom watchdog in an unoccupied space that you can see within range, where it remains for the duration, until you dismiss it as an action, or until you move more than 100 feet away from it.\n\nThe hound is invisible to all creatures except you and can't be harmed. When a Small or larger creature comes within 30 feet of it without first speaking the password that you specify when you cast this spell, the hound starts barking loudly. The hound sees invisible creatures and can see into the Ethereal Plane. It ignores illusions.\n\nAt the start of each of your turns, the hound attempts to bite one creature within 5 feet of it that is hostile to you. The hound's attack bonus is equal to your spellcasting ability modifier + your proficiency bonus. On a hit, it deals 4d8 piercing damage.","damage_en":"4d8 Piercing","attack_type":"melee","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"사거리 내에서 볼 수 있는 빈 공간에 유령 같은 감시견을 소환한다. 감시견은 지속시간 동안, 시전자가 행동을 사용해 해제하거나 시전자가 30m(100ft) 넘게 멀어질 때까지 그곳에 머무른다.\n\n감시견은 시전자를 제외한 모든 크리처에게 보이지 않으며 해칠 수 없다. 소형 이상의 크리처가 시전 시 지정한 암호를 먼저 말하지 않고 감시견의 9m(30ft) 이내로 들어오면, 감시견이 크게 짖기 시작한다. 감시견은 투명한 크리처를 보고 영계를 꿰뚫어 볼 수 있으며, 환영을 무시한다.\n\n매 턴이 시작될 때, 감시견은 자신의 1.5m(5ft) 이내에 있는, 시전자에게 적대적인 크리처 하나를 물려 시도한다. 감시견의 명중 보너스는 시전자의 주문시전 능력 수정치 + 숙련 보너스와 같다. 명중 시 4d8 관통 피해를 준다.","higher_level_ko":"","damage_ko":"4d8 관통 피해","material_ko":"작은 은호루라기, 뼈 조각, 실."},{"name_ko":"몽환","name_en":"Dream","level":5,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Special","casting_time_en":"1 minute","duration_en":"8 hours","material_en":"A handful of sand, a dab of ink, and a writing quill plucked from a sleeping bird.","higher_level_en":"","desc_en":"This spell shapes a creature's dreams. Choose a creature known to you as the target of this spell. The target must be on the same plane of existence as you. Creatures that don't sleep, such as elves, can't be contacted by this spell. You, or a willing creature you touch, enters a trance state, acting as a messenger.\n\nWhile in the trance, the messenger is aware of his or her surroundings, but can't take actions or move.\n\nIf the target is asleep, the messenger appears in the target's dreams and can converse with the target as long as it remains asleep, through the duration of the spell. The messenger can also shape the environment of the dream, creating landscapes, objects, and other images. The messenger can emerge from the trance at any time, ending the effect of the spell early. The target recalls the dream perfectly upon waking. If the target is awake when you cast the spell, the messenger knows it, and can either end the trance (and the spell) or wait for the target to fall asleep, at which point the messenger appears in the target's dreams.\n\nYou can make the messenger appear monstrous and terrifying to the target. If you do, the messenger can deliver a message of no more than ten words and then the target must make a wisdom saving throw. On a failed save, echoes of the phantasmal monstrosity spawn a nightmare that lasts the duration of the target's sleep and prevents the target from gaining any benefit from that rest. In addition, when the target wakes up, it takes 3d6 psychic damage.\n\nIf you have a body part, lock of hair, clipping from a nail, or similar portion of the target's body, the target makes its saving throw with disadvantage.","damage_en":"3d6 Psychic","attack_type":"","range_ko":"특수","casting_time_ko":"1 분","duration_ko":"8 시간","desc_ko":"이 주문은 크리처의 꿈을 빚는다. 시전자에게 알려진 크리처 하나를 이 주문의 대상으로 선택한다. 대상은 시전자와 같은 존재계에 있어야 한다. 엘프처럼 잠들지 않는 크리처는 이 주문으로 접촉할 수 없다. 시전자, 또는 접촉한 동의하는 크리처가 무아지경에 들어가 전달자 역할을 한다.\n\n무아지경에 든 동안, 전달자는 주변을 인지하지만 행동하거나 이동할 수 없다.\n\n대상이 잠들어 있으면, 전달자는 대상의 꿈에 나타나, 주문의 지속시간 동안 대상이 잠들어 있는 한 대상과 대화할 수 있다. 전달자는 또한 꿈의 환경을 빚어 풍경, 물체, 그 밖의 이미지를 만들 수 있다. 전달자는 언제든 무아지경에서 나와 주문의 효과를 일찍 끝낼 수 있다. 대상은 깨어날 때 꿈을 완벽하게 기억한다. 주문을 시전할 때 대상이 깨어 있으면, 전달자가 이를 알고, 무아지경(과 주문)을 끝내거나 대상이 잠들 때까지 기다릴 수 있으며, 그때 전달자가 대상의 꿈에 나타난다.\n\n전달자를 대상에게 흉측하고 무섭게 보이게 할 수 있다. 그렇게 하면 전달자는 열 단어 이하의 전언을 전할 수 있고, 그 뒤 대상은 지혜 내성 굴림을 굴려야 한다. 실패 시 환영 괴물의 잔향이 악몽을 일으켜, 대상이 자는 동안 지속되며 그 휴식에서 어떤 이득도 얻지 못하게 한다. 또한 대상은 깨어날 때 3d6 정신 피해를 받는다.\n\n대상의 신체 일부, 머리카락 한 줌, 잘라낸 손톱, 또는 비슷한 신체 부위를 가지고 있으면, 대상은 내성 굴림에 불리 보정을 받는다.","higher_level_ko":"","damage_ko":"3d6 정신 피해","material_ko":"모래 한 줌, 잉크 약간, 잠든 새에게서 뽑은 깃펜."},{"name_ko":"무기 마법화","name_en":"Magic Weapon","level":2,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 bonus action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the bonus increases to +2. When you use a spell slot of 6th level or higher, the bonus increases to +3.","desc_en":"You touch a nonmagical weapon. Until the spell ends, that weapon becomes a magic weapon with a +1 bonus to attack rolls and damage rolls.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 추가 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"비마법 무기 하나를 접촉한다. 주문이 끝날 때까지 그 무기는 명중 굴림과 피해 굴림에 +1 보너스를 받는 마법 무기가 된다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면 보너스가 +2로 증가한다. 6레벨 이상의 주문 슬롯을 사용하면 보너스가 +3으로 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"무기 원소화","name_en":"Elemental Weapon","level":3,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"무력화 광선","name_en":"Ray of Enfeeblement","level":2,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"A black beam of enervating energy springs from your finger toward a creature within range. Make a ranged spell attack against the target. On a hit, the target deals only half damage with weapon attacks that use Strength until the spell ends.\n\nAt the end of each of the target's turns, it can make a constitution saving throw against the spell. On a success, the spell ends.","damage_en":"","attack_type":"ranged","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"검은 쇠약의 에너지 광선이 손가락에서 사거리 내 크리처를 향해 뻗어나간다. 대상에게 원거리 주문 공격을 굴린다. 명중 시 주문이 끝날 때까지 대상은 근력을 쓰는 무기 공격으로 절반의 피해만 준다.\n\n대상은 자기 턴이 끝날 때마다 이 주문에 맞서는 건강 내성 굴림을 굴릴 수 있다. 성공 시 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"무심화","name_en":"Mind Blank","level":8,"school":"방호계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"24 hours","material_en":"","higher_level_en":"","desc_en":"Until the spell ends, one willing creature you touch is immune to psychic damage, any effect that would sense its emotions or read its thoughts, divination spells, and the charmed condition. The spell even foils wish spells and spells or effects of similar power used to affect the target's mind or to gain information about the target.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"무적의 구체","name_en":"Globe of Invulnerability","level":6,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A glass or crystal bead that shatters when the spell ends.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the barrier blocks spells of one level higher for each slot level above 6th.","desc_en":"An immobile, faintly shimmering barrier springs into existence in a 10-foot radius around you and remains for the duration.\n\nAny spell of 5th level or lower cast from outside the barrier can't affect creatures or objects within it, even if the spell is cast using a higher level spell slot. Such a spell can target creatures and objects within the barrier, but the spell has no effect on them. Similarly, the area within the barrier is excluded from the areas affected by such spells.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"무지개 벽","name_en":"Prismatic Wall","level":9,"school":"방호계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"","higher_level_en":"","desc_en":"A shimmering, multicolored plane of light forms a vertical opaque wall--up to 90 feet long, 30 feet high, and 1 inch thick--centered on a point you can see within range. Alternatively, you can shape the wall into a sphere up to 30 feet in diameter centered on a point you choose within range. The wall remains in place for the duration. If you position the wall so that it passes through a space occupied by a creature, the spell fails, and your action and the spell slot are wasted.\n\nThe wall sheds bright light out to a range of 100 feet and dim light for an additional 100 feet. You and creatures you designate at the time you cast the spell can pass through and remain near the wall without harm. If another creature that can see the wall moves to within 20 feet of it or starts its turn there, the creature must succeed on a constitution saving throw or become blinded for 1 minute.\n\nThe wall consists of seven layers, each with a different color. When a creature attempts to reach into or pass through the wall, it does so one layer at a time through all the wall's layers. As it passes or reaches through each layer, the creature must make a dexterity saving throw or be affected by that layer's properties as described below.\n\nThe wall can be destroyed, also one layer at a time, in order from red to violet, by means specific to each layer. Once a layer is destroyed, it remains so for the duration of the spell. A rod of cancellation destroys a prismatic wall, but an antimagic field has no effect on it.\n\n***1. Red.*** The creature takes 10d6 fire damage on a failed save, or half as much damage on a successful one. While this layer is in place, nonmagical ranged attacks can't pass through the wall. The layer can be destroyed by dealing at least 25 cold damage to it.\n\n***2. Orange.*** The creature takes 10d6 acid damage on a failed save, or half as much damage on a successful one. While this layer is in place, magical ranged attacks can't pass through the wall. The layer is destroyed by a strong wind.\n\n***3. Yellow.*** The creature takes 10d6 lightning damage on a failed save, or half as much damage on a successful one. This layer can be destroyed by dealing at least 60 force damage to it.\n\n***4. Green.*** The creature takes 10d6 poison damage on a failed save, or half as much damage on a successful one. A passwall spell, or another spell of equal or greater level that can open a portal on a solid surface, destroys this layer.\n\n***5. Blue.*** The creature takes 10d6 cold damage on a failed save, or half as much damage on a successful one. This layer can be destroyed by dealing at least 25 fire damage to it.\n\n***6. Indigo.*** On a failed save, the creature is restrained. It must then make a constitution saving throw at the end of each of its turns. If it successfully saves three times, the spell ends. If it fails its save three times, it permanently turns to stone and is subjected to the petrified condition. The successes and failures don't need to be consecutive; keep track of both until the creature collects three of a kind.\n\nWhile this layer is in place, spells can't be cast through the wall. The layer is destroyed by bright light shed by a daylight spell or a similar spell of equal or higher level.\n\n***7. Violet.*** On a failed save, the creature is blinded. It must then make a wisdom saving throw at the start of your next turn. A successful save ends the blindness. If it fails that save, the creature is transported to another plane of the GM's choosing and is no longer blinded. (Typically, a creature that is on a plane that isn't its home plane is banished home, while other creatures are usually cast into the Astral or Ethereal planes.) This layer is destroyed by a dispel magic spell or a similar spell of equal or higher level that can end spells and magical effects.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"무지개 분사","name_en":"Prismatic Spray","level":7,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Eight multicolored rays of light flash from your hand. Each ray is a different color and has a different power and purpose. Each creature in a 60-foot cone must make a dexterity saving throw. For each target, roll a d8 to determine which color ray affects it.\n\n***1. Red.*** The target takes 10d6 fire damage on a failed save, or half as much damage on a successful one.\n\n***2. Orange.*** The target takes 10d6 acid damage on a failed save, or half as much damage on a successful one.\n\n***3. Yellow.*** The target takes 10d6 lightning damage on a failed save, or half as much damage on a successful one.\n\n***4. Green.*** The target takes 10d6 poison damage on a failed save, or half as much damage on a successful one.\n\n***5. Blue.*** The target takes 10d6 cold damage on a failed save, or half as much damage on a successful one.\n\n***6. Indigo.*** On a failed save, the target is restrained. It must then make a constitution saving throw at the end of each of its turns. If it successfully saves three times, the spell ends. If it fails its save three times, it permanently turns to stone and is subjected to the petrified condition. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind.\n\n***7. Violet.*** On a failed save, the target is blinded. It must then make a wisdom saving throw at the start of your next turn. A successful save ends the blindness. If it fails that save, the creature is transported to another plane of existence of the GM's choosing and is no longer blinded. (Typically, a creature that is on a plane that isn't its home plane is banished home, while other creatures are usually cast into the Astral or Ethereal planes.)\n\n***8. Special.*** The target is struck by two rays. Roll twice more, rerolling any 8.","damage_en":"10d6","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"10d6","material_ko":""},{"name_ko":"문양","name_en":"Symbol","level":7,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"Until dispelled","material_en":"Mercury, phosphorus, and powdered diamond and opal with a total value of at least 1,000 gp, which the spell consumes.","higher_level_en":"","desc_en":"When you cast this spell, you inscribe a harmful glyph either on a surface (such as a section of floor, a wall, or a table) or within an object that can be closed to conceal the glyph (such as a book, a scroll, or a treasure chest). If you choose a surface, the glyph can cover an area of the surface no larger than 10 feet in diameter. If you choose an object, that object must remain in its place; if the object is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered.\n\nThe glyph is nearly invisible, requiring an Intelligence (Investigation) check against your spell save DC to find it.\n\nYou decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, the most typical triggers include touching or stepping on the glyph, removing another object covering it, approaching within a certain distance of it, or manipulating the object that holds it. For glyphs inscribed within an object, the most common triggers are opening the object, approaching within a certain distance of it, or seeing or reading the glyph.\n\nYou can further refine the trigger so the spell is activated only under certain circumstances or according to a creature's physical characteristics (such as height or weight), or physical kind (for example, the ward could be set to affect hags or shapechangers). You can also specify creatures that don't trigger the glyph, such as those who say a certain password.\n\nWhen you inscribe the glyph, choose one of the options below for its effect. Once triggered, the glyph glows, filling a 60-foot-radius sphere with dim light for 10 minutes, after which time the spell ends. Each creature in the sphere when the glyph activates is targeted by its effect, as is a creature that enters the sphere for the first time on a turn or ends its turn there.\n\n***Death.*** Each target must make a constitution saving throw, taking 10d 10 necrotic damage on a failed save, or half a
