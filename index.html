cast the spell. Your familiar must be within 100 feet of you, and it must use its reaction to deliver the spell when you cast it. If the spell requires an attack roll, you use your action modifier for the roll.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 시간","duration_ko":"즉시","desc_ko":"패밀리어의 봉사를 얻는다. 패밀리어는 시전자가 선택한 동물 형태를 취하는 정령이다. 박쥐, 고양이, 게, 개구리(두꺼비), 매, 도마뱀, 문어, 올빼미, 독사, 물고기(쿼퍼), 쥐, 까마귀, 해마, 거미, 족제비 중에서 고른다. 사거리 내 빈 공간에 나타나며, 패밀리어는 선택한 형태의 능력치를 지니되 야수가 아니라 천상체, 요정, 또는 악마(시전자 선택)다.\n\n패밀리어는 시전자와 독립적으로 행동하지만, 항상 시전자의 명령에 따른다. 전투에서는 자신의 우선권을 굴리고 자기 턴에 행동한다. 패밀리어는 공격할 수 없지만, 그 외의 행동은 정상적으로 취할 수 있다.\n\n패밀리어의 히트 포인트가 0이 되면, 물리적 형체를 남기지 않고 사라진다. 이 주문을 다시 시전하면 다시 나타난다.\n\n패밀리어가 시전자로부터 30m(100ft) 이내에 있는 동안, 텔레파시로 소통할 수 있다. 또한 행동을 사용해, 다음 턴이 시작될 때까지 패밀리어의 눈으로 보고 그것이 듣는 것을 들을 수 있으며, 패밀리어가 가진 특수 감각의 이점을 얻는다. 이 동안 시전자는 자신의 감각에 관해서는 귀머거리이자 실명 상태가 된다.\n\n행동을 사용해 패밀리어를 일시적으로 해제할 수 있다. 패밀리어는 시전자의 부름을 기다리는 주머니 차원으로 사라진다. 또는 영원히 해제할 수도 있다. 일시적으로 해제된 동안 행동을 사용해, 시전자의 9m(30ft) 이내 빈 공간에 다시 나타나게 할 수 있다.\n\n한 번에 패밀리어를 둘 이상 가질 수 없다. 이미 패밀리어가 있는 상태에서 이 주문을 시전하면, 대신 패밀리어가 새 형태를 취하게 한다. 위 목록에서 형태 하나를 고르면, 패밀리어가 선택한 크리처로 변한다.\n\n끝으로, 사거리가 접촉인 주문을 시전할 때, 패밀리어가 마치 자신이 그 주문을 시전한 것처럼 전달할 수 있다. 패밀리어는 시전자의 30m(100ft) 이내에 있어야 하며, 시전자가 주문을 시전할 때 반응행동을 사용해 전달해야 한다. 주문에 명중 굴림이 필요하면 시전자의 수정치를 사용한다.","higher_level_ko":"","damage_ko":"","material_ko":"놋쇠 화로에서 불로 태워야 하는 10gp 가치의 숯, 향, 약초."},{"name_ko":"포격 소환","name_en":"Conjure Volley","level":5,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"포획의 일격","name_en":"Ensnaring Strike","level":1,"school":"조형계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"폭발성 구름","name_en":"Incendiary Cloud","level":8,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"A swirling cloud of smoke shot through with white-hot embers appears in a 20-foot-radius sphere centered on a point within range. The cloud spreads around corners and is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it.\n\nWhen the cloud appears, each creature in it must make a dexterity saving throw. A creature takes 10d8 fire damage on a failed save, or half as much damage on a successful one. A creature must also make this saving throw when it enters the spell's area for the first time on a turn or ends its turn there.\n\nThe cloud moves 10 feet directly away from you in a direction that you choose at the start of each of your turns.","damage_en":"10d8 Fire","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"10d8 화염 피해","material_ko":""},{"name_ko":"하급 원소 소환","name_en":"Conjure Minor Elementals","level":4,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 minute","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using certain higher-level spell slots, you choose one of the summoning options above, and more creatures appear: twice as many with a 6th-level slot and three times as many with an 8th-level slot.","desc_en":"You summon elementals that appear in unoccupied spaces that you can see within range. You choose one the following options for what appears:\n\n- One elemental of challenge rating 2 or lower\n\n- Two elementals of challenge rating 1 or lower\n\n- Four elementals of challenge rating 1/2 or lower\n\n- Eight elementals of challenge rating 1/4 or lower.\n\nAn elemental summoned by this spell disappears when it drops to 0 hit points or when the spell ends.\n\nThe summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which has its own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions.\n\nThe GM has the creatures' statistics.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 분","duration_ko":"정신집중, 최대 1시간","desc_ko":"사거리 내에서 볼 수 있는 빈 공간에 나타나는 정령을 소환한다. 나타날 것으로 다음 선택지 중 하나를 고른다.\n\n- 도전 지수 2 이하의 정령 하나\n\n- 도전 지수 1 이하의 정령 둘\n\n- 도전 지수 1/2 이하의 정령 넷\n\n- 도전 지수 1/4 이하의 정령 여덟\n\n이 주문으로 소환된 정령은 히트 포인트가 0이 되거나 주문이 끝나면 사라진다.\n\n소환된 크리처는 시전자와 동료에게 우호적이다. 소환된 크리처들의 우선권은 한 무리로 굴리며, 자기들만의 턴을 갖는다. 시전자가 내리는 음성 명령을 따른다(시전자의 행동은 필요 없다). 명령을 내리지 않으면, 적대적인 크리처로부터 스스로를 방어할 뿐 그 외의 행동은 하지 않는다.\n\n크리처들의 능력치는 DM이 갖는다.","higher_level_ko":"특정 고레벨 주문 슬롯으로 시전하면, 위 소환 선택지 중 하나를 고르고 더 많은 크리처가 나타난다. 6레벨 슬롯은 두 배, 8레벨 슬롯은 세 배다.","damage_ko":"","material_ko":""},{"name_ko":"하급 환영","name_en":"Minor Illusion","level":0,"school":"환영계","components":["S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"A bit of fleece.","higher_level_en":"","desc_en":"You create a sound or an image of an object within range that lasts for the duration. The illusion also ends if you dismiss it as an action or cast this spell again.\n\nIf you create a sound, its volume can range from a whisper to a scream. It can be your voice, someone else's voice, a lion's roar, a beating of drums, or any other sound you choose. The sound continues unabated throughout the duration, or you can make discrete sounds at different times before the spell ends.\n\nIf you create an image of an object--such as a chair, muddy footprints, or a small chest--it must be no larger than a 5-foot cube. The image can't create sound, light, smell, or any other sensory effect. Physical interaction with the image reveals it to be an illusion, because things can pass through it.\n\nIf a creature uses its action to examine the sound or image, the creature can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the illusion becomes faint to the creature.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"사거리 내에 소리 또는 물체의 이미지를 만들어 지속시간 동안 유지한다. 행동을 사용해 해제하거나 이 주문을 다시 시전해도 환영이 끝난다.\n\n소리를 만들 경우, 그 크기는 속삭임에서 비명까지 가능하다. 시전자의 목소리, 다른 이의 목소리, 사자의 포효, 북소리 등 원하는 어떤 소리든 될 수 있다. 소리는 지속시간 내내 끊이지 않고 이어지게 하거나, 주문이 끝나기 전 서로 다른 시점에 개별적인 소리를 낼 수도 있다.\n\n의자, 진흙 발자국, 작은 상자 같은 물체의 이미지를 만들 경우, 그 크기는 1.5m(5ft) 정육면체를 넘지 않아야 한다. 이 이미지는 소리, 빛, 냄새 등 다른 감각 효과를 만들 수 없다. 이미지와 물리적으로 접촉하면 물체가 통과되므로 환영임이 드러난다.\n\n크리처가 행동을 사용해 소리나 이미지를 조사하면, 주문 내성 DC에 대한 지능(수사) 판정에 성공하여 그것이 환영임을 알아낼 수 있다. 크리처가 환영의 정체를 간파하면, 그 크리처에게 환영은 희미해진다.","higher_level_ko":"","damage_ko":"","material_ko":"양털 조각."},{"name_ko":"하급 회복","name_en":"Lesser Restoration","level":2,"school":"방호계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You touch a creature and can end either one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"크리처 하나를 접촉해, 그를 괴롭히는 질병 하나 또는 상태 하나를 끝낼 수 있다. 상태는 실명, 귀머거리, 마비, 중독 중 하나일 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"하다르의 굶주림","name_en":"Hunger of Hadar","level":3,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"하다르의 팔","name_en":"Arms of Hadar","level":1,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"함정 탐지","name_en":"Find Traps","level":2,"school":"예지계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You sense the presence of any trap within range that is within line of sight. A trap, for the purpose of this spell, includes anything that would inflict a sudden or unexpected effect you consider harmful or undesirable, which was specifically intended as such by its creator. Thus, the spell would sense an area affected by the alarm spell, a glyph of warding, or a mechanical pit trap, but it would not reveal a natural weakness in the floor, an unstable ceiling, or a hidden sinkhole.\n\nThis spell merely reveals that a trap is present. You don't learn the location of each trap, but you do learn the general nature of the danger posed by a trap you sense.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 시야에 들어오는 모든 함정의 존재를 감지한다. 이 주문에서 함정이란, 제작자가 의도적으로 그렇게 만든, 해롭거나 바람직하지 않다고 여겨질 갑작스럽거나 예상치 못한 효과를 일으키는 모든 것을 말한다. 따라서 이 주문은 경보 주문이 걸린 구역, 방호 문양, 기계식 함정 구덩이는 감지하지만, 바닥의 자연적 약점, 불안정한 천장, 숨겨진 함몰지는 드러내지 않는다.\n\n이 주문은 함정이 있다는 것만 드러낸다. 각 함정의 위치는 알 수 없으나, 감지한 함정이 가하는 위험의 대략적인 성질은 알게 된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"형상변화","name_en":"Shapechange","level":9,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A jade circlet worth at least 1,500 gp, which you must place on your head before you cast the spell.","higher_level_en":"","desc_en":"You assume the form of a different creature for the duration. The new form can be of any creature with a challenge rating equal to your level or lower. The creature can't be a construct or an undead, and you must have seen the sort of creature at least once. You transform into an average example of that creature, one without any class levels or the Spellcasting trait.\n\nYour game statistics are replaced by the statistics of the chosen creature, though you retain your alignment and Intelligence, Wisdom, and Charisma scores. You also retain all of your skill and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus listed in its statistics is higher than yours, use the creature's bonus in place of yours. You can't use any legendary actions or lair actions of the new form.\n\nYou assume the hit points and Hit Dice of the new form. When you revert to your normal form, you return to the number of hit points you had before you transformed. If you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. As long as the excess damage doesn't reduce your normal form to 0 hit points, you aren't knocked unconscious.\n\nYou retain the benefit of any features from your class, race, or other source and can use them, provided that your new form is physically capable of doing so. You can't use any special senses you have (for example, darkvision) unless your new form also has that sense. You can only speak if the creature can normally speak.\n\nWhen you transform, you choose whether your equipment falls to the ground, merges into the new form, or is worn by it. Worn equipment functions as normal. The GM determines whether it is practical for the new form to wear a piece of equipment, based on the creature's shape and size. Your equipment doesn't change shape or size to match the new form, and any equipment that the new form can't wear must either fall to the ground or merge into your new form. Equipment that merges has no effect in that state.\n\nDuring this spell's duration, you can use your action to assume a different form following the same restrictions and rules for the original form, with one exception: if your new form has more hit points than your current one, your hit points remain at their current value.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"혼란","name_en":"Confusion","level":4,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"Three walnut shells.","higher_level_en":"When you cast this spell using a spell slot of 5th level or higher, the radius of the sphere increases by 5 feet for each slot level above 4th.","desc_en":"This spell assaults and twists creatures' minds, spawning delusions and provoking uncontrolled action. Each creature in a 10-foot-radius sphere centered on a point you choose within range must succeed on a Wisdom saving throw when you cast this spell or be affected by it.\n\nAn affected target can't take reactions and must roll a d10 at the start of each of its turns to determine its behavior for that turn.\n\n| d10 | Behavior |\n\n|---|---|\n\n| 1 | The creature uses all its movement to move in a random direction. To determine the direction, roll a d8 and assign a direction to each die face. The creature doesn't take an action this turn. |\n\n| 2-6 | The creature doesn't move or take actions this turn. |\n\n| 7-8 | The creature uses its action to make a melee attack against a randomly determined creature within its reach. If there is no creature within its reach, the creature does nothing this turn. |\n\n| 9-10 | The creature can act and move normally. |\n\nAt the end of each of its turns, an affected target can make a Wisdom saving throw. If it succeeds, this effect ends for that target.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"이 주문은 크리처의 정신을 공격하고 뒤틀어, 망상을 일으키고 통제 불능의 행동을 유발한다. 사거리 내에서 선택한 지점을 중심으로 한 3m(10ft) 반경 구체 내의 각 크리처는, 주문을 시전할 때 지혜 내성 굴림에 성공하지 못하면 이 주문의 영향을 받는다.\n\n영향받은 대상은 반응행동을 할 수 없으며, 매 턴이 시작될 때 d10을 굴려 그 턴의 행동을 결정한다.\n\n| d10 | 행동 |\n|---|---|\n| 1 | 크리처는 무작위 방향으로 이동하는 데 모든 이동력을 쓴다. 방향을 정하려면 d8을 굴려 각 면에 방향을 배정한다. 이 턴에 행동을 하지 않는다. |\n| 2-6 | 크리처는 이 턴에 이동하거나 행동하지 않는다. |\n| 7-8 | 크리처는 행동을 사용해, 닿을 수 있는 범위 내에서 무작위로 정해진 크리처에게 근접 공격을 한다. 닿을 수 있는 크리처가 없으면 이 턴에 아무것도 하지 않는다. |\n| 9-10 | 크리처는 정상적으로 행동하고 이동할 수 있다. |\n\n영향받은 대상은 자기 턴이 끝날 때 지혜 내성 굴림을 굴릴 수 있다. 성공하면 그 대상에 대한 효과가 끝난다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 구체의 반경이 1.5m(5ft)씩 증가한다.","damage_ko":"","material_ko":"호두 껍질 세 개."},{"name_ko":"화살 결계","name_en":"Cordon of Arrows","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"화염 구체","name_en":"Flaming Sphere","level":2,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A bit of tallow, a pinch of brimstone, and a dusting of powdered iron.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d6 for each slot level above 2nd.","desc_en":"A 5-foot-diameter sphere of fire appears in an unoccupied space of your choice within range and lasts for the duration. Any creature that ends its turn within 5 feet of the sphere must make a dexterity saving throw. The creature takes 2d6 fire damage on a failed save, or half as much damage on a successful one.\n\nAs a bonus action, you can move the sphere up to 30 feet. If you ram the sphere into a creature, that creature must make the saving throw against the sphere's damage, and the sphere stops moving this turn.\n\nWhen you move the sphere, you can direct it over barriers up to 5 feet tall and jump it across pits up to 10 feet wide. The sphere ignites flammable objects not being worn or carried, and it sheds bright light in a 20-foot radius and dim light for an additional 20 feet.","damage_en":"2d6 Fire","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"지름 1.5m(5ft)의 불 구체가 사거리 내에서 선택한 빈 공간에 나타나 지속시간 동안 유지된다. 구체의 1.5m(5ft) 이내에서 턴을 마치는 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 2d6 화염 피해를, 성공 시 절반의 피해를 받는다.\n\n추가 행동으로 구체를 최대 9m(30ft) 이동시킬 수 있다. 구체를 크리처에게 들이받으면, 그 크리처는 구체의 피해에 맞선 내성 굴림을 굴려야 하고, 구체는 이번 턴에 이동을 멈춘다.\n\n구체를 이동시킬 때, 최대 1.5m(5ft) 높이의 장벽 위로 넘기거나 최대 3m(10ft) 폭의 구덩이를 건너뛰게 할 수 있다. 구체는 착용하거나 소지되지 않은 인화성 물체에 불을 붙이며, 6m(20ft) 반경에 밝은 빛을, 추가로 6m(20ft)에 흐릿한 빛을 발한다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 피해가 1d6씩 증가한다.","damage_ko":"2d6 화염 피해","material_ko":"수지 조각, 유황 한 자밤, 철가루 약간."},{"name_ko":"화염 방패","name_en":"Fire Shield","level":4,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"A little phosphorus or a firefly.","higher_level_en":"","desc_en":"Thin and vaporous flame surround your body for the duration of the spell, radiating a bright light bright light in a 10-foot radius and dim light for an additional 10 feet. You can end the spell using an action to make it disappear.\n\nThe flames are around you a heat shield or cold, your choice. The heat shield gives you cold damage resistance and the cold resistance to fire damage.\n\nIn addition, whenever a creature within 5 feet of you hits you with a melee attack, flames spring from the shield. The attacker then suffers 2d8 points of fire damage or cold, depending on the model.","damage_en":"2d8 Fire","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"10 분","desc_ko":"얇고 자욱한 불길이 주문의 지속시간 동안 몸을 감싸며, 3m(10ft) 반경에 밝은 빛을, 추가로 3m(10ft)에 흐릿한 빛을 발한다. 행동을 사용해 불길을 사라지게 하여 주문을 끝낼 수 있다.\n\n불길은 열 방패나 냉기 방패 중 시전자가 선택한 것으로 몸을 감싼다. 열 방패는 냉기 피해에 저항을, 냉기 방패는 화염 피해에 저항을 준다.\n\n또한 시전자의 1.5m(5ft) 이내에 있는 크리처가 근접 공격으로 시전자를 명중시킬 때마다, 방패에서 불길이 솟는다. 그러면 공격자는 방패 종류에 따라 2d8 화염 또는 냉기 피해를 받는다.","higher_level_ko":"","damage_ko":"2d8 화염 피해","material_ko":"인 약간 또는 반딧불이."},{"name_ko":"화염 생성","name_en":"Produce Flame","level":0,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"","higher_level_en":"","desc_en":"A flickering flame appears in your hand. The flame remains there for the duration and harms neither you nor your equipment. The flame sheds bright light in a 10-foot radius and dim light for an additional 10 feet. The spell ends if you dismiss it as an action or if you cast it again.\n\nYou can also attack with the flame, although doing so ends the spell. When you cast this spell, or as an action on a later turn, you can hurl the flame at a creature within 30 feet of you. Make a ranged spell attack. On a hit, the target takes 1d8 fire damage.\n\nThis spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","damage_en":"1d8 Fire","attack_type":"ranged","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"10 분","desc_ko":"손에 일렁이는 불꽃이 나타난다. 불꽃은 지속시간 동안 손에 머무르며, 시전자나 장비에 해를 끼치지 않는다. 불꽃은 3m(10ft) 반경에 밝은 빛을, 추가로 3m(10ft)에 흐릿한 빛을 발한다. 행동을 사용해 해제하거나 다시 시전하면 주문이 끝난다.\n\n불꽃으로 공격할 수도 있지만, 그렇게 하면 주문이 끝난다. 이 주문을 시전할 때, 또는 이후 턴에 행동으로, 9m(30ft) 이내의 크리처에게 불꽃을 던질 수 있다. 원거리 주문 공격을 굴린다. 명중 시 대상은 1d8 화염 피해를 받는다.\n\n이 주문의 피해는 5레벨(2d8), 11레벨(3d8), 17레벨(4d8)에 도달할 때 1d8씩 증가한다.","higher_level_ko":"","damage_ko":"1d8 화염 피해","material_ko":""},{"name_ko":"화염 직격","name_en":"Flame Strike","level":5,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Pinch of sulfur.","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the fire damage or the radiant damage (your choice) increases by 1d6 for each slot level above 5th.","desc_en":"A vertical column of divine fire roars down from the heavens in a location you specify. Each creature in a 10-foot-radius, 40-foot-high cylinder centered on a point within range must make a dexterity saving throw. A creature takes 4d6 fire damage and 4d6 radiant damage on a failed save, or half as much damage on a successful one.","damage_en":"4d6 + 4d6 Fire","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"시전자가 지정한 위치로 신성한 불의 수직 기둥이 하늘에서 굉음을 내며 내리꽂힌다. 사거리 내 한 지점을 중심으로 한 반경 3m(10ft), 높이 12m(40ft)의 원기둥 내의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 4d6 화염 피해와 4d6 광휘 피해를, 성공 시 절반의 피해를 받는다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 화염 피해나 광휘 피해(시전자 선택)가 1d6씩 증가한다.","damage_ko":"4d6 + 4d6 화염 피해","material_ko":"유황 한 자밤."},{"name_ko":"화염 폭풍","name_en":"Fire Storm","level":7,"school":"방출계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"A storm made up of sheets of roaring flame appears in a location you choose within range. The area of the storm consists of up to ten 10-foot cubes, which you can arrange as you wish. Each cube must have at least one face adjacent to the face of another cube. Each creature in the area must make a dexterity saving throw. It takes 7d10 fire damage on a failed save, or half as much damage on a successful one.\n\nThe fire damages objects in the area and ignites flammable objects that aren't being worn or carried. If you choose, plant life in the area is unaffected by this spell.","damage_en":"7d10 Fire","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"7d10 화염 피해","material_ko":""},{"name_ko":"화염 화살","name_en":"Fire Bolt","level":0,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You hurl a mote of fire at a creature or object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 fire damage. A flammable object hit by this spell ignites if it isn't being worn or carried.\n\nThis spell's damage increases by 1d10 when you reach 5th level (2d10), 11th level (3d10), and 17th level (4d10).","damage_en":"1d10 Fire","attack_type":"ranged","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내 크리처나 물체에 불덩이를 던진다. 대상에게 원거리 주문 공격을 굴린다. 명중 시 대상은 1d10 화염 피해를 받는다. 이 주문에 맞은 인화성 물체는 착용하거나 소지되지 않은 경우 불이 붙는다.\n\n이 주문의 피해는 5레벨(2d10), 11레벨(3d10), 17레벨(4d10)에 도달할 때 1d10씩 증가한다.","higher_level_ko":"","damage_ko":"1d10 화염 피해","material_ko":""},{"name_ko":"화염구","name_en":"Fireball","level":3,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A tiny ball of bat guano and sulfur.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd.","desc_en":"A bright streak flashes from your pointing finger to a point you choose within range and then blossoms with a low roar into an explosion of flame. Each creature in a 20-foot-radius sphere centered on that point must make a dexterity saving throw. A target takes 8d6 fire damage on a failed save, or half as much damage on a successful one.\n\nThe fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried.","damage_en":"8d6 Fire","attack_type":"","range_ko":"45m(150ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"시전자의 손가락에서 밝은 빛줄기가 사거리 내에서 선택한 지점으로 뻗어나가, 낮게 울리는 굉음과 함께 화염으로 폭발한다. 그 지점을 중심으로 한 6m(20ft) 반경 구체 내의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 8d6 화염 피해를, 성공 시 절반의 피해를 받는다.\n\n화염은 모퉁이를 돌아 퍼질 수 있다. 착용하거나 소지되지 않은 인화성 물체에 불을 붙인다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 피해가 1d6씩 증가한다.","damage_ko":"8d6 화염 피해","material_ko":"박쥐 배설물과 유황으로 된 작은 공."},{"name_ko":"환생","name_en":"Reincarnate","level":5,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 hour","duration_en":"Instantaneous","material_en":"Rare oils and unguents worth at least 1,000 gp, which the spell consumes.","higher_level_en":"","desc_en":"You touch a dead humanoid or a piece of a dead humanoid. Provided that the creature has been dead no longer than 10 days, the spell forms a new adult body for it and then calls the soul to enter that body. If the target's soul isn't free or willing to do so, the spell fails.\n\nThe magic fashions a new body for the creature to inhabit, which likely causes the creature's race to change. The GM rolls a d 100 and consults the following table to determine what form the creature takes when restored to life, or the GM chooses a form.\n\n| d100 | Race |\n\n|---|---|\n\n| 01-04 | Dragonborn |\n\n| 05-13 | Dwarf, hill |\n\n| 14-21 | Dwarf, mountain |\n\n| 22-25 | Elf, dark |\n\n| 26-34 | Elf, high |\n\n| 35-42 | Elf, wood |\n\n| 43-46 | Gnome, forest |\n\n| 47-52 | Gnome, rock |\n\n| 53-56 | Half-elf |\n\n| 57-60 | Half-orc |\n\n| 61-68 | Halfling, lightfoot |\n\n| 69-76 | Halfling, stout |\n\n| 77-96 | Human |\n\n| 97-00 | Tiefling |\n\nThe reincarnated creature recalls its former life and experiences. It retains the capabilities it had in its original form, except it exchanges its original race for the new one and changes its racial traits accordingly.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 시간","duration_ko":"즉시","desc_ko":"죽은 인간형이나 죽은 인간형의 일부를 접촉한다. 크리처가 죽은 지 10일을 넘지 않았다면, 주문이 그를 위한 새로운 성인 육체를 빚고 영혼을 그 육체로 불러들인다. 대상의 영혼이 자유롭지 않거나 그럴 의사가 없으면 주문은 실패한다.\n\n마법이 크리처가 깃들 새 육체를 빚으며, 이로 인해 크리처의 종족이 바뀔 가능성이 높다. DM이 d100을 굴려 다음 표를 참고해, 크리처가 되살아날 때 취하는 형태를 정하거나, DM이 형태를 고른다.\n\n| d100 | 종족 |\n|---|---|\n| 01-04 | 드래곤본 |\n| 05-13 | 언덕 드워프 |\n| 14-21 | 산악 드워프 |\n| 22-25 | 다크 엘프 |\n| 26-34 | 하이 엘프 |\n| 35-42 | 우드 엘프 |\n| 43-46 | 숲 노움 |\n| 47-52 | 바위 노움 |\n| 53-56 | 하프엘프 |\n| 57-60 | 하프오크 |\n| 61-68 | 라이트풋 하플링 |\n| 69-76 | 스타우트 하플링 |\n| 77-96 | 인간 |\n| 97-00 | 티플링 |\n\n환생한 크리처는 이전 삶과 경험을 기억한다. 원래 형태에서 가졌던 능력은 유지하되, 원래 종족을 새 종족으로 바꾸고 그에 따라 종족 특성을 바꾼다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 1,000gp 이상 가치의 희귀한 기름과 연고."},{"name_ko":"환영 문서","name_en":"Illusory Script","level":1,"school":"환영계","components":["S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 minute","duration_en":"10 days","material_en":"A lead-based ink worth at least 10gp, which this spell consumes.","higher_level_en":"","desc_en":"You write on parchment, paper, or some other suitable writing material and imbue it with a potent illusion that lasts for the duration.\n\nTo you and any creatures you designate when you cast the spell, the writing appears normal, written in your hand, and conveys whatever meaning you intended when you wrote the text. To all others, the writing appears as if it were written in an unknown or magical script that is unintelligible. Alternatively, you can cause the writing to appear to be an entirely different message, written in a different hand and language, though the language must be one you know.\n\nShould the spell be dispelled, the original script and the illusion both disappear.\n\nA creature with truesight can read the hidden message.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 분","duration_ko":"10 일","desc_ko":"양피지, 종이, 또는 그 밖의 적합한 필기 재료에 글을 쓰고, 지속시간 동안 지속되는 강력한 환영을 깃들인다.\n\n시전자 자신과 시전할 때 지정한 크리처에게는, 글이 시전자의 필체로 정상적으로 쓰인 것으로 보이며 쓸 때 의도한 의미를 전달한다. 그 외 모두에게는 알 수 없거나 마법적인 문자로 쓰여 이해할 수 없는 것처럼 보인다. 또는 글이 전혀 다른 필체와 언어로 쓰인 완전히 다른 메시지로 보이게 할 수도 있으나, 그 언어는 시전자가 아는 것이어야 한다.\n\n주문이 무효화되면, 원래의 글과 환영이 모두 사라진다.\n\n진시야를 지닌 크리처는 숨겨진 메시지를 읽을 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 10gp 이상 가치의 납 성분 잉크."},{"name_ko":"환영 살해자","name_en":"Phantasmal Killer","level":4,"school":"환영계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 5th level or higher, the damage increases by 1d10 for each slot level above 4th.","desc_en":"You tap into the nightmares of a creature you can see within range and create an illusory manifestation of its deepest fears, visible only to that creature. The target must make a wisdom saving throw. On a failed save, the target becomes frightened for the duration. At the start of each of the target's turns before the spell ends, the target must succeed on a wisdom saving throw or take 4d10 psychic damage. On a successful save, the spell ends.","damage_en":"4d10 Psychic","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 크리처의 악몽을 파고들어, 그 크리처에게만 보이는, 가장 깊은 공포의 환영 현현을 만든다. 대상은 지혜 내성 굴림을 굴려야 한다. 실패 시 대상은 지속시간 동안 공포에 빠진다. 주문이 끝나기 전 대상의 매 턴이 시작될 때, 대상은 지혜 내성 굴림에 성공하지 못하면 4d10 정신 피해를 받는다. 성공 시 주문이 끝난다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 피해가 1d10씩 증가한다.","damage_ko":"4d10 정신 피해","material_ko":""},{"name_ko":"환영 지형","name_en":"Hallucinatory Terrain","level":4,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"300 feet","casting_time_en":"10 minutes","duration_en":"24 hours","material_en":"A stone, a twig, and a bit of green plant.","higher_level_en":"","desc_en":"You make natural terrain in a 150-foot cube in range look, sound, and smell like some other sort of natural terrain. Thus, open fields or a road can be made to resemble a swamp, hill, crevasse, or some other difficult or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a rock-strewn gully like a wide and smooth road. Manufactured structures, equipment, and creatures within the area aren't changed in appearance.\n\nThe tactile characteristics of the terrain are unchanged, so creatures entering the area are likely to see through the illusion. If the difference isn't obvious by touch, a creature carefully examining the illusion can attempt an Intelligence (Investigation) check against your spell save DC to disbelieve it. A creature who discerns the illusion for what it is, sees it as a vague image superimposed on the terrain.","damage_en":"","attack_type":"","range_ko":"90m(300ft)","casting_time_ko":"10 분","duration_ko":"24 시간","desc_ko":"사거리 내 45m(150ft) 정육면체 안의 자연 지형을 다른 종류의 자연 지형처럼 보이고, 들리고, 냄새나게 한다. 따라서 탁 트인 들판이나 길을 늪, 언덕, 갈라진 틈, 또는 그 밖의 어렵거나 지날 수 없는 지형처럼 보이게 할 수 있다. 연못을 풀밭처럼, 낭떠러지를 완만한 비탈처럼, 돌투성이 협곡을 넓고 매끄러운 길처럼 보이게 할 수 있다. 그 구역 안의 인공 구조물, 장비, 크리처는 외형이 바뀌지 않는다.\n\n지형의 촉각적 특성은 바뀌지 않으므로, 그 구역에 들어오는 크리처는 환영을 꿰뚫어 볼 가능성이 높다. 촉감으로 차이가 명백하지 않으면, 환영을 주의 깊게 살피는 크리처는 시전자의 주문 내성 DC에 맞선 지능(수사) 판정을 시도해 그것을 믿지 않을 수 있다. 환영의 정체를 간파한 크리처는 그것을 지형 위에 겹쳐진 어렴풋한 이미지로 본다.","higher_level_ko":"","damage_ko":"","material_ko":"돌, 잔가지, 초록 식물 조각."},{"name_ko":"환영력","name_en":"Phantasmal Force","level":2,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"환영마","name_en":"Phantom Steed","level":3,"school":"환영계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 minute","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"A Large quasi-real, horselike creature appears on the ground in an unoccupied space of your choice within range. You decide the creature's appearance, but it is equipped with a saddle, bit, and bridle. Any of the equipment created by the spell vanishes in a puff of smoke if it is carried more than 10 feet away from the steed.\n\nFor the duration, you or a creature you choose can ride the steed. The creature uses the statistics for a riding horse, except it has a speed of 100 feet and can travel 10 miles in an hour, or 13 miles at a fast pace. When the spell ends, the steed gradually fades, giving the rider 1 minute to dismount. The spell ends if you use an action to dismiss it or if the steed takes any damage.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 분","duration_ko":"1 시간","desc_ko":"사거리 내에서 선택한 빈 공간의 땅에 대형의, 반쯤 실재하는 말 같은 크리처가 나타난다. 크리처의 외모는 시전자가 정하며, 안장, 재갈, 굴레를 갖추고 있다. 주문으로 만든 장비는 탈것에서 3m(10ft) 넘게 떨어지면 연기와 함께 사라진다.\n\n지속시간 동안, 시전자나 시전자가 선택한 크리처가 탈것을 탈 수 있다. 크리처는 승용마의 능력치를 쓰되, 이동속도가 30m(100ft)이고 시간당 10마일, 빠른 속도로는 13마일을 이동할 수 있다. 주문이 끝나면 탈것이 서서히 사라지며, 탄 이에게 내릴 1분을 준다. 시전자가 행동을 사용해 해제하거나 탈것이 피해를 받으면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"활력의 오오라","name_en":"Aura of Vitality","level":3,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"활보","name_en":"Longstrider","level":1,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A pinch of dirt.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each spell slot above 1st.","desc_en":"You touch a creature. The target's speed increases by 10 feet until the spell ends.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"크리처 하나를 접촉한다. 주문이 끝날 때까지 대상의 이동속도가 3m(10ft) 증가한다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 주문 슬롯마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"흙 한 자밤."},{"name_ko":"황폐화","name_en":"Blight","level":4,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 5th level of higher, the damage increases by 1d8 for each slot level above 4th.","desc_en":"Necromantic energy washes over a creature of your choice that you can see within range, draining moisture and vitality from it. The target must make a constitution saving throw. The target takes 8d8 necrotic damage on a failed save, or half as much damage on a successful one. The spell has no effect on undead or constructs.\n\nIf you target a plant creature or a magical plant, it makes the saving throw with disadvantage, and the spell deals maximum damage to it.\n\nIf you target a nonmagical plant that isn't a creature, such as a tree or shrub, it doesn't make a saving throw; it simply withers and dies.","damage_en":"8d8 Necrotic","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는, 선택한 크리처에게 사령 에너지가 밀려들어, 수분과 생명력을 빨아들인다. 대상은 건강 내성 굴림을 굴려야 한다. 실패 시 8d8 사령 피해를, 성공 시 절반의 피해를 받는다. 이 주문은 언데드나 구조물에는 효과가 없다.\n\n식물 크리처나 마법 식물을 대상으로 하면, 그 대상은 내성 굴림에 불리 보정을 받으며, 주문이 최대 피해를 준다.\n\n나무나 관목처럼 크리처가 아닌 비마법 식물을 대상으로 하면, 그것은 내성 굴림을 굴리지 않고 그저 시들어 죽는다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"8d8 사령 피해","material_ko":""},{"name_ko":"회화","name_en":"Commune","level":5,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"1 minute","material_en":"Incense and a vial of holy or unholy water.","higher_level_en":"","desc_en":"You contact your deity or a divine proxy and ask up to three questions that can be answered with a yes or no. You must ask your questions before the spell ends. You receive a correct answer for each question.\n\nDivine beings aren't necessarily omniscient, so you might receive \"unclear\" as an answer if a question pertains to information that lies beyond the deity's knowledge. In a case where a one-word answer could be misleading or contrary to the deity's interests, the GM might offer a short phrase as an answer instead.\n\nIf you cast the spell two or more times before finishing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get no answer. The GM makes this roll in secret.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 분","duration_ko":"1 분","desc_ko":"시전자의 신이나 신의 대리자와 접촉해, 예 또는 아니오 ko":"정신집중, 최대 1시간","desc_ko":"그림자와 침묵의 장막이 시전자에게서 뿜어져 나와, 시전자와 동료를 탐지로부터 감춘다. 지속시간 동안, 시전자로부터 9m(30ft) 이내에서 선택한 각 크리처(시전자 포함)는 민첩(은신) 판정에 +10 보너스를 받고, 마법적 수단 외에는 추적당하지 않는다. 이 보너스를 받는 크리처는 지나간 흔적이나 자취를 남기지 않는다.","higher_level_ko":"","damage_ko":"","material_ko":"불태운 겨우살이 잎의 재와 가문비나무 잔가지."},{"name_ko":"흡혈의 접촉","name_en":"Vampiric Touch","level":3,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd.","desc_en":"The touch of your shadow-wreathed hand can siphon life force from others to heal your wounds. Make a melee spell attack against a creature within your reach. On a hit, the target takes 3d6 necrotic damage, and you regain hit points equal to half the amount of necrotic damage dealt. Until the spell ends, you can make the attack again on each of your turns as an action.","damage_en":"3d6 Necrotic","attack_type":"melee","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"그림자에 휩싸인 손의 접촉으로 다른 이의 생명력을 빨아들여 자신의 상처를 치유할 수 있다. 닿을 수 있는 크리처에게 근접 주문 공격을 굴린다. 명중 시 대상은 3d6 사령 피해를 받고, 시전자는 가한 사령 피해의 절반만큼 히트 포인트를 회복한다. 주문이 끝날 때까지, 이후 매 턴 행동으로 공격을 다시 할 수 있다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 피해가 1d6씩 증가한다.","damage_ko":"3d6 사령 피해","material_ko":""},{"name_ko":"희망의 봉화","name_en":"Beacon of Hope","level":3,"school":"방호계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"This spell bestows hope and vitality. Choose any number of creatures within range. For the duration, each target has advantage on wisdom saving throws and death saving throws, and regains the maximum number of hit points possible from any healing.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"이 주문은 희망과 활력을 부여한다. 사거리 내 크리처를 원하는 만큼 선택한다. 지속시간 동안 각 대상은 지혜 내성 굴림과 죽음 내성 굴림에 유리 보정을 받고, 어떤 치유로든 가능한 최대치의 히트 포인트를 회복한다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"힘의 원","name_en":"Circle of Power","level":5,"school":"방호계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""}];
const SCHOOLS = ["방출계","방호계","변환계","사령계","예지계","조형계","환영계","환혹계"];
const COMPS = ["V","S","M"];

// 계열별 아이콘 (stroke 기반 SVG, currentColor 상속)
const ICONS = {
  "방출계":"ti-flame",
  "방호계":"ti-shield",
  "변환계":"ti-transform",
  "사령계":"ti-skull",
  "예지계":"ti-crystal-ball",
  "조형계":"ti-sparkles",
  "환영계":"ti-ghost-2",
  "환혹계":"ti-heart"
}

const state = { search:"", levels:new Set(), schools:new Set(), comps:new Set(), ritual:false, concentration:false, sort:"ko" };

document.getElementById("total").textContent = SPELLS.length;

function levelLabel(l){ return l===0 ? "소마법" : l+"레벨"; }

const levelChips = document.getElementById("level-chips");
for(let l=0;l<=9;l++){
  const b=document.createElement("button");
  b.className="chip"; b.textContent = l===0?"소마법":l; b.dataset.level=l;
  b.onclick=()=>{ toggle(state.levels,l,b); render(); };
  levelChips.appendChild(b);
}
const schoolChips = document.getElementById("school-chips");
SCHOOLS.forEach(s=>{
  const b=document.createElement("button");
  b.className="chip"; b.textContent=s.replace("계",""); b.dataset.school=s;
  b.onclick=()=>{ toggle(state.schools,s,b); render(); };
  schoolChips.appendChild(b);
});
const compChips = document.getElementById("comp-chips");
COMPS.forEach(c=>{
  const b=document.createElement("button");
  b.className="chip"; b.textContent=c+"만"; b.dataset.comp=c;
  b.onclick=()=>{ toggle(state.comps,c,b); render(); };
  compChips.appendChild(b);
});
const attrChips = document.getElementById("attr-chips");
[["ritual","의식","ti-pentagram"],["concentration","집중","ti-eye"]].forEach(([key,label,icon])=>{
  const b=document.createElement("button");
  b.className="chip chip-attr"; b.innerHTML=`<i class="ti ${icon}" aria-hidden="true"></i>${label}`; b.dataset.attr=key;
  b.onclick=()=>{ state[key]=!state[key]; b.classList.toggle("active",state[key]); render(); };
  attrChips.appendChild(b);
});

function toggle(set,val,btn){
  if(set.has(val)){ set.delete(val); btn.classList.remove("active"); }
  else{ set.add(val); btn.classList.add("active"); }
}

const searchInput=document.getElementById("search");
const searchClear=document.getElementById("search-clear");
const searchbarEl=document.querySelector(".searchbar");
function updateClear(){ searchbarEl.classList.toggle("has-text", searchInput.value.length>0); }
searchInput.addEventListener("input",e=>{
  state.search = e.target.value.trim().toLowerCase();
  updateClear();
  render();
});
searchClear.addEventListener("click",()=>{
  searchInput.value=""; state.search="";
  updateClear(); render(); searchInput.focus();
});
document.getElementById("sort").addEventListener("change",e=>{
  state.sort = e.target.value; render();
});
document.getElementById("reset").addEventListener("click",()=>{
  state.search=""; state.levels.clear(); state.schools.clear(); state.comps.clear();
  state.ritual=false; state.concentration=false;
  document.getElementById("search").value="";
  updateClear();
  document.querySelectorAll(".chip.active").forEach(c=>c.classList.remove("active"));
  render();
});

function match(sp){
  if(state.search){
    const hay=(sp.name_ko+" "+sp.name_en).toLowerCase();
    if(!hay.includes(state.search)) return false;
  }
  if(state.levels.size && !state.levels.has(sp.level)) return false;
  if(state.schools.size && !state.schools.has(sp.school)) return false;
  // 구성요소 필터: 아무것도 선택 안 하면 전체, 선택하면 그 조합과 정확히 일치하는 카드만
  if(state.comps.size){
    if(sp.components.length !== state.comps.size) return false;
    for(const c of sp.components){ if(!state.comps.has(c)) return false; }
  }
  // 속성 필터: 켜진 것만 요구(AND)
  if(state.ritual && !sp.ritual) return false;
  if(state.concentration && !sp.concentration) return false;
  return true;
}

function sortList(list){
  const s=state.sort;
  return list.sort((a,b)=>{
    if(s==="ko") return a.name_ko.localeCompare(b.name_ko,"ko");
    if(s==="en") return a.name_en.localeCompare(b.name_en,"en");
    if(s==="level-asc") return a.level-b.level || a.name_ko.localeCompare(b.name_ko,"ko");
    if(s==="level-desc") return b.level-a.level || a.name_ko.localeCompare(b.name_ko,"ko");
    return 0;
  });
}

const grid=document.getElementById("grid");
const empty=document.getElementById("empty");
const countEl=document.getElementById("count");

function render(){
  const filtered = sortList(SPELLS.filter(match));
  countEl.textContent = filtered.length+"개 표시 중";
  if(filtered.length===0){ grid.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  const frag=document.createDocumentFragment();
  filtered.forEach(sp=>{
    const card=document.createElement("div");
    card.className="card s-"+sp.school;
    const comps=sp.components.map(c=>`<span class="comp">${c}</span>`).join("");
    const iconClass=ICONS[sp.school]||"";
    let attrIcons="";
    if(sp.ritual) attrIcons+=`<span class="attr-ic ritual" title="의식"><i class="ti ti-pentagram" aria-hidden="true"></i></span>`;
    if(sp.concentration) attrIcons+=`<span class="attr-ic concentration" title="집중"><i class="ti ti-eye" aria-hidden="true"></i></span>`;
    card.innerHTML=
      `<div class="card-inner">`+
      `<div class="card-top"><i class="ti ${iconClass} school-icon" aria-hidden="true"></i><span class="school-tag">${sp.school}</span></div>`+
      `<div class="card-body"><div class="card-name">${sp.name_ko}</div><div class="card-en">${sp.name_en}</div></div>`+
      `<div class="card-bottom"><span class="level-badge">${levelLabel(sp.level)}</span><span class="bottom-right">${attrIcons}<span class="comps">${comps}</span></span></div>`+
      `</div>`;
    card.onclick=()=>openDialog(sp);
    frag.appendChild(card);
  });
  grid.innerHTML="";
  grid.appendChild(frag);
}

render();

// ===== 상세 다이얼로그 =====
const overlay=document.getElementById("dialog-overlay");
const dlg=document.getElementById("dialog");
let dlgShowEn=false;   // 영어로 보기 토글 상태
let dlgSpell=null;

function fieldHtml(label, ko, en){
  // 한글 있으면 한글, 없으면 영문. 토글 상태에 따라 영문 강제.
  const hasKo = ko && ko.trim();
  let val;
  if(dlgShowEn){ val = en || (hasKo?ko:"") ; }
  else { val = hasKo ? ko : (en||""); }
  if(!val || !val.trim()) val = "—";
  return `<div class="dlg-field"><span class="dlg-flabel">${label}</span><span class="dlg-fval">${escapeHtml(val)}</span></div>`;
}
function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function mdInline(s){
  s = s.split("***").join("\u0001");
  s = s.replace(/\u0001([^\u0001]+)\u0001/g, "<strong>$1</strong>");
  s = s.split("**").join("\u0002");
  s = s.replace(/\u0002([^\u0002]+)\u0002/g, "<strong>$1</strong>");
  s = s.split("\u0001").join("").split("\u0002").join("").split("*").join("");
  return s;
}
function isPipeRow(l){ return l.trim().charAt(0)==="|"; }
function isDivider(l){
  // |---|---| 형태 (구분선)
  var t=l.trim();
  if(t.charAt(0)!=="|") return false;
  for(var i=0;i<t.length;i++){
    var c=t.charAt(i);
    if(c!=="|"&&c!=="-"&&c!==":"&&c!==" ") return false;
  }
  return true;
}
function tableHtml(rows){
  var html='<table class="dlg-table">';
  var first=true;
  rows.forEach(function(r){
    if(isDivider(r)) return;
    var parts=r.split("|");
    var cells=parts.slice(1, parts.length-1).map(function(c){return c.trim();});
    var tag=first?"th":"td";
    html+="<tr>"+cells.map(function(c){return "<"+tag+">"+mdInline(escapeHtml(c))+"</"+tag+">";}).join("")+"</tr>";
    first=false;
  });
  return html+"</table>";
}
function paraHtml(ko, en){
  const hasKo = ko && ko.trim();
  let val;
  if(dlgShowEn){ val = en || ""; }
  else { val = hasKo ? ko : (en||""); }
  if(!val || !val.trim()){
    return `<p class="dlg-empty">아직 등록된 설명이 없어요.</p>`;
  }
  // 줄 단위로 순회하며 문단/표/소제목 조립
  const lines = val.split("\n\n").join("\n\u0003\n").split("\n"); //  = 문단 경계 마커
  const out=[];
  let para=[];      // 현재 문단 줄 모음
  let tbl=[];       // 현재 표 줄 모음
  function flushPara(){
    if(para.length){ out.push("<p>"+para.join("<br>")+"</p>"); para=[]; }
  }
  function flushTbl(){
    if(tbl.length){ out.push(tableHtml(tbl)); tbl=[]; }
  }
  for(let i=0;i<lines.length;i++){
    let l=lines[i];
    if(l==="\u0003"){
      // 문단 경계: 다음 비어있지 않은 줄도 표 행이면 표를 이어감
      if(tbl.length){
        let j=i+1;
        while(j<lines.length && lines[j]==="\u0003") j++;
        // 다음 파이프 줄의 그다음 줄이 divider면 새 표 시작 → 현재 표를 끊음
        let k=j+1;
        while(k<lines.length && lines[k]==="\u0003") k++;
        const nextIsNewTable = j<lines.length && isPipeRow(lines[j]) && k<lines.length && isDivider(lines[k]);
        if(j<lines.length && isPipeRow(lines[j]) && !nextIsNewTable) continue; // 표 계속
      }
      flushTbl(); flushPara(); continue;
    }
    if(isPipeRow(l)){ flushPara(); tbl.push(l); continue; }
    flushTbl();
    let t=l.trim();
    if(t.charAt(0)==="#"){
      flushPara();
      var htext=t; while(htext.charAt(0)==="#"||htext.charAt(0)===" ") htext=htext.slice(1);
      out.push('<p class="dlg-subhead">'+mdInline(escapeHtml(htext))+'</p>');
    } else if(t){
      para.push(mdInline(escapeHtml(l)));
    }
  }
  flushTbl(); flushPara();
  return out.join("");
}

function renderDialog(){
  const sp=dlgSpell; if(!sp) return;
  const iconClass=ICONS[sp.school]||"";
  const comps=sp.components.map(c=>`<span class="comp">${c}</span>`).join("");
  let attrIcons="";
  if(sp.ritual) attrIcons+=`<span class="attr-ic ritual" title="의식"><i class="ti ti-pentagram" aria-hidden="true"></i></span>`;
  if(sp.concentration) attrIcons+=`<span class="attr-ic concentration" title="집중"><i class="ti ti-eye" aria-hidden="true"></i></span>`;

  // 상단: 카드와 동일 UI (영어명은 Uncial 폰트 유지)
  const head=
    `<div class="dlg-card-top"><i class="ti ${iconClass} school-icon" aria-hidden="true"></i><span class="school-tag">${sp.school}</span></div>`+
    `<div class="dlg-title"><div class="card-name dlg-name">${sp.name_ko}</div><div class="card-en dlg-en">${sp.name_en}</div></div>`+
    `<div class="dlg-meta"><span class="level-badge">${levelLabel(sp.level)}</span><span class="bottom-right">${attrIcons}<span class="comps">${comps}</span></span></div>`;

  // 수치 필드
  const compsFull = sp.components.join(", ") + (sp.material_en? " ("+ (dlgShowEn? sp.material_en : (sp.material_en)) +")" : "");
  const stats=
    fieldHtml("시전 시간", sp.casting_time_ko, sp.casting_time_en)+
    fieldHtml("사거리", sp.range_ko, sp.range_en)+
    fieldHtml("지속 시간", sp.duration_ko, sp.duration_en)+
    (sp.damage_en? fieldHtml("피해", sp.damage_ko, sp.damage_en):"")+
    (sp.material_en? fieldHtml("물질 구성요소", sp.material_ko, sp.material_en):"");

  const toggleLabel = dlgShowEn ? "한국어로 전환" : "영어로 전환";
  const body=
    `<div class="dlg-toggle-row"><button class="dlg-toggle" id="dlg-toggle">${toggleLabel}</button></div>`+
    `<div class="dlg-stats">${stats}</div>`+
    `<div class="dlg-desc">${paraHtml(sp.desc_ko, sp.desc_en)}</div>`+
    ((sp.higher_level_ko||sp.higher_level_en)? `<div class="dlg-higher"><div class="dlg-higher-label">상위 레벨에서</div>${paraHtml(sp.higher_level_ko, sp.higher_level_en)}</div>`:"");

  dlg.innerHTML=
    `<button class="dlg-close" id="dlg-close" aria-label="닫기"><i class="ti ti-x" aria-hidden="true"></i></button>`+
    `<div class="dlg-head">${head}</div>`+
    `<div class="dlg-scroll">${body}</div>`;

  document.getElementById("dlg-close").onclick=closeDialog;
  document.getElementById("dlg-toggle").onclick=()=>{ dlgShowEn=!dlgShowEn; renderDialog(); };
}

let dlgScrollY=0;
function openDialog(sp){
  dlgSpell=sp; dlgShowEn=false;
  dlg.className="dialog s-"+sp.school;
  renderDialog();
  overlay.classList.add("open");
  dlgScrollY=window.scrollY||window.pageYOffset||0;
  document.body.style.position="fixed";
  document.body.style.top=(-dlgScrollY)+"px";
  document.body.style.left="0";
  document.body.style.right="0";
  document.body.style.width="100%";
  document.body.style.overflow="hidden";
}
function closeDialog(){
  overlay.classList.remove("open");
  document.body.style.position="";
  document.body.style.top="";
  document.body.style.left="";
  document.body.style.right="";
  document.body.style.width="";
  document.body.style.overflow="";
  window.scrollTo(0, dlgScrollY);
  dlgSpell=null;
}
overlay.addEventListener("click", e=>{ if(e.target===overlay) closeDialog(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && overlay.classList.contains("open")) closeDialog(); });
</script>
