s much damage on a successful save.\n\n***Discord.*** Each target must make a constitution saving throw. On a failed save, a target bickers and argues with other creatures for 1 minute. During this time, it is incapable of meaningful communication and has disadvantage on attack rolls and ability checks.\n\n***Fear.*** Each target must make a wisdom saving throw and becomes frightened for 1 minute on a failed save. While frightened, the target drops whatever it is holding and must move at least 30 feet away from the glyph on each of its turns, if able.\n\n***Hopelessness.*** Each target must make a charisma saving throw. On a failed save, the target is overwhelmed with despair for 1 minute. During this time, it can't attack or target any creature with harmful abilities, spells, or other magical effects.\n\n***Insanity.*** Each target must make an intelligence saving throw. On a failed save, the target is driven insane for 1 minute. An insane creature can't take actions, can't understand what other creatures say, can't read, and speaks only in gibberish. The GM controls its movement, which is erratic.\n\n***Pain.*** Each target must make a constitution saving throw and becomes incapacitated with excruciating pain for 1 minute on a failed save.\n\n***Sleep.*** Each target must make a wisdom saving throw and falls unconscious for 10 minutes on a failed save. A creature awakens if it takes damage or if someone uses an action to shake or slap it awake.\n\n***Stunning.*** Each target must make a wisdom saving throw and becomes stunned for 1 minute on a failed save.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"문열기","name_en":"Knock","level":2,"school":"변환계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"Choose an object that you can see within range. The object can be a door, a box, a chest, a set of manacles, a padlock, or another object that contains a mundane or magical means that prevents access.\n\nA target that is held shut by a mundane lock or that is stuck or barred becomes unlocked, unstuck, or unbarred. If the object has multiple locks, only one of them is unlocked.\n\nIf you choose a target that is held shut with arcane lock, that spell is suppressed for 10 minutes, during which time the target can be opened and shut normally.\n\nWhen you cast the spell, a loud knock, audible from as far away as 300 feet, emanates from the target object.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는 물체 하나를 선택한다. 물체는 문, 상자, 궤짝, 수갑, 맹꽁이자물쇠, 또는 접근을 막는 평범하거나 마법적인 수단이 있는 다른 물체일 수 있다.\n\n평범한 자물쇠로 잠겼거나, 끼었거나, 빗장이 걸린 대상은 잠김이 풀리거나, 빠지거나, 빗장이 열린다. 물체에 자물쇠가 여럿이면 그중 하나만 풀린다.\n\n비전 자물쇠로 잠긴 대상을 선택하면, 그 주문이 10분간 억제되며 그동안 대상을 정상적으로 여닫을 수 있다.\n\n주문을 시전하면 대상 물체에서 300피트 밖까지 들리는 큰 노크 소리가 울린다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"물 조종","name_en":"Control Water","level":4,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"300 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A drop of water and a pinch of dust.","higher_level_en":"","desc_en":"Until the spell ends, you control any freestanding water inside an area you choose that is a cube up to 100 feet on a side. You can choose from any of the following effects when you cast this spell. As an action on your turn, you can repeat the same effect or choose a different one.\n\n***Flood.*** You cause the water level of all standing water in the area to rise by as much as 20 feet. If the area includes a shore, the flooding water spills over onto dry land.\n\nIf you choose an area in a large body of water, you instead create a 20-foot tall wave that travels from one side of the area to the other and then crashes down. Any Huge or smaller vehicles in the wave's path are carried with it to the other side. Any Huge or smaller vehicles struck by the wave have a 25 percent chance of capsizing.\n\nThe water level remains elevated until the spell ends or you choose a different effect. If this effect produced a wave, the wave repeats on the start of your next turn while the flood effect lasts.\n\n***Part Water.*** You cause water in the area to move apart and create a trench. The trench extends across the spell's area, and the separated water forms a wall to either side. The trench remains until the spell ends or you choose a different effect. The water then slowly fills in the trench over the course of the next round until the normal water level is restored.\n\n***Redirect Flow.*** You cause flowing water in the area to move in a direction you choose, even if the water has to flow over obstacles, up walls, or in other unlikely directions. The water in the area moves as you direct it, but once it moves beyond the spell's area, it resumes its flow based on the terrain conditions. The water continues to move in the direction you chose until the spell ends or you choose a different effect.\n\n***Whirlpool.*** This effect requires a body of water at least 50 feet square and 25 feet deep. You cause a whirlpool to form in the center of the area. The whirlpool forms a vortex that is 5 feet wide at the base, up to 50 feet wide at the top, and 25 feet tall. Any creature or object in the water and within 25 feet of the vortex is pulled 10 feet toward it. A creature can swim away from the vortex by making a Strength (Athletics) check against your spell save DC.\n\nWhen a creature enters the vortex for the first time on a turn or starts its turn there, it must make a strength saving throw. On a failed save, the creature takes 2d8 bludgeoning damage and is caught in the vortex until the spell ends. On a successful save, the creature takes half damage, and isn't caught in the vortex. A creature caught in the vortex can use its action to try to swim away from the vortex as described above, but has disadvantage on the Strength (Athletics) check to do so.\n\nThe first time each turn that an object enters the vortex, the object takes 2d8 bludgeoning damage; this damage occurs each round it remains in the vortex.","damage_en":"2d8 Bludgeoning","attack_type":"","range_ko":"90m(300ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"주문이 끝날 때까지, 선택한 한 변 최대 30m(100ft)의 정육면체 구역 안의 자유로운 물을 조종한다. 이 주문을 시전할 때 다음 효과 중 하나를 선택할 수 있다. 자기 턴에 행동으로 같은 효과를 반복하거나 다른 효과를 고를 수 있다.\n\n***범람.*** 구역 내 모든 고인 물의 수위를 최대 6m(20ft)까지 높인다. 구역에 물가가 포함되면, 넘친 물이 마른 땅으로 쏟아진다.\n\n큰 물속의 구역을 선택하면, 대신 6m(20ft) 높이의 파도를 만들어 구역의 한쪽에서 다른 쪽으로 이동한 뒤 부서지게 한다. 파도 경로에 있는 초대형 이하의 탈것은 함께 반대편으로 실려간다. 파도에 맞은 초대형 이하의 탈것은 25퍼센트 확률로 전복된다.\n\n수위는 주문이 끝나거나 다른 효과를 고를 때까지 높은 채로 유지된다. 이 효과가 파도를 만들었다면, 범람 효과가 지속되는 동안 다음 턴이 시작될 때마다 파도가 반복된다.\n\n***물 가르기.*** 구역 내 물을 갈라 물길을 만든다. 물길은 주문 구역을 가로질러 뻗고, 갈라진 물은 양쪽에 벽을 이룬다. 물길은 주문이 끝나거나 다른 효과를 고를 때까지 유지된다. 그 뒤 물은 다음 라운드에 걸쳐 서서히 물길을 채워 평소 수위를 회복한다.\n\n***흐름 전환.*** 구역 내 흐르는 물을, 장애물을 넘거나 벽을 오르거나 그 밖의 있음직하지 않은 방향으로라도, 시전자가 선택한 방향으로 이동하게 한다. 구역 내 물은 시전자가 지시한 대로 움직이지만, 주문 구역을 벗어나면 지형 조건에 따른 흐름을 다시 따른다. 물은 주문이 끝나거나 다른 효과를 고를 때까지 선택한 방향으로 계속 움직인다.\n\n***소용돌이.*** 이 효과는 최소 15m(50ft) 정사각형에 깊이 7.5m(25ft)의 물이 필요하다. 구역 중앙에 소용돌이를 만든다. 소용돌이는 바닥에서 폭 1.5m(5ft), 꼭대기에서 폭 최대 15m(50ft), 높이 7.5m(25ft)의 소용돌이를 이룬다. 물속에서 소용돌이의 7.5m(25ft) 이내에 있는 크리처나 물체는 소용돌이 쪽으로 3m(10ft) 끌려간다. 크리처는 시전자의 주문 내성 DC에 맞선 근력(운동) 판정으로 소용돌이에서 헤엄쳐 벗어날 수 있다.\n\n크리처가 한 턴에 처음으로 소용돌이에 들어가거나 그곳에서 턴을 시작하면, 근력 내성 굴림을 굴려야 한다. 실패 시 2d8 타격 피해를 받고 주문이 끝날 때까지 소용돌이에 갇힌다. 성공 시 절반의 피해를 받고 갇히지 않는다. 소용돌이에 갇힌 크리처는 행동을 사용해 위에 설명한 대로 헤엄쳐 벗어나려 시도할 수 있으나, 그 근력(운동) 판정에 불리 보정을 받는다.\n\n물체가 매 턴 처음으로 소용돌이에 들어가면 2d8 타격 피해를 받으며, 이 피해는 소용돌이에 남아 있는 매 라운드 발생한다.","higher_level_ko":"","damage_ko":"2d8 타격 피해","material_ko":"물 한 방울과 먼지 한 자밤."},{"name_ko":"물 창조 또는 파괴","name_en":"Create or Destroy Water","level":1,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A drop of water if creating water, or a few grains of sand if destroying it.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you create or destroy 10 additional gallons of water, or the size of the cube increases by 5 feet, for each slot level above 1st.","desc_en":"You either create or destroy water.\n\n***Create Water.*** You create up to 10 gallons of clean water within range in an open container. Alternatively, the water falls as rain in a 30-foot cube within range.\n\n***Destroy Water.*** You destroy up to 10 gallons of water in an open container within range. Alternatively, you destroy fog in a 30-foot cube within range.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"물을 창조하거나 파괴한다.\n\n***물 창조.*** 사거리 내 열린 용기 안에 깨끗한 물을 최대 10갤런까지 창조한다. 또는 사거리 내 9m(30ft) 정육면체 안에 비로 내리게 할 수 있다.\n\n***물 파괴.*** 사거리 내 열린 용기 안의 물을 최대 10갤런까지 파괴한다. 또는 사거리 내 9m(30ft) 정육면체 안의 안개를 파괴한다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 창조하거나 파괴하는 물이 10갤런씩 늘거나 정육면체의 크기가 1.5m(5ft)씩 커진다.","damage_ko":"","material_ko":"물을 창조할 경우 물 한 방울, 파괴할 경우 모래 몇 알."},{"name_ko":"물체 위치파악","name_en":"Locate Object","level":2,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A forked twig.","higher_level_en":"","desc_en":"Describe or name an object that is familiar to you. You sense the direction to the object's location, as long as that object is within 1,000 feet of you. If the object is in motion, you know the direction of its movement.\n\nThe spell can locate a specific object known to you, as long as you have seen it up close--within 30 feet--at least once. Alternatively, the spell can locate the nearest object of a particular kind, such as a certain kind of apparel, jewelry, furniture, tool, or weapon.\n\nThis spell can't locate an object if any thickness of lead, even a thin sheet, blocks a direct path between you and the object.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"시전자에게 익숙한 물체를 묘사하거나 이름을 댄다. 그 물체가 시전자로부터 1,000피트 이내에 있는 한, 물체 위치로 향하는 방향을 감지한다. 물체가 움직이고 있으면 그 이동 방향을 안다.\n\n이 주문은 시전자가 30피트 이내 가까이에서 적어도 한 번 본 적 있는 특정 물체를 찾을 수 있다. 또는 특정 종류의 옷, 장신구, 가구, 도구, 무기처럼 특정 종류의 가장 가까운 물체를 찾을 수 있다.\n\n시전자와 물체 사이 직선 경로를 납이 조금이라도, 얇은 판이라도 가로막고 있으면 이 주문은 물체를 찾을 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"끝이 갈라진 나뭇가지."},{"name_ko":"물체 조종","name_en":"Animate Objects","level":5,"school":"변환계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"If you cast this spell using a spell slot of 6th level or higher, you can animate two additional objects for each slot level above 5th.","desc_en":"Objects come to life at your command. Choose up to ten nonmagical objects within range that are not being worn or carried. Medium targets count as two objects, Large targets count as four objects, Huge targets count as eight objects. You can't animate any object larger than Huge. Each target animates and becomes a creature under your control until the spell ends or until reduced to 0 hit points.\n\nAs a bonus action, you can mentally command any creature you made with this spell if the creature is within 500 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete.\n\n##### Animated Object Statistics\n\n| Size | HP | AC | Attack | Str | Dex |\n\n|---|---|---|---|---|---|\n\n| Tiny | 20 | 18 | +8 to hit, 1d4 + 4 damage | 4 | 18 |\n\n| Small | 25 | 16 | +6 to hit, 1d8 + 2 damage | 6 | 14 |\n\n| Medium | 40 | 13 | +5 to hit, 2d6 + 1 damage | 10 | 12 |\n\n| Large | 50 | 10 | +6 to hit, 2d10 + 2 damage | 14 | 10 |\n\n| Huge | 80 | 10 | +8 to hit, 2d12 + 4 damage | 18 | 6 |\n\nAn animated object is a construct with AC, hit points, attacks, Strength, and Dexterity determined by its size. Its Constitution is 10 and its Intelligence and Wisdom are 3, and its Charisma is 1. Its speed is 30 feet; if the object lacks legs or other appendages it can use for locomotion, it instead has a flying speed of 30 feet and can hover. If the object is securely attached to a surface or a larger object, such as a chain bolted to a wall, its speed is 0. It has blindsight with a radius of 30 feet and is blind beyond that distance. When the animated object drops to 0 hit points, it reverts to its original object form, and any remaining damage carries over to its original object form.\n\nIf you command an object to attack, it can make a single melee attack against a creature within 5 feet of it. It makes a slam attack with an attack bonus and bludgeoning damage determined by its size. The GM might rule that a specific object inflicts slashing or piercing damage based on its form.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"시전자의 명령에 물체들이 생명을 얻는다. 사거리 내에서 착용하거나 소지되지 않은 비마법 물체 최대 열을 선택한다. 중형 대상은 물체 두 개, 대형 대상은 네 개, 초대형 대상은 여덟 개로 친다. 초대형보다 큰 물체는 생동시킬 수 없다. 각 대상은 생동하여, 주문이 끝나거나 히트 포인트가 0이 될 때까지 시전자가 통제하는 크리처가 된다.\n\n추가 행동으로, 이 주문으로 만든 크리처가 시전자로부터 150m(500ft) 이내에 있으면 정신적으로 명령할 수 있다(여럿을 통제하면 동시에 일부나 전부에게 같은 명령을 내릴 수 있다). 크리처가 다음 턴에 취할 행동과 이동할 곳을 정하거나, 특정 방이나 복도를 지키라는 식의 대략적인 명령을 내릴 수 있다. 명령을 내리지 않으면, 크리처는 적대적인 크리처로부터 스스로를 방어할 뿐이다. 명령을 내리면 크리처는 그 작업을 완수할 때까지 계속 따른다.\n\n##### 생동한 물체 능력치\n\n| 크기 | HP | AC | 공격 | 근력 | 민첩 |\n|---|---|---|---|---|---|\n| 초소형 | 20 | 18 | 명중 +8, 1d4+4 피해 | 4 | 18 |\n| 소형 | 25 | 16 | 명중 +6, 1d8+2 피해 | 6 | 14 |\n| 중형 | 40 | 13 | 명중 +5, 2d6+1 피해 | 10 | 12 |\n| 대형 | 50 | 10 | 명중 +6, 2d10+2 피해 | 14 | 10 |\n| 초대형 | 80 | 10 | 명중 +8, 2d12+4 피해 | 18 | 6 |\n\n생동한 물체는 크기에 따라 정해지는 방어도(AC), 히트 포인트, 공격, 근력, 민첩을 지닌 구조물이다. 건강은 10, 지능과 지혜는 3, 매력은 1이다. 이동속도는 9m(30ft)이며, 이동에 쓸 다리나 다른 부속지가 없으면 대신 9m(30ft)의 비행 속도를 갖고 부양할 수 있다. 벽에 볼트로 고정된 사슬처럼 표면이나 더 큰 물체에 단단히 붙어 있으면 이동속도가 0이다. 반경 9m(30ft)의 맹안시야를 가지며 그 거리 너머로는 앞을 못 본다. 생동한 물체의 히트 포인트가 0이 되면 원래 물체 형태로 돌아가며, 남은 피해는 원래 물체 형태로 이어진다.\n\n물체에게 공격을 명령하면, 그 1.5m(5ft) 이내의 크리처에게 근접 공격을 한 번 할 수 있다. 크기에 따라 정해지는 명중 보너스와 타격 피해로 후려치기 공격을 한다. DM은 물체의 형태에 따라 특정 물체가 참격이나 관통 피해를 준다고 판정할 수 있다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 물체를 두 개씩 추가로 생동시킬 수 있다.","damage_ko":"","material_ko":""},{"name_ko":"미로","name_en":"Maze","level":8,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"You banish a creature that you can see within range into a labyrinthine demiplane. The target remains there for the duration or until it escapes the maze.\n\nThe target can use its action to attempt to escape. When it does so, it makes a DC 20 Intelligence check. If it succeeds, it escapes, and the spell ends (a minotaur or goristro demon automatically succeeds).\n\nWhen the spell ends, the target reappears in the space it left or, if that space is occupied, in the nearest unoccupied space.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"바람 걷기","name_en":"Wind Walk","level":6,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 minute","duration_en":"8 hours","material_en":"Fire and holy water.","higher_level_en":"","desc_en":"You and up to ten willing creatures you can see within range assume a gaseous form for the duration, appearing as wisps of cloud. While in this cloud form, a creature has a flying speed of 300 feet and has resistance to damage from nonmagical weapons. The only actions a creature can take in this form are the Dash action or to revert to its normal form. Reverting takes 1 minute, during which time a creature is incapacitated and can't move. Until the spell ends, a creature can revert to cloud form, which also requires the 1-minute transformation.\n\nIf a creature is in cloud form and flying when the effect ends, the creature descends 60 feet per round for 1 minute until it lands, which it does safely. If it can't land after 1 minute, the creature falls the remaining distance.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"바람의 벽","name_en":"Wind Wall","level":3,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A tiny fan and a feather of exotic origin.","higher_level_en":"","desc_en":"A wall of strong wind rises from the ground at a point you choose within range. You can make the wall up to 50 feet long, 15 feet high, and 1 foot thick. You can shape the wall in any way you choose so long as it makes one continuous path along the ground. The wall lasts for the duration.\n\nWhen the wall appears, each creature within its area must make a strength saving throw. A creature takes 3d8 bludgeoning damage on a failed save, or half as much damage on a successful one.\n\nThe strong wind keeps fog, smoke, and other gases at bay. Small or smaller flying creatures or objects can't pass through the wall. Loose, lightweight materials brought into the wall fly upward. Arrows, bolts, and other ordinary projectiles launched at targets behind the wall are deflected upward and automatically miss. (Boulders hurled by giants or siege engines, and similar projectiles, are unaffected.) Creatures in gaseous form can't pass through it.","damage_en":"3d8 Bludgeoning","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 선택한 지점의 땅에서 강풍의 벽이 솟아오른다. 벽은 길이 최대 15m(50ft), 높이 4.5m(15ft), 두께 1피트로 만들 수 있다. 땅을 따라 하나의 연속된 경로를 이루는 한, 원하는 어떤 형태로든 벽을 빚을 수 있다. 벽은 지속시간 동안 유지된다.\n\n벽이 나타날 때, 그 구역 안의 각 크리처는 근력 내성 굴림을 굴려야 한다. 실패 시 3d8 타격 피해를, 성공 시 절반의 피해를 받는다.\n\n강풍은 안개, 연기, 그 밖의 기체를 막는다. 소형 이하의 비행 크리처나 물체는 벽을 통과할 수 없다. 벽에 휩쓸린 헐겁고 가벼운 물질은 위로 날아오른다. 벽 뒤의 대상을 향해 쏜 화살, 볼트, 그 밖의 평범한 발사체는 위로 튕겨 나가 자동으로 빗나간다(거인이나 공성 병기가 던진 바위 등 유사한 발사체는 영향받지 않는다). 기체 형태의 크리처는 통과할 수 없다.","higher_level_ko":"","damage_ko":"3d8 타격 피해","material_ko":"작은 부채와 이국적인 기원의 깃털."},{"name_ko":"바위 형상","name_en":"Stone Shape","level":4,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Soft clay, to be crudely worked into the desired shape for the stone object.","higher_level_en":"","desc_en":"You touch a stone object of Medium size or smaller or a section of stone no more than 5 feet in any dimension and form it into any shape that suits your purpose. So, for example, you could shape a large rock into a weapon, idol, or coffer, or make a small passage through a wall, as long as the wall is less than 5 feet thick. You could also shape a stone door or its frame to seal the door shut. The object you create can have up to two hinges and a latch, but finer mechanical detail isn't possible.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"중형 이하의 돌 물체나 어느 방향으로도 1.5m(5ft)를 넘지 않는 돌 부분을 접촉해, 목적에 맞는 어떤 형태로든 빚는다. 예를 들어 큰 바위를 무기, 우상, 궤로 빚거나, 두께 1.5m(5ft) 미만인 벽에 작은 통로를 낼 수 있다. 돌문이나 그 틀을 빚어 문을 봉할 수도 있다. 만드는 물체는 경첩 두 개와 걸쇠 하나까지 가질 수 있으나, 그보다 정교한 기계적 세부는 불가능하다.","higher_level_ko":"","damage_ko":"","material_ko":"돌 물체의 원하는 형태로 대강 빚을 부드러운 점토."},{"name_ko":"바위의 벽","name_en":"Wall of Stone","level":5,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A small block of granite.","higher_level_en":"","desc_en":"A nonmagical wall of solid stone springs into existence at a point you choose within range. The wall is 6 inches thick and is composed of ten 10-foot-by-10-foot panels. Each panel must be contiguous with at least one other panel. Alternatively, you can create 10-foot-by-20-foot panels that are only 3 inches thick.\n\nIf the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (your choice). If a creature would be surrounded on all sides by the wall (or the wall and another solid surface), that creature can make a dexterity saving throw. On a success, it can use its reaction to move up to its speed so that it is no longer enclosed by the wall.\n\nThe wall can have any shape you desire, though it can't occupy the same space as a creature or object. The wall doesn't need to be vertical or rest on any firm foundation. It must, however, merge with and be solidly supported by existing stone. Thus, you can use this spell to bridge a chasm or create a ramp.\n\nIf you create a span greater than 20 feet in length, you must halve the size of each panel to create supports. You can crudely shape the wall to create crenellations, battlements, and so on.\n\nThe wall is an object made of stone that can be damaged and thus breached. Each panel has AC 15 and 30 hit points per inch of thickness. Reducing a panel to 0 hit points destroys it and might cause connected panels to collapse at the GM's discretion.\n\nIf you maintain your concentration on this spell for its whole duration, the wall becomes permanent and can't be dispelled. Otherwise, the wall disappears when the spell ends.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에 비마법적인 돌의 벽을 솟아나게 한다. 벽은 두께 6인치이며, 각각 10피트×10피트인 판 열 개로 이루어진다. 각 판은 다른 판 하나와 반드시 인접해야 한다. 또는 5피트×10피트인 판 열 개를 만들어, 최대 3m(10ft) 폭의 구덩이나 틈을 건너는 다리나 경사로를 만들 수도 있다.\n\n벽은 어떤 형태로든 빚을 수 있으나, 통과할 수 없어야 한다. 벽의 길이는 총 30m(100ft), 높이는 6m(20ft), 두께는 6인치까지 가능하다. 벽이 기존 크리처의 공간을 지나가면, 벽이 나타날 때 그 크리처는 어느 쪽으로든 밀려나거나(시전자 선택) 벽에 맞선 판정을 굴린다.\n\n크리처의 공간을 지나도록 벽을 위치시키면, 그 크리처는 어느 한쪽으로 밀려난다. 크리처가 완전히 둘러싸이는 것을 견딜 수 없으면, 판 하나를 지나갈 수 있다.\n\n정신집중으로 지속시간 동안 벽을 유지하면 벽이 영구적이 되어 더 이상 해제할 수 없다. 그렇지 않으면 정신집중이 끝날 때 벽이 사라진다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 화강암 덩어리."},{"name_ko":"바위피부","name_en":"Stoneskin","level":4,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"Diamond dust worth 100 gp, which the spell consumes.","higher_level_en":"","desc_en":"This spell turns the flesh of a willing creature you touch as hard as stone. Until the spell ends, the target has resistance to nonmagical bludgeoning, piercing, and slashing damage.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"이 주문은 접촉한 동의하는 크리처의 살을 돌처럼 단단하게 만든다. 주문이 끝날 때까지 대상은 비마법 타격, 관통, 참격 피해에 저항을 얻는다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 100gp 가치의 다이아몬드 가루."},{"name_ko":"반공감/공감","name_en":"Antipathy/Sympathy","level":8,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 hour","duration_en":"10 days","material_en":"Either a lump of alum soaked in vinegar for the antipathy effect or a drop of honey for the sympathy effect.","higher_level_en":"","desc_en":"This spell attracts or repels creatures of your choice. You target something within range, either a Huge or smaller object or creature or an area that is no larger than a 200-foot cube. Then specify a kind of intelligent creature, such as red dragons, goblins, or vampires. You invest the target with an aura that either attracts or repels the specified creatures for the duration. Choose antipathy or sympathy as the aura's effect.\n\n***Antipathy.*** The enchantment causes creatures of the kind you designated to feel an intense urge to leave the area and avoid the target. When such a creature can see the target or comes within 60 feet of it, the creature must succeed on a wisdom saving throw or become frightened. The creature remains frightened while it can see the target or is within 60 feet of it. While frightened by the target, the creature must use its movement to move to the nearest safe spot from which it can't see the target. If the creature moves more than 60 feet from the target and can't see it, the creature is no longer frightened, but the creature becomes frightened again if it regains sight of the target or moves within 60 feet of it.\n\n***Sympathy.*** The enchantment causes the specified creatures to feel an intense urge to approach the target while within 60 feet of it or able to see it. When such a creature can see the target or comes within 60 feet of it, the creature must succeed on a wisdom saving throw or use its movement on each of its turns to enter the area or move within reach of the target. When the creature has done so, it can't willingly move away from the target.\n\nIf the target damages or otherwise harms an affected creature, the affected creature can make a wisdom saving throw to end the effect, as described below.\n\n***Ending the Effect.*** If an affected creature ends its turn while not within 60 feet of the target or able to see it, the creature makes a wisdom saving throw. On a successful save, the creature is no longer affected by the target and recognizes the feeling of repugnance or attraction as magical. In addition, a creature affected by the spell is allowed another wisdom saving throw every 24 hours while the spell persists.\n\nA creature that successfully saves against this effect is immune to it for 1 minute, after which time it can be affected again.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"반마법장","name_en":"Antimagic Field","level":8,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A pinch of powdered iron or iron filings.","higher_level_en":"","desc_en":"A 10-foot-radius invisible sphere of antimagic surrounds you. This area is divorced from the magical energy that suffuses the multiverse. Within the sphere, spells can't be cast, summoned creatures disappear, and even magic items become mundane. Until the spell ends, the sphere moves with you, centered on you.\n\nSpells and other magical effects, except those created by an artifact or a deity, are suppressed in the sphere and can't protrude into it. A slot expended to cast a suppressed spell is consumed. While an effect is suppressed, it doesn't function, but the time it spends suppressed counts against its duration.\n\n***Targeted Effects.*** Spells and other magical effects, such as magic missile and charm person, that target a creature or an object in the sphere have no effect on that target.\n\n***Areas of Magic.*** The area of another spell or magical effect, such as fireball, can't extend into the sphere. If the sphere overlaps an area of magic, the part of the area that is covered by the sphere is suppressed. For example, the flames created by a wall of fire are suppressed within the sphere, creating a gap in the wall if the overlap is large enough.\n\n***Spells.*** Any active spell or other magical effect on a creature or an object in the sphere is suppressed while the creature or object is in it.\n\n***Magic Items.*** The properties and powers of magic items are suppressed in the sphere. For example, a +1 longsword in the sphere functions as a nonmagical longsword.\n\nA magic weapon's properties and powers are suppressed if it is used against a target in the sphere or wielded by an attacker in the sphere. If a magic weapon or a piece of magic ammunition fully leaves the sphere (for example, if you fire a magic arrow or throw a magic spear at a target outside the sphere), the magic of the item ceases to be suppressed as soon as it exits.\n\n***Magical Travel.*** Teleportation and planar travel fail to work in the sphere, whether the sphere is the destination or the departure point for such magical travel. A portal to another location, world, or plane of existence, as well as an opening to an extradimensional space such as that created by the rope trick spell, temporarily closes while in the sphere.\n\n***Creatures and Objects.*** A creature or object summoned or created by magic temporarily winks out of existence in the sphere. Such a creature instantly reappears once the space the creature occupied is no longer within the sphere.\n\n***Dispel Magic.*** Spells and magical effects such as dispel magic have no effect on the sphere. Likewise, the spheres created by different antimagic field spells don't nullify each other.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"반생명 보호막","name_en":"Antilife Shell","level":5,"school":"방호계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"","desc_en":"A shimmering barrier extends out from you in a 10-foot radius and moves with you, remaining centered on you and hedging out creatures other than undead and constructs. The barrier lasts for the duration.\n\nThe barrier prevents an affected creature from passing or reaching through. An affected creature can cast spells or make attacks with ranged or reach weapons through the barrier.\n\nIf you move so that an affected creature is forced to pass through the barrier, the spell ends.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"어른거리는 장벽이 시전자로부터 3m(10ft) 뻗어나가, 지속시간 동안 시전자와 함께 이동하는 반구를 이룬다. 이 장벽은 구조물이나 언데드가 아닌 크리처가 통과하거나 장벽을 뚫고 뻗지 못하게 막는다.\n\n장벽은 시전자가 이런 크리처를 상대로 하는 것을 막지 않는다. 시전자가 이동해 그런 크리처가 장벽을 통과하게 하면, 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"방비의 유대","name_en":"Warding Bond","level":2,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A pair of platinum rings worth at least 50gp each, which you and the target must wear for the duration.","higher_level_en":"","desc_en":"This spell wards a willing creature you touch and creates a mystic connection between you and the target until the spell ends. While the target is within 60 feet of you, it gains a +1 bonus to AC and saving throws, and it has resistance to all damage. Also, each time it takes damage, you take the same amount of damage.\n\nThe spell ends if you drop to 0 hit points or if you and the target become separated by more than 60 feet.\n\nIt also ends if the spell is cast again on either of the connected creatures. You can also dismiss the spell as an action.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"접촉한 동의하는 크리처 하나를 보호하고, 주문이 끝날 때까지 시전자와 대상 사이에 신비한 연결을 만든다. 대상이 시전자로부터 18m(60ft) 이내에 있는 동안, 방어도(AC)와 내성 굴림에 +1 보너스를 받고 모든 피해에 저항을 얻는다. 또한 대상이 피해를 받을 때마다 시전자도 같은 양의 피해를 받는다.\n\n시전자의 히트 포인트가 0이 되거나 시전자와 대상이 18m(60ft)를 넘게 떨어지면 주문이 끝난다.\n\n연결된 두 크리처 중 하나에게 이 주문이 다시 시전되어도 끝난다. 행동을 사용해 주문을 해제할 수도 있다.","higher_level_ko":"","damage_ko":"","material_ko":"각각 50gp 이상 가치의 백금 반지 한 쌍. 시전자와 대상이 지속시간 동안 착용해야 한다."},{"name_ko":"방패","name_en":"Shield","level":1,"school":"방호계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 reaction","duration_en":"1 round","material_en":"","higher_level_en":"","desc_en":"An invisible barrier of magical force appears and protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from magic missile.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 반응행동","duration_ko":"1 라운드","desc_ko":"보이지 않는 마법 역장의 장벽이 나타나 시전자를 보호한다. 다음 턴이 시작될 때까지, 이 주문을 유발한 공격을 포함해 방어도(AC)에 +5 보너스를 받으며, 마법 화살 주문으로 인한 피해를 받지 않는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"번개","name_en":"Lightning Bolt","level":3,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A bit of fur and a rod of amber, crystal, or glass.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd.","desc_en":"A stroke of lightning forming a line 100 feet long and 5 feet wide blasts out from you in a direction you choose. Each creature in the line must make a dexterity saving throw. A creature takes 8d6 lightning damage on a failed save, or half as much damage on a successful one.\n\nThe lightning ignites flammable objects in the area that aren't being worn or carried.","damage_en":"8d6 Lightning","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"길이 30m(100ft), 폭 1.5m(5ft)의 직선을 이루는 번개가 시전자로부터 선택한 방향으로 뻗어나간다. 그 직선 안의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 8d6 번개 피해를, 성공 시 절반의 피해를 받는다.\n\n번개는 착용하거나 소지되지 않은 인화성 물체에 불을 붙인다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 피해가 1d6씩 증가한다.","damage_ko":"8d6 번개 피해","material_ko":"털 조각과 호박, 수정, 또는 유리로 된 막대."},{"name_ko":"번개 화살","name_en":"Lightning Arrow","level":3,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"벽통과","name_en":"Passwall","level":5,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A pinch of sesame seeds.","higher_level_en":"","desc_en":"A passage appears at a point of your choice that you can see on a wooden, plaster, or stone surface (such as a wall, a ceiling, or a floor) within range, and lasts for the duration. You choose the opening's dimensions: up to 5 feet wide, 8 feet tall, and 20 feet deep. The passage creates no instability in a structure surrounding it.\n\nWhen the opening disappears, any creatures or objects still in the passage created by the spell are safely ejected to an unoccupied space nearest to the surface on which you cast the spell.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"이 주문을 시전하면, 사거리 내에서 볼 수 있는 나무, 회반죽, 돌 같은 표면에 통로가 나타나 지속시간 동안 유지된다. 통로의 크기는 높이 1.5m(5ft), 폭 2.4m(8ft), 깊이 6m(20ft)까지 시전자가 정한다. 이 통로는 그 지나는 표면이나 물질의 반대편으로 뚫는 구조적 안정성을 무너뜨리지 않는다.\n\n통로가 사라질 때 그 안에 있던 크리처나 물체는 통로가 있던 물질에서 가장 가까운 빈 공간으로 안전하게 밀려난다.","higher_level_ko":"","damage_ko":"","material_ko":"참깨 한 자밤."},{"name_ko":"변신","name_en":"Polymorph","level":4,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A caterpillar cocoon.","higher_level_en":"","desc_en":"This spell transforms a creature that you can see within range into a new form. An unwilling creature must make a wisdom saving throw to avoid the effect. A shapechanger automatically succeeds on this saving throw.\n\nThe transformation lasts for the duration, or until the target drops to 0 hit points or dies. The new form can be any beast whose challenge rating is equal to or less than the target's (or the target's level, if it doesn't have a challenge rating). The target's game statistics, including mental ability scores, are replaced by the statistics of the chosen beast. It retains its alignment and personality.\n\nThe target assumes the hit points of its new form. When it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious.\n\nThe creature is limited in the actions it can perform by the nature of its new form, and it can't speak, cast spells, or take any other action that requires hands or speech.\n\nThe target's gear melds into the new form. The creature can't activate, use, wield, or otherwise benefit from any of its equipment.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"이 주문은 사거리 내에서 볼 수 있는 크리처를 새로운 형태로 변형시킨다. 원치 않는 크리처는 지혜 내성 굴림에 성공해야 효과를 피한다. 변신자는 이 내성 굴림에 자동으로 성공한다.\n\n변형은 지속시간 동안, 또는 대상의 히트 포인트가 0이 되거나 죽을 때까지 지속된다. 새 형태는 도전 지수가 대상의 도전 지수(도전 지수가 없으면 대상의 레벨) 이하인 어떤 야수든 될 수 있다. 정신 능력치를 포함한 대상의 게임 능력치가 선택한 야수의 능력치로 대체된다. 대상은 자신의 성향과 성격은 유지한다.\n\n대상은 새 형태의 히트 포인트를 갖는다. 원래 형태로 돌아오면 변형 전에 가졌던 히트 포인트로 돌아온다. 히트 포인트가 0이 되어 돌아오는 경우, 초과 피해는 원래 형태로 이어진다. 초과 피해가 크리처의 원래 형태를 0 히트 포인트로 떨어뜨리지 않는 한, 무의식 상태가 되지는 않는다.\n\n크리처는 새 형태의 특성상 할 수 있는 행동이 제한되며, 말하거나, 주문을 시전하거나, 손이나 말이 필요한 다른 행동을 할 수 없다.\n\n대상의 장비는 새 형태에 융합된다. 크리처는 장비를 작동시키거나, 사용하거나, 휘두르거나, 달리 그 이점을 얻을 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"애벌레 고치."},{"name_ko":"보이지 않는 하인","name_en":"Unseen Servant","level":1,"school":"조형계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A piece of string and a bit of wood.","higher_level_en":"","desc_en":"This spell creates an invisible, mindless, shapeless force that performs simple tasks at your command until the spell ends. The servant springs into existence in an unoccupied space on the ground within range. It has AC 10, 1 hit point, and a Strength of 2, and it can't attack. If it drops to 0 hit points, the spell ends.\n\nOnce on each of your turns as a bonus action, you can mentally command the servant to move up to 15 feet and interact with an object. The servant can perform simple tasks that a human servant could do, such as fetching things, cleaning, mending, folding clothes, lighting fires, serving food, and pouring wine. Once you give the command, the servant performs the task to the best of its ability until it completes the task, then waits for your next command.\n\nIf you command the servant to perform a task that would move it more than 60 feet away from you, the spell ends.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"이 주문은 보이지 않고 지성이 없으며 형체 없는 힘을 만들어, 주문이 끝날 때까지 시전자의 명령에 따라 간단한 작업을 수행하게 한다. 하인은 사거리 내 바닥의 빈 공간에 나타난다. 방어도(AC) 10, 히트 포인트 1점, 근력 2를 지니며 공격할 수 없다. 히트 포인트가 0이 되면 주문이 끝난다.\n\n자기 턴마다 한 번, 추가 행동으로 하인에게 정신적으로 명령해 최대 4.5m(15ft) 이동하고 물체와 상호작용하게 할 수 있다. 하인은 물건 가져오기, 청소, 수선, 옷 개기, 불 피우기, 음식 나르기, 술 따르기처럼 인간 하인이 할 수 있는 간단한 작업을 수행할 수 있다. 명령을 내리면 하인은 작업을 완료할 때까지 최선을 다해 수행한 뒤, 다음 명령을 기다린다.\n\n하인이 시전자로부터 18m(60ft) 넘게 멀어지는 작업을 명령하면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"실 한 조각과 나무 조각."},{"name_ko":"보호와 방비","name_en":"Guards and Wards","level":6,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"10 minutes","duration_en":"24 hours","material_en":"Burning incense, a small measure of brimstone and oil, a knotted string, a small amount of umber hulk blood, and a small silver rod worth at least 10 gp.","higher_level_en":"","desc_en":"You create a ward that protects up to 2,500 square feet of floor space (an area 50 feet square, or one hundred 5-foot squares or twenty-five 10-foot squares). The warded area can be up to 20 feet tall, and shaped as you desire. You can ward several stories of a stronghold by dividing the area among them, as long as you can walk into each contiguous area while you are casting the spell.\n\nWhen you cast this spell, you can specify individuals that are unaffected by any or all of the effects that you choose. You can also specify a password that, when spoken aloud, makes the speaker immune to these effects.\n\nGuards and wards creates the following effects within the warded area.\n\n***Corridors.*** Fog fills all the warded corridors, making them heavily obscured. In addition, at each intersection or branching passage offering a choice of direction, there is a 50 percent chance that a creature other than you will believe it is going in the opposite direction from the one it chooses.\n\n***Doors.*** All doors in the warded area are magically locked, as if sealed by an arcane lock spell. In addition, you can cover up to ten doors with an illusion (equivalent to the illusory object function of the minor illusion spell) to make them appear as plain sections of wall.\n\n***Stairs.*** Webs fill all stairs in the warded area from top to bottom, as the web spell. These strands regrow in 10 minutes if they are burned or torn away while guards and wards lasts.\n\n***Other Spell Effect.*** You can place your choice of one of the following magical effects within the warded area of the stronghold.\n\n- Place dancing lights in four corridors. You can designate a simple program that the lights repeat as long as guards and wards lasts.\n\n- Place magic mouth in two locations.\n\n- Place stinking cloud in two locations. The vapors appear in the places you designate; they return within 10 minutes if dispersed by wind while guards and wards lasts.\n\n- Place a constant gust of wind in one corridor or room.\n\n- Place a suggestion in one location. You select an area of up to 5 feet square, and any creature that enters or passes through the area receives the suggestion mentally.\n\nThe whole warded area radiates magic. A dispel magic cast on a specific effect, if successful, removes only that effect.\n\nYou can create a permanently guarded and warded structure by casting this spell there every day for one year.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"보호의 문양","name_en":"Glyph of Warding","level":3,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 hour","duration_en":"Until dispelled","material_en":"Incense and powdered diamond worth at least 200 gp, which the spell consumes.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the damage of an explosive runes glyph increases by 1d8 for each slot level above 3rd. If you create a spell glyph, you can store any spell of up to the same level as the slot you use for the glyph of warding.","desc_en":"When you cast this spell, you inscribe a glyph that harms other creatures, either upon a surface (such as a table or a section of floor or wall) or within an object that can be closed (such as a book, a scroll, or a treasure chest) to conceal the glyph. If you choose a surface, the glyph can cover an area of the surface no larger than 10 feet in diameter. If you choose an object, that object must remain in its place; if the object is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered.\n\nThe glyph is nearly invisible and requires a successful Intelligence (Investigation) check against your spell save DC to be found.\n\nYou decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, the most typical triggers include touching or standing on the glyph, removing another object covering the glyph, approaching within a certain distance of the glyph, or manipulating the object on which the glyph is inscribed. For glyphs inscribed within an object, the most common triggers include opening that object, approaching within a certain distance of the object, or seeing or reading the glyph. Once a glyph is triggered, this spell ends.\n\nYou can further refine the trigger so the spell activates only under certain circumstances or according to physical characteristics (such as height or weight), creature kind (for example, the ward could be set to affect aberrations or drow), or alignment. You can also set conditions for creatures that don't trigger the glyph, such as those who say a certain password.\n\nWhen you inscribe the glyph, choose *explosive runes* or a *spell glyph*.\n\n***Explosive Runes.*** When triggered, the glyph erupts with magical energy in a 20-foot-radius sphere centered on the glyph. The sphere spreads around corners. Each creature in the area must make a Dexterity saving throw. A creature takes 5d8 acid, cold, fire, lightning, or thunder damage on a failed saving throw (your choice when you create the glyph), or half as much damage on a successful one.\n\n***Spell Glyph.*** You can store a prepared spell of 3rd level or lower in the glyph by casting it as part of creating the glyph. The spell must target a single creature or an area. The spell being stored has no immediate effect when cast in this way. When the glyph is triggered, the stored spell is cast. If the spell has a target, it targets the creature that triggered the glyph. If the spell affects an area, the area is centered on that creature. If the spell summons hostile creatures or creates harmful objects or traps, they appear as close as possible to the intruder and attack it. If the spell requires concentration, it lasts until the end of its full duration.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 시간","duration_ko":"무효화될 때까지","desc_ko":"이 주문을 시전하면, 다른 크리처를 해치는 문양을 표면(탁자, 바닥, 벽의 일부 등)에 새기거나, 닫을 수 있는 물체(책, 두루마리, 보물 상자 등) 안에 새겨 숨긴다. 표면을 택하면 문양은 지름 3m(10ft) 이하의 구역을 덮을 수 있다. 물체를 택하면 그 물체는 제자리에 있어야 한다. 물체가 시전한 곳에서 3m(10ft) 넘게 옮겨지면 문양이 깨지고, 유발되지 않은 채 주문이 끝난다.\n\n문양은 거의 보이지 않으며, 시전자의 주문 내성 DC에 맞서는 지능(수사) 판정에 성공해야 발견할 수 있다.\n\n주문을 시전할 때 무엇이 문양을 유발할지 정한다. 표면에 새긴 문양의 대표적인 유발 조건으로는 문양을 건드리거나 밟기, 문양을 덮은 다른 물체 치우기, 문양에서 일정 거리 이내로 접근, 문양이 새겨진 물체를 다루기 등이 있다. 물체 안에 새긴 문양의 흔한 유발 조건으로는 그 물체 열기, 물체에서 일정 거리 이내로 접근, 문양을 보거나 읽기 등이 있다. 문양이 한 번 유발되면 이 주문이 끝난다.\n\n유발 조건을 더 정교하게 다듬어, 특정 상황에서만, 또는 신체적 특징(키나 몸무게 등), 크리처 종류(예를 들어 이형체나 드로우에게 영향을 주도록 설정), 성향에 따라서만 주문이 발동하게 할 수 있다. 특정 암호를 말하는 크리처처럼 문양을 유발하지 않는 크리처에 대한 조건도 설정할 수 있다.\n\n문양을 새길 때, ***폭발 룬*** 또는 ***주문 문양*** 중 하나를 선택한다.\n\n***폭발 룬.*** 유발되면 문양을 중심으로 한 6m(20ft) 반경 구체에 마법 에너지가 터진다. 구체는 모퉁이를 돌아 퍼질 수 있다. 그 구역의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 5d8 산성, 냉기, 화염, 번개, 또는 천둥 피해(문양을 만들 때 시전자가 선택)를, 성공 시 절반의 피해를 받는다.\n\n***주문 문양.*** 문양을 만드는 일부로 3레벨 이하의 준비된 주문을 시전하여 문양에 저장할 수 있다. 그 주문은 크리처 하나나 구역을 대상으로 해야 한다. 이렇게 저장되는 주문은 시전 시 즉각적인 효과가 없다. 문양이 유발되면 저장된 주문이 시전된다. 주문에 대상이 있으면 문양을 유발한 크리처를 대상으로 삼는다. 주문이 구역에 영향을 주면 그 크리처를 중심으로 삼는다. 주문이 적대적인 크리처를 소환하거나 해로운 물체나 함정을 만들면, 그것들은 침입자와 가능한 한 가까이 나타나 공격한다. 주문이 정신집중을 요구하면 전체 지속시간이 끝날 때까지 지속된다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 폭발 룬 문양의 피해가 1d8씩 증가한다. 주문 문양을 만드는 경우, 보호의 문양에 사용한 슬롯과 같은 레벨까지의 주문을 저장할 수 있다.","damage_ko":"","material_ko":"이 주문이 소모하는 200gp 이상 가치의 향과 다이아몬드 가루."},{"name_ko":"복수의 폭풍","name_en":"Storm of Vengeance","level":9,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Sight","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"A churning storm cloud forms, centered on a point you can see and spreading to a radius of 360 feet. Lightning flashes in the area, thunder booms, and strong winds roar. Each creature under the cloud (no more than 5,000 feet beneath the cloud) when it appears must make a constitution saving throw. On a failed save, a creature takes 2d6 thunder damage and becomes deafened for 5 minutes.\n\nEach round you maintain concentration on this spell, the storm produces additional effects on your turn.\n\n***Round 2.*** Acidic rain falls from the cloud. Each creature and object under the cloud takes 1d6 acid damage.\n\n***Round 3.*** You call six bolts of lightning from the cloud to strike six creatures or objects of your choice beneath the cloud. A given creature or object can't be struck by more than one bolt. A struck creature must make a dexterity saving throw. The creature takes 10d6 lightning damage on a failed save, or half as much damage on a successful one.\n\n***Round 4.*** Hailstones rain down from the cloud. Each creature under the cloud takes 2d6 bludgeoning damage.\n\n***Round 5-10.*** Gusts and freezing rain assail the area under the cloud. The area becomes difficult terrain and is heavily obscured. Each creature there takes 1d6 cold damage. Ranged weapon attacks in the area are impossible. The wind and rain count as a severe distraction for the purposes of maintaining concentration on spells. Finally, gusts of strong wind (ranging from 20 to 50 miles per hour) automatically disperse fog, mists, and similar phenomena in the area, whether mundane or magical.","damage_en":"2d6 Thunder","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"2d6 천둥 피해","material_ko":""},{"name_ko":"복제","name_en":"Clone","level":8,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 hour","duration_en":"Instantaneous","material_en":"A diamond worth at least 1,000 gp and at least 1 cubic inch of flesh of the creature that is to be cloned, which the spell consumes, and a vessel worth at least 2,000 gp that has a sealable lid and is large enough to hold a Medium creature, such as a huge urn, coffin, mud-filled cyst in the ground, or crystal container filled with salt water.","higher_level_en":"","desc_en":"This spell grows an inert duplicate of a living creature as a safeguard against death. This clone forms inside a sealed vessel and grows to full size and maturity after 120 days; you can also choose to have the clone be a younger version of the same creature. It remains inert and endures indefinitely, as long as its vessel remains undisturbed.\n\nAt any time after the clone matures, if the original creature dies, its soul transfers to the clone, provided that the soul is free and willing to return. The clone is physically identical to the original and has the same personality, memories, and abilities, but none of the original's equipment. The original creature's physical remains, if they still exist, become inert and can't thereafter be restored to life, since the creature's soul is elsewhere.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"부양","name_en":"Levitate","level":2,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"Either a small leather loop or a piece of golden wire bent into a cup shape with a long shank on one end.","higher_level_en":"","desc_en":"One creature or object of your choice that you can see within range rises vertically, up to 20 feet, and remains suspended there for the duration. The spell can levitate a target that weighs up to 500 pounds. An unwilling creature that succeeds on a constitution saving throw is unaffected.\n\nThe target can move only by pushing or pulling against a fixed object or surface within reach (such as a wall or a ceiling), which allows it to move as if it were climbing. You can change the target's altitude by up to 20 feet in either direction on your turn. If you are the target, you can move up or down as part of your move. Otherwise, you can use your action to move the target, which must remain within the spell's range.\n\nWhen the spell ends, the target floats gently to the ground if it is still aloft.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에서 볼 수 있는, 선택한 크리처나 물체 하나가 수직으로 최대 6m(20ft) 떠올라 지속시간 동안 그곳에 매달려 있는다. 이 주문은 최대 500파운드까지의 대상을 부양시킬 수 있다. 건강 내성 굴림에 성공한 원치 않는 크리처는 영향받지 않는다.\n\n대상은 손이 닿는 고정된 물체나 표면(벽이나 천장 등)을 밀거나 당겨야만 이동할 수 있으며, 그렇게 하면 등반하듯 이동할 수 있다. 시전자는 자기 턴에 대상의 고도를 어느 방향으로든 최대 6m(20ft) 바꿀 수 있다. 시전자 자신이 대상이면 이동의 일부로 오르내릴 수 있다. 그 외에는 행동을 사용해 대상을 이동시키며, 대상은 주문의 사거리 내에 있어야 한다.\n\n주문이 끝날 때 대상이 아직 떠 있으면 부드럽게 지면으로 내려온다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 가죽 고리, 또는 한쪽 끝에 긴 자루가 달린 컵 모양으로 구부린 금 철사."},{"name_ko":"부활","name_en":"Resurrection","level":7,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 hour","duration_en":"Instantaneous","material_en":"A diamond worth at least 1,000gp, which the spell consumes.","higher_level_en":"","desc_en":"You touch a dead creature that has been dead for no more than a century, that didn't die of old age, and that isn't undead. If its soul is free and willing, the target returns to life with all its hit points.\n\nThis spell neutralizes any poisons and cures normal diseases afflicting the creature when it died. It doesn't, however, remove magical diseases, curses, and the like; if such effects aren't removed prior to casting the spell, they afflict the target on its return to life.\n\nThis spell closes all mortal wounds and restores any missing body parts.\n\nComing back from the dead is an ordeal. The target takes a -4 penalty to all attack rolls, saving throws, and ability checks. Every time the target finishes a long rest, the penalty is reduced by 1 until it disappears.\n\nCasting this spell to restore life to a creature that has been dead for one year or longer taxes you greatly. Until you finish a long rest, you can't cast spells again, and you have disadvantage on all attack rolls, ability checks, and saving throws.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"분노의 강타","name_en":"Wrathful Smite","level":1,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"분쇄","name_en":"Shatter","level":2,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A burst of mica.","higher_level_en":"When you cast this spell using a 3 or higher level spell slot, the damage of the spell increases by 1d8 for each level of higher spell slot 2.","desc_en":"A sudden loud ringing noise, painfully intense, erupts from a point of your choice within range. Each creature in a 10-foot-radius sphere centered on that point must make a Constitution saving throw. A creature takes 3d8 thunder damage on a failed save, or half as much damage on a successful one. A creature made of inorganic material such as stone, crystal, or metal has disadvantage on this saving throw.\n\nA non-magical item that is not worn or carried also suffers damage if it is in the area of the spell.","damage_en":"3d8 Thunder","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"고통스러울 만큼 강렬한 갑작스러운 큰 울림소리가 사거리 내에서 선택한 지점에서 터진다. 그 지점을 중심으로 한 3m(10ft) 반경 구체 내의 각 크리처는 건강 내성 굴림을 굴려야 한다. 실패 시 3d8 천둥 피해를, 성공 시 절반의 피해를 받는다. 돌, 수정, 금속 같은 무기물로 이루어진 크리처는 이 내성 굴림에 불리 보정을 받는다.\n\n착용하거나 소지되지 않은 비마법 물품도 주문 구역 안에 있으면 피해를 받는다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"3d8 천둥 피해","material_ko":"운모 조각."},{"name_ko":"분해","name_en":"Disintegrate","level":6,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"A lodestone and a pinch of dust.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the damage increases by 3d6 for each slot level above 6th.","desc_en":"A thin green ray springs from your pointing finger to a target that you can see within range. The target can be a creature, an object, or a creation of magical force, such as the wall created by wall of force.\n\nA creature targeted by this spell must make a dexterity saving throw. On a failed save, the target takes 10d6 + 40 force damage. If this damage reduces the target to 0 hit points, it is disintegrated.\n\nA disintegrated creature and everything it is wearing and carrying, except magic items, are reduced to a pile of fine gray dust. The creature can be restored to life only by means of a true resurrection or a wish spell.\n\nThis spell automatically disintegrates a Large or smaller nonmagical object or a creation of magical force. If the target is a Huge or larger object or creation of force, this spell disintegrates a 10-foot-cube portion of it. A magic item is unaffected by this spell.","damage_en":"10d6 + 40 Force","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"10d6 + 40 역장 피해","material_ko":""},{"name_ko":"불꽃 칼날","name_en":"Flame Blade","level":2,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 bonus action","duration_en":"Up to 10 minutes","material_en":"Leaf of sumac.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for every two slot levels above 2nd.","desc_en":"You evoke a fiery blade in your free hand. The blade is similar in size and shape to a scimitar, and it lasts for the duration. If you let go of the blade, it disappears, but you can evoke the blade again as a bonus action.\n\nYou can use your action to make a melee spell attack with the fiery blade. On a hit, the target takes 3d6 fire damage.\n\nThe flaming blade sheds bright light in a 10-foot radius and dim light for an additional 10 feet.","damage_en":"3d6 Fire","attack_type":"","range_ko":"자신","casting_time_ko":"1 추가 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"빈 손에 불타는 칼날을 불러낸다. 칼날은 언월도와 크기·모양이 비슷하며 지속시간 동안 유지된다. 칼날을 놓으면 사라지지만, 추가 행동으로 다시 불러낼 수 있다.\n\n행동을 사용해 불타는 칼날로 근접 주문 공격을 할 수 있다. 명중 시 대상은 3d6 화염 피해를 받는다.\n\n불타는 칼날은 3m(10ft) 반경에 밝은 빛을, 추가로 3m(10ft)에 흐릿한 빛을 발한다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨 두 단계마다 피해가 1d6씩 증가한다.","damage_ko":"3d6 화염 피해","material_ko":"옻나무 잎."},{"name_ko":"불꽃의 벽","name_en":"Wall of Fire","level":4,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A small piece of phosphorus.","higher_level_en":"When you cast this spell using a spell slot of 5th level or higher, the damage increases by 1d8 for each slot level above 4th.","desc_en":"You create a wall of fire on a solid surface within range. You can make the wall up to 60 feet long, 20 feet high, and 1 foot thick, or a ringed wall up to 20 feet in diameter, 20 feet high, and 1 foot thick. The wall is opaque and lasts for the duration.\n\nWhen the wall appears, each creature within its area must make a Dexterity saving throw. On a failed save, a creature takes 5d8 fire damage, or half as much damage on a successful save.\n\nOne side of the wall, selected by you when you cast this spell, deals 5d8 fire damage to each creature that ends its turn within 10 feet o f that side or inside the wall. A creature takes the same damage when it enters the wall for the first time on a turn or ends its turn there. The other side of the wall deals no damage.\n\nThe other side of the wall deals no damage.","damage_en":"5d8 Fire","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내 단단한 표면에 불의 벽을 만든다. 벽은 길이 최대 18m(60ft), 높이 6m(20ft), 두께 1피트로 만들거나, 지름 최대 6m(20ft), 높이 6m(20ft), 두께 1피트의 고리형 벽으로 만들 수 있다. 벽은 불투명하며 지속시간 동안 유지된다.\n\n벽이 나타날 때, 그 구역 안의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 5d8 화염 피해를, 성공 시 절반의 피해를 받는다.\n\n주문을 시전할 때 시전자가 선택한 벽의 한쪽 면은, 그 면에서 3m(10ft) 이내 또는 벽 안에서 턴을 마치는 각 크리처에게 5d8 화염 피해를 준다. 크리처가 한 턴에 처음으로 벽에 들어오거나 그곳에서 턴을 마칠 때도 같은 피해를 받는다. 벽의 다른 면은 피해를 주지 않는다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"5d8 화염 피해","material_ko":"인 작은 조각."},{"name_ko":"불화의 속삭임","name_en":"Dissonant Whispers","level":1,"school":"환혹계","components":["V"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"붙잡는 덩굴","name_en":"Grasping Vine","level":4,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"비전 관문","name_en":"Arcane Gate","level":6,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"비전 신기루","name_en":"Mirage Arcane","level":7,"school":"환영계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Sight","casting_time_en":"10 minutes","duration_en":"10 days","material_en":"","higher_level_en":"","desc_en":"You make terrain in an area up to 1 mile square look, sound, smell, and even feel like some other sort of terrain. The terrain's general shape remains the same, however. Open fields or a road could be made to resemble a swamp, hill, crevasse, or some other difficult or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a rock-strewn gully like a wide and smooth road.\n\nSimilarly, you can alter the appearance of structures, or add them where none are present. The spell doesn't disguise, conceal, or add creatures.\n\nThe illusion includes audible, visual, tactile, and olfactory elements, so it can turn clear ground into difficult terrain (or vice versa) or otherwise impede movement through the area. Any piece of the illusory terrain (such as a rock or stick) that is removed from the spell's area disappears immediately.\n\nCreatures with truesight can see through the illusion to the terrain's true form; however, all other elements of the illusion remain, so while the creature is aware of the illusion's presence, the creature can still physically interact with the illusion.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"비전 자물쇠","name_en":"Arcane Lock","level":2,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Until dispelled","material_en":"Gold dust worth at least 25gp, which the spell consumes.","higher_level_en":"","desc_en":"You touch a closed door, window, gate, chest, or other entryway, and it becomes locked for the duration. You and the creatures you designate when you cast this spell can open the object normally. You can also set a password that, when spoken within 5 feet of the object, suppresses this spell for 1 minute. Otherwise, it is impassable until it is broken or the spell is dispelled or suppressed. Casting knock on the object suppresses arcane lock for 10 minutes.\n\nWhile affected by this spell, the object is more difficult to break or force open; the DC to break it or pick any locks on it increases by 10.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"무효화될 때까지","desc_ko":"닫힌 문, 창문, 대문, 궤짝, 또는 다른 출입구를 접촉하면 지속시간 동안 잠긴다. 시전자와, 시전 시 지정한 크리처는 물체를 정상적으로 열 수 있다. 또한 암호를 설정할 수 있으며, 물체의 1.5m(5ft) 이내에서 그 암호를 말하면 이 주문이 1분간 억제된다. 그렇지 않으면 물체는 부서지거나 주문이 무효화 또는 억제될 때까지 통과할 수 없다. 물체에 문열기를 시전하면 비전 자물쇠가 10분간 억제된다.\n\n이 주문의 영향을 받는 동안, 물체는 부수거나 억지로 열기가 더 어려워진다. 물체를 부수거나 자물쇠를 따는 DC가 10 증가한다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 25gp 이상 가치의 금가루."},{"name_ko":"비전의 눈","name_en":"Arcane Eye","level":4,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A bit of bat fur.","higher_level_en":"","desc_en":"You create an invisible, magical eye within range that hovers in the air for the duration.\n\nYou mentally receive visual information from the eye, which has normal vision and darkvision out to 30 feet. The eye can look in every direction.\n\nAs an action, you can move the eye up to 30 feet in any direction. There is no limit to how far away from you the eye can move, but it can't enter another plane of existence. A solid barrier blocks the eye's movement, but the eye can pass through an opening as small as 1 inch in diameter.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"사거리 내에 보이지 않는 마법의 눈을 만들어, 지속시간 동안 공중에 떠 있게 한다.\n\n이 눈에서 시각 정보를 정신적으로 받으며, 눈은 9m(30ft)까지의 일반 시야와 암시야를 갖는다. 눈은 모든 방향을 볼 수 있다.\n\n행동을 사용해 눈을 어느 방향으로든 최대 9m(30ft) 이동시킬 수 있다. 눈이 시전자로부터 얼마나 멀리 이동할 수 있는지에는 제한이 없으나, 다른 존재계로는 들어갈 수 없다. 단단한 장벽은 눈의 이동을 막지만, 눈은 지름 1인치만 한 작은 틈도 통과할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"박쥐 털 약간."},{"name_ko":"비틀대는 강타","name_en":"Staggering Smite","level":4,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"비행","name_en":"Fly","level":3,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A wing feather from any bird.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, you can target one additional creature for each slot level above 3rd.","desc_en":"You touch a willing creature. The target gains a flying speed of 60 feet for the duration. When the spell ends, the target falls if it is still aloft, unless it can stop the fall.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"동의하는 크리처 하나를 접촉한다. 주문이 끝날 때까지 대상은 18m(60ft)의 비행 속도를 얻는다. 주문이 끝날 때 대상이 아직 공중에 떠 있으면, 다른 수단으로 떠 있지 못하는 한 떨어진다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"새의 깃털."},{"name_ko":"빅바이의 손","name_en":"Bigby's Hand","level":5,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"빈사 인정","name_en":"Spare the Dying","level":0,"school":"사령계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You touch a living creature that has 0 hit points. The creature becomes stable. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"히트 포인트가 0인 살아 있는 크리처를 접촉한다. 그 크리처는 안정된다. 이 주문은 언데드나 구조물에는 효과가 없다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"빛","name_en":"Light","level":0,"school":"방출계","components":["V","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A firefly or phosphorescent moss.","higher_level_en":"","desc_en":"You touch one object that is no larger than 10 feet in any dimension. Until the spell ends, the object sheds bright light in a 20-foot radius and dim light for an additional 20 feet. The light can be colored as you like. Completely covering the object with something opaque blocks the light. The spell ends if you cast it again or dismiss it as an action.\n\nIf you target an object held or worn by a hostile creature, that creature must succeed on a dexterity saving throw to avoid the spell.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"어느 방향으로도 10피트를 넘지 않는 물체 하나를 접촉한다. 주문이 끝날 때까지 그 물체는 6m(20ft) 반경에 밝은 빛을, 추가로 6m(20ft)에 흐릿한 빛을 발한다. 빛은 원하는 색으로 낼 수 있다. 물체를 불투명한 무언가로 완전히 덮으면 빛이 차단된다. 이 주문을 다시 시전하거나 행동을 사용해 해제하면 주문이 끝난다.\n\n적대적인 크리처가 들거나 착용한 물체를 대상으로 하면, 그 크리처는 민첩 내성 굴림에 성공해야 주문을 피할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"반딧불이 또는 인광성 이끼."},{"name_ko":"사냥꾼의 징표","name_en":"Hunter's Mark","level":1,"school":"예지계","components":["V"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 bonus action","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 3rd or 4th level, you can maintain your concentration on the spell for up to 8 hours. When you use a spell slot of 5th level or higher, you can maintain your concentration on the spell for up to 24 hours.","desc_en":"You choose a creature you can see within range and mystically mark it as your quarry. Until the spell ends, you deal an extra 1d6 damage to the target whenever you hit it with a weapon attack, and you have advantage on any Wisdom (Perception) or Wisdom (Survival) check you make to find it. If the target drops to 0 hit points before this spell ends, you can use a bonus action on a subsequent turn of yours to mark a new creature.","damage_en":"","attack_type":"","range_ko":"27m(90ft)","casting_time_ko":"1 추가 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"사거리 내에서 볼 수 있는 크리처 하나를 선택해 신비롭게 사냥감으로 표시한다. 주문이 끝날 때까지, 무기 공격으로 대상을 명중시킬 때마다 추가로 1d6 피해를 주며, 대상을 찾기 위한 지혜(감지)나 지혜(생존) 판정에 유리 보정을 받는다. 주문이 끝나기 전에 대상의 히트 포인트가 0이 되면, 이후 자기 턴에 추가 행동으로 새 크리처를 표시할 수 있다.","higher_level_ko":"3레벨이나 4레벨 주문 슬롯으로 시전하면 최대 8시간까지 정신집중을 유지할 수 있다. 5레벨 이상의 주문 슬롯을 사용하면 최대 24시간까지 정신집중을 유지할 수 있다.","damage_ko":"","material_ko":""},{"name_ko":"사명 부여","name_en":"Geas","level":5,"school":"환혹계","components":["V"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 minute","duration_en":"30 days","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 7th or 8th level, the duration is 1 year. When you cast this spell using a spell slot of 9th level, the spell lasts until it is ended by one of the spells mentioned above.","desc_en":"You place a magical command on a creature that you can see within range, forcing it to carry out some service or refrain from some action or course of activity as you decide. If the creature can understand you, it must succeed on a wisdom saving throw or become charmed by you for the duration. While the creature is charmed by you, it takes 5d10 psychic damage each time it acts in a manner directly counter to your instructions, but no more than once each day. A creature that can't understand you is unaffected by the spell.\n\nYou can issue any command you choose, short of an activity that would result in certain death. Should you issue a suicidal command, the spell ends.\n\nYou can end the spell early by using an action to dismiss it. A remove curse, greater restoration, or wish spell also ends it.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 분","duration_ko":"30 일","desc_ko":"사거리 내에서 볼 수 있는 크리처에게 마법의 명령을 내려, 시전자가 정한 어떤 봉사를 수행하거나 어떤 행동이나 활동을 삼가도록 강제한다. 크리처가 시전자를 이해할 수 있으면, 지혜 내성 굴림에 성공하지 못할 경우 지속시간 동안 시전자에게 매혹된다. 크리처가 매혹된 동안, 시전자의 지시에 직접 반하는 방식으로 행동할 때마다 5d10 정신 피해를 받으나, 하루에 한 번을 넘지 않는다. 시전자를 이해할 수 없는 크리처는 이 주문에 영향받지 않는다.\n\n확실한 죽음을 초래할 활동만 아니면 어떤 명령이든 내릴 수 있다. 자살적인 명령을 내리면 주문이 끝난다.\n\n행동을 사용해 해제하여 주문을 일찍 끝낼 수 있다. 저주 해제, 상급 회복, 또는 소원 주문도 이를 끝낸다.","higher_level_ko":"7레벨이나 8레벨 주문 슬롯으로 시전하면 지속시간이 1년이 된다. 9레벨 주문 슬롯으로 시전하면 위에 언급된 주문 중 하나로 끝날 때까지 지속된다.","damage_ko":"","material_ko":""},{"name_ko":"사자 소생","name_en":"Raise Dead","level":5,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 hour","duration_en":"Instantaneous","material_en":"A diamond worth at least 500gp, which the spell consumes.","higher_level_en":"","desc_en":"You return a dead creature you touch to life, provided that it has been dead no longer than 10 days. If the creature's soul is both willing and at liberty to rejoin the body, the creature returns to life with 1 hit point.\n\nThis spell also neutralizes any poisons and cures nonmagical diseases that affected the creature at the time it died. This spell doesn't, however, remove magical diseases, curses, or similar effects; if these aren't first removed prior to casting the spell, they take effect when the creature returns to life. The spell can't return an undead creature to life.\n\nThis spell closes all mortal wounds, but it doesn't restore missing body parts. If the creature is lacking body parts or organs integral for its survival--its head, for instance--the spell automatically fails.\n\nComing back from the dead is an ordeal. The target takes a -4 penalty to all attack rolls, saving throws, and ability checks. Every time the target finishes a long rest, the penalty is reduced by 1 until it disappears.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 시간","duration_ko":"즉시","desc_ko":"접촉한 죽은 크리처를, 죽은 지 10일을 넘지 않았다면 되살린다. 크리처의 영혼이 육신에 다시 합쳐지기를 원하고 또 그럴 수 있으면, 크리처는 히트 포인트 1점으로 되살아난다.\n\n이 주문은 또한 크리처가 죽을 당시 걸려 있던 모든 독을 중화하고 비마법적 질병을 치료한다. 다만 마법적 질병, 저주, 또는 비슷한 효과는 제거하지 못한다. 이런 것들을 주문 시전 전에 먼저 제거하지 않으면, 크리처가 되살아날 때 효력을 발휘한다. 이 주문은 언데드 크리처를 되살릴 수 없다.\n\n이 주문은 모든 치명상을 닫지만, 잃어버린 신체 부위를 복원하지는 않는다. 크리처에게 생존에 필수적인 신체 부위나 장기가 없으면(예를 들어 머리) 주문은 자동으로 실패한다.\n\n죽음에서 돌아오는 것은 시련이다. 대상은 모든 명중 굴림, 내성 굴림, 능력 판정에 -4 페널티를 받는다. 대상이 긴 휴식을 마칠 때마다 페널티가 1씩 줄어 사라진다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 500gp 이상 가치의 다이아몬드."},{"name_ko":"사체 조종","name_en":"Animate Dead","level":3,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 minute","duration_en":"Instantaneous","material_en":"A drop of blood, a piece of flesh, and a pinch of bone dust.","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, you animate or reassert control over two additional undead creatures for each slot level above 3rd. Each of the creatures must come from a different corpse or pile of bones.","desc_en":"This spell creates an undead servant. Choose a pile of bones or a corpse of a Medium or Small humanoid within range. Your spell imbues the target with a foul mimicry of life, raising it as an undead creature. The target becomes a skeleton if you chose bones or a zombie if you chose a corpse (the GM has the creature's game statistics).\n\nOn each of your turns, you can use a bonus action to mentally command any creature you made with this spell if the creature is within 60 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete.\n\nThe creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature again before the current 24-hour period ends. This use of the spell reasserts your control over up to four creatures you have animated with this spell, rather than animating a new one.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 분","duration_ko":"즉시","desc_ko":"이 주문은 죽음을 흉내낸 사악한 생명력을 시체에 불어넣는다. 사거리 내에서 볼 수 있는, 중형 이하의 인간형 시체나 뼈 무더기를 선택한다. 시전자의 주문은 대상에게 새로운 생명력을 주어, 좀비(시체 사용 시)나 해골(뼈 무더기 사용 시)로 일으킨다. 이 크리처들의 능력치는 DM이 갖는다.\n\n자기 턴에 추가 행동으로, 24시간 이내에 이 주문으로 되살린 크리처들에게 정신적으로 명령을 내릴 수 있으며(같은 명령을 모두에게), 무엇을 할지 정하고 어디로 이동할지 지시한다. 언데드가 완수할 수 있는 어떤 행동이든 명령할 수 있다. 명령을 내리지 않으면, 언데드는 스스로를 방어할 뿐 그 외의 행동은 하지 않는다. 명령은 다음 명령을 내릴 때까지 지속된다.\n\n24시간이 지날 때마다 이 주문을 다시 시전해야 크리처에 대한 통제를 유지할 수 있다. 크리처를 되살린 뒤 24시간이 지나기 전에 이 주문을 다시 시전하지 못하면, 그 크리처들에 대한 통제를 잃고 시전자에게 적대적이 될 수 있으며, DM의 판단에 따라 명령을 내리려 시도할 수 있다. 이 주문을 시전할 때마다 이런 식으로 크리처 넷까지 통제를 재확립할 수 있다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 3레벨을 넘는 슬롯 레벨마다 언데드 하나씩을 추가로 되살리거나 통제를 재확립한다.","damage_ko":"","material_ko":"피 한 방울, 살점 한 조각, 뼛가루 한 자밤."},{"name_ko":"산성 거품","name_en":"Acid Splash","level":0,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You hurl a bubble of acid. Choose one creature within range, or choose two creatures within range that are within 5 feet of each other. A target must succeed on a dexterity saving throw or take 1d6 acid damage.\n\nThis spell's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).","damage_en":"1d6 Acid","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"산성 거품을 던진다. 사거리 내 크리처 하나를 선택하거나, 서로 1.5m(5ft) 이내에 있는 사거리 내 크리처 둘을 선택한다. 대상은 민첩 내성 굴림에 성공하지 못하면 1d6 산성 피해를 받는다.\n\n이 주문의 피해는 5레벨(2d6), 11레벨(3d6), 17레벨(4d6)에 도달할 때 1d6씩 증가한다.","higher_level_ko":"","damage_ko":"1d6 산성 피해","material_ko":""},{"name_ko":"상급 영상","name_en":"Major Image","level":3,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A bit of fleece.","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the spell lasts until dispelled, without requiring your concentration.","desc_en":"You creat
