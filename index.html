할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"짧은 구리 철사 한 조각."},{"name_ko":"전설 전승","name_en":"Legend Lore","level":5,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"10 minutes","duration_en":"Instantaneous","material_en":"Incense worth at least 250 gp, which the spell consumes, and four ivory strips worth at least 50 gp each.","higher_level_en":"","desc_en":"Name or describe a person, place, or object. The spell brings to your mind a brief summary of the significant lore about the thing you named. The lore might consist of current tales, forgotten stories, or even secret lore that has never been widely known. If the thing you named isn't of legendary importance, you gain no information. The more information you already have about the thing, the more precise and detailed the information you receive is.\n\nThe information you learn is accurate but might be couched in figurative language. For example, if you have a mysterious magic axe on hand the spell might yield this information: \"Woe to the evildoer whose hand touches the axe, for even the haft slices the hand of the evil ones. Only a true Child of Stone, lover and beloved of Moradin, may awaken the true powers of the axe, and only with the sacred word *Rudnogg* on the lips.\"","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"10 분","duration_ko":"즉시","desc_ko":"사람, 장소, 또는 물체의 이름을 대거나 묘사한다. 주문이 시전자의 마음에 그 대상에 관한 중요한 전승의 짧은 요약을 떠올린다. 그 전승은 현재의 이야기, 잊힌 사연, 또는 널리 알려진 적 없는 비밀 전승일 수 있다. 이름을 댄 대상이 전설적 중요성이 없으면 정보를 얻지 못한다. 대상에 대해 이미 가진 정보가 많을수록, 받는 정보가 더 정확하고 상세하다.\n\n얻는 정보는 정확하지만 비유적 언어로 표현될 수 있다. 예를 들어 신비한 마법 도끼를 손에 쥐고 있으면, 주문은 이런 정보를 줄 수 있다. \"손이 도끼에 닿는 악인에게 화 있을지니, 자루조차 악한 자의 손을 베노라. 오직 참된 돌의 아이, 모라딘의 사랑하고 사랑받는 자만이 도끼의 참된 힘을 깨울 수 있으며, 오직 신성한 단어 '루드노그'를 입에 올릴 때뿐이니라.\"","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는 250gp 이상 가치의 향과, 각각 50gp 이상 가치의 상아 조각 네 개."},{"name_ko":"전염","name_en":"Contagion","level":5,"school":"사령계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"7 days","material_en":"","higher_level_en":"","desc_en":"Your touch inflicts disease. Make a melee spell attack against a creature within your reach. On a hit, you afflict the creature with a disease of your choice from any of the ones described below.\n\nAt the end of each of the target's turns, it must make a constitution saving throw. After failing three of these saving throws, the disease's effects last for the duration, and the creature stops making these saves. After succeeding on three of these saving throws, the creature recovers from the disease, and the spell ends.\n\nSince this spell induces a natural disease in its target, any effect that removes a disease or otherwise ameliorates a disease's effects apply to it.\n\n***Blinding Sickness.*** Pain grips the creature's mind, and its eyes turn milky white. The creature has disadvantage on wisdom checks and wisdom saving throws and is blinded.\n\n***Filth Fever.*** A raging fever sweeps through the creature's body. The creature has disadvantage on strength checks, strength saving throws, and attack rolls that use Strength.\n\n***Flesh Rot.*** The creature's flesh decays. The creature has disadvantage on Charisma checks and vulnerability to all damage.\n\n***Mindfire.*** The creature's mind becomes feverish. The creature has disadvantage on intelligence checks and intelligence saving throws, and the creature behaves as if under the effects of the confusion spell during combat.\n\n***Seizure.*** The creature is overcome with shaking. The creature has disadvantage on dexterity checks, dexterity saving throws, and attack rolls that use Dexterity.\n\n***Slimy Doom.*** The creature begins to bleed uncontrollably. The creature has disadvantage on constitution checks and constitution saving throws. In addition, whenever the creature takes damage, it is stunned until the end of its next turn.","damage_en":"","attack_type":"melee","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"7 일","desc_ko":"시전자의 접촉이 질병을 일으킨다. 닿을 수 있는 크리처에게 근접 주문 공격을 굴린다. 명중 시 아래 설명된 질병 중 시전자가 선택한 하나를 크리처에게 건다.\n\n대상의 매 턴이 끝날 때, 대상은 건강 내성 굴림을 굴려야 한다. 이 내성 굴림에 세 번 실패하면, 질병 효과가 지속시간 동안 이어지고 크리처는 더 이상 이 내성 굴림을 굴리지 않는다. 이 내성 굴림에 세 번 성공하면, 크리처가 질병에서 회복되고 주문이 끝난다.\n\n이 주문은 대상에게 자연적인 질병을 유발하므로, 질병을 제거하거나 질병 효과를 완화하는 어떤 효과든 여기에 적용된다.\n\n***실명병.*** 고통이 크리처의 정신을 옭아매고, 눈이 뿌옇게 하얘진다. 크리처는 지혜 판정과 지혜 내성 굴림에 불리 보정을 받으며 실명한다.\n\n***오물열.*** 맹렬한 열이 크리처의 몸을 휩쓴다. 크리처는 근력 판정, 근력 내성 굴림, 근력을 쓰는 명중 굴림에 불리 보정을 받는다.\n\n***살썩음병.*** 크리처의 살이 썩는다. 크리처는 매력 판정에 불리 보정을 받고 모든 피해에 취약해진다.\n\n***정신불.*** 크리처의 정신이 열병에 걸린다. 크리처는 지능 판정과 지능 내성 굴림에 불리 보정을 받으며, 전투 중 혼란 주문의 효과를 받는 것처럼 행동한다.\n\n***발작.*** 크리처가 경련에 휩싸인다. 크리처는 민첩 판정, 민첩 내성 굴림, 민첩을 쓰는 명중 굴림에 불리 보정을 받는다.\n\n***끈적한 파멸.*** 크리처가 걷잡을 수 없이 출혈하기 시작한다. 크리처는 건강 판정과 건강 내성 굴림에 불리 보정을 받는다. 또한 크리처가 피해를 받을 때마다, 다음 턴이 끝날 때까지 충격에 빠진다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"전음","name_en":"Sending","level":3,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Unlimited","casting_time_en":"1 action","duration_en":"1 round","material_en":"A short piece of fine copper wire.","higher_level_en":"","desc_en":"You send a short message of twenty-five words or less to a creature with which you are familiar. The creature hears the message in its mind, recognizes you as the sender if it knows you, and can answer in a like manner immediately. The spell enables creatures with Intelligence scores of at least 1 to understand the meaning of your message.\n\nYou can send the message across any distance and even to other planes of existence, but if the target is on a different plane than you, there is a 5 percent chance that the message doesn't arrive.","damage_en":"","attack_type":"","range_ko":"무제한","casting_time_ko":"1 행동","duration_ko":"1 라운드","desc_ko":"익숙한 크리처에게 스물다섯 단어 이하의 짧은 전언을 보낸다. 그 크리처는 머릿속에서 전언을 듣고, 시전자를 안다면 발신자로 알아보며, 즉시 같은 방식으로 답할 수 있다. 이 주문은 지능이 최소 1 이상인 크리처가 전언의 의미를 이해할 수 있게 한다.\n\n어떤 거리로도, 심지어 다른 존재계로도 전언을 보낼 수 있으나, 대상이 시전자와 다른 존재계에 있으면 전언이 도달하지 못할 확률이 5퍼센트 있다.","higher_level_ko":"","damage_ko":"","material_ko":"짧은 고운 구리 철사 조각."},{"name_ko":"점멸","name_en":"Blink","level":3,"school":"변환계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 minute","material_en":"","higher_level_en":"","desc_en":"Roll a d20 at the end of each of your turns for the duration of the spell. On a roll of 11 or higher, you vanish from your current plane of existence and appear in the Ethereal Plane (the spell fails and the casting is wasted if you were already on that plane). At the start of your next turn, and when the spell ends if you are on the Ethereal Plane, you return to an unoccupied space of your choice that you can see within 10 feet of the space you vanished from. If no unoccupied space is available within that range, you appear in the nearest unoccupied space (chosen at random if more than one space is equally near). You can dismiss this spell as an action.\n\nWhile on the Ethereal Plane, you can see and hear the plane you originated from, which is cast in shades of gray, and you can't see anything there more than 60 feet away. You can only affect and be affected by other creatures on the Ethereal Plane. Creatures that aren't there can't perceive you or interact with you, unless they have the ability to do so.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"주문의 지속시간 동안 매 턴이 끝날 때 d20을 굴린다. 11 이상이 나오면, 현재 존재계에서 사라져 영계에 나타난다(이미 그 존재계에 있었다면 주문은 실패하고 시전이 낭비된다). 다음 턴이 시작될 때, 그리고 영계에 있다면 주문이 끝날 때, 사라진 공간에서 3m(10ft) 이내에서 볼 수 있는, 선택한 빈 공간으로 돌아온다. 그 범위 내에 빈 공간이 없으면 가장 가까운 빈 공간에 나타난다(똑같이 가까운 공간이 여럿이면 무작위로 선택). 행동을 사용해 이 주문을 해제할 수 있다.\n\n영계에 있는 동안, 시전자가 떠나온 존재계를 회색 음영으로 보고 들을 수 있으며, 그곳에서 18m(60ft) 넘게 떨어진 것은 볼 수 없다. 영계의 다른 크리처에게만 영향을 주고 영향을 받을 수 있다. 그곳에 없는 크리처는 그럴 능력이 없는 한 시전자를 인지하거나 시전자와 상호작용할 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"점술","name_en":"Augury","level":2,"school":"예지계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 minute","duration_en":"Instantaneous","material_en":"Specially marked sticks, bones, or similar tokens worth at least 25gp.","higher_level_en":"","desc_en":"By casting gem-inlaid sticks, rolling dragon bones, laying out ornate cards, or employing some other divining tool, you receive an omen from an otherworldly entity about the results of a specific course of action that you plan to take within the next 30 minutes. The GM chooses from the following possible omens:\n\n- Weal, for good results\n\n- Woe, for bad results\n\n- Weal and woe, for both good and bad results\n\n- Nothing, for results that aren't especially good or bad\n\nThe spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion.\n\nIf you cast the spell two or more times before completing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The GM makes this roll in secret.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 분","duration_ko":"즉시","desc_ko":"보석이 박힌 막대를 던지거나, 용의 뼈를 굴리거나, 화려한 카드를 펼치거나, 그 밖의 점술 도구를 써서, 앞으로 30분 이내에 시전자가 계획한 특정 행동의 결과에 관한 조짐을 이계의 존재로부터 받는다. DM은 다음 조짐 중에서 선택한다.\n\n- 길조, 좋은 결과\n\n- 흉조, 나쁜 결과\n\n- 길흉, 좋기도 하고 나쁘기도 한 결과\n\n- 없음, 특별히 좋지도 나쁘지도 않은 결과\n\n이 주문은 추가 주문 시전이나 동료의 상실·합류처럼 결과를 바꿀 수 있는 상황은 고려하지 않는다.\n\n다음 긴 휴식을 완료하기 전에 이 주문을 두 번 이상 시전하면, 첫 번째 이후 시전마다 무작위 결과가 나올 확률이 25%씩 누적된다. DM은 이 굴림을 비밀리에 한다.","higher_level_ko":"","damage_ko":"","material_ko":"25gp 이상 가치의 특별히 표시된 막대, 뼈, 또는 비슷한 징표."},{"name_ko":"정신감응","name_en":"Telepathy","level":8,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"정화의 오오라","name_en":"Aura of Purity","level":4,"school":"방호계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"조건화","name_en":"Contingency","level":6,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"10 minutes","duration_en":"10 days","material_en":"A statuette of yourself carved from ivory and decorated with gems worth at least 1,500 gp.","higher_level_en":"","desc_en":"Choose a spell of 5th level or lower that you can cast, that has a casting time of 1 action, and that can target you. You cast that spell--called the contingent spell--as part of casting contingency, expending spell slots for both, but the contingent spell doesn't come into effect. Instead, it takes effect when a certain circumstance occurs. You describe that circumstance when you cast the two spells. For example, a contingency cast with water breathing might stipulate that water breathing comes into effect when you are engulfed in water or a similar liquid.\n\nThe contingent spell takes effect immediately after the circumstance is met for the first time, whether or not you want it to. and then contingency ends.\n\nThe contingent spell takes effect only on you, even if it can normally target others. You can use only one contingency spell at a time. If you cast this spell again, the effect of another contingency spell on you ends. Also, contingency ends on you if its material component is ever not on your person.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"조용한 영상","name_en":"Silent Image","level":1,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"A bit of fleece.","higher_level_en":"","desc_en":"You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 15-foot cube. The image appears at a spot within range and lasts for the duration. The image is purely visual; it isn't accompanied by sound, smell, or other sensory effects.\n\nYou can use your action to cause the image to move to any spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking.\n\nPhysical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"4.5m(15ft) 정육면체를 넘지 않는 물체, 크리처, 또는 그 밖에 눈에 보이는 현상의 이미지를 만든다. 이미지는 사거리 내 한 지점에 나타나 지속시간 동안 유지된다. 이 이미지는 순전히 시각적이며, 소리, 냄새, 그 밖의 감각 효과를 동반하지 않는다.\n\n행동을 사용해 이미지를 사거리 내 어느 지점으로든 이동시킬 수 있다. 이미지가 위치를 옮길 때, 움직임이 자연스러워 보이도록 외형을 바꿀 수 있다. 예를 들어 크리처의 이미지를 만들어 이동시키면, 걷는 것처럼 보이도록 이미지를 바꿀 수 있다.\n\n이미지와 물리적으로 접촉하면 물체가 통과하므로 환영임이 드러난다. 행동을 사용해 이미지를 살피는 크리처는 시전자의 주문 내성 DC에 맞서는 지능(수사) 판정에 성공하여 그것이 환영임을 알아낼 수 있다. 크리처가 환영의 정체를 간파하면, 그 크리처는 이미지를 꿰뚫어 볼 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":"양털 조각."},{"name_ko":"주문반사","name_en":"Counterspell","level":3,"school":"방호계","components":["S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 reaction","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 4th level or higher, the interrupted spell has no effect if its level is less than or equal to the level of the spell slot you used.","desc_en":"You attempt to interrupt a creature in the process of casting a spell. If the creature is casting a spell of 3rd level or lower, its spell fails and has no effect. If it is casting a spell of 4th level or higher, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a success, the creature's spell fails and has no effect.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 반응행동","duration_ko":"즉시","desc_ko":"주문을 시전 중인 크리처를 방해하려 시도한다. 그 크리처가 3레벨 이하의 주문을 시전 중이면, 그 주문은 실패하고 효과가 없다. 4레벨 이상의 주문을 시전 중이면, 주문시전 능력으로 능력 판정을 굴린다. DC는 10 + 그 주문의 레벨이다. 성공 시 그 크리처의 주문은 실패하고 효과가 없다.","higher_level_ko":"4레벨 이상의 주문 슬롯으로 시전하면, 방해한 주문의 레벨이 사용한 주문 슬롯 레벨 이하일 경우 그 주문은 효과가 없다.","damage_ko":"","material_ko":""},{"name_ko":"주박","name_en":"Hex","level":1,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"주술 화살","name_en":"Witch Bolt","level":1,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"주의 사로잡기","name_en":"Enthrall","level":2,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"1 minute","material_en":"","higher_level_en":"","desc_en":"You weave a distracting string of words, causing creatures of your choice that you can see within range and that can hear you to make a wisdom saving throw. Any creature that can't be charmed succeeds on this saving throw automatically, and if you or your companions are fighting a creature, it has advantage on the save. On a failed save, the target has disadvantage on Wisdom (Perception) checks made to perceive any creature other than you until the spell ends or until the target can no longer hear you. The spell ends if you are incapacitated or can no longer speak.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"1 분","desc_ko":"주의를 흩뜨리는 말을 엮어, 사거리 내에서 볼 수 있고 시전자의 말을 들을 수 있는, 선택한 크리처들이 지혜 내성 굴림을 굴리게 한다. 매혹될 수 없는 크리처는 이 내성 굴림에 자동으로 성공하며, 시전자나 동료가 크리처와 싸우는 중이면 그 크리처는 내성 굴림에 유리 보정을 받는다. 실패 시 대상은 주문이 끝나거나 시전자의 말을 더 이상 들을 수 없을 때까지, 시전자 외의 크리처를 인지하기 위한 지혜(감지) 판정에 불리 보정을 받는다. 시전자가 무력화되거나 더 이상 말할 수 없으면 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"죽은 자와의 대화","name_en":"Speak with Dead","level":3,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"Burning incense.","higher_level_en":"","desc_en":"You grant the semblance of life and intelligence to a corpse of your choice within range, allowing it to answer the questions you pose. The corpse must still have a mouth and can't be undead. The spell fails if the corpse was the target of this spell within the last 10 days.\n\nUntil the spell ends, you can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are hostile to it or it recognizes you as an enemy. This spell doesn't return the creature's soul to its body, only its animating spirit. Thus, the corpse can't learn new information, doesn't comprehend anything that has happened since it died, and can't speculate about future events.","damage_en":"","attack_type":"","range_ko":"3m(10ft)","casting_time_ko":"1 행동","duration_ko":"10 분","desc_ko":"사거리 내에서 선택한 시체에 생명과 지성의 겉모습을 부여하여, 시전자가 던지는 질문에 답하게 한다. 시체는 입이 있어야 하며 언데드일 수 없다. 시체가 지난 10일 이내에 이 주문의 대상이 된 적 있으면 주문은 실패한다.\n\n주문이 끝날 때까지 시체에게 최대 다섯 개의 질문을 할 수 있다. 시체는 생전에 알던 것만 알며, 여기에는 생전에 알던 언어도 포함된다. 답변은 대개 짧거나, 모호하거나, 반복적이며, 시전자가 시체에게 적대적이거나 시체가 시전자를 적으로 알아보면 진실한 답을 할 의무가 없다. 이 주문은 크리처의 영혼을 육신으로 되돌리는 것이 아니라 생동시키는 정령만 부여한다. 따라서 시체는 새 정보를 배울 수 없고, 죽은 뒤 일어난 일을 이해하지 못하며, 미래의 사건을 추측할 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"불타는 향."},{"name_ko":"죽음 방비","name_en":"Death Ward","level":4,"school":"방호계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"8 hours","material_en":"","higher_level_en":"","desc_en":"You touch a creature and grant it a measure of protection from death.\n\nThe first time the target would drop to 0 hit points as a result of taking damage, the target instead drops to 1 hit point, and the spell ends.\n\nIf the spell is still in effect when the target is subjected to an effect that would kill it instantaneously without dealing damage, that effect is instead negated against the target, and the spell ends.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"크리처 하나를 접촉해 죽음에 대한 어느 정도의 보호를 부여한다.\n\n대상이 피해를 받아 처음으로 히트 포인트가 0이 될 상황에서, 대상은 대신 히트 포인트 1점으로 떨어지고 주문이 끝난다.\n\n주문이 아직 유효한 동안 대상이 피해 없이 즉사시키는 효과를 받으면, 그 효과는 대상에 대해 무효화되고 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"죽음구름","name_en":"Cloudkill","level":5,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.","desc_en":"You create a 20-foot-radius sphere of poisonous, yellow-green fog centered on a point you choose within range. The fog spreads around corners. It lasts for the duration or until strong wind disperses the fog, ending the spell. Its area is heavily obscured.\n\nWhen a creature enters the spell's area for the first time on a turn or starts its turn there, that creature must make a constitution saving throw. The creature takes 5d8 poison damage on a failed save, or half as much damage on a successful one. Creatures are affected even if they hold their breath or don't need to breathe.\n\nThe fog moves 10 feet away from you at the start of each of your turns, rolling along the surface of the ground. The vapors, being heavier than air, sink to the lowest level of the land, even pouring down openings.","damage_en":"5d8 Poison","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에서 선택한 지점을 중심으로, 독성의 노란빛 도는 초록 안개의 6m(20ft) 반경 구체를 만든다. 안개는 모퉁이를 돌아 퍼진다. 지속시간 동안, 또는 강한 바람이 안개를 흩어 주문을 끝낼 때까지 지속된다. 그 구역은 심하게 가려진다.\n\n크리처가 한 턴에 처음으로 주문 구역에 들어오거나 그곳에서 턴을 시작하면, 그 크리처는 건강 내성 굴림을 굴려야 한다. 실패 시 5d8 독성 피해를, 성공 시 절반의 피해를 받는다. 크리처는 숨을 참거나 숨쉴 필요가 없어도 영향받는다.\n\n안개는 매 턴이 시작될 때 시전자로부터 3m(10ft) 멀어지며 지면을 따라 굴러간다. 증기는 공기보다 무거워 지형의 가장 낮은 곳으로 가라앉으며, 구멍 아래로도 쏟아진다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"5d8 독성 피해","material_ko":""},{"name_ko":"죽음의 손가락","name_en":"Finger of Death","level":7,"school":"사령계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You send negative energy coursing through a creature that you can see within range, causing it searing pain. The target must make a constitution saving throw. It takes 7d8 + 30 necrotic damage on a failed save, or half as much damage on a successful one.\n\nA humanoid killed by this spell rises at the start of your next turn as a zombie that is permanently under your command, following your verbal orders to the best of its ability.","damage_en":"7d8 + 30 Necrotic","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"7d8 + 30 사령 피해","material_ko":""},{"name_ko":"죽음의 원","name_en":"Circle of Death","level":6,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"The powder of a crushed black pearl worth at least 500 gp.","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the damage increases by 2d6 for each slot level above 6th.","desc_en":"A sphere of negative energy ripples out in a 60-foot radius sphere from a point within range. Each creature in that area must make a constitution saving throw. A target takes 8d6 necrotic damage on a failed save, or half as much damage on a successful one.","damage_en":"8d6 Necrotic","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"8d6 사령 피해","material_ko":""},{"name_ko":"중력 역전","name_en":"Reverse Gravity","level":7,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"100 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A lodestone and iron filings.","higher_level_en":"","desc_en":"This spell reverses gravity in a 50-foot-radius, 100-foot high cylinder centered on a point within range. All creatures and objects that aren't somehow anchored to the ground in the area fall upward and reach the top of the area when you cast this spell. A creature can make a dexterity saving throw to grab onto a fixed object it can reach, thus avoiding the fall.\n\nIf some solid object (such as a ceiling) is encountered in this fall, falling objects and creatures strike it just as they would during a normal downward fall. If an object or creature reaches the top of the area without striking anything, it remains there, oscillating slightly, for the duration.\n\nAt the end of the duration, affected objects and creatures fall back down.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"지연 폭발 화염구","name_en":"Delayed Blast Fireball","level":7,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A tiny ball of bat guano and sulfur.","higher_level_en":"When you cast this spell using a spell slot of 8th level or higher, the base damage increases by 1d6 for each slot level above 7th.","desc_en":"A beam of yellow light flashes from your pointing finger, then condenses to linger at a chosen point within range as a glowing bead for the duration. When the spell ends, either because your concentration is broken or because you decide to end it, the bead blossoms with a low roar into an explosion of flame that spreads around corners. Each creature in a 20-foot-radius sphere centered on that point must make a dexterity saving throw. A creature takes fire damage equal to the total accumulated damage on a failed save, or half as much damage on a successful one.\n\nThe spell's base damage is 12d6. If at the end of your turn the bead has not yet detonated, the damage increases by 1d6.\n\nIf the glowing bead is touched before the interval has expired, the creature touching it must make a dexterity saving throw. On a failed save, the spell ends immediately, causing the bead to erupt in flame. On a successful save, the creature can throw the bead up to 40 feet. When it strikes a creature or a solid object, the spell ends, and the bead explodes.\n\nThe fire damages objects in the area and ignites flammable objects that aren't being worn or carried.","damage_en":"12d6 Fire","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"12d6 화염 피해","material_ko":""},{"name_ko":"지옥의 책망","name_en":"Hellish Rebuke","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 reaction","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st.","desc_en":"You point your finger, and the creature that damaged you is momentarily surrounded by hellish flames. The creature must make a dexterity saving throw. It takes 2d10 fire damage on a failed save, or half as much damage on a successful one.","damage_en":"2d10 Fire","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 반응행동","duration_ko":"즉시","desc_ko":"손가락을 가리키면, 시전자에게 피해를 준 크리처가 잠시 지옥의 화염에 휩싸인다. 그 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 2d10 화염 피해를, 성공 시 절반의 피해를 받는다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 피해가 1d10씩 증가한다.","damage_ko":"2d10 화염 피해","material_ko":""},{"name_ko":"지진","name_en":"Earthquake","level":8,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"500 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A pinch of dirt, a piece of rock, and a lump of clay.","higher_level_en":"","desc_en":"You create a seismic disturbance at a point on the ground that you can see within range. For the duration, an intense tremor rips through the ground in a 100-foot-radius circle centered on that point and shakes creatures and structures in contact with the ground in that area.\n\nThe ground in the area becomes difficult terrain. Each creature on the ground that is concentrating must make a constitution saving throw. On a failed save, the creature's concentration is broken.\n\nWhen you cast this spell and at the end of each turn you spend concentrating on it, each creature on the ground in the area must make a dexterity saving throw. On a failed save, the creature is knocked prone.\n\nThis spell can have additional effects depending on the terrain in the area, as determined by the GM.\n\nFissures. Fissures open throughout the spell's area at the start of your next turn after you cast the spell. A total of 1d6 such fissures open in locations chosen by the GM. Each is 1d10 x 10 feet deep, 10 feet wide, and extends from one edge of the spell's area to the opposite side. A creature standing on a spot where a fissure opens must succeed on a dexterity saving throw or fall in. A creature that successfully saves moves with the fissure's edge as it opens.\n\nA fissure that opens beneath a structure causes it to automatically collapse (see below).\n\nStructures. The tremor deals 50 bludgeoning damage to any structure in contact with the ground in the area when you cast the spell and at the start of each of your turns until the spell ends. If a structure drops to 0 hit points, it collapses and potentially damages nearby creatures. A creature within half the distance of a structure's height must make a dexterity saving throw. On a failed save, the creature takes 5d6 bludgeoning damage, is knocked prone, and is buried in the rubble, requiring a DC 20 Strength (Athletics) check as an action to escape. The GM can adjust the DC higher or lower, depending on the nature of the rubble. On a successful save, the creature takes half as much damage and doesn't fall prone or become buried.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"진눈깨비 폭풍","name_en":"Sleet Storm","level":3,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A pinch of dust and a few drops of water.","higher_level_en":"","desc_en":"Until the spell ends, freezing rain and sleet fall in a 20-foot-tall cylinder with a 40-foot radius centered on a point you choose within range. The area is heavily obscured, and exposed flames in the area are doused.\n\nThe ground in the area is covered with slick ice, making it difficult terrain. When a creature enters the spell's area for the first time on a turn or starts its turn there, it must make a dexterity saving throw. On a failed save, it falls prone.\n\nIf a creature is concentrating in the spell's area, the creature must make a successful constitution saving throw against your spell save DC or lose concentration.","damage_en":"","attack_type":"","range_ko":"45m(150ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"주문이 끝날 때까지, 사거리 내에서 선택한 지점을 중심으로 한 높이 6m(20ft), 반경 12m(40ft)의 원기둥에 얼어붙는 비와 진눈깨비가 내린다. 그 구역은 심하게 가려지며, 구역 안의 노출된 불꽃은 꺼진다.\n\n구역의 땅은 미끄러운 얼음으로 덮여 어려운 지형이 된다. 크리처가 한 턴에 처음으로 주문 구역에 들어오거나 그곳에서 턴을 시작하면 민첩 내성 굴림을 굴려야 한다. 실패 시 넘어진다.\n\n크리처가 주문 구역에서 정신집중 중이면, 시전자의 주문 내성 DC에 맞선 건강 내성 굴림에 성공하지 못할 경우 정신집중을 잃는다.","higher_level_ko":"","damage_ko":"","material_ko":"먼지 한 자밤과 물 몇 방울."},{"name_ko":"진시야","name_en":"True Seeing","level":6,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"1 hour","material_en":"An ointment for the eyes that costs 25gp; is made from mushroom powder, saffron, and fat; and is consumed by the spell.","higher_level_en":"","desc_en":"This spell gives the willing creature you touch the ability to see things as they actually are. For the duration, the creature has truesight, notices secret doors hidden by magic, and can see into the Ethereal Plane, all out to a range of 120 feet.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"진실의 공간","name_en":"Zone of Truth","level":2,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"10 minutes","material_en":"","higher_level_en":"","desc_en":"You create a magical zone that guards against deception in a 15-foot-radius sphere centered on a point of your choice within range. Until the spell ends, a creature that enters the spell's area for the first time on a turn or starts its turn there must make a Charisma saving throw. On a failed save, a creature can't speak a deliberate lie while in the radius. You know whether each creature succeeds or fails on its saving throw.\n\nAn affected creature is aware of the spell and can thus avoid answering questions to which it would normally respond with a lie. Such a creature can remain evasive in its answers as long as it remains within the boundaries of the truth.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"10 분","desc_ko":"사거리 내에서 선택한 지점을 중심으로 한 4.5m(15ft) 반경 구체에 기만을 막는 마법 구역을 만든다. 주문이 끝날 때까지, 한 턴에 처음으로 주문 구역에 들어오거나 그곳에서 턴을 시작하는 크리처는 매력 내성 굴림을 굴려야 한다. 실패 시 그 크리처는 반경 안에 있는 동안 의도적인 거짓말을 할 수 없다. 시전자는 각 크리처가 내성 굴림에 성공했는지 실패했는지 안다.\n\n영향받은 크리처는 주문의 존재를 알고 있으므로, 평소 거짓말로 답할 질문에 답하기를 피할 수 있다. 그런 크리처는 진실의 경계 안에 머무는 한 답변을 회피적으로 할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"진정한 변신","name_en":"True Polymorph","level":9,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A drop of mercury, a dollop of gum arabic, and a wisp of smoke.","higher_level_en":"","desc_en":"Choose one creature or nonmagical object that you can see within range. You transform the creature into a different creature, the creature into an object, or the object into a creature (the object must be neither worn nor carried by another creature). The transformation lasts for the duration, or until the target drops to 0 hit points or dies. If you concentrate on this spell for the full duration, the transformation becomes permanent.\n\nShapechangers aren't affected by this spell. An unwilling creature can make a wisdom saving throw, and if it succeeds, it isn't affected by this spell.\n\n***Creature into Creature.*** If you turn a creature into another kind of creature, the new form can be any kind you choose whose challenge rating is equal to or less than the target's (or its level, if the target doesn't have a challenge rating). The target's game statistics, including mental ability scores, are replaced by the statistics of the new form. It retains its alignment and personality.\n\nThe target assumes the hit points of its new form, and when it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious.\n\nThe creature is limited in the actions it can perform by the nature of its new form, and it can't speak, cast spells, or take any other action that requires hands or speech unless its new form is capable of such actions.\n\nThe target's gear melds into the new form. The creature can't activate, use, wield, or otherwise benefit from any of its equipment.\n\n***Object into Creature.*** You can turn an object into any kind of creature, as long as the creature's size is no larger than the object's size and the creature's challenge rating is 9 or lower. The creature is friendly to you and your companions. It acts on each of your turns. You decide what action it takes and how it moves. The GM has the creature's statistics and resolves all of its actions and movement.\n\nIf the spell becomes permanent, you no longer control the creature. It might remain friendly to you, depending on how you have treated it.\n\n***Creature into Object.*** If you turn a creature into an object, it transforms along with whatever it is wearing and carrying into that form. The creature's statistics become those of the object, and the creature has no memory of time spent in this form, after the spell ends and it returns to its normal form.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"진정한 부활","name_en":"True Resurrection","level":9,"school":"사령계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 hour","duration_en":"Instantaneous","material_en":"A sprinkle of holy water and diamonds worth at least 25,000gp, which the spell consumes.","higher_level_en":"","desc_en":"You touch a creature that has been dead for no longer than 200 years and that died for any reason except old age. If the creature's soul is free and willing, the creature is restored to life with all its hit points.\n\nThis spell closes all wounds, neutralizes any poison, cures all diseases, and lifts any curses affecting the creature when it died. The spell replaces damaged or missing organs and limbs.\n\nThe spell can even provide a new body if the original no longer exists, in which case you must speak the creature's name. The creature then appears in an unoccupied space you choose within 10 feet of you.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"차원문","name_en":"Dimension Door","level":4,"school":"조형계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"500 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You teleport yourself from your current location to any other spot within range. You arrive at exactly the spot desired. It can be a place you can see, one you can visualize, or one you can describe by stating distance and direction, such as \"200 feet straight downward\" or \"upward to the northwest at a 45-degree angle, 300 feet.\"\n\nYou can bring along objects as long as their weight doesn't exceed what you can carry. You can also bring one willing creature of your size or smaller who is carrying gear up to its carrying capacity. The creature must be within 5 feet of you when you cast this spell.\n\nIf you would arrive in a place already occupied by an object or a creature, you and any creature traveling with you each take 4d6 force damage, and the spell fails to teleport you.","damage_en":"4d6 Force","attack_type":"","range_ko":"150m(500ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"현재 위치에서 사거리 내 다른 지점으로 순간이동한다. 정확히 원하는 지점에 도착한다. 볼 수 있는 곳, 머릿속에 그릴 수 있는 곳, 또는 \"똑바로 아래 60m(200ft)\"나 \"북서쪽 위로 45도 각도, 90m(300ft)\"처럼 거리와 방향을 말해 묘사할 수 있는 곳일 수 있다.\n\n운반할 수 있는 무게를 넘지 않는 한 물체를 함께 가져갈 수 있다. 또한 운반 능력만큼의 장비를 지닌, 시전자와 같은 크기 이하의 동의하는 크리처 하나를 데려갈 수 있다. 이 주문을 시전할 때 그 크리처는 시전자의 1.5m(5ft) 이내에 있어야 한다.\n\n이미 물체나 크리처가 점유한 곳에 도착하게 되면, 시전자와 함께 이동하는 모든 크리처가 각각 4d6 역장 피해를 받고, 주문은 순간이동에 실패한다.","higher_level_ko":"","damage_ko":"4d6 역장 피해","material_ko":""},{"name_ko":"참된 일격","name_en":"True Strike","level":0,"school":"예지계","components":["S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 round","material_en":"","higher_level_en":"","desc_en":"You extend your hand and point a finger at a target in range. Your magic grants you a brief insight into the target's defenses. On your next turn, you gain advantage on your first attack roll against the target, provided that this spell hasn't ended.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1라운드","desc_ko":"손을 뻗어 사거리 내 대상을 손가락으로 가리킨다. 시전자의 마법이 대상의 방어에 대한 짧은 통찰을 준다. 이 주문이 끝나지 않았다면, 다음 턴에 그 대상을 상대로 한 첫 명중 굴림에 유리 보정을 받는다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"창조","name_en":"Creation","level":5,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 minute","duration_en":"Special","material_en":"A tiny piece of matter of the same type of the item you plan to create.","higher_level_en":"When you cast this spell using a spell slot of 6th level or higher, the cube increases by 5 feet for each slot level above 5th.","desc_en":"You pull wisps of shadow material from the Shadowfell to create a nonliving object of vegetable matter within range: soft goods, rope, wood, or something similar. You can also use this spell to create mineral objects such as stone, crystal, or metal. The object created must be no larger than a 5-foot cube, and the object must be of a form and material that you have seen before.\n\nThe duration depends on the object's material. If the object is composed of multiple materials, use the shortest duration.\n\n| Material | Duration |\n\n|---|---|\n\n| Vegetable matter | 1 day |\n\n| Stone or crystal | 12 hours |\n\n| Precious metals | 1 hour |\n\n| Gems | 10 minutes |\n\n| Adamantine or mithral | 1 minute |\n\nUsing any material created by this spell as another spell's material component causes that spell to fail.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 분","duration_ko":"특수","desc_ko":"섀도펠에서 그림자 물질의 가닥을 끌어와, 사거리 내에 식물성 무생물, 즉 부드러운 물품, 밧줄, 나무, 또는 비슷한 것을 만든다. 이 주문으로 돌, 수정, 금속 같은 광물성 물체를 만들 수도 있다. 만드는 물체는 1.5m(5ft) 정육면체보다 크지 않아야 하며, 시전자가 전에 본 적 있는 형태와 재료여야 한다.\n\n지속시간은 물체의 재료에 따라 다르다. 물체가 여러 재료로 이루어지면 가장 짧은 지속시간을 쓴다.\n\n| 재료 | 지속시간 |\n|---|---|\n| 식물성 물질 | 1일 |\n| 돌이나 수정 | 12시간 |\n| 귀금속 | 1시간 |\n| 보석 | 10분 |\n| 아다만틴이나 미스랄 | 1분 |\n\n이 주문으로 만든 재료를 다른 주문의 물질 구성요소로 쓰면 그 주문은 실패한다.","higher_level_ko":"6레벨 이상의 주문 슬롯으로 시전하면, 5레벨을 넘는 슬롯 레벨마다 정육면체가 1.5m(5ft)씩 커진다.","damage_ko":"","material_ko":"만들려는 물품과 같은 종류의 물질 작은 조각."},{"name_ko":"천둥 강타","name_en":"Thunderous Smite","level":1,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"천둥파도","name_en":"Thunderwave","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st.","desc_en":"A wave of thunderous force sweeps out from you. Each creature in a 15-foot cube originating from you must make a constitution saving throw. On a failed save, a creature takes 2d8 thunder damage and is pushed 10 feet away from you. On a successful save, the creature takes half as much damage and isn't pushed.\n\nIn addition, unsecured objects that are completely within the area of effect are automatically pushed 10 feet away from you by the spell's effect, and the spell emits a thunderous boom audible out to 300 feet.","damage_en":"2d8 Thunder","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"천둥 같은 역장의 파도가 시전자로부터 뻗어나간다. 시전자로부터 시작되는 4.5m(15ft) 정육면체 내의 각 크리처는 건강 내성 굴림을 굴려야 한다. 실패 시 크리처는 2d8 천둥 피해를 받고 시전자로부터 3m(10ft) 밀려난다. 성공 시 절반의 피해를 받고 밀려나지 않는다.\n\n또한 효과 범위 안에 완전히 들어온 고정되지 않은 물체는 주문 효과로 자동으로 3m(10ft) 밀려나며, 주문은 90m(300ft)까지 들리는 천둥 같은 굉음을 낸다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 피해가 1d8씩 증가한다.","damage_ko":"2d8 천둥 피해","material_ko":""},{"name_ko":"천상체 소환","name_en":"Conjure Celestial","level":7,"school":"조형계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 minute","duration_en":"Up to 1 hour","material_en":"","higher_level_en":"When you cast this spell using a 9th-level spell slot, you summon a celestial of challenge rating 5 or lower.","desc_en":"You summon a celestial of challenge rating 4 or lower, which appears in an unoccupied space that you can see within range. The celestial disappears when it drops to 0 hit points or when the spell ends.\n\nThe celestial is friendly to you and your companions for the duration. Roll initiative for the celestial, which has its own turns. It obeys any verbal commands that you issue to it (no action required by you), as long as they don't violate its alignment. If you don't issue any commands to the celestial, it defends itself from hostile creatures but otherwise takes no actions.\n\nThe GM has the celestial's statistics.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"청산유수","name_en":"Glibness","level":8,"school":"변환계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"Until the spell ends, when you make a Charisma check, you can replace the number you roll with a 15. Additionally, no matter what you say, magic that would determine if you are telling the truth indicates that you are being truthful.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"최면 패턴","name_en":"Hypnotic Pattern","level":3,"school":"환영계","components":["S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A glowing stick of incense or a crystal vial filled with phosphorescent material.","higher_level_en":"","desc_en":"You create a twisting pattern of colors that weaves through the air inside a 30-foot cube within range. The pattern appears for a moment and vanishes. Each creature in the area who sees the pattern must make a wisdom saving throw. On a failed save, the creature becomes charmed for the duration. While charmed by this spell, the creature is incapacitated and has a speed of 0.\n\nThe spell ends for an affected creature if it takes any damage or if someone else uses an action to shake the creature out of its stupor.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내 9m(30ft) 정육면체 안의 공중을 휘감으며 지나가는 뒤틀리는 색색의 무늬를 만든다. 무늬는 잠깐 나타났다 사라진다. 그 구역에서 무늬를 본 각 크리처는 지혜 내성 굴림을 굴려야 한다. 실패 시 그 크리처는 지속시간 동안 매혹된다. 이 주문으로 매혹된 동안 크리처는 무력화되고 이동속도가 0이 된다.\n\n영향받은 크리처가 피해를 받거나, 다른 누군가가 행동을 사용해 그 크리처를 멍한 상태에서 흔들어 깨우면 그 크리처에 대한 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"빛나는 향 막대 또는 인광 물질이 담긴 수정 병."},{"name_ko":"추방","name_en":"Banishment","level":4,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"An item distasteful to the target.","higher_level_en":"When you cast this spell using a spell slot of 5th level or higher, you can target one additional creature for each slot level above 4th.","desc_en":"You attempt to send one creature that you can see within range to another plane of existence. The target must succeed on a charisma saving throw or be banished.\n\nIf the target is native to the plane of existence you're on, you banish the target to a harmless demiplane. While there, the target is incapacitated. The target remains there until the spell ends, at which point the target reappears in the space it left or in the nearest unoccupied space if that space is occupied.\n\nIf the target is native to a different plane of existence than the one you're on, the target is banished with a faint popping noise, returning to its home plane. If the spell ends before 1 minute has passed, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. Otherwise, the target doesn't return.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는 크리처 하나를 다른 존재계로 보내려 시도한다. 대상은 매력 내성 굴림에 성공하지 못하면 추방된다.\n\n대상이 시전자가 있는 존재계 태생이면, 대상을 해롭지 않은 반쪽 존재계로 추방한다. 그곳에 있는 동안 대상은 무력화된다. 대상은 주문이 끝날 때까지 그곳에 머물며, 주문이 끝나면 떠났던 공간에 다시 나타나거나, 그 공간이 점유되어 있으면 가장 가까운 빈 공간에 나타난다.\n\n대상이 시전자가 있는 존재계와 다른 존재계 태생이면, 대상은 희미한 펑 소리와 함께 추방되어 고향 존재계로 돌아간다. 1분이 지나기 전에 주문이 끝나면, 대상은 떠났던 공간이나 가장 가까운 빈 공간에 다시 나타난다. 그렇지 않으면 대상은 돌아오지 않는다.","higher_level_ko":"5레벨 이상의 주문 슬롯으로 시전하면, 4레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"대상이 싫어하는 물품."},{"name_ko":"추방의 강타","name_en":"Banishing Smite","level":5,"school":"방호계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"축복","name_en":"Bless","level":1,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A sprinkling of holy water.","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st.","desc_en":"You bless up to three creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the spell ends, the target can roll a d4 and add the number rolled to the attack roll or saving throw.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 선택한 크리처 최대 셋을 축복한다. 주문이 끝나기 전에 대상이 명중 굴림이나 내성 굴림을 굴릴 때마다, d4를 굴려 그 결과를 명중 굴림이나 내성 굴림에 더할 수 있다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"성수 약간."},{"name_ko":"춤추는 빛","name_en":"Dancing Lights","level":0,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A bit of phosphorus or wychwood, or a glowworm.","higher_level_en":"","desc_en":"You create up to four torch-sized lights within range, making them appear as torches, lanterns, or glowing orbs that hover in the air for the duration. You can also combine the four lights into one glowing vaguely humanoid form of Medium size. Whichever form you choose, each light sheds dim light in a 10-foot radius.\n\nAs a bonus action on your turn, you can move the lights up to 60 feet to a new spot within range. A light must be within 20 feet of another light created by this spell, and a light winks out if it exceeds the spell's range.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에 횃불 크기의 빛을 최대 네 개 만들어, 횃불, 등불, 또는 공중에 떠 있는 빛나는 구체처럼 보이게 한다. 네 빛을 하나로 합쳐 중형 크기의 어렴풋한 인간형 형체로 만들 수도 있다. 어느 형태를 택하든 각 빛은 3m(10ft) 반경에 흐릿한 빛을 발한다.\n\n자기 턴에 추가 행동으로, 빛을 사거리 내 새로운 지점까지 최대 18m(60ft) 이동시킬 수 있다. 각 빛은 이 주문으로 만든 다른 빛의 6m(20ft) 이내에 있어야 하며, 사거리를 벗어난 빛은 꺼진다.","higher_level_ko":"","damage_ko":"","material_ko":"인 조각이나 위치우드, 또는 야광충."},{"name_ko":"충동","name_en":"Compulsion","level":4,"school":"환혹계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"","higher_level_en":"","desc_en":"Creatures of your choice that you can see within range and that can hear you must make a wisdom saving throw. A target automatically succeeds on this saving throw if it can't be charmed. On a failed save, a target is affected by this spell. Until the spell ends, you can use a bonus action on each of your turns to designate a direction that is horizontal to you. Each affected target must use as much of its movement as possible to move in that direction on its next turn. It can take any action before it moves. After moving in this way, it can make another Wisdom save to try to end the effect.\n\nA target isn't compelled to move into an obviously deadly hazard, such as a fire or a pit, but it will provoke opportunity attacks to move in the designated direction.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있고 시전자의 말을 들을 수 있는, 선택한 크리처들이 지혜 내성 굴림을 굴려야 한다. 매혹될 수 없는 대상은 이 내성 굴림에 자동으로 성공한다. 실패 시 대상은 이 주문의 영향을 받는다. 주문이 끝날 때까지, 자기 턴마다 추가 행동으로 시전자에게 수평인 방향 하나를 지정할 수 있다. 영향받은 각 대상은 다음 턴에 가능한 한 이동력을 최대한 써서 그 방향으로 이동해야 한다. 이동하기 전에 어떤 행동이든 할 수 있다. 이렇게 이동한 뒤, 효과를 끝내기 위해 다시 지혜 내성 굴림을 굴릴 수 있다.\n\n대상은 불이나 구덩이처럼 명백히 치명적인 위험 속으로 이동하도록 강요받지는 않지만, 지정된 방향으로 이동하기 위해 기회 공격을 유발하게 된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"치료의 기도","name_en":"Prayer of Healing","level":2,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"10 minutes","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, the healing increases by 1d8 for each slot level above 2nd.","desc_en":"Up to six creatures of your choice that you can see within range each regain hit points equal to 2d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"10 분","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는, 선택한 크리처 최대 여섯이 각각 2d8 + 시전자의 주문시전 능력 수정치만큼의 히트 포인트를 회복한다. 이 주문은 언데드나 구조물에는 효과가 없다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 회복량이 1d8씩 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"치료의 단어","name_en":"Healing Word","level":1,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":true,"range_en":"60 feet","casting_time_en":"1 bonus action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d4 for each slot level above 1st.","desc_en":"A creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 추가 행동","duration_ko":"즉시","desc_ko":"사거리 내에서 볼 수 있는, 선택한 크리처가 1d4 + 주문시전 능력 수정치만큼의 히트 포인트를 회복한다. 이 주문은 언데드나 구조물에는 효과가 없다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 회복량이 1d4씩 증가한다.","damage_ko":"","material_ko":""},{"name_ko":"치유","name_en":"Heal","level":6,"school":"방출계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 7th level or higher, the amount of healing increases by 10 for each slot level above 6th.","desc_en":"Choose a creature that you can see within range. A surge of positive energy washes through the creature, causing it to regain 70 hit points. This spell also ends blindness, deafness, and any diseases affecting the target. This spell has no effect on constructs or undead.","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"친밀화","name_en":"Friends","level":0,"school":"환혹계","components":["S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"침묵","name_en":"Silence","level":2,"school":"환영계","components":["V","S"],"ritual":true,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"For the duration, no sound can be created within or pass through a 20-foot-radius sphere centered on a point you choose within range. Any creature or object entirely inside the sphere is immune to thunder damage, and creatures are deafened while entirely inside it.\n\nCasting a spell that includes a verbal component is impossible there.","damage_en":"","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 10분","desc_ko":"지속시간 동안, 사거리 내에서 선택한 지점을 중심으로 한 6m(20ft) 반경 구체 안에서는 어떤 소리도 만들어지거나 통과할 수 없다. 구체 안에 완전히 들어간 크리처나 물체는 천둥 피해에 면역이며, 완전히 안에 있는 크리처는 귀머거리가 된다.\n\n그 안에서는 음성 구성요소가 포함된 주문을 시전할 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"칼날 방벽","name_en":"Blade Barrier","level":6,"school":"방출계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"90 feet","casting_time_en":"1 action","duration_en":"Up to 10 minutes","material_en":"","higher_level_en":"","desc_en":"You create a vertical wall of whirling, razor-sharp blades made of magical energy. The wall appears within range and lasts for the duration. You can make a straight wall up to 100 feet long, 20 feet high, and 5 feet thick, or a ringed wall up to 60 feet in diameter, 20 feet high, and 5 feet thick. The wall provides three-quarters cover to creatures behind it, and its space is difficult terrain.\n\nWhen a creature enters the wall's area for the first time on a turn or starts its turn there, the creature must make a dexterity saving throw. On a failed save, the creature takes 6d10 slashing damage. On a successful save, the creature takes half as much damage.","damage_en":"6d10 Slashing","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"6d10 참격 피해","material_ko":""},{"name_ko":"쾌속 화살통","name_en":"Swift Quiver","level":5,"school":"변환계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"크리쳐 위치파악","name_en":"Locate Creature","level":4,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"A bit of fur from a bloodhound.","higher_level_en":"","desc_en":"Describe or name a creature that is familiar to you. You sense the direction to the creature's location, as long as that creature is within 1,000 feet of you. If the creature is moving, you know the direction of its movement.\n\nThe spell can locate a specific creature known to you, or the nearest creature of a specific kind (such as a human or a unicorn), so long as you have seen such a creature up close--within 30 feet--at least once. If the creature you described or named is in a different form, such as being under the effects of a polymorph spell, this spell doesn't locate the creature.\n\nThis spell can't locate a creature if running water at least 10 feet wide blocks a direct path between you and the creature.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"시전자에게 익숙한 크리처를 묘사하거나 이름을 댄다. 그 크리처가 시전자로부터 1,000피트 이내에 있는 한, 크리처 위치로 향하는 방향을 감지한다. 크리처가 움직이고 있으면 그 이동 방향을 안다.\n\n이 주문은 시전자가 아는 특정 크리처, 또는 특정 종류(인간이나 유니콘 등)의 가장 가까운 크리처를 찾을 수 있으며, 그런 크리처를 30피트 이내 가까이에서 적어도 한 번 본 적 있어야 한다. 묘사하거나 이름을 댄 크리처가 변신 주문의 효과를 받는 등 다른 형태로 있으면, 이 주문은 그 크리처를 찾지 못한다.\n\n시전자와 크리처 사이 직선 경로를 폭 10피트 이상의 흐르는 물이 가로막고 있으면 이 주문은 크리처를 찾을 수 없다.","higher_level_ko":"","damage_ko":"","material_ko":"블러드하운드의 털 조각."},{"name_ko":"타샤의 끔찍한 웃음","name_en":"Tasha's Hideous Laughter","level":1,"school":"환혹계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"Tiny tarts and a feather that is waved in the air.","higher_level_en":"","desc_en":"A creature of your choice that you can see within range perceives everything as hilariously funny and falls into fits of laughter if this spell affects it. The target must succeed on a wisdom saving throw or fall prone, becoming incapacitated and unable to stand up for the duration. A creature with an Intelligence score of 4 or less isn't affected.\n\nAt the end of each of its turns, and each time it takes damage, the target can make another wisdom saving throw. The target had advantage on the saving throw if it's triggered by damage. On a success, the spell ends.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1분","desc_ko":"사거리 내에서 볼 수 있는, 선택한 크리처가 이 주문에 영향을 받으면 모든 것이 우스꽝스럽게 느껴져 웃음 발작에 빠진다. 대상은 지혜 내성 굴림에 성공하지 못하면 넘어지고, 무력화되어 지속시간 동안 일어설 수 없게 된다. 지능 점수가 4 이하인 크리처는 영향받지 않는다.\n\n대상은 자기 턴이 끝날 때마다, 그리고 피해를 받을 때마다 다시 지혜 내성 굴림을 굴릴 수 있다. 피해로 인해 유발된 내성 굴림에는 유리 보정을 받는다. 성공 시 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"작은 타르트와 공중에 흔드는 깃털."},{"name_ko":"타오르는 강타","name_en":"Searing Smite","level":1,"school":"방출계","components":["V"],"ritual":false,"concentration":true,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"타오르는 광선","name_en":"Scorching Ray","level":2,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"120 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, you create one additional ray for each slot level above 2nd.","desc_en":"You create three rays of fire and hurl them at targets within range. You can hurl them at one target or several.\n\nMake a ranged spell attack for each ray. On a hit, the target takes 2d6 fire damage.","damage_en":"2d6 Fire","attack_type":"","range_ko":"36m(120ft)","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"불의 광선 셋을 만들어 사거리 내 대상에게 던진다. 한 대상에게 몰거나 여럿에게 나눠 던질 수 있다.\n\n각 광선마다 원거리 주문 공격을 굴린다. 명중 시 대상은 2d6 화염 피해를 받는다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 광선이 하나씩 늘어난다.","damage_ko":"2d6 화염 피해","material_ko":""},{"name_ko":"타오르는 손길","name_en":"Burning Hands","level":1,"school":"방출계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"","higher_level_en":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.","desc_en":"As you hold your hands with thumbs touching and fingers spread, a thin sheet of flames shoots forth from your outstretched fingertips. Each creature in a 15-foot cone must make a dexterity saving throw. A creature takes 3d6 fire damage on a failed save, or half as much damage on a successful one.\n\nThe fire ignites any flammable objects in the area that aren't being worn or carried.","damage_en":"3d6 Fire","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"즉시","desc_ko":"엄지를 맞대고 손가락을 펼친 채 손을 들면, 뻗은 손가락 끝에서 얇은 화염 판이 뿜어져 나온다. 4.5m(15ft) 원뿔 내의 각 크리처는 민첩 내성 굴림을 굴려야 한다. 실패 시 3d6 화염 피해를, 성공 시 절반의 피해를 받는다.\n\n이 화염은 착용하거나 소지되지 않은 인화성 물체에 불을 붙인다.","higher_level_ko":"2레벨 이상의 주문 슬롯으로 시전하면, 1레벨을 넘는 슬롯 레벨마다 피해가 1d6씩 증가한다.","damage_ko":"3d6 화염 피해","material_ko":""},{"name_ko":"탄막 소환","name_en":"Conjure Barrage","level":3,"school":"조형계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"탈것 찾기","name_en":"Find Steed","level":2,"school":"조형계","components":["V","S"],"ritual":false,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"10 minutes","duration_en":"Instantaneous","material_en":"","higher_level_en":"","desc_en":"You summon a spirit that assumes the form of an unusually intelligent, strong, and loyal steed, creating a long-lasting bond with it. Appearing in an unoccupied space within range, the steed takes on a form that you choose, such as a warhorse, a pony, a camel, an elk, or a mastiff. (Your GM might allow other animals to be summoned as steeds.) The steed has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of its normal type. Additionally, if your steed has an Intelligence of 5 or less, its Intelligence becomes 6, and it gains the ability to understand one language of your choice that you speak.\n\nYour steed serves you as a mount, both in combat and out, and you have an instinctive bond with it that allows you to fight as a seamless unit. While mounted on your steed, you can make any spell you cast that targets only you also target your steed.\n\nWhen the steed drops to 0 hit points, it disappears, leaving behind no physical form. You can also dismiss your steed at any time as an action, causing it to disappear. In either case, casting this spell again summons the same steed, restored to its hit point maximum.\n\nWhile your steed is within 1 mile of you, you can communicate with it telepathically.\n\nYou can't have more than one steed bonded by this spell at a time. As an action, you can release the steed from its bond at any time, causing it to disappear.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"10 분","duration_ko":"즉시","desc_ko":"유난히 영리하고 강하며 충성스러운 탈것 형태를 취하는 정령을 소환하여, 그것과 오래 지속되는 유대를 맺는다. 사거리 내 빈 공간에 나타나며, 탈것은 군마, 조랑말, 낙타, 엘크, 마스티프처럼 시전자가 선택한 형태를 취한다(DM이 다른 동물을 탈것으로 허용할 수도 있다). 탈것은 선택한 형태의 능력치를 지니되, 본래 유형이 아니라 천상체, 요정, 또는 악마(시전자 선택)다. 또한 탈것의 지능이 5 이하이면 지능이 6이 되고, 시전자가 구사하는 언어 중 시전자가 선택한 언어 하나를 이해하는 능력을 얻는다.\n\n탈것은 전투 안팎에서 시전자의 탈것으로 봉사하며, 시전자는 그것과 본능적 유대를 맺어 매끄러운 한 몸처럼 싸울 수 있다. 탈것에 올라탄 동안, 시전자만을 대상으로 하는 주문을 시전하면 그 주문이 탈것도 대상으로 삼게 할 수 있다.\n\n탈것의 히트 포인트가 0이 되면, 물리적 형체를 남기지 않고 사라진다. 언제든 행동으로 탈것을 해제해 사라지게 할 수도 있다. 어느 쪽이든, 이 주문을 다시 시전하면 최대 히트 포인트로 회복된 같은 탈것이 소환된다.\n\n탈것이 시전자로부터 1마일 이내에 있는 동안, 텔레파시로 소통할 수 있다.\n\n이 주문으로 유대를 맺은 탈것은 한 번에 하나만 가질 수 있다. 행동으로 언제든 탈것을 유대에서 풀어 사라지게 할 수 있다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"탐지방어","name_en":"Nondetection","level":3,"school":"방호계","components":["V","S","M"],"ritual":false,"concentration":false,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"8 hours","material_en":"A pinch of diamond dust worth 25 gp sprinkled over the target, which the spell consumes.","higher_level_en":"","desc_en":"For the duration, you hide a target that you touch from divination magic. The target can be a willing creature or a place or an object no larger than 10 feet in any dimension. The target can't be targeted by any divination magic or perceived through magical scrying sensors.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"8 시간","desc_ko":"지속시간 동안, 접촉한 대상을 예지 마법으로부터 숨긴다. 대상은 동의하는 크리처, 또는 어느 방향으로도 3m(10ft)를 넘지 않는 장소나 물체일 수 있다. 대상은 어떤 예지 마법으로도 대상이 될 수 없고, 마법적 염탐 감지기로도 인지되지 않는다.","higher_level_ko":"","damage_ko":"","material_ko":"이 주문이 소모하는, 대상에게 뿌리는 25gp 가치의 다이아몬드 가루 한 자밤."},{"name_ko":"태양광","name_en":"Daylight","level":3,"school":"방출계","components":["V","S"],"ritual":false,"concentration":true,"srd":true,"range_en":"60 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"","higher_level_en":"","desc_en":"A 60-foot-radius sphere of light spreads out from a point you choose within range. The sphere is bright light and sheds dim light for an additional 60 feet.\n\nIf you chose a point on an object you are holding or one that isn't being worn or carried, the light shines from the object and moves with it. Completely covering the affected object with an opaque object, such as a bowl or a helm, blocks the light.\n\nIf any of this spell's area overlaps with an area of darkness created by a spell of 3rd level or lower, the spell that created the darkness is dispelled.","damage_en":"","attack_type":"","range_ko":"18m(60ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"사거리 내에서 선택한 지점에서 반경 18m(60ft)의 빛 구체가 퍼진다. 구체는 밝은 빛이며, 추가로 18m(60ft)에 흐릿한 빛을 발한다.\n\n시전자가 든 물체나 착용·소지되지 않은 물체 위의 지점을 택하면, 빛이 그 물체에서 빛나며 물체와 함께 이동한다. 사발이나 투구 같은 불투명한 물체로 영향받은 물체를 완전히 덮으면 빛이 차단된다.\n\n이 주문의 구역 일부가 3레벨 이하의 주문으로 만든 어둠의 구역과 겹치면, 그 어둠을 만든 주문이 무효화된다.","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"태양광선","name_en":"Sunbeam","level":6,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"Up to 1 minute","material_en":"A magnifying glass.","higher_level_en":"","desc_en":"A beam of brilliant light flashes out from your hand in a 5-foot-wide, 60-foot-long line. Each creature in the line must make a constitution saving throw. On a failed save, a creature takes 6d8 radiant damage and is blinded until your next turn. On a successful save, it takes half as much damage and isn't blinded by this spell. Undead and oozes have disadvantage on this saving throw.\n\nYou can create a new line of radiance as your action on any turn until the spell ends.\n\nFor the duration, a mote of brilliant radiance shines in your hand. It sheds bright light in a 30-foot radius and dim light for an additional 30 feet. This light is sunlight.","damage_en":"6d8 Radiant","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"6d8 광휘 피해","material_ko":""},{"name_ko":"태양폭발","name_en":"Sunburst","level":8,"school":"방출계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"150 feet","casting_time_en":"1 action","duration_en":"Instantaneous","material_en":"Fire and a piece of sunstone.","higher_level_en":"","desc_en":"Brilliant sunlight flashes in a 60-foot radius centered on a point you choose within range. Each creature in that light must make a constitution saving throw. On a failed save, a creature takes 12d6 radiant damage and is blinded for 1 minute. On a successful save, it takes half as much damage and isn't blinded by this spell. Undead and oozes have disadvantage on this saving throw.\n\nA creature blinded by this spell makes another constitution saving throw at the end of each of its turns. On a successful save, it is no longer blinded.\n\nThis spell dispels any darkness in its area that was created by a spell.","damage_en":"12d6 Radiant","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"12d6 광휘 피해","material_ko":""},{"name_ko":"텐서의 부유 원반","name_en":"Tenser's Floating Disk","level":1,"school":"조형계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"30 feet","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A drop of mercury.","higher_level_en":"","desc_en":"This spell creates a circular, horizontal plane of force, 3 feet in diameter and 1 inch thick, that floats 3 feet above the ground in an unoccupied space of your choice that you can see within range. The disk remains for the duration, and can hold up to 500 pounds. If more weight is placed on it, the spell ends, and everything on the disk falls to the ground.\n\nThe disk is immobile while you are within 20 feet of it. If you move more than 20 feet away from it, the disk follows you so that it remains within 20 feet of you. If can move across uneven terrain, up or down stairs, slopes and the like, but it can't cross an elevation change of 10 feet or more. For example, the disk can't move across a 10-foot-deep pit, nor could it leave such a pit if it was created at the bottom.\n\nIf you move more than 100 feet away from the disk (typically because it can't move around an obstacle to follow you), the spell ends.","damage_en":"","attack_type":"","range_ko":"9m(30ft)","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"이 주문은 지름 3피트, 두께 1인치의 둥글고 수평인 역장 판을 만들며, 사거리 내에서 볼 수 있는 빈 공간의 지면 3피트 위에 떠 있는다. 이 원반은 지속시간 동안 유지되며, 최대 500파운드까지 실을 수 있다. 그보다 무거운 것을 올리면 주문이 끝나고, 원반 위의 모든 것이 바닥에 떨어진다.\n\n원반은 시전자가 6m(20ft) 이내에 있는 동안 움직이지 않는다. 시전자가 6m(20ft) 넘게 멀어지면, 원반은 시전자의 6m(20ft) 이내에 머물도록 따라온다. 원반은 고르지 않은 지형, 계단, 경사면 등을 가로질러 이동할 수 있지만, 3m(10ft) 이상의 고도 변화는 넘지 못한다. 예를 들어 원반은 3m(10ft) 깊이의 구덩이를 가로지를 수 없으며, 구덩이 바닥에서 만들어졌다면 그곳을 벗어날 수도 없다.\n\n시전자가 원반으로부터 30m(100ft) 넘게 멀어지면(대개 원반이 장애물을 돌아 따라올 수 없기 때문에), 주문이 끝난다.","higher_level_ko":"","damage_ko":"","material_ko":"수은 한 방울."},{"name_ko":"통증 광선","name_en":"Ray of Sickness","level":1,"school":"사령계","components":["V","S"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"투명체 감지","name_en":"See Invisibility","level":2,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Self","casting_time_en":"1 action","duration_en":"1 hour","material_en":"A dash of talc and a small amount of silver powder.","higher_level_en":"","desc_en":"For the duration of the spell, you see invisible creatures and objects as if they were visible, and you can see through Ethereal. The ethereal objects and creatures appear ghostly translucent.","damage_en":"","attack_type":"","range_ko":"자신","casting_time_ko":"1 행동","duration_ko":"1 시간","desc_ko":"주문의 지속시간 동안, 투명한 크리처와 물체를 보이는 것처럼 보고, 영계를 꿰뚫어 볼 수 있다. 영체 물체와 크리처는 유령처럼 반투명하게 보인다.","higher_level_ko":"","damage_ko":"","material_ko":"활석 약간과 소량의 은가루."},{"name_ko":"투명화","name_en":"Invisibility","level":2,"school":"환영계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"Touch","casting_time_en":"1 action","duration_en":"Up to 1 hour","material_en":"An eyelash encased in gum arabic.","higher_level_en":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.","desc_en":"A creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person. The spell ends for a target that attacks or casts a spell.","damage_en":"","attack_type":"","range_ko":"접촉","casting_time_ko":"1 행동","duration_ko":"정신집중, 최대 1시간","desc_ko":"접촉한 크리처가 주문이 끝날 때까지 투명해진다. 대상이 착용하거나 소지한 것은 대상의 몸에 있는 한 함께 투명해진다. 대상이 공격하거나 주문을 시전하면 그 대상에 대한 주문이 끝난다.","higher_level_ko":"3레벨 이상의 주문 슬롯으로 시전하면, 2레벨을 넘는 슬롯 레벨마다 크리처를 하나씩 추가로 대상으로 삼을 수 있다.","damage_ko":"","material_ko":"아라비아고무로 감싼 속눈썹."},{"name_ko":"투시","name_en":"Clairvoyance","level":3,"school":"예지계","components":["V","S","M"],"ritual":false,"concentration":true,"srd":true,"range_en":"1 mile","casting_time_en":"10 minutes","duration_en":"Up to 10 minutes","material_en":"A focus worth at least 100gp, either a jeweled horn for hearing or a glass eye for seeing.","higher_level_en":"","desc_en":"You create an invisible sensor within range in a location familiar to you (a place you have visited or seen before) or in an obvious location that is unfamiliar to you (such as behind a door, around a corner, or in a grove of trees). The sensor remains in place for the duration, and it can't be attacked or otherwise interacted with.\n\nWhen you cast the spell, you choose seeing or hearing. You can use the chosen sense through the sensor as if you were in its space. As your action, you can switch between seeing and hearing.\n\nA creature that can see the sensor (such as a creature benefiting from see invisibility or truesight) sees a luminous, intangible orb about the size of your fist.","damage_en":"","attack_type":"","range_ko":"1마일","casting_time_ko":"10 분","duration_ko":"정신집중, 최대 10분","desc_ko":"사거리 내에서 시전자에게 익숙한 장소(전에 방문했거나 본 적 있는 곳)나, 익숙하지 않지만 뻔한 위치(문 뒤, 모퉁이 너머, 나무 숲속 등)에 보이지 않는 감지기를 만든다. 감지기는 지속시간 동안 그 자리에 머무르며, 공격받거나 달리 상호작용할 수 없다.\n\n주문을 시전할 때 보기와 듣기 중 하나를 선택한다. 마치 감지기의 공간에 있는 것처럼 그 감각을 감지기를 통해 사용할 수 있다. 행동을 사용해 보기와 듣기를 전환할 수 있다.\n\n감지기를 볼 수 있는 크리처(투명체 감지나 진시야의 이득을 받는 크리처 등)는 주먹만 한 크기의 빛나는 무형의 구체를 본다.","higher_level_ko":"","damage_ko":"","material_ko":"보기 위한 유리 눈이나 듣기 위한 보석 뿔 등, 100gp 이상 가치의 초점 매개체."},{"name_ko":"파괴의 파도","name_en":"Destructive Wave","level":5,"school":"방출계","components":["V"],"ritual":false,"concentration":false,"srd":false,"range_en":"","casting_time_en":"","duration_en":"","material_en":"","higher_level_en":"","desc_en":"","damage_en":"","attack_type":"","range_ko":"","casting_time_ko":"","duration_ko":"","desc_ko":"","higher_level_ko":"","damage_ko":"","material_ko":""},{"name_ko":"패밀리어 찾기","name_en":"Find Familiar","level":1,"school":"조형계","components":["V","S","M"],"ritual":true,"concentration":false,"srd":true,"range_en":"10 feet","casting_time_en":"1 hour","duration_en":"Instantaneous","material_en":"10gp worth of charcoal, incense, and herbs that must be consumed by fire in a brass brazier.","higher_level_en":"","desc_en":"You gain the service of a familiar, a spirit that takes an animal form you choose: bat, cat, crab, frog (toad), hawk, lizard, octopus, owl, poisonous snake, fish (quipper), rat, raven, sea horse, spider, or weasel. Appearing in an unoccupied space within range, the familiar has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of a beast.\n\nYour familiar acts independently of you, but it always obeys your commands. In combat, it rolls its own initiative and acts on its own turn. A familiar can't attack, but it can take other actions as normal.\n\nWhen the familiar drops to 0 hit points, it disappears, leaving behind no physical form. It reappears after you cast this spell again.\n\nWhile your familiar is within 100 feet of you, you can communicate with it telepathically. Additionally, as an action, you can see through your familiar's eyes and hear what it hears until the start of your next turn, gaining the benefits of any special senses that the familiar has. During this time, you are deaf and blind with regard to your own senses.\n\nAs an action, you can temporarily dismiss your familiar. It disappears into a pocket dimension where it awaits your summons. Alternatively, you can dismiss it forever. As an action while it is temporarily dismissed, you can cause it to reappear in any unoccupied space within 30 feet of you.\n\nYou can't have more than one familiar at a time. If you cast this spell while you already have a familiar, you instead cause it to adopt a new form. Choose one of the forms from the above list. Your familiar transforms into the chosen creature.\n\nFinally, when you cast a spell with a range of touch, your familiar can deliver the spell as if it had
