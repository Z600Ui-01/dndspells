<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D 5e 주문 목록</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
:root{
  --ink:#0a0a0a;
  --bg:#ffffff;
  --line:#e6e6e6;
  --line-strong:#d0d0d0;
  --muted:#8a8a8a;
  --sub:#5f5f5f;
  --chip-bg:#f4f4f4;
  --active-bg:#0a0a0a;
  --active-fg:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding:0;
}
.wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px;}

header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:20px;}
h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;}
.subtitle{font-size:13px;color:var(--muted);margin-top:6px;}

.controls{position:sticky;top:0;background:var(--bg);z-index:10;padding:16px 0 14px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.searchbar{position:relative;margin-bottom:14px;}
.searchbar input{
  width:100%;height:46px;border:1px solid var(--line-strong);border-radius:10px;
  padding:0 16px 0 42px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);
  transition:border-color .15s;
}
.searchbar input:focus{outline:none;border-color:var(--ink);}
.searchbar input::placeholder{color:var(--muted);}
.searchbar .icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted);}

.filter-row{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:2px;}
.filter-group{display:flex;flex-direction:column;gap:7px;}
.filter-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  border:1px solid var(--line-strong);background:var(--bg);color:var(--sub);
  font-family:inherit;font-size:13px;font-weight:500;
  padding:5px 11px;border-radius:7px;cursor:pointer;user-select:none;
  transition:all .12s;white-space:nowrap;
}
.chip:hover{border-color:var(--ink);color:var(--ink);}
.chip.active{background:var(--active-bg);color:var(--active-fg);border-color:var(--active-bg);}

.meta-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 2px 12px;font-size:13px;color:var(--muted);flex-wrap:wrap;gap:8px;}
.reset{font-family:inherit;font-size:12px;color:var(--sub);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:2px 0;}
.reset:hover{color:var(--ink);}
.sort-select{font-family:inherit;font-size:12px;border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;color:var(--sub);background:var(--bg);cursor:pointer;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}

.card{
  border:none;border-radius:14px;padding:16px 16px;
  background:var(--bg);display:flex;flex-direction:column;gap:9px;
  box-shadow:0 1px 2px rgba(10,10,10,0.04), 0 4px 16px rgba(10,10,10,0.07);
  transition:box-shadow .15s, transform .1s;
}
.card:hover{box-shadow:0 2px 4px rgba(10,10,10,0.06), 0 8px 24px rgba(10,10,10,0.11);transform:translateY(-1px);}
.card-top{display:flex;align-items:center;gap:7px;}
.school-icon{width:17px;height:17px;color:var(--ink);flex:none;}
.school-icon svg{width:100%;height:100%;display:block;}
.school-tag{font-size:11px;font-weight:600;color:var(--ink);letter-spacing:0.02em;}
.card-name{font-size:17px;font-weight:700;letter-spacing:-0.01em;line-height:1.25;}
.card-en{font-size:12px;color:var(--muted);margin-top:1px;line-height:1.3;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:1px;padding-top:10px;border-top:1px solid var(--line);}
.level-badge{font-size:12px;font-weight:600;color:var(--sub);}
.comps{display:flex;gap:4px;}
.comp{
  font-size:11px;font-weight:600;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  border-radius:5px;background:var(--chip-bg);color:var(--sub);
}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}

@media (max-width:520px){
  .wrap{padding:20px 14px 60px;}
  h1{font-size:22px;}
  .grid{grid-template-columns:1fr 1fr;gap:12px;}
  .card-name{font-size:15px;}
  .filter-row{gap:14px;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>D&amp;D 5e 주문 목록</h1>
    <p class="subtitle">총 <span id="total">0</span>개</p>
  </header>

  <div class="controls">
    <div class="searchbar">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="주문 이름 검색 (한글 또는 영어)" autocomplete="off">
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">레벨</span>
        <div class="chips" id="level-chips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">계열</span>
        <div class="chips" id="school-chips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">구성요소</span>
        <div class="chips" id="comp-chips"></div>
      </div>
    </div>
  </div>

  <div class="meta-bar">
    <span id="count">0개 표시 중</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <select class="sort-select" id="sort">
        <option value="ko">가나다순</option>
        <option value="level-asc">레벨 낮은순</option>
        <option value="level-desc">레벨 높은순</option>
        <option value="en">영어명순</option>
      </select>
      <button class="reset" id="reset">필터 초기화</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">조건에 맞는 주문이 없어요.</div>
</div>

const SCHOOLS = ["방출계","방호계","변환계","사령계","예지계","조형계","환영계","환혹계"];
const COMPS = ["V","S","M"];

// 계열별 아이콘 (stroke 기반 SVG, currentColor 상속)
const ICONS = {
  "방출계":"ti-flame",
  "방호계":"ti-shield",
  "변환계":"ti-transform",
  "사령계":"ti-skull",
  "예지계":"ti-eye",
  "조형계":"ti-sparkles",
  "환영계":"ti-ghost-2",
  "환혹계":"ti-wand"
}

const state = { search:"", levels:new Set(), schools:new Set(), comps:new Set(), sort:"ko" };

document.getElementById("total").textContent = SPELLS.length;

function levelLabel(l){ return l===0 ? "소마법" : l+"레벨"; }

const levelChips = document.getElementById("level-chips");
for(let l=0;l<=9;l++){
  const b=document.createElement("button");
  b.className="chip"; b.textContent = l===0?"소마법":l; b.dataset.level=l;
  b.onclick=()=>{ toggle(state.levels,l,b); render(); };
  levelChips.appendChild(b);
}
const schoolChips = document.getElementById("school-chips");
SCHOOLS.forEach(s=>{
  const b=document.createElement("button");
  b.className="chip"; b.textContent=s.replace("계",""); b.dataset.school=s;
  b.onclick=()=>{ toggle(state.schools,s,b); render(); };
  schoolChips.appendChild(b);
});
const compChips = document.getElementById("comp-chips");
COMPS.forEach(c=>{
  const b=document.createElement("button");
  b.className="chip"; b.textContent=c; b.dataset.comp=c;
  b.onclick=()=>{ toggle(state.comps,c,b); render(); };
  compChips.appendChild(b);
});

function toggle(set,val,btn){
  if(set.has(val)){ set.delete(val); btn.classList.remove("active"); }
  else{ set.add(val); btn.classList.add("active"); }
}

document.getElementById("search").addEventListener("input",e=>{
  state.search = e.target.value.trim().toLowerCase();
  render();
});
document.getElementById("sort").addEventListener("change",e=>{
  state.sort = e.target.value; render();
});
document.getElementById("reset").addEventListener("click",()=>{
  state.search=""; state.levels.clear(); state.schools.clear(); state.comps.clear();
  document.getElementById("search").value="";
  document.querySelectorAll(".chip.active").forEach(c=>c.classList.remove("active"));
  render();
});

function match(sp){
  if(state.search){
    const hay=(sp.name_ko+" "+sp.name_en).toLowerCase();
    if(!hay.includes(state.search)) return false;
  }
  if(state.levels.size && !state.levels.has(sp.level)) return false;
  if(state.schools.size && !state.schools.has(sp.school)) return false;
  if(state.comps.size){
    for(const c of state.comps){ if(!sp.components.includes(c)) return false; }
  }
  return true;
}

function sortList(list){
  const s=state.sort;
  return list.sort((a,b)=>{
    if(s==="ko") return a.name_ko.localeCompare(b.name_ko,"ko");
    if(s==="en") return a.name_en.localeCompare(b.name_en,"en");
    if(s==="level-asc") return a.level-b.level || a.name_ko.localeCompare(b.name_ko,"ko");
    if(s==="level-desc") return b.level-a.level || a.name_ko.localeCompare(b.name_ko,"ko");
    return 0;
  });
}

const grid=document.getElementById("grid");
const empty=document.getElementById("empty");
const countEl=document.getElementById("count");

function render(){
  const filtered = sortList(SPELLS.filter(match));
  countEl.textContent = filtered.length+"개 표시 중";
  if(filtered.length===0){ grid.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  const frag=document.createDocumentFragment();
  filtered.forEach(sp=>{
    const card=document.createElement("div");
    card.className="card";
    const comps=sp.components.map(c=>`<span class="comp">${c}</span>`).join("");
    const iconClass=ICONS[sp.school]||"";
    card.innerHTML=
      `<div class="card-top"><i class="ti ${iconClass} school-icon" aria-hidden="true"></i><span class="school-tag">${sp.school}</span></div>`+
      `<div><div class="card-name">${sp.name_ko}</div><div class="card-en">${sp.name_en}</div></div>`+
      `<div class="card-bottom"><span class="level-badge">${levelLabel(sp.level)}</span><span class="comps">${comps}</span></div>`;
    frag.appendChild(card);
  });
  grid.innerHTML="";
  grid.appendChild(frag);
}

render();
</script>
